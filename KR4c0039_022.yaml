front:
  text: 唐陸宣公集卷第二十二中書奏議卷第六
  hash: sha256:a1418e6dae016768cbfbc1d6efc5389ea2a144f715ea321127edfadfeb01d312
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_022-1a}
body:
  text: 均節賦稅恤百姓六條其一論兩稅之弊須有釐革國朝著令賦役之法有三一曰租二曰調三曰庸古者一井之地九夫共之公田在中藉而不稅私田不善則非吏公田不善則非民事頗纎微難於防檢春秋之際巳不能行故國家襲其要而去其煩丁男一人授田百畝但歲納租粟二石而巳言以公田假人而收其租入故謂之租古者任土之冝以奠賦法國家就因往制簡而一之每丁各隨鄉土所出歲輸若絹若綾若絁共二丈綿三兩其無蠶桑之處則輸布二丈五尺麻三斤以其據丁戶調而取之故謂之調古者用人之力歲不過三日後代多事其增十之國家斟酌物冝立為中制每丁一歲定役二旬若不役則收其庸日凖三尺以其出絹而當庸直故謂之庸此三道者皆宗本前哲之規模參考歷代之利害其取法也逺其立意也深其斂財也均其域人也固其裁規也簡其備慮也周有田則有租有家則有調有身則有庸天下為家法制均一雖欲轉徙莫容其姦故人無搖心而事有定制以之厚生則不隄防而家業可久以之成務則不校閲而衆寡可知以之為理則法不煩而教化行以之成賦則下不困而上用足三代創制百王是程雖維御損益之術小殊而其義一也天寶季歲羯胡亂華海內波搖兆庶雲擾版圗隳於避地賦法壞於奉軍建中之初再造百度執事者知弊之冝革而所作兼失其源知簡之可從而所操不得其要舊患雖減新沴復滋救跛成痿展轉增劇凡欲拯其積弊須窮致弊之由時弊則但理其時法弊則全革其法而又揆新校舊慮逺圖難規略未詳悉固不果行利害非相縣固不苟變所為必當其悔乃亡若好革而不知原始要終斯皆以弊易弊者也至如賦役舊法乃是聖祖典章行之百年人以為便兵興之後供億不恆乘急誅求漸隳經制此所謂時之弊非法弊也時有弊而未理法無弊而巳更掃庸調之成規創兩稅之新制立意且爽彌綸又踈竭耗編氓日日滋甚夫作法𥙿於人未有不得人者也作法𥙿於財未有不失人者也陛下初膺寶位思致理平誕發德音哀痛流弊念徴役之頻重憫蒸黎之困窮分命使臣敷揚惠化誠冝損上益下嗇用節財窒侈欲以蕩其貪風息冗費以紓其厚斂而乃搜摘郡邑劾驗簿書每州各取大曆中一年科率錢榖數最多者便為兩稅定額此乃採非法之權令以為經制揔無名之暴賦以立恆規是務取財豈云恤隱作法而不以裕人拯病為本得非立意且爽者乎夫財之所生必因人力工而能勤則豐冨拙而兼墮則窶空是以先王之制賦入也必以丁夫為本無求於力分之外無貸於力分之內故不以務穡增其稅不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其庸則功力勤如是然後能使人安其居盡其力相觀而化時靡遁心雖有墮遊不率之人亦已懲矣兩稅之立則異於斯唯以資産為宗不以丁身為本資産少者則其稅少資産多者則其稅多曽不悟資産之中事情不一有藏於襟懷囊篋物雖貴而人莫能窺有積於埸圃囤倉直雖輕而衆以為冨有流通蕃息之貨數雖寡而計日收贏有廬舍器用之資價雖髙而終歲無利如此之比其流實繁一槩計估算緡冝其失平長僞由是務輕費而樂轉徙者恆脫於徭稅敦本業而樹居産者每困於徴求此乃誘之為姦歐之避役力用不得不弛風俗不得不訛閭井不得不殘賦入不得不闕復以創制之首不務齊平但令本道本州各依舊額徴稅軍興巳久事例不常供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸既成新規須懲積弊化之所在足使無偏減重分輕是將均濟而乃急於聚斂懼或蠲除不量物力所堪唯以舊額為凖舊重之處流亡益多舊輕之鄉歸附益衆有流亡則巳重者攤徴轉重有歸附則巳輕者散出轉輕髙下相傾勢何能止又以謀始之際不立科條分遣使臣凡十餘輩專行其意各制一隅遂使人殊見道異法低昻不類緩急不倫逮至復命于朝竟無類㑹裁處其於踳駮胡可勝言利害相形事尤非便作法而不以究微防患為慮得非彌綸又踈者乎立意且爽彌綸又踈凡厥疲人巳嬰其弊就加保育猶懼不支況復亟繚棼絲重傷宿痏其為擾病抑又甚焉請為陛下舉其尤者六七端則人之困窮固可知矣大曆中紀綱廢弛百事從權至於率稅少多皆在牧守裁制邦賦既無定限官私懼有闕供每至徵配之初例必廣張名數以備不時之命且為施惠之資應用有餘則遂減放增損既由郡邑消息易協物冝故法雖久刓而人未甚瘁及揔雜徴虛數以為兩稅恆規悉登地官咸繫經費計奏一定有加無除此則人益困窮其事一也本懲賦斂繁重所以變舊從新新法既行巳重於舊旋屬征討國用不充復以供軍為名每貫加徴二百當道或增戎旅又許量事取資詔勑皆謂權冝悉令事畢停罷息兵巳久加稅如初此則人益困窮其事二也定稅之數皆計緡錢納稅之時多配綾絹往者納絹一匹當錢三千二三百文今者納絹一匹當錢一千五六百文往輸其一者今過於二矣雖官非增賦而私巳倍輸此則人益困窮其事三也諸州稅物送至上都度支頒給羣司例皆增長本價而又繆稱折估抑使剝徴姦吏因緣得行侵奪所獲殊寡所擾殊多此則人益困窮其事四也稅法之重若是既於巳極之中而復有奉進宣索之繁尚在其外方嶽頗拘於成例莫敢闕供朝典又束以彛章不許别稅綺麗之飾紈素之饒非從地生非自天降若不出編戶之筋力膏髓將安所取哉於是有巧避微文曲承睿㫖變徴役以召雇之目換科配以和市之名廣其課而狹償其庸精其入而粗計其直以召雇為目而捕之不得不來以和市為名而迫之不得不出其為妨抑特甚常徭此則人益困窮其事五也大曆中非法賦斂急備供軍折估宣索進奉之類者既並收入兩稅矣今於兩稅之外非法之事復又並存此則人益困窮其事六也建中定稅之始諸道巳不均齊其後或吏理失冝或兵賦偏重或癘疾鍾害或水旱荐灾田里荒蕪戶口減耗牧守苟避於殿責罕盡申聞所司姑務於取求莫肯矜恤遂於逃死闕乏稅額纍加見在疲氓一室巳空四鄰繼盡漸行增廣何由自存此則人益困窮其事七也自至德訖干大曆二十年餘兵亂相乘海內罷弊幸遇陛下紹膺寶運憂濟生靈誕敷聖謨痛矯前弊重愛人節用之㫖宣輕徭薄賦之名率土蒸黎感涕相賀延頸企踵咸以為太平可期既而制失其中斂從其重頗乖始望巳沮羣心因之以兵甲而煩暴之取轉加繼之以獻求而靜約之風浸靡臣所知者才梗槩耳而人益困窮之事巳有七焉臣所不知何啻於此陛下儻追思大曆中所聞人間疾苦而又有此七事重增於前則人之無聊不問可悉昔魯哀公問於有若曰年飢用不足如之何有若對曰盍徹乎哀公曰二吾猶不足如之何其徹也有若曰百姓足君孰與不足百姓不足君孰與足孔子曰有國有家者不患寡而患不均不患貧而患不安蓋均而無怨節而無貧和而無寡安而無傾漢文恤患救災則命郡國無來獻是以人為本以財為末人安則財贍本固則邦寧今百姓艱窮非止不足稅額類例非止不均求取繁多非止來獻誠可哀憫亦可憂危此而不圖何者為急聖情重愼每戒作為伏知貴欲因循不敢盡求釐革且去其太甚亦足小休望令所司與宰臣參量據每年支用色目中有不急者無益者罷廢之有過制者廣費者減節之遂以罷減之資回給要切之用其百姓稅錢頃因軍興每貫加徵二伯者下詔停之用復其言俾人知信下之化上不令而行諸道權冝加徴亦當自請蠲放如是則因窮之中十緩其二三矣供御之物各有典司任土之儀各有常貢過此以往復何所須假欲崇飾燕居儲備賜與天子之貴寧憂乏財但勑有司何求不給豈必旁延進獻別徇營求減德示私傷風敗法因依縱擾為害最深陛下臨御之初巳弘清淨之化下無曲獻上絶私求近歲巳來稍渝前旨今但滌除流誤振起聖猷則淳風再興賄道中寢雖有貪叨之輩曷由復肆侵漁州郡羡財亦將焉往若不上輸王府理須下紓疲人如是則困窮之中十又緩其四五矣所定稅物估價合依當處月中百姓輸納之時纍經州縣簡閲事或涉於姦黨過則不在戶人重重剝徴理甚無謂望令所司應諸州府送稅物到京但與色樣相符不得虛稱折估如濫惡尤甚給用不充唯罪元納官司亦勿更徴百姓根本既自端靜枝葉無因動搖如是則困窮之中十又緩其二三矣然後據每年見供賦稅之處詳諭詔旨咸俾均平每道各令知兩稅判官一人赴京與度支類㑹參定通計戶數以配稅錢輕重之間犬約可准而又量土地之沃瘠計物産之少多倫比諸州定為兩等州等下者其每戶配錢之數少州等髙者其每戶配錢之數多多少巳差悉令折衷仍委觀察使更於當管所配錢數之內均融處置務盡事宜就於一管之中輕重不得偏併雖或未盡齊一决當不甚低昻既免擾人且不變法粗均勞逸足救凋殘非但徴賦易供亦兾逋逃漸息俟稍寧阜更擇所冝其二請兩稅以布帛為額不計錢數夫國家之制賦稅也必先導以厚生之業而後取其什一焉其所取也量人之力任土之冝非力之所出則不征非土之所有則不貢謂之通法歷代常行大凡生於天地之間而五材之用為急五材者金木水火土也水火不資於作為金木自産於山澤唯土爰播植非力不成衣食之源皆出於此故可以勉人功定賦入者唯布麻繒纊與百榖焉先王懼物之貴賤失平而人之交易難准又立貨泉之法以節輕重之冝斂散弛張必由於是蓋御財之大柄為國之利權守之在官不以任下然則榖帛者人之所為也錢貨者官之所為也人之所為者故租稅取焉官之所為者故賦斂捨焉此又事理著明者也是以國朝著令稽古作程所取於人不踰其分租出榖庸出絹調雜出繒纊布麻非此族也不在賦法列聖遺典粲然可徴曷常有禁人鑄錢而以錢為賦者也今之兩稅獨異舊章違任土之通方效算緡之末法不稽事理不揆人功但估資産為差便以錢榖定稅臨時折徴雜物每歲色目頗殊唯計求得之利冝靡論供辦之難易所徴非所業所業非所徴遂或增價以買其所無減價以賣其所有一增一減耗損巳多且百姓所營唯在耕織人力之作為有限物價之貴賤無恆而乃定稅計錢折錢納物是將有限之産以奉無恆之輸納物賤則供稅之所出漸多多則人力不給納物貴則收稅之所入漸少少則國用不充公私二途常不兼濟以此為法未之前聞往者初定雨稅之時百姓納稅一匹折錢三千二三百文大率萬錢為絹三匹價計稍貴數則不多及乎頒給軍裝計數而不計價此所謂稅入少而國用不充者也近者百姓納絹一匹折錢一千五六百文大率萬錢為絹六匹價既轉賤數則漸加向之𧖟織不殊而所輸尚欲過倍此所謂供稅多而人力不給者也今欲不甚改法而粗救災害者在乎約循典制而以時變損益之臣謂冝令所司勘㑹諸州府𥘉納兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數仍依庸調舊制各隨鄉土所冝某州某年定出稅布若干端某州某年定出稅絹若干匹其有絁綿雜貨亦隨所出定名勿更計錢以為稅數如此則土有常制人有常輸衆皆知上令之不遷於是一其心而專其業應出布麻者則務於紡績供綿絹者則事於𧖟桑日作月營自然便習各修家技皆足供官無求人假手之勞無賤鬻貴買之費無暴徴急辦之弊無易常改作之煩物甚賤而人之所出不加物甚貴而官之所入不減是以家給而國足事均而法行此直稍循令典之舊規固非創制之可疑者也然蚩蚩之俗罕究事情好騁異端妄行沮議臣請假為問答以備討論陛下誠有意乎憐愍蒼生將務救恤但垂聽覽必有可行議者若曰每歲經費所資大抵皆約錢數若令以布帛為額是令支計無慿答曰國𥘉約法巳來常賦率由布帛輸二甲子制用不愆何獨當今則難支計且經費之大其流有三軍食一也軍衣二也內外官月俸及諸色資課三也軍衣固在於布帛軍食又取於地租其計錢為數者獨月俸資課而巳制祿唯不計錢故三代以食人衆寡為差兩漢以石數多少為秩蓋以錢者官府之權貨祿者吏屬之常資以常徇權則豐約之度不得恆於家以權為常則輕重之柄不得專於國故先王制祿以食而平貨以錢然後國有權而家有節矣況今餽餉方廣倉儲未豐盡復古規或慮不足若但據羣官月俸之等隨百役資課之差各依錢數少多折為布帛定數某官月給俸絹若干匹某役月給資布若干端所給色目精粗有司明立條例便為恆制更不計錢物甚賤而官之所給不加物甚貴而私之所禀不減官私有准何利如之生人大端衣食為切有職田以供食有俸絹以供衣從事之家固足自給以兹制事誰曰不然夫然則國之用財多是布帛定以為賦復何所傷議者若曰吏祿軍裝雖頒布粟至於以時斂糴用權物價重輕是必須錢於何取給答曰古之聖人所以取山澤之藴材作泉布之寶貨國專其利而不與人共之者蓋為此也物賤由乎錢少少則重重則加鑄而散之使輕物貴由乎錢多多則輕輕則作法而斂之使重是乃物之貴賤繫於錢之多少錢之多少在於官之盈縮官失其守反求於人人不得鑄錢而限令供稅是使貧者破産而假資於冨有之室冨者蓄貨而竊行於輕重之權下困齊人上虧利柄今之所病諒在於斯誠冝廣即山殖貨之功峻用銅為器之禁苟制持得所則錢不乏矣有糶鹽以入其直有榷酒以納其資苟消息合冝則錢可收矣錢可收固可以斂輕為重錢不乏固可以散重為輕弛張在官何所不可慮無所給是未知方議者若曰自定兩稅以來恆使計錢納物物價漸賤所納漸多出給之時又增虛估廣求羡利以贍庫錢歲計月支猶患不足今若定供布帛出納以平軍國之資無乃有闕答曰自天寶以後師旅數起法度消亡肅宗撥滔天之灾而急於功賞先帝邁含垢之德而緩於糾繩由是用頗殷繁俗亦靡弊公賦巳重別獻繼興别獻既行私賂竟長誅求刻剝日長月滋積纍以至于大曆之間所謂取之極甚者也今既揔收極甚之數定為兩稅矣所定別獻之類復在數外矣間緣軍用不給巳嘗加徴矣近屬折納價錢則又多獲矣比於大曆極甚之數殆將再益其倍焉復幸年穀屢豐兵車少息而用常不足其故何哉蓋以事逐情生費從事廣物有劑而用無節夫安得不乏乎苟能黜其情約其用非但可以布帛為稅雖更減其稅亦可也苟務逞其情侈其用非但行今重稅之不足雖更加其稅亦不足也夫地力之生物有大數人力之成物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難下無困窮理化既衰則乃反是量出為入不恤所無故魯哀公問年饑用不足如之何有若對以盍徹桀用天下而不足湯用七十里而有餘是乃用之盈虛在節與不節耳不節則雖盈必竭能節則雖虛必盈衛文公承滅國之餘建新徙之業革車不過三十乘豈不甚殆哉而能衣大布冠大帛約已率下通商務農卒以冨強見稱載籍漢文帝接秦項積久傷夷之弊繼髙吕革創多事之時家國虛殘日不暇給而能躬儉節用靜事息人服弋綈履革舄却駿馬而不御罷露臺而不修屢賜田租以厚蒸庶遂使戶口蕃息百物阜殷乃至鄉曲宴遊乘牝牸者不得赴㑹子孫生長或有積數十歲不識市廛御府之錢貫朽而不可校太倉之粟紅腐而不可食國冨於上人安於下生享遐福沒垂令名人到于今稱其仁賢可謂盛矣太宗文皇帝收合板蕩再造寰區武德年中革車屢動繼以災歉人多流離貞觀之𥘉荐屬霜旱自關輔綿及三河之地米價騰貴斗易一縑道路之間餒殍相藉太宗敦行儉約撫養困窮視人如傷勞徠不倦百姓有鬻男女者出御府金帛贖還其家嚴禁貪殘愼節徭賦弛不急之用省無事之官黜損乘輿斥出宫女太宗嘗有氣疾百官以大內卑濕請營一閣以居尚憚煩勞竟不之許是以至誠上感淳化下敷四方大和百榖連稔貞觀八年以後米斗至四五錢俗阜化行人知義讓行旅萬里或不齎糧故人到于今談帝王之盛則必先太宗之聖功論理道之崇則必慕貞觀之故事此三君者其經始豈不艱窘哉皆以嗇用愛人竟獲豐福是所謂能節雖虛必盈之效也秦始皇據崤函之固藉雄富之業專力農戰廣收材豪故能芟滅暴強宰制天下功成志滿自謂有太山之安貪欲熾然以為六合莫豫違也於是發閭左之戍徴太半之賦進諌者謂之宣謗恤隱者謂之收恩故徴發未終而宗社巳泯漢武帝遇時運理平之㑹承文景勤儉之積內廣興作外張甲兵侈汰無窮遂至殫竭大搜財貨算及舟車逺近騷然幾至顚覆賴武帝英姿大度付任以能納諌無疑改過不吝下哀痛之詔罷征伐之勞封丞相為冨民侯以示休息邦本搖而復定帝祚危而再安隋氏因周室平齊之資府庫充實開皇之際理尚清廉是時公私豐饒議者以比漢之文景煬帝嗣位肆行驕奢竭耗生靈不知止息海內怨叛以至於亡此三君者其所慿藉豈不豐厚哉此皆以縱欲殘人竟致蹙喪是所謂不節則雖盈必竭之效也秦隋不悟而遂滅漢武中悔而獲存乃知懲與不懲覺與不覺其於得失相逺復有存滅之殊安可不思安可不懼今人窮日甚國用歲加不時節量其勢必蹙而議者但憂財利之不足罔慮安危之不持若然者則太宗漢文之德曷見稱秦皇隋煬之敗靡足戒唯欲是逞復何規哉幸屬休明將期致理急聚斂而忽於勤恤固非聖代之所冝言也其三論長吏以增戶加稅闢田為課績夫欲施教化立度程必先域人使之地著古之王者設井田之法以安其業立五宗之制以綴其恩猶懼其未也又教之族墳墓敬桑梓將以固人之志定人之居俾皆重遷然可為理厥後又督之以出鄉遊墮之禁糾之以板圖比閲之方雖訓導漸微而檢制猶密歷代因襲以為彛章其理也必謹於隄防其亂也必慢於經界斯道崇替與時興衰人主失之則不可御寰區守長失之則不可釐郡邑理人之要莫急於兹頃因兵興典制弛廢戶板之紀綱罔緝土斷之條約不明恣人浮流莫克禁止縱之則湊集整之則驚離恆懷幸心靡固本業是以賦稅不一教令不行長人者又罕能推忠恕易地之情體至公徇國之意迭行小惠竟誘姦氓以傾奪鄰境為智能以招萃逋逃為理化捨彼適此者既謂新收而獲宥倐忽往來者又以復業而見優唯懷土安居首末不遷者則使之日重斂之日加是令地著之人恆代墮游服役則何異驅之轉徙教之澆訛此由牧宰不克弘通各私所部之過也及夫廉使奏課㑹府考功但守常規不稽時變其所以為長吏之能者大約在於四科一曰戶口增加二曰田野墾闢三曰稅錢長數四曰徴辦先期此四者誠吏職之所崇然立法齊人久無不弊法之所沮則人飾巧而苟避其網法之所勸則人興僞以曲附其文理之者若不知維御損益之冝則巧僞萌生恆因沮勸而滋矣夫課吏之法所貴戶口增加者豈不以撫字得所人益阜蕃乎今或詭情以誘其姦浮苛法以析其親族苟益戶數務登賞條所誘者將議薄征巳遽驚散所析者不勝重稅又漸流亡州縣破傷多起於此長吏相效以為績安忍莫懲齊人相扇以成風規避轉甚不究實而務增戶口有如是之病焉所貴田野墾闢者豈不以訓導有術人皆樂業乎今或牽率黎蒸播植荒廢約以年限免其地租苟農夫不增而墾田欲廣新畝雖闢舊畬反蕪人利免租頗亦從令年限才滿復為汙萊有益煩勞無增稼穡不度力而務闢田野有如是之病焉所貴稅錢長數者豈不以既庶而冨人可加賦乎今或重困疲羸力求附益捶骨瀝髓隳家取財苟媚聚斂之司以為仕進之路不恤人而務長稅數有如是之病焉所貴徴辦先期者豈不以物力優贍人皆樂輸乎今或肆毒作威殘人逞欲事有常限因而促之不量時冝唯尚強濟絲不容織粟不暇舂矧伊貧虛能不奔逬不恕物而務先徴辦有如是之病焉然則引人逋逃蹙人艱窘唯兹四病亦有助焉此由考核不切事情而泛循舊轍之過也且夫戶口增加田野墾闢稅錢長數徴辦先期若不以實事驗之則真僞莫得而辨將驗之以實則租賦須加所加既出於人固有受其損者此州若增客戶彼郡必減居人增處邀賞而稅數有加減處懼罪而稅數不降儻國家所設考課之法必欲崇於聚斂則如斯可矣將有意乎冨俗而務理豈不刺謬歟當今之要在於厚人而薄財損上以益下下苟利矣上必安焉則少損者所以招大益也人既厚矣財必贍焉則暫薄者所以成永厚也臣愚謂冝申命有司詳定考績往貴於加者今務於減焉假如一州之中所稅舊有定額凡管幾許百姓復作幾等差科每等有若干戶人每戶出若干稅物各令條舉都數年別一申使司使司詳覆有憑然後録報戶部若當管之內人益阜殷所定稅額有餘任其據戶均減率計減數多少以為考課等差其當管稅物通比校每戶十分減三分者為上課十分減二分者次焉十分減一分者又次焉如或人多流亡加稅見戶比校殿罰法亦如之其百姓所出田租則各以去年應輸之數便為定額每歲據額徵納更不勘責檢巡增闢者勿益其租廢耕者不降其數足以誘導墾植且免妨奪農功事簡體弘人必恱勸每至定戶之際但據雜産校量田既自有恆租不冝更入兩稅如此則吏無苟且俗變澆浮不督課而人自樂耕不防間而衆皆安土斯亦當今冨人固本之要術在陛下舉而行之其四論稅期限迫促建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而斂其餘財遂人所營恤人所乏借必以度斂必以時有度則忘勞得時則易給是以官事無闕人力不殫公私相全上下交愛古之得衆者其率用此歟法制或虧本末倒置但務取人以資國不思立國以養人非獨徭賦繁多敻無蠲貸至於徴收迫促亦不矜量蠶事方興巳輸縑稅農功未艾遽斂榖租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬所繫遲速之間不過月旬之異一寬稅限歲歲相承遲無所妨速不為益何急敦逼重傷疲人頃緣定稅之𥘉期約未甚詳衷旋屬征役多故復令先限量徴近雖優延尚未均濟望委轉運使與諸道觀察使商議更詳定徴稅期限聞奏各隨當土風俗所便時候所冝務於紓人俾得辦集所謂惠而不費者則此類也其五請以稅茶錢置義倉以備水旱臣聞仁君在上則海內無餒殍之人豈必耕而餉之㸑而食之哉蓋以慮得其冝制得其道致人於歉乏之外設備於災沴之前是以年雖大殺衆不恇懼夫水旱為敗堯湯𬒳之矣隂陽相寇聖何禦哉所貴堯湯之盛者在於遭患能濟耳凡厥哲后皆謹循之故王制記虞夏殷周四代之法乃云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也周官司徒之屬亦云掌鄉里之委積以恤艱厄縣鄙之委積以待凶荒王制既衰雜以權術魏用平糴之法漢置常平之倉利兼公私頗亦為便隋氏立制始創社倉終於開皇人不饑饉貞觀𥘉戴胄建積榖備災之議太宗恱焉因命有司詳立條制所在貯粟號為義倉豐則斂藏歉則散給歷髙宗之代五六十載人賴其資國步中艱斯制亦弛開元之際漸復修崇是知儲積備災聖王之急務也語曰百姓足君孰與不足百姓不足君孰與足此言君養人以成國人戴君以成生上下相成事如一體然則古稱九年六年之蓄者蓋率土臣庶通為之計耳固非獨豐公庾不及編氓記所謂雖有凶旱水溢人無菜色良以此也後代失典籍備慮之㫖忘先王子愛之心所蓄糧儲唯計廪庾犬彘猒人之食而不知檢溝壑委人之骨而不能恤亂興於下禍延於上雖有公粟豈得而食諸故立國而不先養人國固不立矣養人而不先足食人固不養矣足食而不先備災食固不足矣為官而備者人必不贍為人而備者官必不窮是故論德昏明在乎所務本末務本則其末自遂務末則其本兼亡國本於人安得不務頃以寇戎為梗師旅亟興惠恤之方多所未暇每遇隂陽愆候年不順成官司所儲祗給軍食支計苟有所闕猶須更取於人人之凶荒豈遑賑救人小乏則求取息利人大乏則賣鬻田廬幸逢有年才償逋債斂穫始畢糇糧巳空執契擔囊行復貸假重重計息食每不充儻遇荐饑遂至顚沛室家相棄骨肉分離乞為奴僕猶莫之售或行丐廛里或縊死道途天災流行四方代有率計𬒳其害者每歲常不下一二十州以陛下為人父母之心若垂省憂固足傷惻幸有可救乏之道焉可捨而不念哉今賦役巳繁人力已竭窮歲汲汲永無贏餘課之聚糧終不能致將樹儲蓄根本必藉官司助成陛下誠能為人備災過聽愚計不害經費可垂永圖近者有司奏請稅茶歲約得五十萬貫元勑令貯户部用救百姓凶饑今以蓄糧適副前旨望令轉運使揔計諸道戶口多少每年所得稅茶錢使均融分配各令當道巡院主掌每至榖麥熟時即與觀察使計㑹散就管內州縣和糴便於當處置倉收納每州令録事參軍專知仍定觀察判官一人與和糴巡院官同勾當亦以義倉為名除賑給百姓巳外一切不得貸便支用如時當大稔事至傷農則優與價錢廣其糴數榖若稍貴糴亦便停所糴少多與年上下准平榖價恆使得中每遇災荒即以賑給小歉則隨事借貸大飢則録奏分頒許從便冝務使周濟循環斂散遂以為常如此則蓄財息債者不能耗吾人聚榖幸災者無以牟大利冨不至侈貧不至飢農不至傷糴不至貴一舉事而衆美具可不務乎俟人小休漸勸私積平糴之法斯在社倉之制兼行不出十年之中必盈三歲之蓄弘長不巳升平可期使一代黎人永無餒乏此堯湯所以見稱於千古也願陛下遵之慕之繼之齊之苟能存誠蔑有不至其六論兼并之家私斂重於公稅國之紀綱在於制度商農工賈各有所專凡在食祿之家不得與人爭利此王者所以節材力勵廉隅是古今之所同不可得而變革者也代理則其道存而不犯代亂則其制委而不行其道存則貴賤有章豐殺有度車服田宅莫敢僣踰雖積貨財無所施設是以咸安其分罕徇貪求藏不偏多故物不偏罄用不偏厚故人不偏窮聖王能使禮讓興行而財用均足則此道也其制委則法度不守教化不從唯貨是崇唯力是騁貨力苟備無欲不成租販兼并下錮齊人之業奉養豐麗上侔王者之尊戶蓄羣黎􅊢役同輩既濟嗜欲不虞憲章肆其貪婪曷有紀極天下之物有限冨室之積無涯養一人而費百人之資則百人之食不得不乏冨一家而傾千室之産則千家之業不得不空舉類推之則海內空乏之流亦巳多矣故前代致有風俗訛靡氓庶困窮由此弊也今兹之弊則又甚焉夫物之不可掩藏而易以閲視者莫著乎田宅臣請又措其宅而勿議且舉占田一事以言之古先哲王疆理天下百畝之地號曰一夫蓋以一夫授田不得過於百畝也欲使人無廢業田無曠耕人力田疇二者適足是以貧弱不至竭涸冨厚不至奢淫法立事均斯謂制度今制度弛紊疆理隳壞恣人相吞無復畔限冨者兼地數萬畝貧者無容足之居依託強豪以為私屬貸其種食賃其田廬終年服勞無日休息罄輸所假常患不充有田之家坐食租稅貧冨懸絶乃至於斯厚斂促徴皆甚公賦今京畿之內每田一畝官稅五升而私家收租殆有畝至一石者是二十倍於官稅也降及中等租猶半之是十倍於官稅也夫以土地王者之所有耕稼農夫之所為而兼并之徒居然受利官取其一私取其十穡人安得足食公廪安得廣儲風俗安得不貪財貨安得不壅昔之為理者所以明制度而謹經界豈虛設哉斯道浸亡為日已久頓欲修整行之實難革弊化人事當有漸望令百官集議參酌古今之冝凡所占田約為條限裁減租價務利貧人法貴必行不在深刻𥙿其制以便俗嚴其令以懲違微損有餘稍優不足損不失冨優可賑窮此乃古者安冨恤窮之善經不可捨也右臣前月十一日延英奏對因叙賦稅煩重百姓困窮伏奉恩㫖令具條疏聞奏今且舉其甚者謹件如前臣聞於書曰無輕人事惟難無安厥位惟危此理之所以興也又曰厥後嗣王生則逸不知稼穡之艱難此亂之所由始也以陛下天縱聖哲事更憂危夙夜孜孜志求致理往年論及百姓必為悽然動容每言朕於蒼生支體亦無所惜臣久叨近侍亟奉德音竊謂一代黔黎必躋冨夀之域昨奏人間疾苦十分才及二三聖情巳甚驚疑皆謂臣言過當然則愁怨之事何由上聞煦育之恩何由下布典籍所戒信而有徴一虧聖猷實可深惜臣又聞於書曰非知之艱行之唯艱竊唯陛下所以驚疑於微臣之言者但聞之未熟耳此乃股肱耳目之任仰負於陛下誠所謂知之非艱尚未足深纍聖德也今則既知之矣願陛下勿復艱於所行居安思危億兆幸甚謹奏唐陸宣公集卷第二十二終
