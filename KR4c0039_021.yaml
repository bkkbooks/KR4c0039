body:
  text: 論裴延齡姦蠹書一首論朝官闕貟及刺史等改轉倫序狀論裴延齡姦蠹書一首十一月三日具官臣某惶恐頓首獻書皇帝陛下臣聞君子小人用捨不並國家否泰恆必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人於蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠹也眯離婁之目則天地四方之位不分矣充子野之耳則雷霆蠅黽之聲莫辨矣雖后稷之穡禾易長畝而蟊傷其本則零瘁而不植矣雖公輸之巧臺成九層而蠹空其中則圯折而不支矣是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而沮之哉誠以其蔽主之明害時之理致禍之源博傷善之釁深所以有國有家者不得不去耳其在周易則曰大君有命開國承家小人勿用必亂邦也在尚書則曰除惡務本去邪勿疑在毛詩則曰無縱詭隨以謹無良曽是掊克斂怨以為德盜言孔甘亂是用餤讒人罔極交亂四國在論語則曰惡利口之覆邦家者在春秋則曰聚斂積實不知紀極毀信廢忠崇飾惡言靖譛庸回服讒搜慝天下之人謂之四凶在禮記則曰小人行險以徼幸長國家而務財用者必自小人矣小人使為國家而災害並至雖有善人無如之何臣頃因讀書常憤此類不圗聖代目覩斯人戶部侍郎裴延齡者其性邪其行險其口利其志凶其矯妄不疑其敗亂無恥以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譛服讒為盡節揔典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下協放勛文思之德而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅僞則天討斯得聖化允孚小往大來孰不欣幸跡其姦蠹日長月滋隂袐者固未盡彰敗露者猶難悉數今請粗舉數事用明欺罔大端悉非隱微皆可覆驗陛下若意其負謗則誠冝亟為辦明陛下若知其無良又安可曲加容掩願擇左右親信兼與舉朝公卿據臣所言閲實其事儻延齡罪惡無狀即臣之奏議是誣冝申典刑以制虛妄俾四海法朝廷之理兆人戴陛下之明得失之間其體甚大不當復有疑慮使辨之不早以竟失天下之望也前歲秋首班宏喪亡特詔延齡繼司邦賦數月之內遽衒功能奏稱勾獲隱欺計錢二十萬貫請貯別庫以為羡財供御所須永無匱乏陛下欣然信納因謂委任得人既賴贏餘之資稍弘心意之欲興作浸廣宣索漸多延齡務實前言且希睿㫖不敢告闕不敢辭難勾獲既是虛言無以應命供辦皆承嚴約苟在及期遂乃搜求市廛豪奪入獻追捕夫匠迫脅就功以勑索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連羣遮訴盈路持綱者莫敢致詰巡察者莫敢為言時有致詰為言翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心于上斂怨於人欺天陷君逺邇危懼此其罪之大者也揔制邦用度支是司出納貨財太府攸職凡是太府出納皆禀度支文符太府依符以奉行度支憑按以勘覆互相關鍵用絶姦欺其出納之數則每旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相承月月相繼明若指掌端如貫珠財貨少多無容隱漏延齡務行邪諂公肆誣欺遂奏云左藏庫司多有失落近因檢閲使置簿書乃於糞土之中收得銀十三萬兩其匹段雜貨百萬有餘皆是文帳脫遺並同巳棄之物今所收獲即是羡餘悉合移入雜庫以供别勑支用者其時特宣進止悉依所奏施行太府少卿韋少華抗表上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗姦計兩司既相論執理須辨鞠是非臣等具以奏聞請定三司詳覆若左藏庫遺漏不謬隱匿固合抵刑如度支舉奏是虛誣誑亦冝得罪陛下既不許差三司按問又不令檢奏辨明度支言太府隱漏至多而少華所任如舊太府論度支姦欺頗甚而延齡見信不渝栍直兩存法度都弛以在庫之物為收獲之功以常賦之財為羡餘之費罔上無畏示人不慚此又罪之大者也國之府庫用置貨財物合入官則納于其內事合給用則出乎其中所納無非法之財所出無不道之用坦然明白何曲何私而延齡險猾售姦詭譎求媚遂於左藏之內分建六庫之名意在别貯贏餘以奉人主私欲曽不知王者之體天下為家國不足則取之於人人不足乃資之於國在國為官物在人為私財何謂贏餘復須別貯是必巧詐以變移官物暴法以刻斂私財捨此二途其將焉取陛下方務崇信不加檢裁延齡既怙寵私益復放肆遂録積久逋缺妄云察獲姦贓總計緡錢八百餘萬聽其言則利益雖大考其事則虛誕自彰或是水火漂焚或緣旱潦傷敗或因兵亂散失或遭寇賊􅐁􅜙或准法免徴或經恩合放或人戶逃逬無處追尋或綱典拘囚不免填納或沒入店宅歲久摧殘或收獲舟船年深破壞類皆如此難以殫論在人者並無可科徴屬官者悉不任貨賣但存名額虛掛簿書大抵錢穀之司皆恥財物減少所以相承積纍不肯滌除每當計奏之時常充應在之數延齡苟稱察獲遂請徴收恢張利門誘動天聽貽誚侮於方嶽賈愁怨於蒸黎于兹纍年一無所得其為踈妄亦曰殆哉陛下姑欲保持曽無詰問延齡謂能蔽惑不復懼思姦威既沮於四方憸態復行於內府由是蹂􅏳官屬傾倒貨財移東就西便為課績取此適彼遂號羡餘愚弄朝廷有同兒戲諸州輸送布帛度支不務凖平抑制市人賤通估價計其所折即更下徴重困疲氓展轉流弊既彰忍害且示不誠及其支送邊州用充和糴則於本價之外例增一倍有餘布帛不殊貴賤有異剝徴罔下既以折估為名抑配傷人又以出估為利事多矛盾交駭物情窮邊穡夫痛憤切於骨髓下土編戶冤呌徹於蒼旻而延齡以冒取折估為公忠苟得出估為賸利所謂失人心而聚財賄亦何異割支體以徇口腹哉殊不窹支體分披口安能食人心離析財豈能存此又罪之大者也平原逺鎮扼制蕃戎五原要衝控帶靈夏芟夷榛薉翦逐豺狼﨑嶇繕完功力才畢地猶敻絶勢頗孤危新集之兵志猶未固尤資贍恤俾漸安居頻勑度支令貯軍糧常使平原有一年之蓄鹽州積半年之儲循環轉輸不得闕數近者二鎮告急俱稱絶糧陛下召延齡令赴中書遣希顔宣㫖質問延齡確言饋餉不絶儲蓄殊多歲內以來必無闕乏希顔懼其推互邀令草狀自陳狀亦如言略無疑畏陛下覽其所奏翻謂軍吏不誠遂遣中官馳往檢覆道路無轉運之跡軍城無旬日之儲將卒嗷嗷幾將不守有如是之顚沛有如是之欺謾按驗既明恩勞靡替其為蠱媚曠代罕聞此又罪之大者也國之憲度㑹府是司位列諸郎猶應辰象任居六事實代天工內揔轄於庶官外敷化於列郡舉措繫生靈之命得失關理亂之源為人軌儀安可容易未有大官弛縱而能使群吏服從朝典陵遲而欲禁天下暴慢是以天寶將季楊國忠為吏部尚書亟於私庭詮集選士果令逆竪得以為詞史䇿書之足為國恥而延齡放情亂紀又甚國忠懈於夙興多闕㑹朝之禮徇其鄙次大隳省署之儀徙郎曹於里閭視公事於私第盡室飲宫厨之膳填街持簿領之書復有諸部參辭四方申請決遣資其判署去就俟其指撝延齡或聚客大誇不令白事或縱酒慿怒莫敢入言至有迫切而來逾旬未省輸納之後纍月不歸資糧罄於滯淹筋力困於朝集晨趨夕散十百為羣里中喧闐常若闤闠衢巷列屠沽之肆邑居成逆旅之津離次慢官虐人斁法求之今古鮮有其倫此又罪之大者也揔領財賦號為殷繁自非識究變通智權輕重大不失體細能析微濟之以均平蒞之以勤肅近無滯事逺無壅情綱條之下無亂繩鑒照之內無隱匿然後人不困而公用足威不厲而姦吏懲苟或未然則非稱職況延齡以素所僻戾之質而加之以狂躁滿盈既懵且驕事何由理遂以國家大計委於胥吏末流當給者無賄而不支應徴者受賕而縱免紀綱大壞貨賂公行苟操利權實竊邦柄近者度支小吏屢為府縣所繩鞠其姦贓無不狼籍通結動連於節將交私匪止於苞苴威福潜移乃至於是職司失序固亦可知此又罪之大者也風教之大禮讓為先禮讓之行朝廷為首朝廷者萬方之所宗仰羣士之所楷模觀而效焉必有甚者是以朝廷好禮則俗尚敬恭朝廷尊讓則時恥貪競朝廷有失容之慢則凌暴之弊播於人朝廷有動色之爭則攻鬪之禍流於下聖王知其然也故選建賢德以為公卿使人具瞻不諭而化昔周之方盛多士盈朝時靡有爭用能俾乂故其詩曰愼爾出話敬爾威儀無不柔嘉又曰有來雍雍至止肅肅相維辟公天子穆穆言羣臣相與事上敬而能和言語動作靡有不善也周德既衰小人在位務相侵侮以至危亡故其詩曰方茂爾惡相爾矛矣又曰既之隂汝反豫來嚇又曰涼曰不可覆背善詈言小人得志惡怒是憑肆其褊心以相詬病也陛下勤修儀式以靖四方愼選庶官以貞百度內選則股肱耳目外選則垣翰藩維濟濟師師咸欽至化庶相感率馴致大和而度支憑寵作威恃權縱暴侵刻軍鎮匱闕資糧將帥每使申論延齡率加毀訾或指誣隱盜或謗訐隂私或數其出處賤微或億其心志邪悖詞皆醜媟事悉加諸匹夫見凌猶或生患況將帥素加委遇多著勳庸縱有踰分取求但冝執理裁處苟當其所孰敢不從豈可對彼偏禆恣行侵辱使其慚靦於麾下憤恥於朝廷惟口起羞諒非細故為國聚釁實由斯人而又虐害羣司幸其闕敗蔑彼彛典逞於凶懷氣吞等夷􅊢蓄郎吏時有履道而不為屈撓守官而莫肯由從遭其詆訶事則尤劇或辱兼祖父或毀及家門皆名教所不忍聞叙述所不堪紀其為構陷抑復多端故示凶威使人懾憚人之狂險乃至於斯上虧大猷下扇流俗炮烋禮義之府衊汚清明之朝此又罪之大者也度支舊管牛驢三千餘頭車八百餘乘循環載負供饋邊軍既有畨遞之倫求無科配之擾延齡苟逞近效不務逺圖廢其葺修減其芻秣車破畜耗略無孑遺每須載運軍資則令府縣差雇或有卒承别㫖須赴促期遂於街市之間虜奪公私雜畜披猖頗甚費損尤多吏因生姦人不堪命所減者則奏以為利所費者則隱而不論破實徇虛多如此類度支應給宫內及諸司使芻藁薪炭等除稅草之外餘並市供所用既多恆須貯備舊例每至秋穫之後冬收之時散開諸埸逐便和市免費髙價復資貧人公私之間頗謂兼濟延齡悉隳舊制但飾姦情旋計芻薪價錢以為節減剩利及乎春夏之際藁秸巳殫霖潦之中樵蘇不繼軍廄輟莝官厨待然告闕頻煩於聖聰徴催絡繹於省署﨑嶇求買何暇計量麋捐官錢不啻纍倍聮蹇狼狽率以為常此則睿鑒之所明知物情之所深駭事之舛繆觸緒皆然臣愚以謂若斯之流不過歲費國家百萬緡錢及事體非冝耳其為罪惡未足傾危事之可憂不在於此是以不復詳舉以煩聽覽也至如矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為自非狀迹尤彰足致其禍者又難以備陳也延齡有詐僞亂邦之罪七而重之以耗斁闕遺愚智共知士庶同憤以陛下英明鑒照物無遁情固非延齡所能蔽虧而莫之辨也或者聖㫖以其甚招嫉怨而謂之孤貞可託腹心以其好進讒諛而謂之盡誠可寄耳目以其縱暴無畏而謂之強直可肅姦欺以其大言不疑而謂之智能可冨財用將欲排衆議而收其獨行假殊寵而兾其大成儻陛下誠有意乎在兹臣竊以為過矣夫君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無謬好者不邪安在私託腹心以售其側媚也以天下之耳目為耳目則天下之聰明皆我之聰明也是以明無不鑒聰無不聞安在偏寄耳目以招其蔽惑也夫布腹心而用耳目舜與紂俱用之矣舜之意務求已之過以與天下同欲而無所偏私由是天下臣庶莫不歸心忠讜既聞玄德逾邁故虞書云臣作朕股肱耳目又云明四目逹四聰言廣大也紂之意務求人之過以與天下違欲而溺於偏私由是天下臣庶莫不離心險詖既行昏德彌熾故商書云崇信姦回大雅云流言以對寇攘式內言邪僻也與天下同欲者謂之聖帝與天下違欲者謂之獨夫其所以布腹心而任耳目之意不殊然於美惡成敗若此相逺豈不求過之情有異任人之道不同哉太宗嘗問侍臣何者為明君何者為暗主魏徴對曰君之所以明者兼聽也其所以暗者偏信也又曰秦之胡亥偏信趙髙肆其姦欺卒至顚覆徴之此說理致甚明簡冊備書足為鑒戒趙髙指鹿為馬愚弄厥君歷代流傳莫不痛憤陛下每覽前史詳考興亡固亦切齒於斯人傷心於其主臣謂鹿之與馬物類猶同豈若延齡掩有而為無指無而為有陛下若不以時省察得無使後代嗟誚又甚趙髙者乎斯愚臣所以焦慮疚懷以陛下為過者良有所以也夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今德義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有德必有人有人必有土有土必有財百姓足君孰與不足蓋謂此也自古及今德義不立而利用克宣人庶不安而財貨可保因以興邦固位者亦未之有焉故曰財散則人聚財聚則人散與其有聚斂之臣寧有盜臣無令侵削兆庶以為天子取怨于下其有若此者行罰無赦蓋為此也殷紂以貪冒失人而亡周武以散發得人而昌則紂之多藏適所以為害巳者之資耳尚何賴於財賄哉太宗亦云務蓄積而不恤人甚非國家之計隋氏不道聚斂無猒所實洛口諸倉卒為李密所利此則前代巳行之明效聖祖垂𥙿之格言是而不懲何以為理陛下𥘉膺寶曆志翦羣凶師旅繁興徴求􅐛廣榷算侵剝下無聊生是以涇原叛徒乘人怨咨白晝犯闕都邑氓庶恬然不驚反與賊衆相從比肩而入宫殿雖蚩蚩之性靡所不為然亦由德澤未浹於人而暴令驅迫以至於是也于時內府之積尚如丘山竟資凶渠以餌貪卒此時陛下躬覩之矣是乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之內萬衆所屯窘如涸流庶物空匱嘗欲發一健步出視賊軍其人懇以苦寒為辭跪奏乞一𥜗袴陛下為之求覔不致竟憫默而遣之又嘗宫壼之中服用有闕聖㫖方以戎事之急不忍重煩於人乃剝親王飾帶之金賣以給直是時行從將吏赴難師徒倉黃奔馳咸未冬服漸屬凝沍且無薪蒸飢凍內攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飈冒霜霰踰旬而衆無攜二卒能走強賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其資與衆庶同其憂患與士伍共其有無乃能使捐軀命而扞冦讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既解諸道稍通賦稅漸臻貢獻繼至乃於行宫外廡之下復列瓊林大盈之司末賞功勞遽私賄玩甚沮惟新之望頗攜死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然歟旋屬蟊賊內攻翠華南狩奉天所積財貨悉復殱於亂軍既遷岷梁日不暇給獨慿大順遂復皇都是知天子者以得人為資以蓄義為冨人苟歸附何患蔑資義苟修崇何憂不冨豈在貯之內府方為已有哉故藏於天下者天子之冨也藏於境內者諸侯之冨也藏於囷倉篋櫝者農夫商賈之冨也奈何以天子之貴海內之冨而猥行諸侯之弃德蹙守農商之鄙業哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為己有則建中之積又不在矣若謂徇欲不足傷理化則建中之失傷己甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪己悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祗嘉陛下之誠臣庶感陛下之意釋憾回慮化危為安陛下亦當為宗廟社稷建不傾不拔之永圗為子孫黎元垂可久可大之休業懲前事徇欲之失復日新盛德之言豈冝更縱憸邪復行刻暴事之追悔其可再乎臣又竊慮陛下納彼盜言墮其姦計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大繆所冝愼思夫人主昏明繫於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顚覆之禍自古何嘗有小人柄用而灾禍不及邦國者乎譬猶操兵以刃人天下不委罪於兵而委罪於所操之主畜蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家理有必然不可不察臣竊慮陛下以延齡之進獨出聖衷延齡之言多順宸㫖今若以罪置辟則似為衆所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其於改過不吝去邪勿疑之道或未盡善焉夫人之難知著自淳古試可乃巳載於典謨陛下意其賢而任之知其惡而棄之此理之常于何不可儻陛下猶未知惡但疑見擠固有象恭挾詐之人亦有黨邪害直之士所資考核兩絶欺誣陛下以延齡為能愚臣以延齡為罪能必有跡罪必有端陛下胡不指明其所效之能以表忠賢按驗其所論之罪以考虛實與衆同辨示人不私若能跡可稱而罪端無據則是黨邪害直之驗也陛下當繩其傷善以勵事君罪端有徴而能跡無實則是象恭挾詐之驗也陛下當糾其包禍以戒亂邦如此則上之於下釋嫌構之疑下之於上絶偏惑之議何必忠邪無辨枉直莫分薰蕕同藏其臭終勝此則小人道長之象也實時運否泰安危之所繫豈但有虧聖德不利善人而巳乎陛下若以必與己同者為忠良自我作者無改變如此則上之所欲莫不諂上之所失莫不從水火相濟不為非金礪相須不為是恥過作非不足戒捨已從人不足稱為意是行則匡輔或幾乎息矣匡輔息則理不可致仲尼所謂一言喪邦者在於豫之言而莫豫違也事關興亡固不可忽希㫖順默浸巳成風奬之使言猶懼不既若又阻抑誰當貢誠伏恐未亮斯言請以一事為證只如延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品喧喧談議億萬為徒能以上言其人有幾陛下誠令親信博採輿詞參校比來所聞足鑒人間情僞臣以卑鄙任當台衡既極崇髙又承渥澤豈不知觀時附㑹足保舊恩隨衆沉浮免貽厚責謝病黜退獲知幾之名黨姦苟容無見嫉之患何急自苦獨當豺狼上違歡情下餌讒口良由內顧庸昧一無所堪夙蒙眷知唯在誠直綢繆帳扆一紀于兹聖慈既以此見容愚臣亦以此自負從陛下歷播遷之臲卼覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭懼慮燬室而悲鳴蓋情激于衷雖欲罷而不能自默也因事陳執雖巳頻繁天聽尚髙未垂諒察輒申悃􅍁以極愚誠憂深故語煩懇迫故詞切以微臣自固之謀則過為陛下慮患之計則忠糜軀奉君非所敢避沽名衒直亦不忍為願回睿聰為國熟慮社稷是賴豈唯微臣不勝荷恩報德之誠謹昧死奉書以聞臣誠惶誠恐頓首再拜論朝官闕貟及刺史等改轉倫序狀右臣聞於經曰濟濟多士文王以寧又曰無曠庶官天工人其代之蓋謂士不可不多官不可不備敦付物以能之義闡恭已無為之風此理道得失之所由也夫聖人之於愛才不唯仄席求思而巳乃復引進以崇其術業歷試以發其器能旌善以重其言優祿以全其操歲月積久聲實並豐列之於朝則王室尊分之於土則藩鎮重故詩序太平之君子能長育人才書比梓人之理材既勤撲斫惟施丹雘禮著造士易尚養賢蓋以人皆含靈唯所誘致如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汚泥疏濬則川沼是以書籍所載歷代同途祚屬殷昌必時多俊乂運鍾衰季則朝乏英髦當在衰季之時咸謂無人足任及其雄才御㝢淑德應期賢能相從森若林㑹然則興王之良佐皆是季代之弃才在季而愚當興而智乃知季代非獨遺賢而不用其於養育獎勸之道亦有所不至焉故曰人皆含靈唯其誘致漢髙禀大度故其時多魁傑不羇之材漢武好英風故其時冨瓌詭立名之士漢宣精吏能故其時萃循良核實之能逮乎哀平桓靈昵比小人踈逺君子故其時近習操國柄嬖戚擅朝權是知人之才性與時升降好之則至奬之則崇抑之則衰斥之則絶此人才消長之所由也臣每於中夜竊自深惟朝之乏人其患有七不澄源而防末流一也不考實而務博訪二也求精太過三也嫉惡太甚四也程試乖方五也取舍違理六也循故事而不擇可否七也夫多少相繆非嘉量不平輕重相欺非縣衡不定用之苟不得其道則主者實病而權量無尤故按名責實者選吏之權量也宰相者主權量之用也宰相之主吏猶司府之主財主吏在序進賢能主財在平頒秩俸假使用財失節則司之者可以改易而秩俸不可以不頒主吏乖方則宰之者可以變更而賢能不可以不進其行甚易其理甚明頃者命官頗異於是常以除吏多少准量宰相重輕宰相承寵私則援引雖濫而必進宰相見踈忌則擬議雖當而罕俞是使羣材仕進之窮通唯繫輔臣恩澤之薄厚求諸理道未謂合冝夫與奪者人主之利權名位者天下之公器不以公器徇喜心不以利權肆忿志不以寡妨衆不以人廢官或其阻執事而擁羣材所謂不澄源而防末流之患也經曰無以小謀亂大作無以嬖人疾莊士蓋務大者不拘於小纍謀小者不逹於大猷嬖者或行異於莊莊者必性殊於嬖理勢相激冝其不同進賢援能諒君子之事遏惡揚善非小人所能君子以愛才為心小人以傷善為利愛而引之則近黨傷而沮之則似公近黨則不辨而遽疑似公則不覆而縣信是以大道每隳於橫議良才常困於中傷失士啓讒多由於此所謂不考實而務博訪之患也夫人之器局有圎方大小之殊官之典司有難易間劇之別名稱有虛實之異課績有升降之差將使官不失才才不失序在乎制法以司契擇人而秉鈞制之不得厥中則其法可更而其契不可亂也擇之不當所任則其人可去而其秉不可奪也如或事多錯雜任靡適從而但役智以求精勞神而救弊則所救愈失所求愈粗故書曰元首明哉股肱良哉庶事康哉元首叢脞哉股肱墮哉庶事隳哉頃之輔臣鮮克勝任過蒙容養苟備職貟致勞睿思巨細經慮每有闕官須𥙷或緣將命藉才宰司愼擇上聞必極當時妙選聖情未愜復命別求執奏既不見從則又降擇其次如是至于再至于三所選漸髙所得轉下或斷於獨見罔徇僉諧或擢自旁求不稽公議權衡失柄進取多門等差不倫聲實相反此所謂求精太過之患也臣聞耀乘之珠不能無纇連城之璧不能無瑕矧伊有情寧免愆吝仲尼至聖也猶以五十學易無大過為言顔子殆庶也尚稱不逺而復無祗悔為美況自賢人以降孰能不有過失哉珠玉不以瑕纇而不珍髦彥不以過失而不用故玄元之教曰常善救人則無弃人文宣亦云赦小過舉賢才齊桓不以射鈎而致嫌故能成九合之功秦穆不以一眚而掩德故能復九敗之辱前史序項藉之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不可屬國曰聞人過終身不忘然則乘瑕録用者霸王之道記過遺才者衰亂之源夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改修則復進既不廢法亦無弃人雖纎芥必懲而才用不匱故能使黜退者克勵以求復登進者警飭以恪居上無滯疑下無蓄怨俾人於變以致時雍陛下英聖統天威莊肅物好善既切計過亦深一抵譴責之中永居嫌忌之地夫以天下士人皆求宦名獲登朝班千百無一其於修身勵行聚學樹官非數十年間勢不能致而以一言忤犯一事過差遂從弃捐沒代不復則人才不能不乏風俗不能不偷此所謂嫉惡太甚之患也臣聞君子約言小人先言君子之道暗然而日章小人之道的然而日亡孔子曰始吾於人也聽其言而信其行今吾於人也察其言而觀其行又曰舉直措諸枉則民服舉枉措諸直則民不服然則舉措不可以不審言行不可以不稽呐呐寡言者未必愚喋喋利口者未必智鄙朴忤逆者未必悖承順愜可者未必忠故明主以辭盡人不以意選士凡制爵祿與衆共之先論其材乃授以職所舉必試之以事所言必考之於成然後苟妄不行而貞實在位矣如或好善而不擇所用恱言而不驗所行進退隨愛憎之情離合繫異同之趣是由捨繩墨而意裁曲直弃權衡而手揣重輕雖甚精微不能無謬此則所謂程試乖方之患也天之生物為用罕兼性有所長必有所短材有所合亦有所睽曲成則品物不遺求備則觸類皆弃是以巧梓順輪桷之用故枉直無廢材良御適險易之冝故駑驥無失性物既若此人亦冝然其於行能固不兼具前志所謂千年一聖五百年一賢者才難不其然乎夫唯聖人方體全德賢之為目猶有未周且以未周之才彌五百年而有一造次求備曷由得人若夫一至之能偏禀之性則中人以上迭有所長苟區别得冝付授當器各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而巳帝王之盛莫盛唐虞臣佐之盛莫盛稷禹稷禹之比無非大賢然猶各任所能不務兼備故尚書序堯舜命官之美自稷禹咎益以降凡二十二人所命典司不踰一職用能平九土播百榖敷五教序五刑禮樂興和蠻夷率服洎鳥獸魚鱉亦罔不寧蓋由舉得其人任得其所鑒擇職授審之於初不求責於力分之外不沮撓於局守之內是以事極其理人盡其材君垂拱於上臣濟美於下功焯當代名施無窮及其失也則升降任情首末異趣使人不量其器與人不由其誠以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則責望過當不恕其所不能是以職司之內無成功君臣之際無定分此所謂取捨違理之患也今之議者多曰內外庶官久於其任又曰官無其人則闕之是皆誦老生之常談而不推時變守舊典之糟粕而不本事情徒眩聰明以撓理化古者人風既朴官號未多但别愚賢匪論資序不責人以朝夕之效不計事於尺寸之差不以小善而褒升不以一眚而罪斥故虞書三載考績三考黜陟幽明是則必俟九年方有進退然其所進者或自側微而納于百揆雖久於任復何病哉漢制部刺史秩六百石郡守秩二千石刺史髙第者即遷為郡守郡守髙第者即入為九卿從九卿即遷為亞相相國是乃從六百石吏而至台輔其間所歷者三四轉耳久在其任亦未失冝近代建官漸多列級逾密今縣邑有七等之異州府有九等之差同謂省郎即有前中後行郎中貟外五等之殊並稱諫官則有諫議大夫𥙷闕拾遺三等之别洎諸臺寺率類於斯悉有當資各須循守若依唐虞故事咸以九載為期是冝髙位常苦於乏人下寮每嗟於白首三代為理損益不同豈必樂於變易哉蓋時勢有不得巳也至如鯀陻洪水績用靡成猶終九年然後殛竄後代設有如鯀之比者豈復能九年而始行罰乎臣固知其必不能也行罰欲速而進官欲遲以此為稽古之方是猶却行而求及前人也頃者臣因奏事論及內外序遷陛下乃言舊例居官歲月皆久朕外祖曽作祕書少監一任經十餘年董晉將順睿情遂奏云臣於大曆中曽任祠部司勳二郎中各經六考陛下之意頗為冝然以臣蠢愚實有偏見凡徴舊例須辨是非是者不必渝非者不必守況於舊例之內自有舛駮之異哉先聖之初權臣用事其於除授類多徇情有一月屢遷有積年不轉逮至中歲君臣構嫌姑務優柔百事凝滯其於選授尤所艱難始以頗僻失平繼以疑阻成否至使彛倫闕敘庶位多淹是皆可懲曷足為法夫核才取吏有三術焉一曰拔擢以旌其異能二曰黜罷以糾其失職三曰序進以謹其守常如此則髙課者驟升無庸者亟退其餘績非出類守不敗官則循以常資約以定限故得殊才不滯庶品有倫參酌古今此為中道而議者暗於通理一槩但曰冝久其任得非誦老生之常談而不推時變者乎夫列位分官緝熙帝載匪唯應務兼亦養才是以職事雖有小大間劇之殊而俱不可曠缺者蓋備於時而用耳故記曰天子以騶虞為節樂官備也唯經邦贊國之任則非有盛德不可以居故記曰設四輔及三公不必備惟其人議者昧於明徴一槩但曰官無其人則闕得非守舊典之糟粕而不本事情者乎今內外羣官考深合轉陛下或言其巳有次第須且借留或謂其未著功勞何用數改是乃循默者既以無聞而不進著課者又有成績而見淹雖能否或差而沉滯無異人之從宦積小成髙至于內列朝行外登郡守其於更歷多巳長年孜孜愼修計日思進而又淹逾考限亟易星霜顧懷生涯能不興歎殊異登延之義且乖勸勵之方夫長吏數遷固非理道居官過久亦有弊生何者時俗常情樂新厭舊有始卒者其唯聖人降及中才罕能無變其始也砥勵之心必切其久也因循之意必萌加以盈無不虧張無不弛天地神化且難常全人之所為安得皆當是以分分而度至丈必差銖銖而稱至鈞必謬蒞職既久寧無咎愆或為姦吏所持或坐深文所糾偶以一跌盡隳前功至使理行不終能名中缺豈非上失其制而推致以及於斯乎故聖人愛人之才慮事之弊採其英華而使之當其茂暢而獎之不滯人於巳成之功不致人於必敗之地是以鋭不挫而力不匱官有業而事有終此理之中庸故書以為法遷轉甚速則人心苟而職業不固甚遲則人心怠而事守浸衰然則甚速與甚遲其弊一也陛下俯徇浮議謂協典謨久次當進者既曰務欲且留缺貟須補者復曰官不必備則才彥何由進益理化孰與交修此所謂循故事而不擇可否之患也伏惟陛下憂勤務理夢想思賢體陶唐有虞聰明之德以敷求法太宗天后英邁之風以拔擢然而得人之盛尚愧前朝底乂之功未光當代良以七患未去三術未行而又睿察太深宸嚴太峻常人才器曷副天心故雖獲超升亦驟從黜廢人物殘瘁抑斯之由而議者莫究致弊之端但思革弊之䇿反以廣於進用為情故以梗於除授為精詳以避謗為奉公之誠以摘瑕為選士之要乃至稱毀紛糅美惡混并凡有遷升必遭掎托聖德廣納不時發明小人多言益敢隂詐以是眩惑目無全人進用之意轉疑汲引之途漸隘舊齒既凋敗幾盡下位或滯淹罕升故令官序失倫人才不長資望漸薄砥勵浸微髙卑等衰殆不相續臣以竊位屬當序才懼曠庶官亟黷宸扆昧識不足以周物微誠不足以動天徒勤進善之心轉積妨賢之罪慙惶交慮焚灼盈懷凡除吏者非謗刺之所生必怨咎之所聚宰臣獲戾多起於兹屢屢上干何所為利但以待罪鈞轄職思其憂兼迫於感恩願效之誠不得不冒昧言之耳其於裁擇用捨惟陛下圖之謹奏唐陸宣公集卷第二十一
