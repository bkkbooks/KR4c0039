front:
  text: 唐陸宣公集卷第五制誥卷第五慰勞招撫處分事
  hash: sha256:404e1310e886c9c27445075ca3c4e0fbb782af6b0a4f19688afef21e7b2e12c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_005-1a}
body:
  text: 奉天遣使宣慰諸道詔古者天子巡狩之義以考國典以觀人風在時多虞或所不暇乃命卿士使于四方問人疾苦廉吏善惡苟副所任則如親臨在理平之時尚資勤恤當喪亂之際得無省憂朕以不敏肆于人上撫馭失道誠感未孚寇盜繁興阻兵拒命哀哉臣庶陷于匪人顧兹田疇鞠為茂草不念柔復遽命徂征徴發兵甲萬里必至暴露營壘連年不息冒于鋒刃繼以死傷煢婺矛牙無依父母廢食存者積思家之怨殁者倍異鄉之痛又以軍費滋廣公儲不充厚取於人罔率厥典科條互設誅斂無常農工廢棄其生業商賈咨嗟於道路軍營日益閭井日空凋瘵日窮徭役日甚以財力之有限供求取之無涯暴吏肆威鞭笞督責嗷嗷黔首控告何依怨氣上騰咎徴斯應疫癘荐至水旱相乘罪非朕躬誰任其責朕自嗣位逮今六年連兵不解巳踰四稔雖本非獲巳義在濟人而事乃重勞敢忘咎已皆以朕之寡昧居安忘危致寇之由實在於此豫則不德人亦何辜愧恨積中痛心疾首昨者改元施令悔往布新將反側獲安則干戈日弭賦役差減則衆庶就康還定流亡與之休息猶懼思慮未周于庶務誠感未逹于遐方一理失中一夫不獲則何以謝天譴致人和俾代豫言其在良弼冝令門下侍郎同中書門下平章事蕭復充山南東西鄂嶽荆南江西淮南浙江東西嶺南福建等道宣慰安撫嗚呼往率乃職敬敷朕命慰勉征戍勞徠困窮訪其所安察其所弊淹滯必逹冤濫必申無憚幽逺而不𬒳無略細微而不恤洎乎編氓比屋咸若朕之躬親股肱惟良豫則有賴其諸道將士並準今年正月一日制嚴備疆界勿使侵擾仍各令本使本將速具名銜等聞奏悉與甄敘其殊功徑節超越常倫別條狀績當特優獎百姓除每年兩稅定額外自餘徴率一切並停課勸農桑各令安業寇難既定漸息干戈朕當躬先簡約庶務節省兩稅之內亦更減除其諸道事緣急切須處分者即與所在節度觀察使啇議裁度務合便冝其餘利害還日條奏朕當詳省以擇厥中宣布逺邇咸使聞知收復京師遣使宣慰將吏百姓詔朕獲承先顧付以大器懼德不類貽列聖羞虔恭惕厲罔敢暇逸將欲立法齊一致俗和平小信未孚衆心遂阻事理乖當百度失中君臣之間鬱堙不逹致寇雖深於罪已興戎猶昧於省躬期靖亂以濟人反勞師而黷武行者被殺傷之苦居者重齎送之勞四海騷然靡有寧處京輦之下杼軸亦空環列之中遣戍殆盡略內以勤逺居安而忘危賊臣誘姦乘間竊發豺狼穢于宫闕士庶陷于塗炭作威肆戮仇視我人萬姓嗷嗷呼天罔告有殞踣以抗節有脅從以假命旦一夫不獲辜實在豫朕君臨萬邦作人父母既不克覆育又從而咎之其心愧耻一食三歎退舍內訟介干梁岷庶乎有瘳以答譴戒皇天悔禍宗社降靈腹心爪牙奮謀宣力元惡稔慝脫身逃遁餘黨歸誠率衆𣢾附掃氛沴而闢閶闔剪鯨鯢以清郊原函夏載寧室家相慶非將士夾輔王室非卿士交修豫違軍旅叶心畢命盡敵豈伊寡昧克復興運戡定大難載感豫懷冝令吏部侍郎班宏充上都宣慰使勞問將士撫綏蒸黎招輯流亡慰安反側朕續整飭法駕擇日還京告謝于祖宗請罪于天地䇿勳行賞大報忠烈銘功永代與國同休明宣朕懷咸使知悉平淮西後宴賞諸軍將士放歸本道詔朕纂奉丕業託于人上仁不被物義不勝姦頌聲蔑聞暴亂連起叛臣希烈竊據淮沂誠則彼夫無良亦由朕之不德撫御之道失之於𥘉師旅一興綿聮莫解服勞者從役不暇受汚者無路自新旱蝗相乘榖糴翔貴兵氓餒死十室九空通邑化為丘墟遺骸遍於原野每念於此傷心涕流且自昔勞師靡有不悔以虞舜之聖屈於苗人漢武之強弊於戎虜矧乎德猶不逮力或未全我其永懷求已自警乃者下哀痛之詔布寬大之恩普天載新殊死必宥然尚勞師旅作扞邊陲有纍歲棄離家室有經時不解甲胄忠雖為國咎實在豫君人若斯寧不知愧賴節將士旅一其誠心奮發武威愼固疆宇逺人思服元惡就誅蒸黎方致於安寧役戍永期於休息懋官以旌善錫宴以勞旋賞不踰時式遵彞典都統檢校司空同中書門下平章事劉從一並與子孫一人五品正貟官鄭滑節度使檢校尚書右僕射李澄檢校兵部尚書曲環檢校戶部尚書李皋兼御史大夫樊澤等並與子孫一人七品正貟官都防禦使工部尚書御史大夫賈耽都團練使檢校左散騎常侍兼御史大夫盧玄卿兼御史大夫張建封等並與子孫一人八品正貟官檢校司空同中書門下平章事李抱真檢校司空同中書門下平章事李納檢校尚書右僕射同中書門下平章事韓滉檢校工部尚書御史大夫田緒或遣士旅逺赴行營同討不庭厥有成績抱真納滉冝並與子孫一人七品正貟官緒與子孫一人八品正貟官應與淮西接界州縣本界鎮守及諸道赴行營將士等冝共賜物三十萬端匹以充賞設度支即約據界首及行營軍額分配定數逐便支送仍委本道都統節度防禦都團練使即條録功第名銜聞奏並與甄敘其行營將士仍各放歸本道明加宣諭令悉朕懷授王武俊李抱真官封并招諭朱滔詔三公之職論道經邦序五行之和任百事之理歷代崇重不常厥官天祚皇家茂生才傑比義齊列同寅協恭以德允台階之望以勳當井賦之賜聿應並命式副具瞻開府儀同三司檢校司空同中書門下平章事使持節恆州諸軍事守恆州刺史充成德軍恆兾深趙等州節度觀察處置等使琅邪郡王王武俊秉志沉密臨事能斷忠而致力勇且有仁奮發之𥘉渠魁即戮危疑之際大節首彰開府儀同三司檢校尚書左僕射同中書門下平章事潞州大都督府長史昭義軍澤潞磁邢等州節度觀察處置度支營田等使上柱國符陽郡王李抱真質重氣和內精外朗智窮變化守必以常學本明誠動有攸利謀猷屢告規益孔多皆戮力盡瘁志匡王室陳師鞠旅同討不庭仗大義而萬衆叶心體至公而千里同契合軍於呼吸之際決䇿於指揮之間并轡載馳執桴親鼓凶徒殄殪河右廓清國家無北顧之虞姦慝阻南侵之計時乃同德厥功茂焉敷五教而阜人均九土以居衆俾爾更踐備揚洪休乃加真實以貽後嗣武俊可檢校司徒同中書門下平章事抱真可檢校司空同中書門下平章事賜實封五百戶嗚呼古人有言曰惟理亂在庶官矧惟輔臣與國同體明朕德命爾其欽承朕嗣位不明輕費尚力謂武可以靖暴慢謂刑可以懲姦邪德之不修亂是用長士馬疲耗蒸庶流離罪非朕躬誰任其咎自去嵗遭變再經播遷歷山川之險艱知軍旅之勞苦惟省前過悔限盈懷追逺事而不及庶後圖之可輔以九廟為重而不憚屈身以百姓為心而不專私欲苟可以保安社稷休息甲兵弘濟蒼生蠲省徭賦含垢忍耻豫無難焉朱滔受任薊門纍著誠績委遇既重封秩亦崇臣節中虧自貽伊阻洎賊泚僭竊上京兄弟之親在法無赦朕以罪不相及情有可原待以如初之誠廣其自新之路執迷不復因敗是求蹙喪而歸既困方悟纍獻𣢾疏深陳懇誠省之惻然良用憫歎雖將相嫉惡之志固所難容以君上懷柔之情未忍拒絶且善莫大於改過德莫盛於好生叛而伐之服而舍之銷難愛人實惟朕志冝委武俊抱真開示大信明加曉諭若誠心益固善迹克彰朕當掩舋録勳與之昭雪宣告衆庶咸使聞知招諭淮西將吏詔朕臨御巳來連兵不息自經播越方歷險艱耳聞􅎏鼓之聲目視殺傷之苦由是覺悟悔於興師既省已以知非亦欲人之遷善至乃嵗有再赦事有屢言務於撫綏不憚煩冗冀朕之誠信日布冀人之患難曰除每議用兵惻然不忍而賊臣希烈煽禍滔天虐用其人介恃厥衆狼心多忌梟性無親以芟伐立威以猜刻為志朝為昵比夕為仇讎肆其芟夷蔑若草芥馮陵汝海流血盈川侵軼浚郊積骸遍野農耕廢業井邑成墟積彼妖氛發為災癘蕭條千里無復人煙朕哀彼生靈陷于塗炭苟存拯物不難屈身故於首春特布新令赦其殊死待以𥘉誠使臣才越於郊畿巨猾已聞於僣竊酷烈滋甚吞噬無厭將相大臣咸懷憤激繼陳章疏固請除討朕以所行天誅本去人害兵戈既接玉石難分言念忠良遭罹脅制雖欲却陳臣節厥路無由受汚終身銜冤沒代淪胥以逞誠足痛傷冝令諸道節度使每欲進軍先加曉諭今所致討唯止元凶其餘脅從一切不問如能去逆效順因事建功明設科條以示褒勸其有一州降者便授刺史封異姓王賜實封五百戶以一萬人巳上降者授刺史封國公賜實封三百戶其餘各據功效節級甄升列爵建官以俟能者朗然明信朕不食言宣示逺人各令知悉招諭河中詔朔方諸軍應在河中絳州朝邑將士等並以義烈繼代勳業冠時艱虞巳來常濟國難肅宗代宗再復京邑皆是朔方將士之功去歲朕在奉天凶黨攻逼解圍赴急亦賴此軍言念爪牙情均骨肉濟朕危厄感之豈忘頃以懷光背恩自生猜阻熒惑將士汚脅忠良朕頻降詔書再三曉諭皆被懷光隱匿兼亦志有加誣朕之誠懷竟未宣布夙夜自愧寢食不安時屬嚴凝屢頒衣賜豈以懷光一人拒命遂令將士俱不沽恩朕於功臣義存終始其朔方及諸軍應在河中絳州朝邑將士等今年春冬衣賜並準二月二十一日勑緣赴奉天解圍功臣等第給錢物冝令所司并許計料別收貯待道路通流即當時支遣其有歸順者續給其將士等有先賜實封一切準元勑並州給牒委馬燧渾瑊逐分送付其差人請受仍明加宣諭招撫務令忠義之士各悉朕意安撫淮西歸順將士百姓勑李希烈首亂淮濆又侵滎汴凶威所及罔不脅從百姓既罹於網羅將士兼質其家口哀我衆庶銜冤莫伸雖欲歸降何由自逹朕為人父母不克保安遂使忠良橫遭脅汚興言憫悼思惻深衷今王師四臨所至剋捷將士百姓𣢾附甚多或棄其鄉園或捐其家族脫身效節良有可嘉特冝撫綏以將誠效應淮西界內及鄭汴等州將士歸順者委所在節度防禦等使便與收管切加存恤優給資糧仍各具名銜聞奏當與甄奬并給遣衣賜其百姓從賊界內歸順者亦委所在觀察使刺史量以本道諸色錢物賑給令得存濟如情願便住者即配與死戶田宅使營生業若欲赴諸州縣者隨其所之當時給文牒發遣不得止遏所至之處準前優賞率土之內莫非王臣雖陷寇中諒非獲巳但能效順即是平人務於招綏副朕所恤甄奬陷賊守節官詔沮勸二柄國之大綱獎善懲違固不可廢頃者賊臣構亂京邑震騷惟兹土人奔竄無所或從其誘脅遂染汚名或守以純誠竟全貞節昨所司奏議但舉刑章坐纍者各巳條疏守節者並巳甄異忠正而不報豈朕意焉應在京百司及京兆府長安萬年兩縣去年十月三日見在職事官在城陷於賊中潛藏不受逆命并諸色前資官被偽署官爵頻遭迫脅首末不出事迹昭著衆所明知者並委御史臺訪察勘覆其事勿容虛濫仍限今月內具名銜事迹聞奏五品巳上及常參官巳授替者委中書門下與處分六品巳下各減三選不拘考例聽集其未得資𬒳替非時放選仍稍優與處分如巳喪亡者並與追贈使恩加存殁以稱朕懷令百寮議大禮期日詔朕自遷越旋於京師將欲請罪祖宗告謝天地所司擇日行有期矣議者多以大盜之後人勞匪居懼愆歲功請俟農隙若俯順羣議則私懷不安將祗率典章又疲氓重擾夙夜憂惕罔知所裁宜令中書門下與常參官即詳議折衷聞奏不許諸軍侵擾勑李希烈阻兵淮右虐害蒸人朕哀憫無辜橫遭脅制若興師行伐則玉石俱焚所以頻下詔書再三開諭曽無悛革但益憑陵忠勇之徒皆思奮激朕悔於征伐務在含容以一夫無良遂百姓罹禍安人忍恥初是素懷今東作方興麥秋在近儻行侵抄深害農功一方之人實足矜憫應與淮西接界州縣各委本道都統節度都防禦團練等使明申前勑嚴設隄防務使農人遂其耕穫賊若不先侵軼但自保守封疆勿令越境暴犯田苗及有侵掠務宣朝化以洽逺人仍於所在界首明加招諭咸令知委放淮西生口歸本貫勑遷徙家鄉分離骨肉有生之酷莫甚於斯朕撫育兆人庶臻理道懲過不可以不罰原情不可以不矜將推內恕之心用廣自新之路應從李希烈作亂以來諸道所有擒獲淮西生口配隸嶺南黔中等道冝一切釋放歸本道其投降人等權於諸州縣安置者亦任各從所適令諸道募靈武鎮守人詔朕以寡德君臨兆人憂四鄙之不寧懼一物之失所降心以懷戎狄期息征徭極慮以綏蒸黎冀遂安輯今夏嶽牧咸能撫封九姓可汗荐克敦好寰瀛之內期謂小康愛人雖發於朕心濟理實由於藩輔豈惟菲薄所致於兹然獨吐蕃負恩背盟棄約尚勞師旅備禦西陲亦賴方嶽同心簡練傑俊助其防鎮遏彼奔衝數年以來邊境寧謐乃眷靈武實惟雄藩扼東牧之咽喉控北門之管鍵軍懸寇邇地逺勢孤雖無交切之虞須建久安之䇿朕屬慮於此殆今纍年晨思廢餐暮想忘寐征兵益戍則憚其勞師移人實邊又念其離土朕欲令萬姓各遂所安抑而使人情有不忍中懷結鬱罔知所從古人有言主憂臣憤今朕憂矣將相牧守得不與我同其慮哉此乃忠臣盡規之時勇士建功之日苟弘良算必有其人冝令諸道節度觀察使各於本管諸色人中募能赴靈武鎮守者取其情願重設賞科仍須精選驍雄薄間武藝便以本道諸色錢物給付仍優厚裝束發赴上都每道各據所管州縣多少通計每州所募多不得過五十人少不減三十人若欲將家口相隨便給資糧同發遣如有戶貫在州者蠲免本戶差科其官健到日朕當超資與官至鎮便替朕之此意非務廣兵欲使四方驍雄俱到塞上壯邊城士旅之氣杜戎醜窺伺之心方嶽信臣所當相悉勿令騷擾副我憂人唐陸宣公集卷第五
