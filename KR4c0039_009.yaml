front:
  text: 唐陸宣公集卷第九制誥卷第九除授
  hash: sha256:e85f82e8d6a2d800b1dd31627830801b9bb4c5edd17a96ba9dbe265c9d76494a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_009-1a}
body:
  text: 渾瑊京畿金商節度使制王者之制安不忘危弘其道則文武齊致教其人則農戰兼務故雖縣內不可去兵況密邇寇虞干紀稔慝都邑郊甸騷然靡寧聿求信臣特建戎號濟人夷難允屬勳賢京畿渭北節度使兵部尚書行在左都虞候渾瑊忠貞博厚溫恭簡肅持重不撓好謀而成居業克敦其詩書受賜每陳於廊廡能推誠而撫下不伐己以拒人委任中外咸著聲績夷險一貫隱然殿邦朕越在郊埛逼於凶醜授之師律式是戎昭侍衛增嚴斥候無爽檢身齊衆同士伍之勞苦敦陳整旅壯行列之威容靜以伐謀動而制勝臨危勵節豫有賴焉王圻之內沃壤千里綿亘商嶺屏於南門觀風靖人詰禁誅暴俾爾兼領用孚于休可京畿渭北渭南金商節度觀察處置等使餘並如故杜亞淮南節度使制淮海奧區一方都㑹兼水陸漕挽之利有澤漁山伐之饒俗具五方地綿千里聿求良牧豈易其才今又革車方興軍賦屢調體於寬大則事缺務於辦集則人殘自非剛柔適中文武兼備其何以副我憂屬惠綏南方正議大夫行尚書刑部侍郎上柱國扶風縣開國男杜亞識精體要學究宗源妙於用而有常通其變而能久為理敦教化之本立言參禮法之中道無淄磷行有枝葉回翔省闥表彌綸獻納之勤踐歷方州著清淨循良之稱其嚴重可以鎮俗其才術可以匡時休有令問輝映朝列朕以東南思乂注意求賢爰輟名臣俾寧藩服往率厥職時惟欽哉可揚州大都督府長史兼御史大夫充淮南節度觀察處置等使䖍王申光隨蔡等州節度使制自昔哲王疆理天下必選其明德樹之宗親參制藩維夾輔王室賢戚並建時惟休哉長淮之西厥壤千里人靡寧息于兹有年朕其永懷慘若焚灼思得良帥代豫安人釋其危疑彰我信惠以親而授其在於兹開府儀同三司䖍王諒性本溫恭生知忠孝祗服訓導躬行不渝言皆副誠事必求當端慎可以鎮俗寬厚可以長人底綏一方庶允憂屬可申光隨蔡等州節度副大使管內觀察處置等使餘如故唐朝臣振武節度論惟明鄜坊觀察使制分命使臣統臨方嶽弛張之道蓋亦從冝近甸無虞則但廉風俗邊陲式遏則兼假旌旄名制雖殊委任俱重膺是選命莫非勳賢開府儀同三司檢校兵部尚書兼鄜州刺史鄜坊丹延等州節度觀察處置等使平樂郡王唐朝臣嘗揔偏師遘于多難仗義率衆臨危不回保全關衝抗絶凶逆守而能固出則有功每急病而讓夷嘗以寡而敵衆竟殱大憝克集茂勳炳然貞心堅若金石洎師旋歸按俗頒條軍旅慰安流庸恱附奉天定難功臣開府儀同三司檢校工部尚書兼左金吾衛大將軍充右街使上柱國建康郡玉論惟明釋位勤王有赴難之節扞城禦寇有持危之功奉主忘身棄家從國越自郊甸再踰巴梁險阻艱難靡不陪扈忠義所在生死以之久司禁戎益茂動纘器質敦實識度寬敏通明吏職練逹武經本之以純良輔之以才術俾居藩翰僉謂汝諧朕以北控單于國之巨鎮彼方戎帥沉痼是嬰卧護邊軍巳淹寒暑憫其盡瘁難以重煩爰咨信臣更踐厥職朝臣可依前檢校兵部尚書兼單于大都護御史大夫充振武綏銀鄜勝等州節度營田處置押兵藩落等使惟明可依前檢校工部尚書兼鄜州刺史御史大夫充鄜坊丹延等都防禦觀察處置等使餘並如故韓滉加檢校右僕射制周制以輔翼之臣出作方伯漢官以牧守之最擢拜公卿其在匡時中外同體朕以大勞未乂勤恤於黎元多難荐興注意於藩嶽就加命服式寵能賢則增秩進律亦古之道也金紫光祿大夫檢校吏部尚書使持節潤州諸軍使兼潤州刺史御史大夫充鎮江軍浙江東西節度觀察等使韓滉忠肅剛直清公簡儉持至公以檢下強禦必繩秉大節以事君險艱無易惠能恤衆明足照姦歲發勤王之師日增贍國之賦軍無撓敗俗以阜康殿于大邦理平訟息朝有勸典昭升乃庸胙土以報勤懋官以旌德底乂江甸永孚于休可檢校尚書右僕射進封昌黎縣開國公餘如故嘉王橫海軍節度使制度土分疆設官涖事因時設制期在理安必順物冝且從人欲版圖既溢則疏邑以制州統攝或乖則分部而建長㳂革之道亦何常哉滄海之隅地饒俗阜隱然北土實曰雄藩鎮撫之宜是資懿戚開府儀同三司嘉王運氣本元淳重承先訓忠肅孝友寬仁惠和勤於服儒樂在為善施於事任必有可觀舉不失親至公斯在欽率厥職永孚於休可橫海軍節度使滄景等州觀察處置等使勳封如故馬燧李皋實封制列爵以旌德胙土以報功國有彛章是用褒勸朕以不德間逢多虞蒲坂有叛亂之臣淮沂有僭逆之帥萬姓罹害四方靡寧奉誠軍節度兵馬元帥檢校司徒兼侍中馬燧聞難之𥘉忠誠奮發躬帥士旅討兹不庭略地如歸政城必克晉絳磁隰靡然向風元凶勢窮竟就梟戮清我甸服時惟茂勳荆南節度觀察處置等使檢校戶部尚書嗣曹王皋親率全軍抗於強虜晝夜不息逮於三年謀成必藏師出皆捷復蘄黃之地拔安陸之城隱其威名保乂江漢並著節于國功存于人跡效炳然僉議攸屬雖懋官巳序而食賦未加疇庸之科無乃有闕冝其寵錫以答殊休燧可賜實封五百户通前七百戶皋可賜實封三百户韓滉度支鹽鐡轉運使制食貨所資邦家大本揔領之重必推元臣故周以冢宰制國用漢以丞相調軍食官給人足謂之善經今戶口凋傷財産衰耗邊疆未靜役費尚多思欲均厚澤之征權重輕之制國無匱乏人不怨咨運籌佐時其在良輔金紫光祿大夫檢校尚書左僕射同中書門下平章事充鎮海軍浙江東西節度兼江淮轉運等使晉國公韓滉昔事先朝常掌邦賦貞心獨立一志在公吏無姦欺財以饒羡自臨江甸事舉風行職貢有加轉餉相繼成功允集艱食用康介于方隅未極材術冝其弘濟式副具瞻可充度支及諸道鹽鐡轉運等使餘如故李叔明右僕射制行止兩全必惟明哲致其用以匡國敦乎道以保身周旋令名始終不替斯賢者極致而行之實難金紫光祿大夫守太子少傅檢校尚書右僕射持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事管內度支觀察處置等使蘇國公李叔明禀粹挺生鬱為邦傑虛懷朗暢逹識周通早以器能纍更任遇中外所踐必聞休聲嘗尹京師姦豪屏息洎臨方嶽風俗澄清吏服嚴明人懷德惠憂公奉職勵節存誠服勞王家行及三紀以兹盡瘁沉恙所嬰扶疾趨朝披誠告老固陳衰瘵深戒滿盈情皆發衷語且形泣視其激切良所軫懷敦勸既頻辭乞彌固繼獻章疏期於必從省之憮然用增感歎雖惜其舊德往涖遐藩而憫以髙年難違懇志猶資碩望俾長庶寮罷方鎮之煩揔中臺之重式彰尚德且示優賢可依前守太子少傅兼尚書右僕射李澄贈司空制既明且哲以保其身求之昔賢鮮克全備良以謀始匪易愼終尤難其有志奉公家力輔王室見危而立節將沒而陳誠操尚堅明謀猷深逺憂國無忘於顚沛周身不離於令名有臣如斯可以旌勸故義成軍節度滑鄭等州觀察處置等使開府儀同三司檢校尚書右僕射兼滑州刺史御史大夫上柱國武威郡王李澄天授將材勇而多智臨危不懼見義必為﨑嶇險艱勳節兼著勤於廣業曽未遑安帶甲臨戎連年野處積勞成瘁霜露所侵痟疾攻中癕疽發外逮兹病亟不替忠誠憂國疚懷戀闕流涕懼軍戎之乏帥念方鎮以為虞上表披陳懇求代免辭情激切備慮精深視之感傷當寧興歎雖史魚之陳尸納諫吳漢之在疚獻謀比方於此不足多尚天胡不容奪我良帥惻然嗟悼用切深衷始終存義澄實有之褒美飾終是冝加等可贈司空賜物五百假米粟三百石以左散騎常侍歸崇敬充使吊祭所緣喪葬並准式官供仍以澄讓表宣付史館以彰忠節除鄧州歸順官制迫以凶威陷于寇境義不受汚忠能奮誠履重險而不回處疾風而逾徑忘軀徇義獻𣢾投誠足以勵彼勤王激其汚俗去逆效順固先典之攸嘉懋賞勸功驗彛章而不昧咸從序用俾服官常可依前件云云李納檢校司空制鄭武公父子繼為周司徒內居股肱外作藩翰詩美緇衣之德傳稱夾輔之勳我懷斯人今得良弼開府儀同三司檢校尚書右僕射同中書門下平章事充平盧淄青節度管內度支營田觀察處置陸運海運押新羅渤海兩蕃等使隴西郡王李納宇量宏博質性沉毅體仁能斷見善必遷藴非常之才守以純一秉難奪之節著于艱危昭升令問茂建勳績屬淮夷構亂東夏震騷奮旅徂征坐籌制勝解商丘之難攘彼凶殘釋陳城之危俘厥渠帥德功克懋官賞冝崇庸建上台冝賜真食惟乃先服勤勞王家以殿邦之勳參論道之職俾爾嗣績光于前人荷國之寵章承家之丕構敬愼厥德永孚于休可檢校司空同中書門下平章事仍賜實封五百戶餘並如故唐陸宣公集卷第九
