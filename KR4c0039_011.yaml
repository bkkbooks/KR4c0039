body:
  text: 論兩河及淮西利害狀論關中事冝狀論兩河及淮西利害狀内侍朱冀寧奉宣進旨縁兩河㓂賊未平殄又淮西兇黨攻逼襄城卿識古知今合有良䇿冝具陳利害封進者臣質性凡鈍聞見陋狹幸因之使簪組昇朝荐承過恩文學入侍每自奮勵思酬奬遇感激所至亦能忘身但以越職干議典制所禁未信而言聖人不尚是以循循黙黙尸居榮近日日以愧自春徂秋心雖懷憂言不敢發此臣之罪也亦臣之分也陛下天縱聖德神授英謀明照八表思周萬務猶慮闕漏下詢芻蕘此堯舜捨已從人好問而好察邇言之意也臣毎讀前史見開說納忠之士乃有泣血碎首牽𥚑斷鞅者皆以進議見拒懇誠激忠遂至發憤踰禮而不能自止故也况今勢有危迫事有機冝當聖主開懷訪納之時無昔人逆鱗顚沛之患儻又上探微旨慮匪恱聞傍懼貴臣將爲沮議首尾憂畏前後顧瞻是乃偷合苟容之徒非有扶危救亂之意此愚臣之所痛心切齒於旣往是以不忍復躬行於當丗也心藴忠憤固願披陳職居禁闈當備顧問承問而對臣之職也寫誠無隱臣之忠也謹具件如後惟明主循省而備慮之豈有微臣獨荷容納之恩實億兆之幸社稷之福也臣本書生不習戎事竊惟霍去病漢將之良者也毎言行軍用師之道顧方略何如耳不在學古兵法是知兵法者無他見其情而通其變則得失可辯成敗可知古人所以坐籌樽爼之間制勝千里之外者得此道也臣才不逮古人而頗窺其意是敢承詔不黙輙陳狂愚伏以剋敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不爲用兵不足恃與無兵同將不爲用與無將同將不能使兵國不能馭將非止費財翫㓂之弊亦有不戢自焚之災自昔禍亂之興何甞不由於此今兩河淮西爲叛亂之帥者獨四五凶人而巳尚恐其中或有傍遭詿誤内蓄危疑蒼黃失圖勢不得止亦未必皆是處心積慮果爲姦逆以僣帝稱王者也況其餘衆蓋並脅從苟知全生豈願爲惡若招攜以法悔禍以誠使來者必安安者必乆斯道積著人誰不懷縱有野心難馴臣知其從化者必過半矣舞千苗格豈獨虚言假使四五兇渠俱禀梟鴟之性其下同惡復有十百相從是皆卒伍庸流闒茸下品其志好不過聲色財貨之樂其材用不過蹴踘距踴之能其約從締交則迭相侮詐以爲智謀其御衆使人則例質妻孥以爲術數斯乃盗竊偷安之伍非有姦雄特異之資以陛下英神志期平壹君臣之勢不類逆順之理不侔形勢之大小不倫師徒之衆寡不敵然尚曠歳持乆師老費財加筭不止於舟車徴卒殆窮於閩濮笞肉捶骨呻吟里閭送父别夫號呼道路杼軸巳甚興發巳殫而將帥者尚曰財不足兵不多此微臣所以千慮百思而不悟其理也未審陛下甞徴其說察其由乎股肱之臣日月獻納復爲陛下察其事乎臣愚無知實所深惑遂乃過爲臆度輙肆討論以爲剋敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不爲用今以陛下効其明聖羣帥畏威雖萬無此虞然亦不可不試省察也陛下若謂臣此說蓋虚體耳不足徴焉臣請復爲陛下效其明徴以實前說田恱唱亂之始氣盛力全恒趙青齊迭爲脣齒陛下特詔馬燧委之專征抱眞李芃聲勢相援于時士吏畏法將帥感恩俱藴勝殘盡敵之誠未有爭功邀利之釁故能累摧堅陣深抵窮巢元惡幸脫於俘囚兇徒幾盡於鋒刃臣故曰剋敵之要在乎將得其人馭將之方在乎操得其柄此其明效也田恱旣敗力屈勢窮且皆離心莫有固志乗我師勝捷之氣躡亡虜傷夷之餘比於前功難易百倍旣而大軍遂駐遺孽復安其後餽運日増師徒日益于兹再稔竟不交鋒量兵力則前者寡而今者多議軍資則前者薄而今者厚論氣勢則前者新集而今者乗勝度攻具則前者草創而今者繕完計兇黨則前者盛而今者殘揣敵情則前者銳而今者挫然而勢因時變事與理乖當易而反難當進而中止本末殊趣前後易方順理之常必不如此臣故曰將非其人者兵雖衆不足恃操失其柄者將雖材不爲用此自昔必然之効但未審今兹事實得無近於此乎在陛下熟察而亟救之耳固不在益兵以生事加賦以殄人無紓目前之虞或興意外之患人者邦之本也財者人之心也兵者財之蠧也其心傷則其本傷其本傷則枝幹顚瘁而根柢蹷抜矣惟陛下重愼之愍惜之今師興三年可謂乆矣稅及百物可謂繁矣陛下爲之宵衣旰食可謂憂勤矣海内爲之行賫居送可謂勞弊矣而㓂亂有益翦滅無期人揺不寧事變難測是以兵貴拙速不尚巧遲速則乗機遲則生變此兵法深切之誡往事明著之驗也夫投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也是以勞心於服逺者莫若修近而其逺自來多方以救失者莫若改行而其失自去若不靖於本而務救於末則救之所爲乃禍之所起也修近之道改行之方易於舉毛但在陛下然之與否耳儻或重難易制姑務持危則當校禍患之重輕辯攻守之緩急臣謂幽燕恒魏之㓂勢緩而禍輕汝洛滎汴之虞勢急而禍重緩者冝圖之以計今失於屯戍太多急者冝備之以嚴今失於守禦不足何以言其然也自胡羯稱亂首起葪門中興巳來未暇芟蕩因其降將即而撫之朝廷置河朔於度外殆三十年非一朝一夕之所急也田恱累經覆敗氣沮勢羸偷全餘生無復逺略武俊蕃種有勇無謀朱滔卒材多疑少决皆受田恱誘䧟遂爲猖狂岀師事起無名衆情不附進退遑惑内外防虞所以纔至魏郊遽又退歸巢穴意在自保勢無他圖加以洪河太行禦其衝并汾洺潞壓其腹雖欲放肆亦何能爲又此郡兇徒互相劫制急則合力退則背憎是皆苟且之徒必無越軼之患此臣所謂幽燕恒魏之㓂勢緩而禍輕希烈忍於傷殘果於吞噬據蔡許冨全之地益鄧襄鹵獲之資意殊無猒兵且未衂東㓂則轉輸將阻北窺則都城或驚此臣所謂汝洛滎汴之虞勢急而禍重代朔邠靈之騎士自昔之精騎也上黨盟津之歩卒當今之練卒也悉此彊勁委之山東勢分於將多財屈於兵廣以攻則曠歳不進以守則數倍有餘各懷顧瞻遞欲推倚此臣所謂緩者冝圖之以計今失於屯戍太多李勉以文吏之材當浚郊奔突之㑹哥舒曜以烏合之衆扞襄野犲狼之羣陛下雖連發禁軍以爲繼援累勑諸鎭務使恊同睿㫖殷憂人思自效但恐本非素習令不適從奔鯨觸羅倉卒難制首䑕應敵因循莫前此臣所謂急者冝備之以嚴今失於守禦不足陛下若察其緩急審其重輕使懷光帥師救襄城之圍李芃還鎭爲東都之援汝洛旣固梁宋亦安是乃取有餘救不足罷關右賦車籍馬之擾減山東飛芻輓粟之勞無擾則禍亂不生息勞則物力可濟非止排難於變切亦將防患於未然徴發旣停守備且固足得徐觀事勢更選艮圖此於紓亂解紛抑亦計之次也議者若曰河朔羣盗尚未殱夷儻又減兵必更生患此蓋好異不思之說耳臣請有以詰之前歳伐叛之𥘉唯馬燧抱眞李芃三帥而巳以攻必剋以戰必彊是則力非不足明矣洎遲留不進乃請益師於是選神䇿銳卒以繼之而李晟往矣猶曰未足復請益師於是徴朔方全軍以赴之而懷光往矣幾遣加半之戍竟無分寸之功是則師不在衆又明矣然而可託以爲解者必曰王師雖益賊黨亦増曩獨田恱寳臣今兼朱滔武俊臣請再詰以塞其辭曩之田恱寳臣皆蓄銳飬謀劇賊之方彊者也㝷而田恱喪敗寳臣殱夷雖復朱滔武俊加於前亦有孝忠日知乗其後是則賊勢不滋於曩日王師有溢於昔時又明矣曩以太原澤潞河陽三將之衆當田恱朱滔武俊三㓂之兵今朱滔遁歸武俊退縮唯此田恱假息危城設使我師悉歸彼亦纔能自守況留抱眞馬燧足得觀釁討除是則減兵東征勢必無患又明矣留之則彼爲冗食徙之則此得長城化危爲安息費從省舉一而兼數利惟陛下圖之謹奏論關中事冝狀右臣頃覽載籍毎至理亂廢興之際必反覆參考究其端由與理同道罔不興與亂同趣罔不廢此理之常也其或措置不異安危則殊此時之變也至於君人有大柄立國有大權得之必彊失之必弱是則歷代不易百王所同夫君人之柄在明其德威立國之權在審其輕重德與威不可偏廢也輕與重不可倒持也蓄威以昭德偏廢則危居重以馭輕倒持則悖恃威則德喪於身取敗之道也失重則輕移諸己啓禍之門也陛下天錫勇智志期削平忿兹昬迷整旅奮伐海内震疊莫敢寧居此誠英主撥亂拯物不得巳而用之然威武四加非謂蓄矣所可兢兢保惜愼守而不失者唯居重馭輕之權耳陛下又果於成務急於應機竭國以奉軍傾中以資外倒持之勢今又似焉臣是以疚心如狂不覺妄發輒踰顧問之㫖深測憂危之端此臣之愚於自量而忠於事主之分也古人所謂愚夫言之而明主擇之惟陛下幸留聽焉臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則小大適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用即不悖處則不危斯乃居重馭輕天子之大權也非獨爲御諸夏而巳抑又有鎭撫戎狄之術焉是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邊城其賦役則輕近而重逺也其惠化則恱近以來逺也太宗文皇帝旣定大業萬方底乂猶務戎備不忘慮危列置府兵分隷禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸乆武備浸微雖府衛具存而卒乗罕習故禄山竊倒持之柄乗外重之資一舉滔天兩京不守尚頼經制頗存典刑彊本之意則忘縁邊之備猶在加以諸牧有馬毎州有糧故肅宗得以爲資中復興運乾元之後大憝𥘉夷繼有外虞悉師東討邊備旣㢮禁戎亦空吐蕃乗虚深入爲㓂故先皇帝莫與爲禦避之東遊是皆失居重馭輕之權忘深根固柢之慮内宼則崤函失險外侵則汧渭爲戎于斯之時朝市離析事變可慮須臾萬端雖有四方之師寧救一朝之患陛下追想及此豈不爲之寒心哉尚頼宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宫廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保祐深矣故示大儆將弘永圖陛下誠冝上副玄心下察時變逺考前代成敗近鑒國朝盛衰垂無疆之休建不抜之業今則勢可危慮又甚於前伏惟聖謀巳有成筭愚臣未逹敢獻所憂先皇帝還自陜郛懲艾往事稍益禁衛漸修邊防是時關中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精彊又徴諸道戍兵毎歳乗秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寳位威懾殊鄰蠢兹昆夷猶肆毒蠚舉國來宼志吞㟭梁貪冒旣深覆亡幾盡遂求通好少息交侵蓋縁馬喪兵疲務以計謀相緩固非畏威懷德必欲守信結和所以歷年優柔竟未堅定要約息兵稍乆育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺羣胡自爾巳來絶無虜使其爲嫌怨足可明徴借如吐蕃實和迴紇無憾戎狄貪詐乃其常情苟有便利可窺豈肯端然自守今朔方太原之衆逺在山東神䇿六軍之兵繼出關外儻有賊臣㗖宼黠虜窺邊伺隙乗虚微犯亭障此愚臣所竊爲憂者也未審陛下其何禦之側聞伐叛之𥘉議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事爲無擾於人爲不勞曽不料兵連禍拏變故難測日引月長漸乖始圖故前志以兵爲凶器戰爲危事至戒至愼不敢輕用之者蓋爲此也當勝而反敗當安而倒危變亡而爲存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以爲鑒往歳爲天下所患咸謂除之則可致昇平者李正已李寶臣梁崇義田恱是也往歳爲國家所信咸謂任之則可除禍亂者朱滔李希烈是也旣而正已死李納繼之寶臣死惟岳繼之崇義卒希烈叛惟岳戮朱滔攜然則往歳之所患者四去其三矣而患竟不衰往歳之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢苟安則異類同心也勢苟危則舟中敵國也陛下豈可不追鑒往事惟新令圖循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無巳之求望難必之效其於爲人除害之意則巳至矣其爲宗社自重之計恐未至焉自頃將帥徂征乆未盡敵苟以藉口則請濟師陛下乃爲之輟邊軍缺環衛虚内廏之馬竭武庫之兵占將家之子以益師賦私養之畜以増騎猶且未戰則曰乏財陛下又爲之筭室廬貸商賈傾司府之幣設請榷之科關輔之閒徴發已甚宫苑之内備衛不全萬一將帥之中又如朱滔希烈或負固邊壘誘致犲狼或竊發郊畿驚犯城闕此亦愚臣所竊爲憂者也未審陛下復何以備之以陛下聖德君臨率土欣戴非常之慮豈所冝言然居安備危哲王是務以言爲諱中主不行若備之巳嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦甞用之以傾諸侯漢甞因之以定四海蓋由憑山河之形勝宅田里之上腴弱則内保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭德也豪勇之在關中者與籍於營衞不殊車乗之在關中者與列於廐牧不殊財用之在關中者與貯於帑藏不殊有急而須一朝可聚今執事者先拔其本弃重取輕所謂倒持太阿授人以柄議制置則彊幹弱枝之術反語綏懷則恱近來逺之道乖求諸通方無適而可顧臣庸懦竊爲陛下惜之往者不可追來者猶可𥙷臣不勝懇懇憂國之至輒敢効其狂鄙以備採擇之一端陛下儻俯照微誠過聽愚計使李芃援東洛懷光救襄城希烈兇徒勢必退衂則所遣神䇿六軍士馬及點召節將子弟東行應援者悉可追還河北旣有馬燧抱眞固亦無藉李晟亦令旋斾完復禁軍明勑涇隴邠寧但令嚴備封守仍云更不徴發使知各保安居又降德音勞徠畿甸具言京輦之下百役殷䌓且又萬方㑹同諸道朝奏䘏勤懷逺理合優容其京城及畿縣所稅閒架搉酒抽貫貸商點召等諸如此類一切停罷則冀巳輸者弭怨見處者獲寧人心不揺邦本自固禍亂無從而作朝廷由是益尊然後可以度時冝施教令㢮張自我何有不從端本整棼無易於此謹奏唐陸宣公集卷第十一
