body:
  text: 興元論解姜公輔狀又荅論姜公輔狀興元論請優獎曲環所領將士狀興元論解蕭復狀又荅論蕭復狀興元論續從賊中赴行在官狀興元論解姜公輔狀右欽漵奉宣聖旨縁唐安公主喪亡不可向此間遷厝權令造一塔安置待收復京城即擬將歸以禮葬送所造塔役功費用亦甚微小都不合是宰相所論之事姜公輔忽有表奏都無道理但欲指朕過失擬自取名朕本拔擢將爲腹心今却如此豈不負朕至深卿冝商量如何穩便者公輔頃在翰林與臣乆同職任臣今據理辨直則渉於私黨之嫌希旨順承則違於匡輔之義渉嫌止貽於身患違義實玷於君恩徇身忘君臣之恥也别嫌奬義主之明也臣今不敢冒行所恥亦頼陛下明聖而鑒焉古語有之順旨者愛所由來逆意者惡所從至故人臣皆爭順旨而避逆意非忘家爲國捐身成君者誰能犯顔色觸忌諱建一言開一說哉是以哲后興王知其若此求諌如不及納善如轉圎諒直者嘉之訐犯者義之愚淺者恕之狂誕者容之仍慮驕汰之易滋而忠實之不聞也於是置敢諌之鼔植告善之旌懸戒愼之鞀立司過之士猶懼其未也又設官制以言爲常由是有史爲書瞽爲詩工誦箴諌大夫規誨士傳言庶人謗尚恐其怠也每歳孟春遒人以木鐸徇于路而振警之官師相規工執蓺事以諌其或不恭邦有常刑然非明智不能招直言非聖德不能求過行招直則其智彌大求過則其德彌光唯衰亂之朝闇惑之主則必諱其過行忿其直言以阿䛕爲納忠以諌爭爲揚惡怨讟溢於下國而耳不欲聞腥德逹于上天而心不求寤迨乎㒹覆猶未知非情之昬迷乃至於是故明者廣納以成德闇者獨用而敗身成敗之途千古相襲與敗同轍者罔不覆與成同軌者罔不昌以陛下日月之明江海之量自當矯夏癸殷辛拒諫飾非之慝協大禹成湯拜言改過之誠矧又時運方屯物情猶鬱乃是陛下握髮吐哺之日宵衣旰食之辰士無賢愚咸冝録用言無大小皆務招延固不可復有忤逆之嫌甘辛之忌也夫君人者以衆智爲智以衆心爲心恒恐一夫不盡其情一事不得其理孜孜訪納唯善是求豈但從諌不咈而巳哉乃至求謗言聽輿誦葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必逹今公輔官在諌議任居宰衡獻替彌綸乃其職分比於芻蕘葑菲豈不優而且重哉此理之常奚足恠也縱使引喻非當不猶愈於輿誦乎矯激過深不猶愈於謗言乎晉文聽輿人之誦而霸業興虞舜設誹謗之木而帝德廣斯實聖賢之髙躅陛下何疾焉聖旨又以造塔役費微小非宰臣所論之事下臣愚戇竊謂不然當問理之是非豈論事之大小若造塔爲是役雖大而作之何傷若造塔爲非費雖小而言者何罪夫小者大之漸微者著之萌故君子愼初聖人有戒知幾者所貴乎不逺而復制理者必在於未亂之前本立輔臣置之左右朝夕納誨意在防微微而弼之乃其職也㳙㳙不遏終變桑田燄燄靡除卒燎原野流煽巳甚禍災巳成雖欲救之固無及矣書曰不矜細行終累大德易曰小人以小善爲無益而不爲也以小惡爲無傷而不去也故惡積而不可掩罪大而不可解然則小之不可不愼也如此陛下安得使之勿論乎虞書載咎繇之言曰兢兢業業一日二日萬幾兢兢愼也業業危也幾者動之微也唐虞之際主聖臣賢庶績咸熈萬邦巳協而猶上下相戒旣愼且危慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎舜之爲君始作􅃮器羣臣固爭咸謂非冝􅃮器之爲用也甚堅其爲費也蓋寡然猶相繼諷諌者豈不欲杜其漸而愼其初歟是知君臣之間義同一體事罔大小相須而成故舜命其臣曰作朕股肱耳目夫股肱之奉元首不以煩細而闕於運行耳目之助於心靈不以么微而廢於視聽是以臣子之於君父也盡其敬而敬焉盡其愛而愛焉敬則願極於尊榮愛則懼䧟於過惡萬邦黎獻莫不皆然而況位列朝廷任當輔弼主辱與辱主安與安此而不言誰復言者禮曰近而不諫則尸利也若宰相者可謂近矣事或乖悮得無諫乎武丁賢君也傳說賢相也而武丁引金作礪以命其相說諭木從繩以戒其君是則輔弼之任匡救攸屬巨細之事悉冝盡規陛下所言役費微小非宰相所論之事又謂指朕過失擬自取名此誠異乎愚臣之所聞是以願披肺腸而不敢自黙者也若以諫爭爲指過則剖心之主不冝見罪於哲王若以諫爭爲取名則匪躬之臣不應垂訓於聖典獻替列職竟使奚爲左右有人復將焉用臣竊謂指過以示直固不如改過以見稱進諫以取名固不如納諫之爲美假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下𬒳違諫之謗是乃掩已過而過彌著損彼名而名益彰果而行之所失大矣一獲一失可不愼乎伏願嘉忤㫖之忠祛逆耳之吝平積憤之氣弭逆詐之情然後試以愚言反覆叅校庶臻至理且亮微誠謹奏又荅論姜公輔狀右欽漵奉宣聖旨省卿所奏公輔事冝雖甚知卿盡忠然似未㑹朕意朕意以公輔才行共宰相都不相當在奉天時早欲停罷後因公輔辭退朕已對面許訖尋屬懷光背叛遂且因循容到山南公輔知朕必擬移改所以固論造塔事賣直取名據此用心豈是良善朕所以惆悵者秖縁如此卿今疑朕不能納諫殊乖本意者臣以戇執務在朴忠推理而言有懷必盡睿意玄妙非几所窺如臣懵昧之材且無希伺之志奏報失旨冝其固然所冀録微𣢾而矜至愚實天下幸甚古人有言曰明主者可以理奪又曰主聖則臣直今陛下禀天縱之才備明聖之資臣若抱理莫伸守直不固上虧至化罪莫大焉輒復據直道而理其前言惟陛下留意幸察臣竊以領覽萬機必先虚其心鑑鏡羣情必先誠其意蓋以心不虚則物或見阻意不誠則人皆可疑阻於物者物亦阻焉疑於人者人亦疑焉萬物阻之兆人疑之將欲感人心致於和平盡物理使無紕繆是由却行而求及前人也無乃愈踈乎孔子曰不遷怒不億不信豈非懼於肆情逞憾以至于失中違道者哉臣之區區志欲匡輔是以前者奏䟽願陛下平積憤雖善而奚爲諫有可從人雖咎而寧捨古先聖王所以採葑菲詢芻蕘傳謗言用仇怨急於聽納乃至於斯其意無他惟義所在願陛下不以憎嫌而遺其片善不務精察而謂之大明忠言者利於行而咈於情唯計慮至熟乃能無忤幸紆宸鑒更審所冝謹奏興元論請優奬曲環所領將士狀右曲環所領一軍悉是朱泚部曲或頃在鳯翔所管或本從河朔同來後因汴宋用兵權抽赴彼應援所以行營將士猶舉幽隴爲名今之元兇乃其舊帥歧下則楚琳助亂薊門則朱滔黨姦獨此偏師漂然河上其營幕則寄于他土其家屬則䧟於匪人又屬汴路姦虞浚城䧟覆糧餉屢絶資裝乆殫士卒常情固難安處是冝潰歸舊管否則散適樂郊而曲環撫之悉無離叛孤軍自守亦不苟從處危能安聞難輒赴甚推齊肅累著功勲近日將帥之中罕有如環之比考其才節絶有過人但縁羇寓多時窮匱轉甚繼陳章奏言極酸辛告急朝廷則力未能救求哀郡府則人莫見憂覽其辭情可謂流涕若失於應接則終以危亡良將義徒實在深惜願陛下不以常人遇之不以常事遣之方今勢可相資唯有江左完實恐須密勑韓滉切令贍恤此軍器甲衣糧咸使周足因賜劉洽手詔亦委加意保持若得自存必有成績非艱難無以表特操非英聖不能全異才有功見知人必恱勸臣不勝區區爲國奬善拯危之意謹啓事以聞謹奏興元論解蕭復狀右欽漵齎蕭復表示臣兼奉宣聖旨朕比縁李懷光兇狂權且就此迴避山南旣與京畿接近指麾兵馬日望收城今蕭復勸朕令幸江陵表狀之中張皇頗甚朕不㑹其意昨問從一從一亦甚驚恠不知事由蕭復奏事官李充朕適喚對共語亦似不是純良此人莫是李承昭家子弟否卿冝審看蕭復表中意趣斟酌奏來者臣伏覩其表兼揣其情蓋以逺路傳聞事多失實大臣獻納務且竭誠雖有過當之虞失中之䇿但冝勿用不足爲尤何則駐蹕奉天屯難巳甚況又不駐艱危可知蕭復備位樞衡奉使宣撫忽聞變故寧免驚憂梁岷之間窮隘特甚輦輓攸止資奉實難凡在戀主之誠各懷徯后之志是以延賞奉迎於西蜀韓滉望幸於東吴此乃臣子之常情古今之通理蕭復所請亦類於斯事雖非冝意則可恕李充頃任御史臣嘗與之同寮其人是故福建觀察使李椅之男共承昭房從巳逺才頗通敏性亦温恭宗族之中足稱佳器伏願更廣詢訪方驗臣言不誣謹奏又荅論蕭復狀右欽漵奉宣聖旨卿所奏蕭復事朕巳具悉假使更無别意終是不識事冝今廵行諸道轉恐事多乖失縁孟皡年老今欲除蕭復爲福建觀察使便令赴任去就亦應得所卿意以爲何如者伏以將相之任所委皆崇中外迭居亦是常理然君臣有禮進退不可以不全理體有冝本末不可以不稱頃盗興都邑駕適郊畿陛下悔征賦之殷繁念黎元之困悴誕降慈㫖深示憫傷特遣大臣普詢疾苦本期還報將議優蠲衆情顒顒日望上逹今若未終前命遽授逺藩則是膏澤將布而復收渙汗巳發而中廢事旣失望人何以觀斯乃進退之禮不全本末之冝不稱謂爲得所臣實疑之儻慮事乖方不欲淹留在外則當諭以詔旨促其歸程逺郡廵歷未周但令副介分往待其復命親訪物情革弊垂恩用符德號使務旣畢能否益彰徐擇所冝以圖進退庶於事體允得厥中謹奏興元論續從賊中赴行在官等狀右欽漵奉宣聖旨近日往往有卑官從山北來皆稱自京城偷路奔赴行在大都此輩多非良善有一邢建論說賊中體勢語最張皇察其事情頗是窺覘今且令留在一處安置如此之類更有數人若不根尋恐有姦計卿冝商量如何穩便者臣伏以任揔百揆者與一職之守不同富有萬國者與百揆之體復異蓋尊領其要卑主其詳尊尚恢弘卑務近細是以練覈小事糺察微姦此有司之守也維御萬樞選建庶長揔綱而衆目咸舉明邇而羣方自通此大臣之任也愚智兼納洪纎靡遺蓋之如天容之如地垂旒黈纊而黜其聦察匿瑕藏疾而務於包含不示威而人畏之如雷霆不用明而人仰之如日月此天子之德也以卑而僭用尊道則職廢于下以尊而降代卑職則德喪于上職廢則事不舉德喪則人不歸事不舉者弊雖切而患輕人不歸者釁似微而禍重兹道得失所關興亡聖王知宇宙之大不可以耳目周故清其無爲之心而觀物之自爲也知億兆之多不可以智力勝故壹其至誠之意而感人之不誠也異於是者乃以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺故宣尼述陶唐之盛曰惟天爲大惟堯則之周詩美文王之德曰不識不知順帝之則是皆覆育萬物渾然大同無好無惡不忌不克之謂也項籍納秦降卒二十萬慮其懷詐復叛一舉而盡坑之其於防虞亦巳甚矣漢髙豁逹大度天下之士至者納用不疑其於備慮可謂䟽矣然而項氏以滅劉氏以昌蓄疑之與推誠其効固不同也秦皇嚴衛雄猜而荆軻奮其隂計光武寛容博厚而馬援輸其欵誠豈不以虚懷待人人亦思附任數御物物終不親情思附則感而恱之雖寇讎化爲心膂有矣意不親則懼而阻之雖骨肉結爲仇慝有矣臣故曰兹道得失所關興亡伏惟陛下睿哲文思光𬒳四表孝友勤儉行髙百王然猶化未大同俗未至理者良以智出庶物有輕待人臣之心思周萬機有獨馭區寓之意謀吞衆略有過愼之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勲業者懼於不容懷反側者迫於及討馴致離叛搆成禍災兵連于外變起于内歳律未半乗輿再遷國家艱屯古未嘗有以陛下至聖之德而遘兹殷憂之期天其或者欲大啓睿心儆小失而崇丕業耳臣謂陛下當奉若天意追咎巳然凡所致寇之由悉巳詳知其故將革前弊以消羣疑今承德音尚襲流誤若未悔禍何由弭災臣獲蒙過知又辱下問若務順旨是爲欺天庸敢指陳庶禆闕漏往歳𥘉奮師旅四征不庭義烈之徒人思自効捨逆歸𣢾者繼獻于闕下陳謀諫失者爭詣于禁門陛下能於此時乗軍氣之方雄因人心之願盡輟沐吐哺虚襟坦懷海納風行不疑不滯功者報之義者旌之直者獎之才者任之其或有志而無𥙷於時敢言而不當其理亦必恕其妄作録其善心率皆優容以禮進退如此則海内風靡翕然歸心賢愚咸懷小大畢力蕞爾凶醜曽何足平臣固知乆巳理安必無奉天之幸矣其所以孕禍胎而索義氣者在乎獨斷宸慮專任睿明降附者意其窺覦輸誠者謂其遊說論官軍撓敗者猜其挾姦毀沮陳兇黨強狡者疑其爲賊張皇獻計者防其漏言進諫者憚其宣謗凡此之類悉貽聖憂咸使拘留謂之安置或詰責而寘於客省或勞慰而延於紫庭雖呵奬頗異其辭然於圈閑一也旣杜出入勢同狴牢解釋無期死生莫測守護且峻家私不通一遭縶維動歷年歳想其痛憤何可勝言由是歸化漸稀而上封殆絶矣徇義之心旣阻脅從之黨彌堅而貴近之臣徃來之使希望風旨詭辭取容唯揣樂聞不憂失實咸言聖謀深逺䇿略如神小寇孤危滅亡無日陛下急於誅惡皆謂其事信然窮兵竭財坐待平一人心轉潰㓂亂愈滋遂至轂下生戎宫闈不守儻陛下能於此際遽敷大號謝過萬方敘忠良見忌之冤而舉其尤鯁亮者加之厚秩紏阿䛕不實之罪而數其極姦妄者處之大刑賞罰旣明忠邪畢辨以此臨下誰敢不誠以此懷人何有不服過而能改亂亦遄安臣固知尋復京師必無梁岷之遊矣陛下旣闕愼于始又失圖于中收之西隅唯在兹日豈可復使一事紕繆一言過差哉今賊泚末平懷光繼叛都邑城闕猰㺄迭居關輔郊畿犲狼雜處朝廷僻介於逺郡道路縁歷於連山杖䇿從君其能有幾推心降接猶恐未多稍不禮焉固不來矣若又就加猜劾且復囚拘使反者得辭來者懷懼則天下有心之士安敢復言忠義哉卵胎不傷麟鳯方至魚鼈咸若龜龍刀遊蓋恱近者來逺之資懷小者致大之術也竊料邢建等輩必非助逆之徒假如過有張皇跡渉疑似亦望矜愚惜體屈法𥙿人並量器能隨事甄貸武者措之於戎伍文者付之於宰司犬則授以職貟次但優其選序必有須離行在難處親軍則或除諸道一官或委諸使録用就其常分各稍加恩古人有言撫我則后虐我則讎惠澤所及謳歌乃歸流聞四方孰不欣戴昔趙殺鳴犢聖人輟行燕尊郭隗賢士繼往況乎天子所作天下式瞻一言阻物則天下莫不自疑一事恤人則天下莫不同恱固不可以小失爲無損而不悔亦不可以小善爲無益而不行小猶愼之矧又非小願陛下惟事無大小皆以覆車之轍爲戒實宗社無疆之休謹奏唐陸宣公集卷第十五
