front:
  text: 唐陸宣公集卷第四制誥卷第四優恤賜功臣名改州府
  hash: sha256:b469c82bd1a29eb17c8a9f74cb4f52855b2a7a61a891cbc784fe1ba54ab3d12f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_004-1a}
body:
  text: 賑恤諸道將吏百姓等詔國之經制儲畜備災雖遇凶年人無菜色時或弛征散利務穡勸分徙有以均無因豐而𥙷敗救患之術抑其次焉自戍役繁興兩河尤極農桑日費井邑為墟丁壯服其干戈疲羸委於溝壑傷夷未復荒饉荐臻歷河朔而至於太原自淮沂而𬒳于洛汭蟲螟為害雨澤愆時稼穡卒疸蒸黎重困然由徴賦不息征役未寧凍餒流離寄命無所興言感悼焚灼于懷朕聞刑罰失中虐沴斯作致咎之本在豫一人萬姓何辜遭罹其弊兢兢惕畏不敢遑安庶蠲下土之災用答上天之戒其宣武等軍宋亳陳州等節度淄青等州節度河陽懷州節度東都畿汝等州節度潞美軍澤潞磁邢等州節度保寧軍節度成德軍恆深趙等州節度易定等州節度每管各賜米五萬碩所司即般運都於楚州分付各委本道差官受領賑給將士百姓等務令均洽以惠困窮屬軍費方殷國儲尚歉今所賜賑給其數非多猶慮孤惸或未周贍榖價翔貴何能自資江淮之間連嵗豐稔迫於供賦頗亦傷農收其有餘濟彼不足允孚發斂之術且叶變通之規冝令度支於淮南浙江東西等道量置埸加價和糴米三五十萬碩差官般運於諸道減價出糶貴從權便以利於人無或勞煩重豫不德方嶽守將實朕股肱恤患分憂與朕同體冝即遣使分道宣慰勞勉將士省問鄉閭有可以救歲之凶災除人之疾苦各與本道節度使啇議具以聞奏必精必詳用稱朕意優恤畿內百姓并除十縣令詔朕以薄德託於人上勵精思理期致雍熙鑒之不明事或乖當百度多闕四方靡寧傷夷未瘳而征役荐起流亡既甚而賦斂彌繁人怨聞上天災降下連歲蝗旱蕩無農收惟兹近郊遭害尤甚豈非昊穹作沴深警豫衷局蹐憂慚罔知攸措今榖價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廪食俱竭既無賑恤猶復徴求財殫力疲繼以鞭箠弛征則軍莫之贍厚斂則人何以堪念兹困窮痛切心骨思所以濟浩無津涯𥙷過實在於增修救患莫如於息費致咎之本既由朕躬謝譴之誠當自朕始冝令尚食每日所進膳各減一半宫人等每月惟供給糧米一千五百碩其餘悉皆停省年食支酒料冝減五百碩飛龍廄馬從今巳後至四月三十日巳前並減半料京兆府百姓應差科徴配及和市和糴等諸色名目事無大小一切並停公私債負容待蠶麥熟後徴收百司非至切之務如追擾百姓及追勘徴收等色府縣並不須承受其尋常訴訟非交相侵奪者亦不得為理百姓及諸色人等如能力行仁義均減有無賙貸貧人全活數衆者府司具事跡聞奏朕當授以官秩蠲其征徭如縣令勸導有方流庸克濟至夏𥘉巳來類例勘㑹但戶口無減田疇不荒亦以狀聞量加優獎百姓有迫於荒饉全家逐食者其田宅家具樹木麥苗等縣司並明立簿書印記令所由及近鄰人同檢校勿容輒有毀損及典賣填納差科本戶却歸使令復業夫致理之本必在於親人親人之任莫切於令長導王者之澤以𬒳於下求庶人之瘼以聞于朝得失之間所係甚大且一夫不獲辜實在豫况百里之安危萬人之性命付以長吏豈容易哉今甸內凋殘亦巳太甚每一興想衋然傷懷非慈惠不能恤疲氓非才術無以賑艱食臺郎御史選重當時得不分朕之憂救人之弊昨者詳延羣彥親訪嘉猷尚書司勳貟外郎竇申等十人咸以器能理道精心究蒸黎之疾苦知教化之宗源輟於周行往涖通邑申可長安縣令鄭珣瑜可檢校吏部貟外郎兼奉先縣令韋武可檢校禮部貟外郎兼昭應縣令賈全可咸陽縣令兼監察御史霍琮可華原縣令兼監察御史王倉可檢校禮部貟外郎兼昭應縣令李曽可盩厔縣令兼監察御史荀曽可三原縣令兼侍御史李緄可冨平縣令兼殿中侍御史其有散官封賜者並如故應畿內縣令俸料宜准常參官例均融加給涇陽縣令韋滌潔已貞明處事通敏有禦災之術有字物之方人不流亡事皆辦集惟是一邑之內獨無愁怨之聲古之循良何以過此就加寵秩允叶前規可檢校工部貟外郎兼本官仍賜緋魚袋并賜衣一襲絹百匹馬一匹嗚呼積行在躬雖微必著咨乃庶尹其惟欽哉朕聞為君者必擇人而官為臣者罔擇官而處弛張繫於理不繫於時升降在乎人不在乎位朕方抑浮華以敦教稽言行以進人非次之恩以待能者彰善黜惡期於必行凡百君子各冝自勉重優復興元府及洋鳯州百姓等詔朕巡狩山南自春涉夏師旋殷㑹日費既廣州閭杼軸歲計其空東作妨時西成罕望雖黽勉從事人不告勞而憫悼積衷豫實知愧昨者減其租稅優以復除庶乎有瘳汔用小息洎駕言旋軫躬履畏途絶澗縈回危棧綿亘時經霖兩道阻且修工徒造舟縣人葺路靡幼靡耋莫獲寧居而又齎負糗糧供備頓舍涉于千里飫我六師居人露處以罔依宿麥過時而不穫覩兹妨奪彌增感傷前所復除未足酬恤式敷惠澤以紓大勞其興元府除先優復外冝更給復二年鳯州全放今年稅其興元府鳯州界內知頓及修道路閣橋州縣官將士等並委嚴震類例功效具名聞奏量與甄奬嗟乎古先哲王東征西怨顧豫不德重以勞人𥙷費録勤是有申命長吏明加優諭稱朕意焉議減鹽價詔三代立制山澤不禁天地材利與人共之王道寖微強霸爭騖於是設祈望之守興榷管之法以佐兵賦以寬地征公私之間猶謂兼澤歷代遵用遂為典常自頃寇難荐興巳三十載服干櫓者農耕盡廢居里閭者杼軸其空革車方殷軍食屢調人多轉徙田畒汙萊乃專煮海之利以為贍國之術度其所入歲倍田租近者軍費日增榷價日重至有以榖一斗易鹽一升本末相踰科條益峻念彼貧匱何能自滋五味失和百疾生害以兹夭斃實為痛傷嗚呼朕丕承列聖之緒遐覽前王之典既不克靜事以息用又不獲弛禁以便人征利滋深疲氓至困豫則不恤其誰省憂應江淮并峽內榷鹽冝令中書門下及度支商議裁減估價兼釐革利害速具條件聞奏削去苛刻止塞姦訛務於利人必稱朕意賜京畿及同華等州百姓種子賑給貧人詔春陽布和萬物暢茂實兆庶樂生之日農夫致力之時今兹吾人則異於是迫以荒饉愁怨無憀有離去井疆業於庸保有乞丐途路困於死亡鄉閭依然煙火斷絶種餉既乏農耕不興若東作愆時西成何望為人父母得不省憂雖國計猶虛公儲未贍濟人之急寧俟盈豐罄其有無庶拯艱厄京兆府百姓並冝賜種子二萬碩同華州各賜三千碩陜號兩州賜四千碩委州長吏即於度支計㑹請受差公清仁恤之吏與縣令親至村閭隨便給付仍加勸課勿失農時應諸倉所有逺年粟麥冝令節度更分二萬碩京兆尹即差官逐便般載賑賜貧人先盡鰥寡孤惸目下不濟者務令均給全活流庸嗚呼朕德之不敷誠之不感上帝降格丁寧厥躬元元何辜罹此災害思欲拯救未知其方長人之官寄任斯重所冝極慮與我同憂勉敷惠和以育疲瘵佇聞良術稱朕意焉賜將士名奉天定難功臣詔國家受天明命平一宇內自武德迄于天寶百四十載海內無事崇德廣化澤浸生人時洽和平俗登冨教鰥寡孤獨咸得其所鳥獸魚鱉亦罔不寧凡今有生實賴亭育羯虜伺間盜起幽燕率土之人莫保性命肅宗以神武戡大難先朝以仁德紹興運區域再造億兆再康室家離析而復安子孫煦嫗而相長勞來安集垂三十年則我列聖之於天下惠澤深矣朕以寡昧祗膺寶曆常恐不克負荷罔敢怠荒道有未明事多乖謬羣情壅而不逹大信鬱而不彰兩河之間羣盜連禍朕務除大患靡憚暫勞是以興有征之師問干紀之罪昨以涇原士徒將赴汝郊失於撫綏致使潰叛朱泚乘舋因構異圖肆其狼心誘我蟊賊謂君可叛謂天可欺縱恣凌悖無所愧畏朕失守宫闕出次郊畿九廟震驚萬姓奔駭內省思咎外顧懷慙罪實在豫不敢自蔽意者宗社降祐大警于朕躬夙夜殷憂庶乎有𥙷實賴股肱心膂勵從戎之節方嶽將校集勤王之師赴難如歸見危思奮艱貞利操何日忘之平巨猾者必仗羣雄賞茂績者不限彞典保勳庸於帶礪傳爵邑於子孫崇功美名與國終始其諸軍使應到奉天縣將士等冝並賜名奉天定難功臣食實封者子孫相繼代代無絶身有過犯遞減罪二等子孫有過犯遞減罪一等當戶應有差科徭役一切蠲免其功臣巳後雖衰老疾患不任軍旅者當分糧賜等並與全給身死之後回給家口十年勿絶如有能梟擒朱泚者即以朱泚在身官爵授之仍加實封二千戶朱泚所有田宅財物悉並充賜其梟擒賊大將巳下并節級特加優寵仍各與實封應梟擒人所有田宅財物亦使賜之其餘立功應合授官給賞並准今年七月勑處分其今日巳前身死王事者追贈官爵亦稱奉天定難功臣子孫為功臣之家應合襲封減罪蠲免差役等一切同例宣告中外令知朕懷建中四年十一月二十三日改梁州為興元府升洋州為望州詔自昔多虞順時而動古公避狄兆永祚於𡵨下髙帝徙蜀建雄圖於漢中王蹟所興子孫是奉覩遷居於遐阻知致君之艱難矧天下為家不常厥邑王者所至四方㑹同崇號設都於是乎在朕遭罹寇難播越梁岷蒸庶煩於供億武徒勤於扞衛凡百執事各奉厥司人皆競勸物以豐給嘉乃成績豫懷不忘今大憝巳除京邑甫定將旋法駕展敬園陵眷于是邦復我興運冝其崇大以示將來古者天子省方則問百年恤百姓以頒慶賜以茂勳勞用弘布澤之恩式慰來蘇之望冝改梁州為興元府其署置官資望一切與京兆河南府同南鄭縣升為赤縣諸縣並升為畿縣見在州縣官各令終考秩至考滿日放選依本資處分耆壽與板授五品官仍並賜緋先巳賜緋並賜紫典正等各賜勳五轉百姓除先減放稅錢外更給復一年洋州冝升為望州見任州官亦並令終考秩并諸縣官等各減兩選無選可減者各加三階應山南西道節度下將士除扈從迎駕巳經改官者餘並即與甄叙嗚呼古先哲王東征西怨顧豫不德重于勤人撫心各已良增愧歎宣示有衆明知朕懷唐陸宣公集卷第四
