body:
  text: 興元賀吐蕃尚結賛抽軍迴歸狀興元奏請許渾瑊李晟等諸軍兵馬自取機便狀興元請撫循李楚琳狀興元論中官及朝官賜名定難功臣狀興元論賜渾瑊詔書爲取散失内人等議狀鑾駕將還宫闕論發日狀請釋趙貴先罪狀論替換李楚琳狀收河中後請罷兵狀興元賀吐蕃尚結賛抽軍迴歸狀右欽漵奉宣聖旨適得渾瑊奏比日尚結賛頻使人計㑹擬自領兵馬剋期同收京城縁春來蕃軍多有疾疫近得探報尚結賛等並抽兵退歸不知逺近朕意縁吐蕃士馬強盛又以和好之義自請將兵助國討賊朝夕望其成功今忽抽軍退歸甚失准擬渾瑊李晟等諸軍兵馬並不至絶多若無蕃軍應援深慮𬒳賊衝突卿試料量事勢如何者臣質性孱昩不習兵機但以人情揆之時亦偶有所得自承此旨欣賀實深竊謂蕃戎退歸乃是社稷遐福昨日巳附欽漵口奏訖伏恐未盡愚欵尚勞聖憂謹復披陳庶解疑結彼吐蕃者犬羊同類狐䑕爲心貪而多防狡而無恥威之不格撫之不懷雖或時有盛衰大抵常爲邊患隂詐難御特甚諸夷陛下但舉建中巳來近事准之則戎心難知固可明矣頃者方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求寖多翻覆靡定託因細事嘖有煩言首尾凡歷四年要約竟未堅决立碑纔畢復請改移猜矯多端於斯可驗逮至盗驚都邑駕幸郊畿結賛揔戎在邊因請將兵赴難陛下推誠允納厚賂招徠逗留持疑竟不時進無濟討除之用但攜將帥之心懷光遽至猖狂頗亦由兹促禍及皇輿再駕移蹕漢中陛下猶望蕃兵以寍内難親倚之情彌厚屈就之事亦多犲狼野心曽不知感翻受朱泚信使意在觀變推移頻與諸軍剋期至時皆不赴㑹致令羣帥進退憂虞欲捨之獨前則慮其懷怨乗躡欲待之合勢則苦其失信稽延旣姦且驕曷望成績非唯變態難測且又妨擾實深戎若未歸冦終不滅臣請復爲陛下根本其說則人情物理昭然皆可得而察焉向者謀誘蕃兵本是使臣失䇿陛下急於戡亂嘉彼効誠唯恐後時不暇詳議遽降優詔促令進軍逺近聞之莫不危駭將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺之擒百姓畏蕃戎之來有財必盡爲所掠是以順於王化者其心不得不怠䧟於寇境者其勢不得不堅怠我之師堅寇之衆戎心變詐復未可量以此益兵但招其損耳以此靖國適資其亂耳一昨蕃戎未退臣又竊有過憂流聞結賛好謀恐其潜蓄姦計儻或幸朝廷播越之際乗賊泚窮蹙之時輕犯近郊若升虚邑耀兵牧馬不却不前外奉國家内通兇逆兩峙誘脅之勢俱納贈遺之資旁觀戰爭坐乗衰弊如此則王師不得伐叛烝黎不得寧居賊必耗亡我亦困竭京甸所有勢無孑遺千里丘墟得將安用是乃戎有萬全之利我有不測之危臣所以痛心傷神晝驚夕惕者慮其意及於此也所頼天奪其魄神降之災覩機若瞑遘厲自遁實昊穹悔禍之應列聖垂祐之期廓清妖氛慶必非逺何以知其然也且賊泚之亂始於暴兵因徴役之繁興乗衞禁之闕備誘扇羣慝遂謀大姦逆天僭君躬肆攻逼凡有血氣皆知惋嗟矧伊忠良孰不痛憤獨惡無與何能乆存加以聖德日新改過不吝布革弊之詔弘恤隱之懷天下黎元翕然遷善易心改觀猒亂思安和風旣揚昏祲自斂蠢兹狂悖乆合殱夷頃屬懷光昏迷緩師養寇吐蕃干撓生事惑人故使義士無施厲階猶梗今懷光别保蒲絳吐蕃逺避封疆形勢旣分腹背無患瑊晟諸帥才力得伸又各士馬非多資糧向竭若不降賊即須建功此輩寵任巳崇貴位巳極建功則寵増而位固降賊則名辱而身危況賊之兇愚滅亡可必賊之孤劣翦撲非難孰肯捨固而就危違寵而從辱棄垂成之業臣將滅之虜哉旣牽於利害之情理不同惡又迫於單乏之急勢難乆居勢理相驅安能無戰渾瑊統戴休顔韓遊瓌乗其西北李晟率駱元光尚可孤攻其東南同病相資自當合力但願陛下愼於撫接以奮起忠勇之心勤於砥礪以昭蘇逺近之望中興大業旬月可期不冝尚眷眷於犬羊之羣以失將士之情也臣愚不任懇悃之至輒以私懐忖度謹冒昧以聞謹奏興元奏請許渾瑊李晟等諸軍兵馬自取機便狀右欽漵奉宣聖旨省卿所奏蕃軍退歸及關中體勢理皆切當甚慰朕懷然渾瑊李晟等諸軍須有商量規畫令其進取朕見欲遣使宣慰卿冝審細條䟽速奏來者臣聞將貴專謀兵以竒勝軍機遥制則失變戎師禀命則不威是以古之賢君選將而任分之於閫誓莫干也授之以鉞俾專斷也夫然故軍敗則死衆戰勝則䇿勲不用刑而師律貞不勞慮而武功立其於委任之體豈不博大哉其於責成之利豈不精覈哉自昔帝王之所以夷大艱成大業者由此道也其或疑於委任以制斷由己爲大權昧於責成以指麾順旨爲良將鋒鏑交於原野而決䇿於九重之中機㑹變於斯須而定計於千里之外違令則失順從令則失冝失順則挫君之嚴失冝則敗君之衆用捨相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷哉其於經綸之術豈不都謬哉自昔帝王之所以長亂繁刑喪師蹙國者由此道也兹道得失兵家大樞當今事冝所繫尤切蓋以寇盗充斥乗輿播遷人心有觀變之揺主室無自固之重秦梁迴繚千里而遥臨之以威則力勢不制授之以䇿則阻逺不精頃者驟降詔書教諭羣帥事無大小悉爲規裁及乎章表陳誠使臣復命進退遲速率乖聖謀豈皆樂於違忤哉亦由傳聞與指實不同懸筭與臨事有異故也設使其中或有肆情奸命者陛下能於此時戮其違詔之罪乎臣竊恐未能也陛下復能奪其兵而易其將帥乎臣亦恐未能也是則違命者旣不果行罰從命者又未必合冝徒費空言秖勞睿慮匪唯無益其損實多何則時方艱屯下陵上替凡在執干戈而衛社稷者皆自謂勲業由己義烈發心安於專行病於羈制陛下冝俯徇斯意因而委之遂其所安護其所病敦以付授之義固以親信之恩假以便冝之權待以殊常之賞其餘細故悉勿關言所賜詔書務從簡要愼其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而衆服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懷將自効忠兵自樂戰與夫迫於驅制不得巳而從之者志氣何啻百倍哉夫君上之權特異臣下者唯不自用乃能用人其要在順於物情其契在通於時變今之要契頗具於兹儻蒙究思或有可取謹奏興元請撫循李楚琳狀右件官比縁性行無良多爲時議所惡頻𬒳封章論奏言其心挾兩端若不隄防恐妄生窺伺謂冝斥絶用杜姦邪近者鳯翔使來絶不蒙恩召見滯留數輩並未放還伏恐陛下不忍忿心頗從輿議以臣惷戇竊謂非冝李楚琳乗時艱危俶擾岐下賊殺戎帥􅍁結兇渠奉天之圍頗亦有助其於叛亂海内彰聞論者今始紛紜一何知見之晚耶但以乗輿未復大憝猶存勤王之師悉在畿内急宣速告晷刻是爭商嶺則道迃且遥雒谷復爲盗所扼僅通王命唯在襃斜此路若又阻艱南北遂將夐絶以諸鎭危疑之勢居二逆誘脅之中洶洶羣情各懷向背彼勝則往我勝則來其間事機不容差跌儻或楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不甚病哉且楚琳本懷唯惡是務今能兩端顧望乃是天誘其衷故通歸塗將濟大業陛下誠冝深以爲念厚加撫循得其持疑便足集事儻能遷善亦可濟師今若徇𥚹狹之談露猜阻之跡懼者甚衆豈唯一夫自昔能建竒功或拯危厄未必皆是㓗矩之士温良之徒驅駕擾馴唯在所馭朝稱兇悖夕謂忠純始爲寇讎終作卿相知陳平無行而不棄忿韓信自王而遂封蒯通以圻理獲全雍齒以積恨先賞此漢祖所以恢帝業也置射鈎之賊而任其才釋斬祛之怨以免於難此桓文所以弘霸功也然則當事之要雖罪惡不得不容適時之冝雖仇讎不得不用陛下必欲精求素行追抉宿疵則是改過不足以𥙷愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又況阻命之輩脅從之流自知負恩安敢歸化斯釁非小所冝速圖孔子曰人而不仁疾之巳甚亂也又曰小不忍則亂大謀君陳曰無忿疾于頑又曰必有忍其乃有濟伏願陛下必以英主大略聖人格言爲元龜固不可納豎儒小忠以虧撓興復之業也臣不勝憂國至計謹啓事以聞謹奏興元論中官及朝官賜名定難功臣狀右欽漵奉宣聖旨比在奉天將士並賜名定難功臣今宰臣等商量扈從中官辛苦至甚亦合依例並賜此名朕以南衙朝士之中有經奉天重圍又似卿等昨者奔赴行在渉歷危險亦極艱難今不問中官朝宫但經重圍又到山南者並擬賜名定難功臣卿冝商量豈不穩便者陛下惠霑執御仁洽庶寮念隨難之憂危恤從廵之勞苦議増寵飾將錫嘉名事雖未行意則巳就凡在貴近固知銜恩睿旨淹詳復詢庸賤惟精惟愼允謂防微顧省何知屬當下問臣若自貪榮號傍懼怨憎因循順成不極所見心且知負如天鑒何是以不揆言之淺深不計身之利害但輸狂直唯聖所裁臣聞賞以懋庸名以彰行賞乖其庸則忠實之効廢名浮於行則瀆冒之弊興一足以撓國權一足以亂風俗授受之際豈容易哉頃以駐蹕奉天迫於患難竟攘兇逆實頼武人遂旌定難之勲特賜功臣之目名頗符實事亦㑹時所霑雖多誰曰非允至如宫闈近侍班列具臣雖奔走恪居各循厥職而驅除翦伐諒匪所任又屬皇輿再遷天禍未悔見危無𥙷曷謂功臣致寇方深孰云定難縱使遭罹圍逼跋履﨑嶇難則當之定將安據勞或有矣功其謂何大凡有生之倫莫不各親其類賤彼貴我抑惟常情黜異奬同亦是常性臣忝搢紳之列又當受賜之科竊自校量猶知不可而況於公議乎況於介胃之士乎人之多言靡所不至必謂陛下溺愛近習故徇其苟得之情汎該羣司以分其私昵之謗怨不在大釁皆自微必將沮戰士激勵之心結勲臣憤恨之氣所恱者寡所愠者多所與者虚名所失者實事所恱者臣下之夸志所病者國家之大猷利害皎然不爲難辨且名者衆之所評也是曰公器亦爲爭端覈之至精猶患相軋處或乖當安能勿踰以漢髙之制服雄豪太宗之削平區㝢天下旣定乃論功勲有蕭曹之殊庸有房杜之碩畫戰守經略倬乎殊倫猶謂豐沛故人刀筆文吏諸將不服頗相訐揚乃至攘𬒮指天拔劒擊柱偶語謀反諠譁訟冤矧今國歩猶艱王化未洽方資武力以殄宼讎蓋非恩倖競進之時文儒角逐之日當功而獎尚恐未孚奬又非功固冝見誚儻有節効尤著理當襃崇賞典甚多何必在此其餘别無績用例徇驅馳且俟賊平甄録非晚謹奏興元論賜渾瑊詔書爲取散失内人等議狀右德亮承旨并録先所散失内人名字令臣撰詔書以賜渾瑊遣於奉天尋訪以得爲限仍量與資裝速送赴行在者頃以理道乖錯禍亂荐鍾陛下思咎懼災𥙿人罪已屢降大號誓將更新天下之人垂涕相賀懲忿釋怨煦仁戴明畢力同心共平多難止土崩於絶岸收板蕩於橫流殄宼清都不失舊物實由陛下至誠動於天地深悔感於神人故得百靈降康兆庶歸德苟不如此自古嘗有擲棄宫闕失守宗祧繼逆於赴難之師再遷於蒙塵之日不踰半歳而復興大業者乎今渠魁始平法駕將返近自郊甸逺周寰􅌡百役疲瘵之甿重傷殘廢之卒皆忍死扶病傾耳竦肩想聞德聲翹望聖澤陛下固當感上天悔禍之眷荷烈祖垂𥙿之休念將士鋒刃之殃愍黎元塗炭之酷以致寇爲戒以居上爲危以務理爲憂以復言爲急損之又損尚懼汰侈之易滋艱之惟艱猶患戒愼之難乆謀始盡善克終巳稀始而不謀終則何有夫以内人爲號蓋是中壼末流天子之尊冨有宫掖如此等輩固繁有徒但恐傷多豈憂乏使翦除元惡曽未浹辰奔賀往來道路如織何必自虧君德首訪婦人又令資裝速赴行在萬目閱視衆口流傳恐非所以荅慶頼之心副惟新之望也夫事有先後義有重輕重者冝務之於先輕者冝措之於後故武王剋殷有未及下車而爲之者有下車而爲之者蓋美其不失先後之冝也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠冝速遣大臣馳傳先往迎復神主脩整郊壇展禋享之儀申告謝之意然後弔恤死義慰犒有功綏輯黎烝優問耆耋安定反側寛宥脅從宣暢鬱堙襃獎忠直官失職之士復廢業之人是皆冝先不可後也至如崇飾服器繕緝殿臺備耳目之娱選巾櫛之侍是皆冝後不可先也冝後而先則爲君之道喪冝先而後則理國之義差古之興王必愼於此陛下將務興復又安可不愼乎且散失内人巳經累月旣當離亂之際必爲將卒所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因㓂亂喪亡頗有大於此者一聞搜索懐懼必多餘孽尚繁羣情未一因而善撫猶恐危疑若又懼之于何不有昔人所以掩絶纓而飲盗馬者豈必忘其情愛蓋知爲君之體然也以小妨大明者不爲天下固多美人何必獨在於此易曰危者安其位者也亂者有其理者也故君子安不忘危理不忘亂是以身安而國家可保也春秋傳曰或多難以固其國或無難以喪其邦誠以處危則思安之情切遭亂則求理之志深切於思安深於求理國之固也不亦冝乎及夫居安而驕恃理而怠驕則縱肆其奢欲怠則猒惡於忠言奢欲日行忠言日梗國之喪也不亦冝乎昔衛獻出奔乆而復國大夫迎於境者執其手而與之言迎於門者頷之而巳言其驕怠之易生也齊桓將圖霸功管仲戒之以無忘在莒懼其情志之易變也今臣亦願陛下企思危固國如不及懲忘亂喪國如探湯以在莒爲書紳之規以衰衛爲覆車之鑒則德爲帝範理致時雍與夫貪逸欲而踐禍機其利害亦云逺矣所令撰賜渾瑊詔未敢承旨伏惟聖裁謹奏鑾駕將還宫闕論發日狀右先頒勑旨已定行期所司供承亦聞粗備但以霖潦方甚道路阻艱衆情同憂莫敢論奏今發日漸逼隂雲尚繁小大嗷嗷愁懼轉甚臣雖闇鈍亦竊揣量豈不知元惡初平餘氛未殄乃是逆順將分之際吉凶多變之時須速鎭安理冝促駕向使霖潦爲害人功可施其備禦由於智能其役用止於煩費其所患不及於性命其可憂但在於人臣則當公私罄財上下竭力務寧大業奚恤暫勞各應叶奉聖規安敢復忤成命良以襃斜峻阻素號畏途縁側逕於巓巖綴危棧於絶壁或百里之内歷險且千或一程之中渉水數四若遇積雨滯浸羣峯澍流巨石崩奔訇殷相繼深谷瀰漫往來不通悉非功力之所支籌略之所遏斯須之頃跬歩之間倉黃遘殃皆不可測匹夫單騎尚且過防况萬乗時行千官影從而可以蹈不存之險冒無禦之災乎如或磴路潨崩閣道淹圯環衛之儀少缺屬車之馬微驚縱有億徒何所爲用陛下欲無駭慮其可得乎又或霪滯更深谿澗皆溢逕路旣絶傳送無由連山萬重進退不可一日乏食將如之何陛下欲無軫憂固亦難矣人主舉措冝圖萬全必先事以防危不臨危而求幸幸而獲濟貽媿巳深不幸罹災追悔何及孔子曰欲速則不逹誠哉是言臣今非敢阻陛下欲速之情但頗以不逹爲慮耳儻廻睿旨少俟開晴則發期雖延渉路無滯不疾而速允叶乾行知幾其神是謂天鑒竊聞羣議輒以上陳慺慺懇誠實冀昭納謹奏請釋趙貴先罪狀右欽漵奉宣聖旨前者共卿商量趙貴先欲恕其罪朕朝來更問諸將皆云貴先順從朱泚則是逆人合依常刑不可寛捨衆人意旣如此應難釋放卿冝知悉者臣愚以爲貴先從逆之罪法當不容貴先䧟身之由情則可恕陛下所議矜宥原其情也諸將所請誅戮據於法也據法而除君之惡者人臣之常志原情而安衆之危者人主之大權臣主之道旣殊通執之方亦異言各有當體各有冝事或相駮而無傷此之謂也往以襄城告急詔命隴右發兵齊映率衆東行貴先即其部將于時軍至昭應適遇駕幸奉天齊映馳歸鳯翔貴先獨主營幕進無揔帥退閡亂兵遂爲賊泚所招紿以同迎鑾駕泚旣反狀未露貴先安得勿從巳受邀留遂遭劫制身縻僞職兵􅊢兇徒雖居賊中亦不見任首末事跡簡在天心臣亦親承德音非獨聞於傳說其於情狀頗有足矜所可受責之辜唯在不能守節而死耳貴先儻能守節即是忠烈之徒固獲襃旌豈資寛捨凡所議讞蓋縁獄疑罪疑惟輕實編令典脅從罔理亦載聖謨况復懷光未殱希烈猶熾遭罹誘䧟其類寔繁今京邑初平皇猷更始乃是汚俗觀化之日聖王布德之時所用刑章尤冝審愼一輕一重理亂攸生宥之以恩則自新者咸思歸命斷之以法則懷懼者姑務偷生衆心旣偷賊勢思固不忍一朝之忿而貽累歳之憂苟循匹夫之談以興億衆之役爲計若此夫何利之有焉曩者羯胡亂華染汚士吏肅宗興復累降赦書罪止渠魁餘所不問河朔遺孽旣聞德澤之弘𬒳且幸脅汚之見原人人皆自怨尤各悔歸國之晚及乎三司按罪繼用嚴科未降之流復喜得計慶緒將消而再結思明巳附而重攜浸長厲階至今爲梗豈不以任法吏而虧權道小不忍而亂大謀者乎昔漢髙帝旣定四方見諸將往往偶語謀反乃問張良曰爲之柰何良曰陛下所最恨者爲誰帝曰雍齒與我有舊而數窘我良曰今急封雍齒則人人自堅矣帝用良計諸將果安皆云雍齒且侯吾屬何患蓋以圖霸王者不牽於常制安反側者罔念於宿瑕今陛下有漢髙之英貴先無雍齒之釁加戮不足威暴逆矜全可以定危疑明恕而行盛德斯在何所爲慮尚勞依違微臣區區上言蓋爲將來張本凡非首惡皆願從寛庶使負累之徒莫不聞風而化消姦兇誘惑之計開叛亂降附之門此其大機不可失也陛下前意固爲善矣伏惟不爲浮議所移謹奏論替換李楚琳狀右欽漵奉宣聖旨李楚琳不可乆在鳯翔欲候朕到日簡擇一人替楚琳充節度使楚琳别與一官便隨朕歸京旣有迎駕諸軍威勢甚盛因此替換亦是權冝卿冝商量穩便否者臣聞王者有作先懷永圖謀必可傳事必可繼不因利以苟得不乗便而幸成故能上下相安而理可長乆也彼楚琳者固是亂人乗國難而肆逞其姦賊邦君而篡居其位按以典法是冝汚潴旣屬多虞不遑致討乃分之以旄鉞又繼之以寵榮逮至南廵頗全外順道途無壅亦有頼焉雖朝命累加蓋非獲巳然王言一岀則不可渝縱闕君臣之恩猶須進退以禮今若因行幸之威勢假迎扈之甲兵易置以歸是同虜執以言乎除亂則不武以言乎務理則不誠禍變繁興爲日乆矣負舋居位豈唯一人以此時廵後將安入以此撫御誰其感懷昔漢髙僞遊韓信見獲功臣繼叛天下幾危征伐紛紜以至没代其徼倖之不可也如此陛下得不爲至戒哉議者謂之權冝臣又未諭其理夫權之爲義取類權衡衡者稱也權者錘也故權在於懸則物之多少可凖權施於事則義之輕重不差其趣理也必取重而捨輕其逺禍也必擇輕而避重苟非明哲難盡精微故聖人貴之乃曰可與適道未可與立可與立未可與權言知機之難也今者甫平大亂將復天衢輦路所經首行脅奪易一帥而虧萬乗之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道爲權以任數爲智君上行之必失衆臣下用之必䧟身歷代之所以喪亂而長姦邪由此誤也夫以韓信才略當時莫儔且負嫌猜巳遭告訏縱之足以亂區㝢除之可以安國家幸而成擒猶謂失䇿當時𬒳攻戰之害百代流詭詐之譏况楚琳卒伍凡材厮養賤品因時擾攘得肆猖狂非有䧟堅殪敵之雄出竒制勝之略頗同狐䑕乗夜睢盱晨光旣升勢自跧縮今郊畿巳乂武衛方嚴汧隴鎭壓於其西邠涇扼制於其北顧是歧下若居掌中以楚琳瑣劣之資處掌中控握之地縱令蹢躅何惡能爲願陛下姑務含弘普安反側促駕遄止録功犒勤敷肆眚之恩布惟新之令然後徴韋臯楚琳俾入分文武之職擇元勲宿望命出揔𡵨隴之師則彼承詔欣榮奔走不暇安敢蠆介復勞誅鋤措置得冝萬無一跌何遽過動不爲後圖仰希睿聦試更詳慮謹奏收河中後請罷兵狀昨日欽漵奉宣聖旨示臣馬燧渾瑊等奏平懷光收河東狀兼令臣商量須作何處置令欽漵奏來者兇梗殱盪關畿廓清實聖謀廣運之功亦宗社無疆之祚應須處置大略巳附欽漵口陳展轉傳言恐未盡意謹復薦其固陋願陛下少留察焉臣聞禍或生福福亦生禍喪者得之理得者喪之端故晉勝鄢陵范爕祈死吴克勁越夫差啓殃是知福不可以屢徼幸得不可以常覬覦居福而慮禍則其福可保見得而忘喪則其喪必臻臣竊懼謟䛕希旨之徒險躁生事之輩幸兇醜覆亡之㑹揣英主削平之心必將競効甘言誘開利欲謂王師所向莫敵謂餘孽指顧可平請廻蒲坂之戈復起淮沂之役斯議一啓必有亂階故微臣姑以生禍爲憂而未敢以獲福爲賀也何則建中之難其事可徴始以蓄憾而隘於含容或以亟勝而輕於戰伐故文喜之討涇上之瘡痛未平崇義之征漢南之芟夷繼甚阻命之帥非不誅也伐叛之師非不克也介焉之斷非不堅也赫斯之怒非不逞也然以人不見恤惟戮是聞有辜無辜不敢自保是以抱釁反側者懼鈇鉞之次加畏禍危疑者慮猜譖之災及遂乃螽結以拒討狼顧以背恩彌兩河而亘淮夷盪三輔而盗京邑鑾輅爲之再駕行宫至於合圍于時海内大揺物情幾去天命莫保於寸晷王威不出於一城邦國之杌􅥳艱屯綿綿聮聮若包桑綴旒幸而不殊者屢矣勢之危窘實足寒心非有曩時熊罷翕習之師雷霆奮發之勢武庫劒㦸之利帑藏財賦之殷其所以施令率人取威定亂比於建中之始豈不至微至殺哉然而陛下懷悔過之深誠降非常之大號知黷武窮兵之長亂知急征重斂之勦財知殘人肆欲之取危知違衆率心之稔慝知烝庶困極之興怨知上下鬱堙之失情德音渙然以之更始所在宣敡之際聞者莫不涕流雖或兇獷匪人亦必爲之歔欷誠之動物乃至于斯懷梟䲭以好音消祲沴爲和氣由是姦回易慮黎獻歸心假王叛換之夫削僞號以請罪觀釁首䑕之將壹純誠以効勤流亡凍餒者希保於室家屯戍戰爭者冀全其性命德澤將竭而重霈君臣巳絶而更交天下之情翕然一變曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任德而不任兵明矣羣帥之悖臣禮拒天誅圖活而不圖亡又明矣尚恐陛下以臣言之略而未喻也請復循其本而申備之往以河朔青齊同惡相扇擁戎據土易代不庭陛下恥王化之未同忿姦慝之靡格於是發六軍神䇿河陽河東澤潞朔方之騎士以徂征于北命永平汴宋幽隴江淮閩嶺之將卒以奮伐于南罄國家廩帑以贍軍悉公私廐牧以張武筭斂周於萬類徴徭𬒳於八荒勞巳甚矣威亦盛矣旣而嚝日綿歳老師費財兩河之冦患有加無瘳而邦本巳始覆矣洎涇卒唱亂泚戎搆災犲狼整居於禁闈猰㺄擇肉於馳道河朔問罪之衆布路而歸宋郊仗順之師守壘不暇于斯之亂海内沸騰儻有問鼎之雄圖滔天之巨猾幸災乗間何所不爲旣而恱納之儔咸自斂縮内無非望之議外無軼境之侵及聞天澤滌瑕制書復爵曽不蔕芥望風􅍁降爭馳表章唯恐居後跡其素志於此可知是皆假兵救怨之流戀土偷安之輩懷生畏死蠢動之大情慮危求安品物之常性有天下而子百姓者以天下之欲爲欲以百姓之心爲心固當遂其所懷去其所畏給其所求使家家自寧人人自遂家苟寧矣國亦同焉人苟遂矣君亦泰焉是則好生以及物者乃自生之方施安以及物者乃自安之術濟彼於死地而求此之乆生也從古及今未之有焉措彼於危地而求此之乆安也從古及今亦未之有焉是以昔之聖王知生者人之所樂而已亦樂之故與人同其生則上下之樂兼得矣聖王知安者人之所利而己亦利之故與人共其安則公私之利兩全矣其有反易常理昏迷不恭則當外察其倔強之由内省於撫馭之失脩近以來逺檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苗格孔子曰逺人不服則修文德以來之旣來之則安之此其證也如或昧於懷柔務在攻取不徴教化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而曝之原野輕人如草芥而勦之銛鋒叛者不賔則命致討討者不克則將議刑是使負釁者懼必死之誅奉辭者慮無功之責編甿以困於杼軸而思變士卒以憚於死䘮而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寧普天致擾兵拏禍結變起百端故孔子曰逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内矣此蓋必然之常理至當之格言足以爲明鑑元龜貫百王而不易者也事乃反覆得無懼乎夫理有必然則殊途歸於同轍言有至當則異代應如合符頃以東北孽徒職貢廢闕陛下忿其違命大舉甲兵至令逆泚誘姦乗釁而動所備之冦猶逺介於河山不虞之戎巳竊發於都輦蕭牆之戒不其信歟前典垂訓旣如彼近事明驗又如此所以德音敘哀痛之情悔征伐之事引衆慝以咎己布明信以示人旣往之失畢懲莫大之辜咸宥約之以省賦誓之以息兵由是億兆汙人四三叛帥感陛下自新之旨恱陛下盛德之言革面易辭具脩臣禮其於深言密議固亦未盡坦然必當聚黨而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興自京邑底寧乗輿旋返屬懷光繼亂天討又行息兵之言我則未復山東羣帥所以未敢生辭者蓋爲河中之地密近王城迫於朝夕之虞不得不翦除之爾今若改轅移斾復指淮西則淮西元兇必將誑脅其同惡之徒間說於新附之帥謂之曰奉天息兵之旨乃因窘急而言朝廷稍安必復誅伐是以朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不爲之動心哉心旣動則盈其喪身覆族之憂憂旣盈則慮以脣亡齒寒之病夫病同者雖胡越而相愍憂同者不邀結而自親河朔青齊固當響應建中之禍勢必重興以國家再造之初當羣孽息肩之後迭來鳴吠或肆奔衝討之則我力未遑縱之乃㓂患斯甚臣愚竊以爲禍非細未審陛下何方以待之若有其方侮之可也如其未有願陛下勿輕易焉凡將圖終必在愼始禍機一發難可復追臣請粗陳當今維馭之所冝唯聖主省擇萬一夫君之大柄在惠與威二者兼行廢一不可惠而罔威則不畏威而罔惠則不懐苟知夫惠之可懷而廢其取威之具則所敷之惠適足以示弱也其何懷之有焉苟知夫威之可畏而遺其施惠之德則所作之威適足以召敵也其何畏之有焉故善爲國者宣惠以養威蓄威以尊惠威而能養則不挫惠而見尊則有恩是以惠與威交相畜也威與惠互相行也人主之欲柔逺人而服強暴不明斯術之要莫之得焉今皇運中興天禍將悔以逆泚之偷居上國以懷光之竊保中畿歳未再周相次梟殄實衆慝驚心之日羣生改觀之時威則已行惠猶未洽誠冝上副天眷下收物情布恤人之惠以濟威乗滅賊之威以行惠宥河中染汚之黨悉無所問赦淮右僭逆之罪咸與惟新蠲貸疲甿休罷戰士符往歳息兵之令以彰信丕大君含垢之德以布仁俾萬姓皆曰大哉王言又曰一哉王心如是則威不用而畏如神明惠不費而懷如父母凡在危疑懼討者必將曰淮右僭逆之罪且赦矣吾屬何患焉凡在脅從同惡者必將曰河中染汚之黨且宥矣吾屬何疚焉凡在倦苦思安者必將曰吾君有戰勝之師抑而不騁信乎其罷征矣凡在凋殘望理者必將曰吾君有嫉亂之憤忍而不攄信乎其恤隱矣天下之心若此而禍亂不息理道不行者無之臣所未敢保其必從唯希烈一人而巳揆其私心非不願從也想其潜慮非不追悔也但以猖狂失計巳竊大名雖荷陛下全宥之恩然不能不自靦於天地之間耳縱未順命斯爲獨夫内則無辭以起兵外則無類以求助其計不過厚撫部曲偷容歳時心雖陸梁勢必不敢陛下伹勑諸鎭各守封疆彼旣氣奪筭窮是乃狴牢之虜不有人禍則當鬼誅朝廷務崇德以待之臣固知其必不逃於所揣矣古所謂不戰而屈人之兵者斯之謂歟今若不顧幾冝復興戎役瀆威而蔑惠捨易而即難是棄明信而務忿心假敵辭而資㓂援窮者不暇恤勞者不得居國之安危或未可保此乃成敗理亂之所繫願陛下難之愼之區區上干憂惜在此儻蒙過納狂瞽不疑所行謹當草具招諭之辭詳陳備禦之畫伏俟宣許方敢以聞謹奏唐陸宣公集卷第十六
