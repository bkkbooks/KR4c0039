body:
  text: 翰苑集巻十一唐陸贄撰奏草一論兩河及淮西利害狀内侍朱冀寜奉宣聖旨縁兩河宼賊未平殄又淮西兇黨攻逼襄城卿識古知今合有良策宜具陳利害封進者臣質性凡鈍聞見陋狹幸因乏使簪組昇朝荐承過恩文學入侍每自奮勵思酬奬遇感激所至亦能忘身但以越職干議典制所禁未信而言聖人不尚是以循循黙黙尸居榮近日日以愧自春徂秋心雖懐憂言不敢發此臣之罪也亦臣之分也陛下天縱聖徳神授英謀明照八表思周萬務猶慮闕漏下詢芻蕘此堯舜捨巳從人好問而好察邇言之意也臣每讀前史見開説納忠之士乃有泣血碎首牽裾斷鞅者皆以進議見拒懇誠激忠遂至發憤踰禮而不能自止故也況今勢有危迫事有機宜當聖主開懐訪納之時無昔人逆鱗顛沛之患儻又上探微旨慮匪恱聞傍懼貴臣將為沮議首尾憂畏前後顧瞻是乃偷合茍容之徒非有扶危救亂之意此愚臣之所痛心切齒於既往是以不忍復躬行於當世也心藴忠憤固願披陳職居禁闈當備顧問承問而對臣之職也寫誠無隠臣之忠也謹具件如後惟明主循省而備慮之豈直微臣獨荷容納之恩實億兆之幸社稷之福也臣本書生不習戎事竊惟霍去病漢將之良者也每言行軍用師之道顧方略何如耳不在學古兵法是知兵法者無他見其情而通其變則得失可辯成敗可知古人所以坐籌樽爼之間制勝千里之外者得此道也臣才不逮古人而頗窺其意是敢承詔不黙輒陳狂愚伏以尅敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用兵不足恃與無兵同將不為用與無將同將不能使兵國不能馭將非止費財翫寇之弊亦有不戢自焚之災自昔禍亂之興何嘗不由於此今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或有傍遭詿誤内蓄危疑蒼黄失圗勢不得止亦未必皆是處心積慮果為姦逆以僭帝稱王者也況其餘衆蓋並脅從茍知全生豈願為惡若招􅂝以法悔禍以誠使来者必安安者必久斯道積著人誰不懐縱有野心難馴臣知其從化者必過半矣舞干苗格豈獨虛言假使四五兇渠俱禀梟鴟之性其下同惡復有十百相從是皆卒伍庸流闒茸下品其志好不過聲色財貨之樂其材用不過蹴踘距踊之能其約從締交則迭相侮詐以為智謀其御衆使人則例質妻孥以為術數斯乃盗竊偷安之伍非有姦雄特異之資以陛下英神志期平壹君臣之勢不類逆順之理不侔形勢之大小不倫師徒之衆寡不敵然尚曠嵗持久師老費財加算不止於舟車徵卒殆窮於閩濮笞肉捶骨呻吟里閭送父别夫號呼道路杼軸已空興發已殫而將帥者尚曰財不足兵不多此微臣所以千慮百思而不悟其理也未審陛下嘗徵其説察其由乎股肱之臣日月獻納復為陛下察其事乎臣愚無知實所深惑遂乃過為臆度輒肆討論以為尅敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用今以陛下効其明聖羣帥畏威雖萬無此虞然亦不可不試省察也陛下若謂臣此説蓋虛體耳不足徵焉臣請復為陛下效其明徵以實前説田恱唱亂之始氣盛力全恒趙青齊迭為脣齒陛下特詔馬燧委之專征抱真李芃聲勢相援于時士吏畏法將帥感恩俱藴勝殘盡敵之誠未有爭功邀利之釁故能累摧堅陣深抵窮巢元惡幸脫於俘囚兇徒幾盡於鋒刃臣故曰尅敵之要在乎將得其人馭將之方在乎操得其柄此其明效也田悅既敗力屈勢窮且皆離心莫有固志乗我師勝㨗之氣躡亡虜傷夷之餘比於前功難易百倍既而大軍遂駐遺孽復安其後餽運日増師徒日益于兹再稔竟不交鋒量兵力則前者寡而今者多議軍資則前者薄而今者厚論氣勢則前者新集而今者乗勝度攻具則前者草創而今者繕完計兇黨則前者盛而今者殘揣敵情則前者銳而今者挫然而勢因時變事與理乖當易而反難當進而中止本末殊趣前後易方順理之常必不如此臣故曰將非其人者兵雖衆不足恃操失其柄者將雖材不為用此自昔必然之效但未審今兹事實得無近於此乎在陛下熟察而亟救之耳固不在益兵以生事加賦以殄人無紓目前之虞或興意外之患人者邦之本也財者人之心也兵者財之蠹也其心傷則其本傷其本傷則枝幹顛瘁而根柢蹷拔矣惟陛下重慎之愍惜之今師興三年可謂久矣稅及百物可謂繁矣陛下為之宵衣旰食可謂憂勤矣海内為之行齎居送可謂勞弊矣而寇亂有益翦滅無期人揺不寜事變難測是以兵貴拙速不尚巧遲速則乗機遲則生變此兵法深切之誡往事明著之驗也夫投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也是以勞心於服逺者莫若修近而其逺自来多方以救失者莫若改行而其失自去若不靖於本而務救於末則救之所為乃禍之所起也修近之道改行之方易於舉毛但在陛下然之與否耳儻或重難易制姑務持危則當校禍患之重輕辯攻守之緩急臣謂幽燕恒魏之寇勢緩而禍輕汝洛滎汴之虞勢急而禍重緩者宜圗之以計今失於屯戍太多急者宜備之以嚴今失於守禦不足何以言其然也自胡羯稱亂首起薊門中興已来未暇芟蕩因其降將即而撫之朝廷置河朔於度外殆三十年非一朝一夕之所急也田恱累經覆敗氣沮勢羸偷全餘生無復逺略武俊蕃種有勇無謀朱滔卒材多疑少決皆受田恱誘陷遂為猖狂出師事起無名衆情不附進退遑惑内外防虞所以纔至魏郊遽又退歸巢穴意在自保勢無他圗加以洪河太行禦其衝幷汾洺潞壓其腹雖欲放肆亦何能為又此郡兇徒互相劫制急則合力退則背憎是皆茍且之徒必無越軼之患此臣所謂幽燕恒魏之寇勢緩而禍輕希烈忍於傷殘果於吞噬據蔡許富全之地益鄧襄鹵獲之資意殊無厭兵且未衂東宼則轉輸將阻北窺則都城或驚此臣所謂汝洛滎汴之虞勢急而禍重代朔邠靈之騎士自昔之精騎也上黨盟津之歩卒當今之練卒也悉此彊勁委之山東勢分於將多財屈於兵廣以攻則曠嵗不進以守則數倍有餘各懐顧瞻逓欲推倚此臣所謂緩者宜圗之以計今失於屯戍太多李勉以文吏之材當浚郊奔突之㑹哥舒曜以烏合之衆扞襄野豺狼之羣陛下雖連發禁軍以為繼援累勅諸鎮務使協同睿旨殷憂人思自効但恐本非素習令不適從奔鯨觸羅倉卒難制首鼠應敵因循莫前此臣所謂急者宜備之以嚴今失於守禦不足陛下若察其緩急審其重輕使懐光帥師救襄城之圍李芃還鎮為東都之援汝洛既固梁宋亦安是乃取有餘救不足罷闗右賦車籍馬之擾減山東飛芻輓粟之勞無擾則禍亂不生息勞則物力可濟非止排難於變切亦將防患於未然徵發既停守備且固足得徐觀事勢更選良圖此於紓亂解紛抑亦計之次也議者若曰河朔羣盗尚未殱夷儻又減兵必更生患此盖好異不思之説耳臣請有以詰之前嵗伐叛之初唯馬燧抱真李芃三帥而已以攻必克以戰必彊是則力非不足明矣洎遲留不進乃請益師於是選神䇿銳卒以繼之而李晟往矣猶曰未足復請益師於是徵朔方全軍以赴之而懐光往矣幾遣加半之戍竟無分寸之功是則師不在衆又明矣然而可託以為解者必曰王師雖益賊黨亦増曩獨田悅寳臣今兼朱滔武俊臣請再詰以塞其辭曩之田悅寳臣皆蓄銳養謀劇賊之方彊者也尋而田悅喪敗寳臣殱夷雖復朱滔武俊加於前亦有孝忠日知乗其後是則賊勢不滋於曩日王師有溢於昔時又明矣曩以太原澤潞河陽三將之衆當田悅朱滔武俊三宼之兵今朱滔遁歸武俊退縮唯此田悅假息危城設使我師悉歸彼亦纔能自守況留抱真馬燧足得觀釁討除是則減兵東征勢必無患又明矣留之則彼為冗食徙之則此得長城化危為安息費從省舉一而兼數利惟陛下圗之謹奏論闗中事宜狀右臣頃覽載籍每至理亂廢興之際必反覆參考究其端由與理同道罔不興與亂同趣罔不廢此理之常也其或措置不異安危則殊此時之變也至於君人有大柄立國有大權得之必彊失之必弱是則厯代不易百王所同夫君人之柄在明其徳威立國之權在審其輕重徳與威不可偏廢也輕與重不可倒持也蓄威以昭徳偏廢則危居重以馭輕倒持則悖恃威則徳喪於身取敗之道也失重則輕移諸已啓禍之門也陛下天錫勇智志期削平忿兹昬迷整旅奮伐海内震疊莫敢寜居此誠英主撥亂拯物不得已而用之然威武四加非謂蓄矣所可兢兢保惜慎守而不失者唯居重馭輕之權耳陛下又果於成務急於應機竭國以奉軍傾中以資外倒持之勢今又似焉臣是以疚心如狂不覺妄發輒踰顧問之旨深測憂危之端此臣之愚於自量而忠於事主之分也古人所謂愚夫言之而明主擇之惟陛下幸留聽焉臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則小大適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用即不悖處則不危斯乃居重馭輕天子之大權也非獨為御諸夏而已抑又有鎮撫戎狄之術焉是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邉城其賦役則輕近而重逺也其惠化則恱近以来逺也太宗文皇帝既定大業萬方厎乂猶務戎備不忘慮危列置府兵分隸禁衞大凡諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中則居重馭輕之意明矣承平漸久武備浸微雖府衞具存而卒乗罕習故禄山竊倒持之柄乗外重之資一舉滔天兩京不守尚賴經制頗存典刑彊本之意則忘縁邉之備猶在加以諸牧有馬每州有糧故肅宗得以為資中復興運乾元之後大憝初夷繼有外虞悉師東討邉備既弛禁戎亦空吐蕃乗虛深入為寇故先皇帝莫與為禦避之東遊是皆失居重馭輕之權忘深根固柢之慮内寇則崤函失險外侵則汧渭為戎於斯之時朝市離析事變可慮須㬰萬端雖有四方之師寜救一朝之患陛下追想及此豈不為之寒心哉尚賴宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宫廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保祐深矣故示大儆將𢎞永圗陛下誠宜上副元心下察時變逺考前代成敗近鑒國朝盛衰垂無疆之休建不拔之業今則勢可危慮又甚於前伏惟聖謀巳有成算愚臣未達敢獻所憂先皇帝還自陜郛懲艾往事稍益禁衞漸修邉防是時闗中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精彊又徵諸道戍兵每嵗乗秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寳位威懾殊鄰蠢兹昆夷猶肆毒蠚舉國来寇志吞㟭梁貪冒既深覆亡幾盡遂求通好少息交侵盖縁馬喪兵疲務以計謀相緩固非畏威懐徳必欲守信結和所以厯年優柔竟未堅定要約息兵稍久育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺羣胡自爾已来絶無虜使其為嫌怨足可明徵借如吐蕃實和回紇無憾戎狄貪詐乃其常情茍有便利可窺豈肯端然自守今朔方太原之衆逺在山東神策六軍之兵繼出闗外儻有賊臣啗寇黠虜窺邉伺隙乗虛微犯亭障此愚臣所竊為憂者也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曽不料兵連禍結變故難測日引月長漸乖始圗故前志以兵為凶器戰為危事至戒至慎不敢輕用之者盖為此也當勝而反敗當安而倒危變亡而為存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以為鑒往嵗為天下所患咸謂除之則可致昇平者李正已李寳臣梁崇義田悅是也往嵗為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正已死李納繼之寳臣死惟岳繼之崇義卒希烈叛惟岳戮朱滔􅂝然則往嵗之所患者四去其三矣而患竟不衰往嵗之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圗循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無已之求望難必之效其於為人除患之意則已至矣其為宗社自重之計恐未至焉自頃將帥徂征久未盡敵茍以藉口則請濟師陛下乃為之輟邉軍缺環衞虛内廐之馬竭武庫之兵占將家之子以益師賦私養之畜以増騎猶且未戰則曰乏財陛下又為之算室廬貸商賈傾司府之幣設請𣙜之科闗輔之間徵發已甚宫苑之内備衞不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之以陛下聖徳君臨率土欣戴非常之慮豈所宜言然居安備危哲王是務以言為諱中主不行若備之已嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海盖由憑山河之形勝宅田里之上腴弱則内保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭徳也豪勇之在闗中者與籍於營衞不殊車乗之在闗中者與列於廐牧不殊財用之在闗中者與貯於帑藏不殊有急而須一朝可聚今執事者先拔其本弃重取輕所謂倒持太阿授人以柄議制置則彊幹弱枝之術反語綏懐則恱近来逺之道乖求諸通方無適而可顧臣庸懦竊為陛下惜之往者不可追来者猶可補臣不勝懇懇憂國之至輒敢效其狂鄙以備採擇之一端陛下儻俯照㣲誠過聽愚計使李芃援東洛懐光救襄城希烈兇徒勢必退衂則所遣神䇿六軍士馬及㸃召節將子弟東行應援者悉可追還河北既有馬燧抱真固亦無藉李晟亦令旋斾完復禁軍明勅涇隴邠寜但令嚴備封守仍云更不徵發使知各保安居又降徳音勞徕畿甸具言京輦之下百役殷繁且又萬方㑹同諸道朝奏卹勤懐逺理合優容其京城及畿縣所稅間架㩁酒抽貫貸商㸃召等諸如此類一切停罷則冀已輸者弭怨見處者獲寜人心不揺邦本自固禍亂無從而作朝廷由是益尊然後可以度時宜施教令弛張自我何有不從端本整棼無易於此謹奏翰苑集巻十一
