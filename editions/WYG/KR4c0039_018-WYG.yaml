body:
  text: 翰苑集巻十八唐陸贄撰中書奏議二論嶺南請於安南置市舶中使狀嶺南節度經略使奏近日舶船多往安南市易進奉事大實懼闕供臣今欲差判官就安南収市望定一中使與臣使司同勾當庶免隱欺希顔奉宣聖㫖宜依者逺國商販唯利是求綏之斯來擾之則去廣州地當要會俗號殷繁交易之徒素所奔湊今忽捨近而趨逺棄中而就偏若非侵刻過深則必招懐失所曽無内訟之意更興出位之思玉毁櫝中是將誰咎珠飛境外安可復追書曰不貴逺物則逺人格今既徇欲如此宜其殊俗不歸況又將蕩上心請降中使示貪風於天下延賄道於朝廷黷汚清時虧損聖化法宜當責事固難依且嶺南安南莫非王土中使外使悉是王臣若縁軍國所須皆有令式恒制人思奉職孰敢闕供豈必信嶺南而絶安南重中使以輕外使殊失推誠之體又傷賤貨之風望押不出論宣令除裴延齡度支使狀右縁班宏喪亡臣今日面取進止今當此選緫有四人杜佑盧徵李衡李巽並曽掌判財賦各有績用可稱資望人才亦堪奬任聖旨以淮南未可移動盧徵又近改官令臣擇一人與江西追取李衡者臣以支計之司當今所切常須銜制黠吏不可斯須闕人待追李衡數月方到或恐綱條弛紊錢物隱欺李巽近追到城請授給事中且令權判若處理稱職便除户部侍郎如材不相當則待李衡到别商量處分既免曠廢於事又得閱試其能兩人之中必有可取陛下累稱穩便許依所奏施行臣又退更詳思以為無易於此希顔適宣進止李巽知度支恐未相當且空與給事中朕更思量司農少卿裴延齡甚公清有才宜令判度支便進擬狀來其李衡亦從追取者伏以周制六官實司理本冢宰制國用量入為出司徒掌邦賦敷教恤人今之度支兼此二柄準平萬貨均節百司有無懋遷豐敗相補利害關黎元之性命費省繫財物之盈虚加以饋餉邊軍資給禁旅刻吝則生患寛假則容姦若非其人不可輕授裴延齡僻戾而好動躁妄而多言遂非不悛堅偽無恥豈獨有識深鄙兼為流俗所嗤頃列班行已塵清貫更居要重必斁大猷是將取笑四方貽殃兆庶尸禄之責固宜及於微臣知人之明亦恐傷於聖鑒伏願重循前議俯察愚誠更於四人之中選擇取其尤者庶諧僉屬不紊朝經延齡妄誕小人任之交駭物聽臣雖熟知不可猶慮所見未周趙憬眼疾漸瘳後日即合假滿待其朝謁乞更參詳去邪勿疑天下幸甚謹奏論齊暎齊抗官狀右希顔奉宣進止卿等所進齊暎替李衡縁江南與湖南接近齊暎齊抗既是當家同任方面事非穩便宜别商量者齊暎齊抗同姓别房既非五服之親則與衆人無異聖朝推誠致理未嘗先事示疑曩之李臯李兼鄰接方鎮今之韓潭全義密邇軍城此例甚多無足為慮但以中朝要職常苦乏人至如暎抗良才並當臺閣妙選臣等先請授暎禮部聖旨令且向外商量儻許移鎮江西亦是漸加恩奬齊抗文學足用精敏罕儔掖垣之駮議司言南宫之掌賦承轄俾居其任皆謂當才若䝉追赴闕廷試加顧問察言稽行必有可觀可否之宜伏候進止請減京東水運収脚價於縁邊州鎮儲蓄軍糧事冝狀右臣伏見陛下毎垂睿心經略邊境増築城壘加置戍兵至於春秋衣裝歳時宴犒先後遲速悉由宸衷其為憂勤可謂至矣其為資費亦以多矣蓋以安人固國不憚煩勞此誠慎慮之深者也然於儲蓄大計則未降意良圗但任有司隨月供應近歳蕃戎小息年穀屢登所支軍糧猶有匱乏邊書告闕相繼于朝儻遇水旱為災粟糴翔貴兇醜匪茹寇擾淹時或負輓力殫或饋餉路絶則戍兵雖衆不足恃城壘雖固不克居是使積年完聚之勞適資一夕潰敗之辱此乃理有必至而事無幸濟者也臣竊為陛下惜之軍志曰雖有石城十仞湯池百歩無粟不能守也故晁錯論安邊之䇿要在積穀充國建破羌之議先務屯田歴代制禦四夷常為國之大事勇者奮其力智者貢其謀攻守異宜盛衰殊勢柔服而不勞師旅者則常聞之矣屯師而不務農食者未嘗有焉今陛下廣徵甲兵分守城鎮除所在營田稅畆自供之外仰給於度支者尚八九萬人千里饋糧渉履艱險運米一斛達于邊軍逺或費錢五六千近者猶過其半犯雪霜皸瘃之苦冒豺狼剽掠之虞四時之間無日休息傾財用而竭物力猶苦日給之不充其於儲蓄以備非常固亦絶意而不暇思也夫屯兵守土以備宼戎至而無糧守必不固矣遇㓂不守則如勿屯平居有殘人耗國之煩臨難有啓敵納侮之禍所養非所用所失非所虞以為制備之規臣竊謂疎矣頃者吐蕃尚結贊率其醜類越軼封疆朔方五原相繼淪陷雖由將帥不武亦因匱乏得辭其事未遥足為深戒昧理而好䛕者必曰當結贊入寇之日遇賊泚作亂之餘戍卒未多邊農尚寡今則甲兵大備稼穡屢豐比於曩時勢不同等臣請復陳近效以質浮詞今年夏初寇犯靈武禦則寡力守則乏糧告急求哀匪朝伊夕有司為之請罪陛下為之軫憂遽擇使臣奔波督運積財以資用髙價以招人賴蕃戎自旋糧道獲濟封略不壊固非成謀然則鹽夏覆而靈武全唯在幸與不幸之間耳是皆無不㧞之勢有可駭之危其為規制之方所謂同歸於失矣議者是當今而非既往豈不曰昧理而好䛕乎今戍卒之加於往時臣固知之矣今邊農之廣於往歳臣亦知之矣所謂同歸於失者在於措置乖當蓄斂乖宜利之所生害亦隨至故也陛下忿蕃醜之暴掠懲邊鎮之空虚繕甲益兵庇人保境此誠雄武之英志覆育之仁心刷憤恥而揚威聲海内咸望有必攻之期矣既而統師無律制事失權戍卒不隸於守臣守臣不緫於元帥至有一城之將一旅之兵各降中使監臨皆承别詔委任分鎮亘千里之地莫相率從縁邊列十萬之師不設謀主毎至犬羊犯境方馳書奏取裁行李往來動踰旬日比蒙徵發救援寇已獲勝罷歸小則蹂藉麥禾大則驅掠人畜是乃益兵甲而費財用竟何補侵軼之患哉夫將貴專謀軍尚氣勢訓齊由乎紀律制勝在於機權是以兵法有分閫之詞有合拳之喻有進退如一之令有便宜從事之規故能動作協變通制備垂永乆出則同力居則同心患難相交急疾相赴兵之奉將若四支之衞頭目將之守境若一家之保室廬然後可扞寇讎䕶甿庶蕃畜牧闢田疇天子唯務擇人而任之則髙枕無虞矣吐蕃之比於中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝彼之兵衆合并而我之部分離析夫部分離析則紀律不一而氣勢不全節制在朝則謀議多端而機權多失臣故曰措置乖當此之謂乎陛下頃以邊兵衆多轉餽勞費設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆恱慕爭趨厚利不憚作勞耕稼日滋粟麥歳賤向使有司識重輕之術𢎞乆逺之謀守之有恒施之有制謹視豐耗善計収積菽麥必歸於公廪布帛悉入於農夫其或有力而無資願居而靡措貸其種食假以犂牛自然戍卒忘歸貧人樂徙可以足食可以實邊無屯田課責之勞而儲蓄自廣無徵役踐更之擾而守偹益嚴果能用之足謂長算既而有司隘吝不克將順忘國家制備之謀行市道茍且之意當稔而願糴者則務裁其價不時斂藏遇災而艱食者則莫揆乏糧抑使収糴遂使豪家貪吏反操利權賤取於人以俟公私之乏困乘時所急十倍其贏又有勢要近親羇遊之士或託附邊將或依倚職司委賤糴於軍城取髙價於京邑坐致厚利寔繁有徒欲勸農而農不獲饒欲省費而費又愈甚復以制事無法示人不誠毎至和糴之時多支絺紵充直窮邊寒冱不任衣裘絶野蕭條無所貨鬻且又虚張估價不務準平髙下隨喜怒之心精麤在胥吏之手既無信義率下下亦以偽應之度支物估轉髙軍郡穀價轉貴遞行欺罔不顧憲章互相制持莫可禁止度支以茍售滯貨為功利而不察邊食之盈虚軍司以所得加價為羨餘而不恤農人之勤苦雖設廵院使相監臨既失綱條轉成囊橐至有空申簿帳偽指囷倉計其數則億萬有餘考其實則百十不足廵院巧誣於㑹府㑹府承詐以上聞幸逄有年復遇無事吞聲補舊引日偷安若遇歳儉兵興則必立至危迫靈武之事足為明徵臣故曰蓄斂乖宜此之謂也邊之大事在食與兵今食則無儲兵則乏帥謂之有備其可得乎近者縁邊諸州頻歳大稔穀糴豐賤殊異往時此乃天贊國家永固封略之時也而尚日不暇給曽無逺圖軍府有歉食之詞穡人有悔耕之意天贊而不受其利農傷而不恤其窮及凶災流行播植墮廢雖復悔恨事何可追臣是以屢屢塵煩所惜在此頃請擇人充使委之平糴務農陛下以理貴因循未賜允許又請乘時豐稔邊城加貯軍糧有司以經費無餘其事復寢臣謬當任使待罪樞衡雖神武之謀不資獻納而職司之分敢忘憂虞夙夜疾心䀌如焚灼輒復効其鄙薄庶或禆補萬分不勞人不變法不加賦稅不費官錢不廢耳目之娯不節浮冗之用唯於漕運一事稍權輕重所宜請為陛下致邊軍十萬人一年之糧以為艱急之備陛下誠能聽臣愚計不受沮傷百日之間収貯緫畢轉運常行之務既無失於舊規太倉歲入之儲亦不闕其恒數圗慮至熟更無所妨謹具揚搉上陳惟陛下留意省察舊制以關中王者所都萬方輻輳人殷地狹不足相資加以六師糗糧百官禄廩邦畿之稅給用不充所以控引東方歲運租米冒淮湖風浪之弊泝河渭湍險之艱所費至多所濟蓋寡習聞見而不逹時宜者則曰國之大事不計費損故承前有用一斗錢運一斗米之言雖知勞煩不可廢也習近利而不防逺患者則曰毎至秋成之時但令畿内和糴既易集事又足勸農何必轉輸徒耗財賦臣以兩家之論互有短長各申偏執之懐俱昧變通之術其於事理可得粗言夫聚人以財而人命在食將制國用須權重輕食不足而財有餘則弛於積財而務實倉廪食有餘而財不足則緩於積食而嗇用貨泉若國家理安錢穀俱富烝黎蕃息力役靡施然後恒操羨財益廣漕運雖有厚費適資貧人三者不失其時之所宜則輕重中權而國用有制矣開元天寳之際承平日乆財力阜殷禄食所頒給用亦廣所以不計糜耗勵贍軍儲至使流俗過言有用一斗錢運一斗米之説然且散有餘而備所乏雖費何害焉斯所謂操羨財以廣漕運者也貞元之始巨盗初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省脚錢至使郊畿之間煙火殆絶都市之内餒殍相望斯所謂覩近利而不防逺患者也近歳關輔之地年穀屢登數減百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困穀賤今夏江淮水潦漂損田苗比於常時米貴加倍甿庶匱乏流庸頗多關輔以穀賤傷農宜加價糴穀以勸稼穡江淮以穀貴民困宜減價糶米以救凶災今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘斯所謂習見聞而不逹時宜者也今淮南諸州米毎斗當錢一百五十文從淮南轉運至東渭橋毎斗船脚又約用錢二百文計運米一斗緫當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估毎斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣頃者毎年從江西湖南浙東浙西淮南等道都運米一百一十萬石送至河陰其中減四十萬石留貯河陰倉餘七十萬石送至陜州又減三十萬石留貯太原倉唯餘四十萬石送赴渭橋輸納臣詳問河陰太原等倉留貯之意蓋因往年蟲旱關輔荐饑當崔造作相之初懲元琇罷運之失遂請毎年轉漕米一百萬石以贍京師比至中塗力殫歳盡所以節級停減分貯諸倉毎至春水初通江淮所般未到便取此米入運免令停滯舟船江淮新米至倉還復留納填數輪環貯運頗亦協宜不必毎歳加般以増不急之費所司但遵舊例曽不詳究源由邇來七年積數滋廣臣近勘河陰太原等倉見米猶有三百二十餘萬石河隂一縣所貯尤多倉廪充盈隨便露積舊者未盡新者轉加歳月漸深耗損増甚縱絶江淮輸轉且運此米入關七八年間計猶未盡況江淮轉輸般次不停但恐過多不慮有闕今歳關中之地百穀豐成京尹及諸縣令頻以此事為言憂在京米粟太賤請廣和糴以救農人臣今計料所糴多少皆云可至百餘萬石又今量定所糴估價通計諸縣貴賤幷雇船車般至太倉穀價約四十有餘米價約七十以下此則一年和糴之數足當轉運二年一斗轉運之資足以和糴五斗比較即時利害運務且合悉停臣竊慮運務若停則舟船無用舟船無用則壊爛莫修儻遇凶災復須轉漕臨時鳩集理必淹遲夫立法裁規乆必生弊經略之念始慮貴周不以積習害機宜不以近利隳永制不貴功於當代不流患於他時慮逺防微是其均濟臣今所獻庶近於斯減所運之數以實邊儲存轉運之務以備時要其於詳審必免貽憂舊例從江淮諸道運米一百一十萬石至河陰來年請停八十萬石運三十萬石舊例從河陰運米七十萬石至太原倉來年請停五十萬石運二十萬石舊例從太原倉運米四十萬石至東渭橋來年請停二十萬石運二十萬石其江淮所停運米八十萬石請委轉運使於遭水州縣毎斗八十價出糶計以糙米與細米分數相接之外毎斗猶減時價五十文以救貧乏計得錢六十四萬貫文節級所減運脚計得六十九萬貫都合得錢一百三十三萬貫數内請支二十萬貫付京兆府令於京城内及東渭橋開場和糴米二十萬石毎斗與錢一百文計加時估價三十已上用利農人其米便送東渭橋及太原倉収貯充填毎年轉漕四十萬石之數並足餘尚有錢一百一十三萬貫文以供邊鎮和糴臣已令度支廵院勘問諸軍州米粟時價兼與當管長吏商量令計見墾之田約定所糴之數得鳳翔涇隴邠寜慶鄜坊丹延夏綏銀靈鹽振武等道良原長武平涼等城報除度支旋糴供軍之外别擬儲備者計可糴得粟一百三十五萬石其臨邊州縣各於當處時價之外更加一倍其次毎十分加七分又其次毎十分加五分通計一百三十五萬石當錢一百二萬六千貫文猶合剰錢十萬四千貫留充來年和糴所於江淮糶米及減運米脚錢請並委轉運使便折市綾絹絁綿四色即作船般送赴上都邊地早寒斂藏向畢若待此錢送到即恐収糴過時請且貸户部别庫物充用本色續到便令折填其所貸户部别庫物亦取綾絹絁綿四色並依平估價務利農人仍取度支官畜及車均融般送請各委當道節度及當城兵馬使與監軍中使幷度支和糴廵院官同受領便計㑹和糴各量人户墾田多少先付價直立限納粟不願糶者亦勿强徵其有納米者毎米六升折粟一斗應所糴得米粟亦委此三官同檢覆分於當管城堡之内揀擇髙燥牢固倉窖等収納封閉仍以貯備軍糧為名非縁城守絶糧及承别勅處分並不得輒有支用待収糴畢具所糴數幷収貯處所聞奏幷報中書門下緫計貯備粟一百三十五萬石是十一萬二千五百人一年之糧來秋若遇順成又可更致百餘萬石邊蓄既富邊備自修以討則有齎以守則可乆以加兵則不憂所至乏食以斂糴則不為貪將所邀恢疆保境者得以遂其謀蹙國跳軍者無所辭其罪是乃立武之根柢安邊之本源守土庇人莫急於此傾公藏而發私積猶當悉力以務之況今不擾一人無廢百事但於常用之内収其枉費之資百萬贏糧坐實邊鄙又有勸農賑乏之利存乎其間此蓋天錫陛下攘戎狄而安國家之時不可失也陛下誠能過聽愚計先聚軍儲慎擇良圗更貞師律蠢爾兇醜自當畏威縱迷款塞之心必無猾夏之慮伏惟少留睿思詳省而明斷之其所停減運脚臣已與本司審細計料并邉鎮分配和糴數及米粟估價等數各得别狀條件分析謹同封進聽進止翰苑集巻十八
