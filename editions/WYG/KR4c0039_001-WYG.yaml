body:
  text: 奉天改元大赦制平朱泚後改建中五年為興元元年門下致理興化必在推誠忘已濟人不吝改過朕嗣守丕構君臨萬方失守宗祧越在草莽不念率徳誠莫追於既往永言思咎期有復於將來明徴厥初以示天下惟我烈祖邁徳庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤垂于後肆予小子獲纉鴻業懼徳不嗣罔敢怠荒然以長于深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察征戍之勞苦澤靡下究情不上通事既壅隔人懐疑阻猶昧省己遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不觧甲胄祀奠乏主室家靡依生死流離怨氣凝結力役不息田萊多荒暴命峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不悟人怨於下而朕不知馴致亂階變興都邑賊臣乘釁肆逆滔天曽莫愧畏敢行凌逼萬品失序九廟震驚上辱于祖宗下負于黎庶痛心􅌤貎罪實在予永言愧悼若墜深谷賴天地降祐神人叶謀將相竭誠爪牙宣力屛逐大盜載張皇維將𢎞永圗必布新令朕晨興夕惕惟念前非乃者公卿百寮累抗章疏猥以徽號加于朕躬固辭不獲俯遂輿議昨因内省良用矍然體隂陽不測之謂神與天地合徳之謂聖顧惟淺昧非所宜當文者所以成化武者所以定亂今化之不被亂是用興豈可更徇羣情茍膺虚美重余不徳祗益懐慙自今以後中外所上書奏不得更稱聖神文武之號夫人情不常繫于時化天道既隠亂獄滋豐朕既不能𢎞徳𨗳人又不能一法齊衆茍設宻網以羅非辜為之父母實増愧悼今上元統歴獻嵗發生宜革紀年之號式敷在宥之澤與人更始以荅天休可大赦天下改建中五年為興元元年自正月一日昧爽以前大辟罪已下罪無輕重咸赦除之李希烈田悦王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内騷擾皆由上失其道下罹其災朕實不君人則何罪屈已𢎞物予何愛焉庶懐引慝之誠以洽好生之徳其李希烈田悦王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推以至誠務欲𢎞貸如能効順亦與惟新其河南北諸軍兵馬並宜各於本道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其扇誘有廹以兇威茍能自新理可矜宥但官軍未到京城以前能去逆効順及散歸本道者並從赦例原免一切不問天下左降官即與量移近處已量移者更與量移流人配隸及藩鎮効力幷縁罪犯與諸使驅使官兼别勅諸州縣安置及得罪人家口未得歸者一切放還應先有痕累禁錮及返逆縁坐承前恩赦所不該者並宜洗雪亡官失爵放歸勿齒者量加收敘人之行業或未必兼構大厦者方集於羣材建竒功者不限於常檢茍在適用則無棄人况黜免之人沉欎既久朝過夕改仁何逺哉流移降黜亡官失爵配隸人等有材能著聞者特加録用勿拘常例諸軍使諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固全城驅除大憝濟危難者其節著復社稷者其業崇我圗爾功特加彞典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯遞減罪二等當户應有差科使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年内仍回給家口其有食實封者子孫相繼代代無絶其餘敘録及功賞條件待收京日並凖去年十月十七日十一月十四日勅處分諸道諸軍將士等久勤扞禦累著功勲方鎮克寧惟爾之力其應在行營者並超三資與官仍賜勲五轉不離鎮者依資與官賜勲三轉其累加勲爵仍許回授周親内外文武官三品已上賜爵一級四品已上各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼薶胔禮典所先雖効用而或殊在惻隐而何間諸道將士有死王事者各委所在州縣給遞送歸本管官為𦵏祭其有因戰陣殺戮及擒獲伏辜暴骨原野者亦委所在逐近便收𦵏應緣流貶及犯罪未𦵏者並許其家各據本官品以禮收𦵏自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及税間架竹木茶漆搉鐵等諸色名目悉宜停罷京畿之内屬此寇戎攻劫焚燒靡有寧室王師仰給人以重勞特宜減放今年夏税之半朕以兇醜犯闕遽用于征爰度近郊息駕兹邑軍儲克辦師旅攸寧式當襃旌以志吾過其奉天宜升為赤縣百姓並給復五年尚徳者教化之所先求賢者邦家之大本永言兹道夢想勞懐而澆薄之風趨競不息幽棲之士寂寞無聞盖誠所未孚故求之未至天下有隠居行義才徳髙逺晦跡丘園不求聞逹者委所在長吏具姓名聞奏當備禮邀致諸色人中有賢良方正能直言極諌及博通墳典逹於教化幷洞識韜鈐堪任將帥者委常參官及所在長吏聞薦天下孤老鰥寡惸獨不能自活者並委州縣長吏量事優恤其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用宜自朕躬當節乘輿之服御絶宫室之華飾率已師儉為天下先諸道貢獻自非供宗廟軍國之用一切並停應内外官有冗員及百司有不急之費委中書門下即商量條件停減聞奏布澤行賞仰惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懐赦書有所未該者委所司類例條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知平朱泚後車駕還京大赦制門下致理之體先徳後刑禮義興行故人知耻格教令明當則俗致和平然後姦慝不萌暴亂不作古先哲后莫不由斯國家受命百七十載八聖儲慶敷佑下人邁種寛大之徳累蠲苛酷之令盖仁之所積者厚故澤之所流者深兹予小子獲主重器懵於理亂之本溺於因習之安授任不明賞罰乖當立法以齊衆而犯命愈甚興戎以除害而長亂益繁賊臣蓄姦乗釁竊發九廟乏祀兆人靡依猰㺄肆其呑噬豺狼穴於宫闕嵗未云半載罹播遷仰慚穹昊俯愧臣庶敢愛霣越茍全眇躬誠懼益縱寇讎重辱宗社忍恥誓志庶補前羞賴億兆宅心不忘先徳諸帥勠力恭行天罰俾余寡昧再膺多祜總乾綱於既紊復天柱於將傾言旋鎬京不改舊物宗祧有序朝享有期責重慶多深増感惕嗚呼君者所以撫人也君茍失位人將安仰朕既不徳致寇興禍使生靈無告受制兇威茍全性命急何能擇或虧廢名節或貪冒貨利䧟於法網事匪一端究其所由自我而致不能撫人以道乃欲繩之以刑豈所謂恤人罪已之誠含垢布和之義滌清汚俗咸與更新可大赦天下自興元元年七月二十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正見繫囚徒常赦所不原者咸赦除之今年五月二十八日已前左降官即與量移未復資者更與移近處流人及犯配隸藩鎮効力並即放還亡官失爵放歸不齒者量加收敘未復資者更與進改其黜免人等有素著行能傍連譴累特加録用勿以為負不有忠者誰復社稷不有勞者誰從巡狩連帥之重所以殿邦禦侮也二千石之任所以分憂共理也方鎮將校勤奉戍役中外寮吏恪居官次國有大慶所宜同之内外文武及致仕官三品已上賜爵一級四品已上加一階仍並賜勲兩轉司徒兼中書令晟英特傑立光輔中興再定皇都一匡天下推恩之典貽慶無窮宜與一子五品正貟京官侍中瑊沉邃忠厚服勞王家保全危城翦除大憝嘉乃茂績次于寵章宜與一子六品正貟京官鎮國軍潼闗節度使檢校右僕射駱元光京畿渭南商州節度使檢校右僕射尚可孤邠寧等州節度使檢校右僕射韓遊瓌奉天行營諸軍節度使檢校右僕射戴休顔咸秉大節著于艱難同勲叶忠翼我興運宜各與一子七品正貟官諸道節度使及行在都知兵馬使興元扈從左右金吾大將軍金吾六軍大將軍等各與一子八品正貟官諸道團練觀察處置等使各與一子九品正貟官應諸軍赴上都收復將士等俱以純誠奮其勇節連年帶甲百戰摧鋒有忘身以効命有滅親以徇義誓平國難如復私讎競揚貔虎之雄克清梟獍之孽策勲行賞傳嗣榮親播乃功名與國終始自去年冬已来未經甄敘者即與超八資改轉已經甄敘者更與超三資進改三品已上祖父母在先無官封者量與致仕官及邑號亡者並與追贈四品已下父母在先無官封者亦授致仕官及邑號亡者與追贈其賞錢委所司即依元勅支給應扈從將士三品已上賜爵兩級四品已下各加兩階仍並賜勲其祖父母官封追贈並準收京城將士例處分應扈從官普恩之外三品已上賜爵兩級四品已下各加兩階仍普賜勲三轉其祖父母父母封贈並準收京城例處分應扈從官普恩之外三品已上更加爵一級四品已下更加一階若常參官祖父母父母在先無官封者量授致仕官及邑號亡者與追贈諸州刺史普恩外賜爵一級諸道進奏陪位者更加一階其奉天定難及元從功臣宜令本軍本使即定名聞奏所司各準元勅優賞其諸道軍鎮及行營將士三品已上賜爵一級四品已上加一階仍準今年正月一日制速與甄敘成徳淄青魏博等節度幷諸軍應歸順將士等各藴誠義積著功勞由朕失於撫綏頃嵗暫懷疑阻尋能勵節不替舊勲是資宴犒俾洽王澤宜委所司即約額支計各賜錢物賞設仍委本節度準前後勅速條疏甄敘其朔方幷諸軍應在河中管内及同州將士等自逺赴難觧其重圍念兹功勞並未酬報雖遭脅制情有可矜應到行營未經甄敘者並準元勅超五資改轉其賞錢比收京城將士例各給一半委本軍兵馬使條録名銜聞奏所司支計給付其食實封者亦便配額令其請受應天下諸道軍將士等如有年老及疾患尫弱不任軍旅願歸鄉里者並給終身優復州縣切加安存勿令侵擾如無家可歸者給田宅使得存濟見危致命先典所尚況忠衞社稷殺身成功朕於斯人義有加等贈太尉秀實天授貞烈沮兹姦邪蒼黄之中獨藴雄斷將紓國難詭收寇兵兇謀既虧吾事果濟忠誠奮發手撃渠魁英風凜然振邁千古宜即差官致祭幷旌表門閭府縣護其喪事緣𦵏所要一切官供仍於墓所官為立碑以揚徽烈其所賜實封五百户嫡子正貟三品官諸子授正貟五品官委中書門下即準元勅處分應諸道諸軍將士有身死王事者委本道本使具名銜聞奏即與褒贈仍以在身官爵授其子孫内外文武官及諸親諸色人等有横遭逆賊殺害者各聴其家及親識人於所司陳牒勘實聞奏亦與追贈如跡著忠烈衆所明知仍訪其子孫量加優恤尚齒養老王風之首三代制理未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰里閭京兆府耆夀年八十已上並與板授刺史仍賜紫八十已下及諸州府耆夀年八十已上並與板授本縣令仍賜緋天下侍侍字疑老耆夀亦各與板授官如年九十已上者州縣長吏嵗時躬親省問貧弱不能自存者量賜粟帛頃屬多難人流俗弊加之以師旅因之以饑饉賦役繁起農桑失時哀哉癉人汔可小息然以國計猶歉軍實靡充未盡復除良増愧悼應天下建中四年年終已前所有諸色逋欠在百姓復内者一切放免百司及諸軍諸使舉放利錢今年六月已前百姓欠負未納者亦並停徴京兆府百姓普恩外給復一年其供頓官吏委京兆尹類例具名銜聞奏量與優奨古者計户以署吏因時而建職既不乏事亦無冗貟今田畝汙萊版圗凋耗齊人編户託庇官􅈠貪吏猾胥誘為囊橐啓姧墮業為害尤深應在京百司色役人及流外等委御史大夫即與諸司使長官審詳商議據見所掌事之閑劇定額聞奏仍校名送中書門下務從減省副朕憂人以後應須署置並定名先奏仍永為常式今年正月一日赦書節目有所未行者所司並舉而行之赦書或有不該即比類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知翰苑集巻一
