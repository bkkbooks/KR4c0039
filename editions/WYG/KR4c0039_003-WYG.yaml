body:
  text: 翰苑集巻三唐陸贄撰制誥赦宥下貞元九年冬至大禮大赦制門下朕以寡徳屬當大統皇天眷佑俾主兆人懼不克承夙夜祗畏􅃡懷前烈致于昇平予心浩然罔知攸濟小大之務曷嘗不勤芻蕘之言亦莫不敬慮每存於致理志常在於恤人中宵屢興終食累歎一事乖張惄焉疚懐一夫罹殃惻若傷體思與海内同臻大和息其生業降心從衆實匪有辭克已利人誠無所恡然以視聴有極思慮難周况乎長自深宫安於近習損益之理寧免過差幽逺之情固多未逹由是兢兢砥礪悔徃修来燭理所患於不明推心庶㡬於無負日慎一日于今十有五年矣上靈降監多士叶誠五稼屢豐四鄙不擾方鎮輯睦干戈厎寧邉壘繕完殊方款附協天地㑹昌之運實宗社無疆之休慶既荷於元功禮有昭於大報矧惟霜露之感永切孝思禋燎之儀每勤精意將申誠敬其在躬親是與公卿大夫䖍奉犧牲圭璧陳其文物薦其馨香類秩於泰壇朝享于清廟率職来助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈惟朕躬思俾普天均承惠澤可大赦天下貞元九年十一月十日昧爽已前繫囚見徒大辟已下罪無輕重咸赦除之其見於官辯對者亦並放免官人犯入已贓不可令其却上已後勿以為累左降官及流人並量移近處其官已經量移未復資者還其階爵竄謫遐裔冀速沾恩比者準制量移所司比例申牒屢加盤覆累渉嵗年既甚淹遲且不均一宜令吏部刑部審勘檢本流貶及量移勅㫖比類元犯事狀輕重兩月内與處分外文武見任及致仕家居幷諸軍諸使將士等三品已上賜爵一級四品已下加一階應百姓自置義倉仍準貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠莫先於竭節惟爾師長卿校洎乎方岳列藩保乂皇家交修庶績竭節之効既昭乃誠榮親之恩宜洽國典内外文武清望職事官幷節度觀察都防禦都團練經略等使父在未有官量授檢校五品官母在未有邑號者各封邑號父母亡沒者量與追贈已經追贈者更與改贈佐運之臣納忠之輔功既存於社稷慶宜及於子孫故周錫田土漢傳帶礪疇其爵邑與國終始以明報徳之恩勸為臣之節其或年代未逺利澤猶存祠宇已變於荒墟裔嗣不編於仕籍思其人猶愛其樹况奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大端應九廟配享功臣及武徳以来將相名節特髙有封爵廢絶祠廟無主者宜許子孫一人紹封以時享祀自今以後應有家廟子孫但傳襲封爵者並許享祔于廟其有毁賣私廟及買之者各以犯教義贓論自古聖帝明王忠臣烈士各令所在長吏以禮致祭書敘明目逹聰垂拱而理詩稱濟濟多士文王以寧舍已從人故能通天下之志棄瑕録用故能盡天下之才昔在太宗勤求理道納諌如響任賢勿疑致俗於太平垂範於永代朕獲承鴻緒追慕聖猷書之座隅常自儆勵朝夕翹想庶聞嘉謀夢寐勞懷思得賢士凡厥在位所宜共成諸司官有陳便宜者各盡所見條疏封進事有寃滯政有闕遺悉當極言無或隐避詔勅不便於時者所司執奏以聞天下有藴徳懷才隐居不仕委所在觀察使表薦當以禮邀致諸色人中賢良方正能直言極諌或博通墳典逹於教化或詳練故事長於著述或精習律令曉暢法理或該明吏術可委理人或洞識韜略堪任將帥者委所在州府長吏及臺省常參官詳録行能舉奏並限来年七月内到京朕當親試應緣大禮掌職行事仗内引駕攝將軍中郎郎將留守副留守幷諸道表狀陪位法駕三引官等三品已上更賜爵一級四品已下加一階其郊壇宫廟行事官仍各賜勳兩轉皇親諸親應陪位者三品已上賜爵一級四品五品加一階六品已下及常選官至選日優與處分白身人及諸色應陪位官等各賜勳兩轉親王大長公主郡主縣主賜物各有差酅公介公各賜物若干段行事室長掌坐齋郎禮生贊者各減一年勞無勞可減者至簡選日優與處分崇賢舘學生減策一道國子監學生陪位者及應緣祗應諸司作官直長長上流外要職掌内侍省白身諸州行綱考典兩京耆夀諸色番役當上在城幷量留十月番人等各賜勲一轉鴻臚番客共賜物若干神策六軍英武威逺皇城金吾街使諸軍諸使將士應緣大禮宿衞御樓立仗及守本庫本營者共賜物若干端匹天下耆老百嵗已上者各賜錦帛五段米五碩八十已上及鰥寡惸獨不能自存者委刺史縣令各加優恤應緣大禮加階及賜勳爵等申報敘奏期限並準貞元六年十二月二日勅處分餘依常式所司不須更作條件赦書日行五百里布告遐邇咸使聞知蝗蟲避正殿降免囚徒徳音夫人事失於下則天變形於上咎徴之作必有由然自去嵗已来災沴仍集雨澤不降延歴三時蟲蝗既臻彌亘千里穀糴翔貴稼穡卒痒嗷嗷烝人聚泣田畝興言及此實所痛傷徧祈百神曾不獲應方悟禱祀殊救患之術言詞非謝譴之誠憂心如焚深自刻責得非刑法舛謬忠良欎堙暴賊未蠲勞師靡息事或無益而重為煩費任或非當而横肆侵蟊有一於兹足傷和氣本其所以罪實在予百姓何辜重罹殍餒所宜出次貶食節用緩刑側身増修以謹天戒朕避正殿不御百寮奏事並於延英處分尚食進膳宜更節減百司不急之務一切且除諸軍將士外自餘應食官糧人及諸色用度等並委本使長官商量權行停減以救荒饉仍限十日内具元額及所釐革條件聞奏待至豐稔却令依舊畿内百姓委京兆尹切加慰撫除正税正役外徴科差遣並宜禁絶非交相侵奪尋常訴訟不須追擾務且息人京畿内外及京兆府諸縣見禁囚徒死罪降徒流以下一切放免畿内及河中同州界應有因戰陣殺戮遺骸暴露者各委所在長吏随事薶瘞咨爾卿佐實惟股肱所當一其誠心同恤災患勉修厥職副我憂勤誅李懷光後原宥河中將吏幷招諭淮西詔自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方来同茍或昧於徳綏務以力勝士旅疲耗烝黎困窮幸以成功豈云有補李懷光久從戎旅頗著勤勞拔於等倫授以旄鉞誓師河朔奔難奉天有夷兇嫉惡之誠有弭患釋圍之績俾介元帥仍升上台秉心匪彞自厎不類怙衆貪亂附姦脅君朕用再遷幾危宗廟洎股肱宣力賊泚就誅率土之人咸懷奮撃朕獨排羣議未忍加兵命復官封志期全貸而乃昬迷不返悖慢逾彰殘害使臣侵敗畿甸宻邇京邑人愁無聊諭之不悛乃用致討上帝悔禍元臣協謀克集茂勲以夷大難渠魁授首餘衆革心制勝以謀兵無血刃雖事非獲已義在救人而本其所由情深罪已盖以信誠未著撫馭或乖至使功臣陷於誅戮謂之克敵寧不愧心然以懷光一家法當殱戮念其昔居將相嘗寄腹心罪雖掛於刑書功已藏於王府以千紀之跡固合滅身以赴難之勲所宜有後非常之澤俾洽幽明雖屈彞章庶旌徃効大夫君子無我有尤宜以懷光一男為嗣賜莊宅各一所聽住京城仍還懐光首級及屍任便收𦵏其妻及諸子孫在室女等並遞送澧州委李臯逐便安置使得存立其出嫁女及諸親戚並宜釋放應先陷河中將士等皆嬰迫脅無路申明多是朔方舊人素藴忠義幷幽州涇原將士頃被朱泚脅從收京之時奔􅇡在彼究其本末情有足矜况能協力同謀舉城歸順録其成効咸與惟新宜一切洗雪勿為瑕累先有官爵實封者並許仍舊其中首謀効順事績著明者委副元帥條件聞奏别加甄奨河中及同州綘州百姓並經陷賊又久屯軍骨肉流離生業廢棄興言軫念良用惻然宜各給復一年京兆府奉先美原等縣緣與同州接近随便供運杼軸既繁流亡頗衆委京兆尹即量事優恤條件聞奏仍加招輯使各安存河中保義軍保寧軍節度使幷管内諸軍行營兵馬副元帥河中保寧等軍節度度支營田觀察處置等使銀青光禄大夫檢校司徒同中書門下平章事兼太原尹北都留守北平郡王燧惟嶽降生欎為時傑奉上勵匪躬之節訓師懷盡敵之謀略地無遺攻城必拔發揚以威強寇感激而服叛徒嘉謀屢聞能事畢備朔方河中同綘陜虢汴等州及管内諸軍副元帥河中綘州節度觀察處置等使開府儀同三司行侍中兼河中尹咸寧郡王瑊鑒識精明宇量𢎞博秉義率衆推誠待人堅制不奪之心亟陳必勝之略輯睦士旅安慰流庸盛徳克彰崇功允集惟乃二帥一其誠心奉行天誅同奨王室有崇譲之美有禁暴之能元惡既除全城底定是加寵命以荅崇勳燧可兼侍中仍與一子五品正貟官幷階餘並如故瑊可檢校司空仍與一子五品正貟官幷階餘並如故華州潼闗鎮國軍節度使開府儀同三司檢校右僕射幷華州刺史上柱國武康郡王駱元光邠寧慶等州刺史御史大夫上柱國許昌郡王韓遊瓌鄜坊丹延等州節度觀察使檢校兵部尚書兼御史大夫上柱國東平郡王唐朝臣等並節著艱危功成討伐鎮于衝要隠若長城取彼兇殘進無堅陣比義同徳廓清方隅宜増食于真封且延榮於䕃子可各賜實封二百戸仍與一子六品正貟官幷五品階餘並如故應諸道諸軍同討懷光將士等一自征役淹歴嵗時被服干戈略無寧息賴兹勤効是有成功宜並賜三十萬端匹以充宴賞仰度支即般次送赴並各放歸本道仍令所司敘録即超資與改轉其中大將及功効殊尤者委所司速具名銜聞奏先與處分其先在河中將士亦宜依例賜錢宴賞如本是奉天定難功臣準條合給賞者度支即排比支付嗚呼自國家多難二紀于兹朕嗣位七年連兵五載追惟往事悔恨于懐今二孽既誅諸方甫定哀彼淮右獨為匪人其帥不龔其衆何罪朕晨夕惕慮念之甚詳罷征討則阻命止於數州窮戰争則流禍及於天下利病之勢較然相懸俾人罹殃寧我忍耻今勲賢列鎮疆理有經縱未偃戈足以保境况天地之大無所不容豈令是邦猶隔朝化因兹大慶使洽鴻恩諸道應與淮西接連宜且各守封境非被侵軼不須進討仍委所在長吏明加招諭宣布朕懷李希烈若能歸降待以不死其餘將士官吏百姓等一切並與洗滌與之更新先有官封亦皆仍舊如能去逆効順因事建功理當甄升以示褒勸其所以優賞科條並準前勅處分朕思與海内去危圗安有過自新雖大必宥朗然明信彰示兆人期爾庶邦自求多福無有遐邇咸使聞知誅李希烈後原淮西將士幷授陳仙竒節度詔反易天常悖違人紀衆之所棄罔或逃誅李希烈蔑義背恩窮姦極暴謂神器可以力取謂生靈可以詐欺志在兇殘躬行僭竊罪無與比法實難容以君徳不修致人於禍究其端本過實在予不忍烝黎重相攻戰屢施詔命務欲懷柔抑羣帥奮發之誠駐諸軍討逐之勢不憚屈已期於息人希烈曾無悛心益逞驕志虐毒滋甚吞噬無厭惡貫既盈自厎夷滅開府儀同三司御史中丞臨漳郡王陳仙竒忠勇有餘沉毅能斷攄闔境受汚之憤導三軍思順之心唱義一呼羣情響附廓清氛祲殱戮渠魁驛書上聞函首入獻方隅既乂役戍其休懸賞之科是宜必信其以仙竒為檢校工部尚書兼蔡州刺史御史大夫充淮西節度仍賜實封五百戸應淮西管内將士官吏百姓等頃迫兇威遂從脅制既誅元惡俱是平人除李希烈一家其餘並準前後赦勅原放更無所問其將士等或本屬平盧或久鎮淮右素推忠義累著勳庸果能叶志同謀輸誠奉順以兹節効良有可嘉委仙竒即以諸色官錢優與宴勞其中首建謀議同斬希烈人等宜並條録聞奏節次褒賞比年以来有潛圗効順節義著明計或未行為賊屠害者亦當審加訪察具事績以聞如有子孫仍並録名聞奏百姓等久經淪陷兼被傷夷遐想凋殘實足哀憫除供當道軍用外宜給二年應被希烈差㸃兵馬及團練子弟並即放散其本額將士之中有不樂在軍願歸農業者委節度刺史量給逃死戸田宅幷借貸種糧優給復終身使之存濟宜令尚書左丞鄭叔則充淮西宣慰使嗚呼往欽哉自希烈叛命于今五年王澤不通下情亦阻所宜宣我信令以釋危疑敷我惠和以慰疲瘵滌清汚俗咸與惟新厎難一方以稱朕意重原宥淮西將士詔乃者希烈亂常阻兵竊號汚脅士衆殘虐烝黎朕志在好生誠深罪已為人受耻不忍加兵惟兹一軍代著忠節果殱元惡不替舊勲詢於衆情就拜戎帥人亦勞止期於小康旋乖䘏下之方重致喪身之禍由朕薄徳俾人不寧撫臨萬邦且愧且悼猶賴將校士旅秉其誠心邦人不驚軍部無撓以兹節効良有可嘉所宜慰安俾洽寛澤應將士吏人承前所有諸過犯罪無輕重一切釋放曠然昭洗咸與惟新其有先請受莊宅財物者各以見管為主將士衣賜節料幷家口糧賜等一切並準舊例以時給付不得停減先令優與賞設亦準元勅處分務令豐厚以稱朕懐仍加曉諭各委知悉翰苑集巻三
