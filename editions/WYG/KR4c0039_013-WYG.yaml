body:
  text: 翰苑集巻十三唐陸贄撰奏草三奉天請數對羣臣兼許令論事狀朝隠奉宣聖旨頻覽卿表狀勸朕數對羣臣兼許令論事辭理懇切深表盡忠朕本心甚好推誠亦能納諫但縁上封事及奏對者少有忠良多是論人長短或探朕意旨朕雖不受讒譖出外即謾生是非以為威福朕往日將謂君臣一體都不隄防縁推誠信不疑多被姦人賣弄今所致患害朕思亦無他故却是失在推誠又諫官論事少能慎宻例自矜􅃷歸過於朕以自取名朕從即位以来見奏對論事者甚多大抵皆是雷同道聽塗說試加質問即便辭窮若有竒才異能在朕豈惜拔擢朕見從前已来事秪如此所以近来不多取次對人亦不是倦於接納卿宜深悉此意者聖徳廣大如天包容俯矜狂愚仍賜奬諭嘉臣以懇切目臣以盡忠雖甚庸駑實懐感勵夫知無不言之謂盡事君以義之謂忠臣之夙心久以自誓以此為奉上之道以此為報主之資幸逢休明獲展誠願既免罪戾又蒙襃稱庶奉周旋不敢失墜儻陛下廣推此道施及萬方咸奬直以矜愚各録長而捨短人之欲善誰不如臣自然聖徳益彰羣心盡達愚衷懇懇實在於斯睿眷特深縷宣宻旨備該物理曲盡人情其於慮逺防微固非常識所逮然臣竊謂天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納帝王之盛莫盛於堯雖四凶在朝而僉議靡輟故曰惟天為大惟堯則之是知人有邪直賢愚在處之各得其所而已必不可以忠良者少而闕於詢謀獻納之道也昔人有因噎而廢食者又有懼溺而自沉者其為矯枉防患之慮豈不過哉願陛下取鑒於兹勿以小虞而妨大道也臣聞人之所助在乎信信之所立由乎誠守誠於中然後俾衆無惑存信於已可以教人不欺唯信與誠有補無失一不誠則心莫之保一不信則言莫之行故聖人重焉以為食可去而信不可失也又曰誠者物之終始不誠無物物者事也言不誠則無復有事矣匹夫不誠無復有事況王者賴人之誠以自固而可不誠於人乎陛下所謂失於誠信以致患害者臣竊以斯言為過矣孔子曰可與言而不與之言失人不可與言而與之言失言智者不失人亦不失言由此論之陛下可審其所言而不可不慎信其所與而不可不誠海禽至微猶識情偽含靈之類固必難誣前志所謂衆庶者至愚而神盖以蚩蚩之徒或昬或鄙此其似於愚也然而上之得失靡不辯上之好惡靡不知上之所秘靡不傳上之所為靡不効此其類於神也故馭之以智則人詐示之以疑則人偷接不以禮則徇義之意輕撫不以恩則効忠之情薄上行之則下從之上施之則下報之若響應聲若影從表表枉則影曲聲淫則響邪懐鄙詐而求顔色之不形顔色形而求觀者之不辯觀者辯而求衆庶之不惑衆庶惑而求叛亂之不生自古及今未之得也故唯天下至誠為能盡其性能盡其性則能盡人之性若不盡於已而望盡於人衆必紿而不從矣不誠於前而曰誠於後衆必疑而不信矣今方岳有不誠於國者陛下則興師以伐之臣庶有虧信於上者陛下則出令以誅之有司順命誅伐而不敢縱捨者盖以陛下之所有責彼之所無故也向若陛下不誠於物不信於人人將有辭何以致討是知誠信之道不可斯須去身願陛下慎守而行之有加恐非所以為悔者也臣聞春秋傳曰人誰無過過而能改善莫大焉易曰日新之謂盛徳禮記曰徳日新日日新又日新商書仲虺述成湯之徳曰用人惟巳改過不吝周詩吉甫美宣王之功曰衮職有闕惟仲山甫補之夫禮易春秋百代不刋之典也皆不以無過為美而謂大善盛徳在於改過日新成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴盖為人之行已必有過差上智下愚俱所不免智者改過而遷善愚者耻過而遂非遷善則其徳日新是為君子遂非則其惡彌積斯謂小人故聞義能徙者常情之所難從諫勿咈者聖人之所尚至於贊揚君徳歌述主功或以改過不吝為言或以有闕能補為美中古巳降淳風浸㣲臣既尚䛕君亦自聖掩盛徳而行小道於是有入則造膝出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑譖臣之罪由此生媚道一行為害斯甚太宗文皇帝挺秀千古清明在躬再恢聖謨一變流弊以虛受為理本以直言為國華有面折廷爭者必為霽雷霆之威而明言奬納有上封獻議者必為黜心意之欲而手勅襃揚故得有過必知知而必改存致雍熙之化沒齊堯舜之名向若太宗徇中主之常情滯習俗之凡見聞過則羞已之短納諫又畏人之知雖有求理之心必無濟代之効雖有悔過之意必無從諫之名此則聽納之實不殊隠見之情小異其於損益之際已有若此相懸又況不及中才師心自用肆于人上以遂非拒諫孰有不危者乎且以太宗有經緯天地之文有底定禍亂之武有躬行仁義之徳有致理太平之功其為休烈耿光可謂盛極矣然而人到于今稱詠以為道冠前古澤被無窮者則從諫改過為其首焉是知諫而能從過而能改帝王之美莫大於斯陛下所謂諫官論事少能慎宻例自矜􅃷歸過於朕者臣以為不宻自矜信非忠厚其於聖徳固亦無虧陛下若納諫不違則傳之適足増美陛下若違諫不納又安能禁之勿傳伏願以貞觀故事為楷模使太宗風烈重光於聖代恐不可謂此為歸過而阻絶直言之路也臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之義是則聖賢為理務詢衆心不敢忽細微不敢侮鰥寡侈言無驗不必用質言當理不必違遜于志者不必然逆于心者不必否異于人者不必是同于衆者不必非辭拙而効速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他唯善所在則可以盡天下之理見天下之心夫人之常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所欲信既偏則聽言而不考其實由是有過當之言疑既甚則雖實而不聽其言於是有失實之聽輕其人則遺其可重之事欲其事則存其可弃之人斯並茍縱私懐不稽皇極于以虧天下之理于以失天下之心故常情之所輕乃聖人之所重圗逺者先驗於近務大者必慎於微將在博採而審用其中固不在慕髙而好異也陛下所謂比見奏對論事皆是雷同道聽塗説者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣竊以陛下雖窮其辭而未盡其理能服其口而未服其心何以知其然臣每讀史書見亂多理少因懐感歎嘗試思之竊謂為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願達於上上之情莫不求知於下然而下恒苦上之難達上恒苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辯給眩聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順旨而忠實之語不聞矣上騁辯必勦説而折人以言上眩明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之説不申矣夫以區域之廣大生靈之衆多宫闕之重深髙卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其閒則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然考其初心不必淫暴亦在乎兩情相阻馴致其失以至于艱難者焉昔龍逢誅而夏亡比干剖而殷滅宫竒去而虞敗屈原放而楚衰臣謂夏殷虞楚之君若知四子之盡忠必不𠞰弃若知四子之可用必不拒違所以至於忍害而捨絶者盖謂其言不足行心不足保故也四子既去四君亦危然則言之固難聽亦不易趙武呐呐而為晉賢臣絳侯木訥而為漢元輔公孫宏上書論事帝使難宏以十䇿宏不得其一及為宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一詶一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才臣是以竊慮陛下雖窮其辭而未窮其理能服其口而未服其心良有以也古之王者明四目達四聰盖欲幽抑之必通且求聞已之過也垂旒於前黈纊於側盖惡視聽之太察唯恐彰人之非也降及末代則反於斯聰明不務通物情視聽秪以伺罪釁與衆違欲與道乖方於是相尚以言相示以智相冒以詐而君臣之義薄矣以陛下性含仁聖意務雍熙而使至道未孚臣竊為陛下懐愧於前哲也古人所以有恥君不如堯舜者故亦以是為心乎夫欲理天下而不務於得人心則天下固不可理矣務得人心而不勤於接下則人心固不可得矣務勤接下而不辯君子小人則下固不可接矣務辯君子小人而惡其言過悅其順已則君子小人固不可辯矣趣和求媚人之甚利存焉犯顔取怨人之甚害存焉居上者易其害而以美利利之猶懼忠告之不蔇況有疎隔而勿接又有猜忌而加損者乎天生烝人合以為國人之有口不能無言人之有心不能無欲言不宣於上則怨讟於下欲不歸於善則湊集於邪聖人知衆之不可以力制也故植謗木陳諫鼓列爭臣之位置采詩之官以宣其言尊禮義安誠信厚賢能之賞廣功利之途以歸其欲使上不至於亢下不至於窮則人心安得而離亂兆何從而起古之無為而理者其率用此歟茍有理之之意而不知其方茍知其方而心守不壹則得失相半天下之理亂未可知也其又違道以師心弃人而任巳謂欲可逞謂衆可誣謂專斷無傷謂詢謀無益謂䛕説為忠順謂獻替為妄愚謂進善為比周謂嫉惡為嫌忌謂多疑為御下之術謂深察為照物之明理道全乖國家之顛危可立待也理亂之戒前哲備言之矣安危之効歷代嘗試之矣舊典盡在殷鑒足徵其於措置施為在陛下明識所擇耳伏願廣接下之道開奬善之門𢎞納諫之懐勵推誠之美其接下也待之以禮煦之以和虛心以盡其言端意以詳其理不禦人以給不自眩以明不以先覺為能不以臆度為智不形好惡以招諂不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍蚩而妍蚩自彰莫得而怨也有犯顔讜直者奬而親之有利口讒佞者疎而斥之自然物無壅情言不茍進君子之道浸長小人之態日消何憂乎少忠良何有乎作威福何患乎妄說是非如此則接下之要備矣其奬善也求之若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪㳙必容能小事則處之以小官立大勞則報之以大利不忌怨不避親不抉瑕不求備不以人廢舉不以已格人聞其才必試以事能其事乃進以班自然無不用之才亦無不實之舉如此則奬善之道得矣其納諫也以補過為心以求過為急以能改其過為善以得聞其過為明故諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為盛徳是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得採納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之徳光矣其推誠也在彰信在任人彰信不務於盡言所貴乎出言則可復任人不可以無擇所貴乎巳擇則不疑言而必誠然後可求人之聽命任而勿貳然後可責人之成功誠信一虧則百事無不紕繆疑貳一起則羣下莫不憂虞是故言或乖宜可引過以改其言而不可茍也任或乖當可求賢以代其任而不可疑也如此則推誠之義孚矣微臣所以屢屢塵黷而不能自抑者盖以陛下有拯亂之志而多難未平有務理之誠而庶績未乂有堯舜聰明之徳而未光宅於天下有覆載含𢎞之量而未翕受於衆情故臣每中夜静思無不竊歎而深惜也向若陛下有其位而無必行之志有其志而無可致之資則臣固已從俗浮沉何苦而汲汲如是惟陛下詳省所闕亟行所宜歸天下之心濟中興之業此臣之願也億兆之福也宗社無疆之休也謹奏奉天論尊號加字狀右冀寜奉宣聖旨往年百官請上尊號曰聖神文武皇帝今縁經此寇難諸事並宜改變衆議欲得於朕舊號之中更加一兩字卿宜商量事體穩便得否者伏以睿徳神功參天配地巍巍蕩蕩無得而名臣子之心務崇美號雖或増累盈百猶恐稱述未周陛下既越常情俯稽至理愚衷未諭安敢不言竊以尊號之興本非古制行於安泰之日已累謙沖襲乎喪亂之時尤傷事體今者鑾輿播越未復宫闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下誠宜深自懲勵以收攬羣心痛自貶損以荅謝靈譴豈可近從末議重益美名既虧追咎之誠必累中興之業以臣庸蔽未見其宜乞更詳思不為兇孽所幸此臣之至願也謹奏重論尊號狀右冀寜奉宣聖旨卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿宜為朕更審思量應亦無妨者臣聞徳合天者謂之皇徳合地者謂之帝徳合人者謂之王父天母地以養人理物各得其宜者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黄帝堯舜自生人已来君徳之最神聖者天下尊之美之亦已至矣而其指以為號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫匪大聖尚自菲薄降號為王嬴秦徳衰於殷周而名竊於羲皡兼皇與帝始緫稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱崇其號無補於徽猷損其名不傷於徳美然而損之有謙光稽古之善崇之獲矜能納諂之譏得失不侔居然可辯況今時遭屯否事屬艱難尤宜懼思以自貶抑必也俯稽術數須有變更與其増美稱而失人心不若黜舊號以祇天戒天時人事理必相扶人既好謙天亦助順陛下誠能斷自宸鑒渙發徳音引咎降名深自尅責惟謙與順一舉而二美從之外可以收物情内可以應元運上可以髙徳於夐古下可以垂法於無窮興廢典矯舊失至明也損虚飾收美利大智也前聖之所以永保鴻名常為稱首者達於兹義而巳矣陛下何恡而不革反欲加冗號以受實患哉元元道徳經曰王侯自謂孤寡不穀以賤為本也周襄王遭亂出居于鄭告于諸侯曰不穀不徳鄙在鄭地春秋禮之以其能降名也漢光武詔令上書者不得言聖史册稱之以其能損巳也臣顧以賤㣲獲承訪議伊尹恥其君不如堯舜臣亦恥之是以誠發於中不復防慮忌諱赦其愚而鑒其理惟明主行焉謹奏奉天論赦書事條狀右隠朝奉宣聖旨并以中書所撰赦文示臣令臣審看可否如有須改張處及事宜不盡條録奏来者臣謹如詔旨詳省再三猶懼所見不周兼與諸學士等參考得失僉以為綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寶志壹中區窮用甲兵竭取財賦甿庶未達於暫勞之旨而怨咨已深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盗據宫闈九廟鞠陷於匪人六師出次於郊邑奔逼憂厄言之痛心自古禍亂所鍾罕有若此之暴今重圍雖解逋寇尚存裂土假王者四兇淊天僭帝者二豎又有顧瞻懐貳叛援黨姦其流寔繁不可悉數皇輿未復國柄未歸勞者未獲休功者未及賞困窮者未暇恤滯抑者未克伸將欲紓多難而收羣心唯在赦令誠言而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懐昔成湯遇災而禱于桑野躬自髠剔以為犧牲古人所謂割髮宜及膚翦爪宜侵體良以誠不至者物不感損不極者益不臻今兹徳音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不𢎞宣暢鬱堙不可不洞開襟抱洗刷疵垢不可不盪去瘢痕使天下聞之廓然一變若披重昏而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具别狀同進除此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形於事人或未諭而宣之以言言必顧心心必副事三者符合不相越踰本於至誠乃可求感事或未致則如勿言一虧其誠終莫之信伏惟陛下先斷厥志乃施於辭度其可行而宣之其不可者措之無茍於言以重其悔言克誠而人心必感人心既感而天下必平事何可不詳言何可不務罄輸愚懇伏聽聖裁謹奏翰苑集巻十三
