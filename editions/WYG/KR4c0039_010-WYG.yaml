body:
  text: 翰苑集巻十唐陸䞇撰制誥鐵券慰問勅書賜李納王武俊等鐵券文維興元元年嵗次甲子正月癸酉朔二日甲戌皇帝咨爾某官某嗚呼王者所以撫人失於所撫則叛下者所以奉上失於所奉則刑各當其理徳用不擾各違其分亂於是生朕徳薄化淺昧於君道㒺知省已姑務責人是以徵師徂征連嵗靡息惟爾以誠志之不達反仄于厥衷阻衆興戎結黨拒命豈非上失於所撫而下失於所奉與書曰萬方有罪罪在朕躬我實不徳兆人何咎俾廢其生業離於室家陷于困窮死于戰陣老疾廢養孤惸靡依怨結蒼生感傷和氣朕為人父母得不愧于心哉晨興以思夕惕以悼自嗣位迄今六載天將悔禍朕方覺悟爾亦知衆心之厭亂思所以保安叶于朕懐若應符契非天地合徳人神合謀將茂育羣生則何以臻此朕是用上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載鼎彝名藏王府子孫代代為國勲臣河山帶礪傳祚無絶朕方布大信承天子人若食其言何以享國嗚呼其祗若命用保無疆之休賜安西管内黄姓纛官鐵券文維貞元二年嵗次丙寅八月丁巳朔三日已未皇帝若曰咨爾四鎮節度管内黄姓纛官驃騎大將軍行左金吾衞大將軍貟外置同正貟兼試太常卿頓啜䕶波支惟爾乃祖乃父代服聲教勤勞王家勲書于鼎彞族列于藩籍爾克紹先祖之烈而重之以忠貞嗣守職官祗若朝化率其種落保我邉陲丹誠向化萬里如近是用稽諸令典錫以券書若金之堅永代無變子孫繼襲作我藩臣爾其欽承勿替休命慰問四鎮北庭將吏勅書四鎮北庭將士官吏僧道耆夀百姓自祿山首亂中夏不安蕃戎乗釁侵敗封略道路梗絶徃来不通哀我士庶忽如異域控告無所歸還莫從朕未嘗一夕忘懐而事勢不及相卹興言軫念忽以涕流卿等咸藴忠誠誓死不屈或早從征鎮白首軍中或生在戎行長身塞外克奉正朔堅保封疆援絶勢孤以寡敵衆晝夜勞苦不得休息嵗時捍禦不解甲胄勲髙百戰義叶一心介然孤城獨守臣節日来月徃三十餘年奉國之誠久而彌勵求諸今古忠烈莫儔義激人倫名光史册蠢動知感況於朕懐朕嗣守洪業君臨宇内思安兆庶以絶戰爭遂與贊普約定好和集蕃漢士庶告天地神祗設壇㑹盟永息邉患疆埸罷警于今六年近以賊臣朱泚背恩驚犯宫闕贊普又遣師旅助討姦兇兩國交懽事同一體北庭去此遙逺信使難通於西蕃既非便宜在國家又絶来徃永念士庶隔在殊方歸路無因親戚永訣為人父母實所感傷已共西蕃定議兼立誓約應在彼將士官吏僧道耆夀百姓等並放歸漢界仍累路置頓供擬發遣待卿等進發然後以土地隸屬西蕃今故遣太常少卿兼御史大夫沈房及中使韓朝彩等往彼宣諭仍便與西蕃交割卿等宜遞相慰勉叶力同心互相提攜速圗進路復歸鄉井重見宗親生人之情莫重於此一勞永逸固不合辭卿等誠莭昭宣勲閥茂著到此之後當特甄升仍給田園以贍生業必令優厚用答忠勞如有資産已成不願歸此亦任便住各遂所安宜勉良圗副我勤想夏熱卿等各平安好遣書指不多及與回紇可汗書皇帝敬問可汗弟兩國和好積有嵗年申之以昬姻約之以兄弟誠信至重情義至深頃因賊臣背恩構成嫌釁天不長惡尋已誅夷使我兄弟恩好如舊周皓及踏本啜黒達干等至得弟来書省覽久之良以為慰弟天資雄傑智識通明親仁善鄰敦信明義罷戰爭之患𢎞禮讓之風保合大和用寜區宇惟兹盛美何以加焉朕之素懐與弟叶契為君之道本務愛人同日月之照臨體天地之覆育其於廣被彼此何殊况累代以来繼敦姻戚與弟俱承先業所宜遵奉令圗自兹以還情契彌固垂之百代永逺無窮緬想至誠當同此意所附踏本啜奏請降公主姻不失舊頗叶通規待弟表到即依所請宣示百寮擇日發遣縁諸軍兵馬收京破賊頻立功勲賞給數多府藏虛竭其馬價物且付十二萬匹至来年三月更發遣一般餘並續續支付弟宜悉也安西北庭使人入奏並却歸本道至彼宜差人送過令其速達弟所寄馬並到深愧厚意賜吐蕃將書勅尚覽鑠論莫陵悉繼等至省所陳奏朕具悉之國家與大蕃親則舅甥義則鄰援息人繼好固是常規朕嗣位君臨思安兆庶常以信讓為事不以爭競為心區域雖殊覆育寜别贊普天資仁徳好生惡殺與朕同心重修舊好㑹蕃漢將相告天地神祇約誓之言至嚴至重大信一立義無改移所請奉天盟書勒於清水碑石審詳事理頗甚乖違往嵗賊臣稱兵竊據城闕尚結贊志惟嫉惡義在救災頻獻表章請收京邑朕以宗廟社稷悉在上都但平宼戎豈惜詶賞遂許四鎮之地以荅收京之功旋屬炎蒸又多疾疫大蕃兵馬便自抽歸既未至京有乖始望奉天盟約豈合更論朕欲茍徇彼情便令鐫刻則是非務實信不由衷欺天罔神莫大於此凡曰通好貴於推誠將垂百代之名豈顧一時之利但以事之去就須定是非若不辨明便成姑息親鄰之義豈所宜然故遣使臣與卿詳議卿是大蕃輔佐必當智識通明事理昭然不足疑惑儻有他見宜具奏聞審細研窮須歸至當所論先許每年與贊普綵絹一萬匹段者本来立約亦為收京然於舅甥之情此乃甚為小事二國和好即同一家此有所須彼當不恡彼有所要此固合供以有均無蓋是常理贊普若須繒帛朕即隨要支分多少之間豈拘定限假使踰於萬匹亦當稱彼所求朕之所重者信誠所輕者財利思與率土同臻大和想卿深體至公務存大義安人保境垂美無窮勉思令圗以副朕意今遣倉部郎中兼侍御史趙聿與来使同往書中意有不盡並令趙聿口宣尚結贊論莽羅等嘗緫師徒逺来赴難功雖未就義則可嘉其所領將士等朕先許與賜物一萬匹段並已排比許卿所商量指定此使却囘即發遣往今各賜卿少物至宜領之賜吐蕃宰相尚結贊書勅尚結贊卿天資材術作輔大蕃識通古今志奉忠信義聲著積逺近流傳比聞入典樞衡近知還緫戎務二國所定和好首末是卿商量得卿却来深以為慰昨者邉軍狀奏彼國兵馬踰越封疆朕以畫界立盟先有定分贊普素敦仁義卿又特禀純誠背約侵漁必無此理但勅邉城自備不令輒動干戈若使効尤恐成交惡初疑界首遊奕少有乖宜不謂大發師徒漸加侵軼興兵動衆必合有名蕃軍此行未測其故朕自嗣膺寳位即與贊普通和敦以舅甥結為鄰援懲戰爭之弊知禮讓之風彼此大同務安衆庶乃於境上建立壇場契約至明誓詞至重告于皇天后土諸佛百神有渝此盟殃及其國朕敬奉誠約分毫不移信使交懽嵗時無絶碑文具在可以明徵豈有一事不行一言不守頃令趙聿專往近方從彼却回兼聞彼蕃使同来至今獨在道路卿所論奏朕並未知待詳事由乃可商議既稱和好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神明豈其可罔卿智識明達朕所深知頃年猶舉義師救此災患今若不存大信遂棄令名故專遣使見卿欲得審知来意竚聞還奏以副所懐趙聿及蕃使合到待覽表中意旨續即商量報卿卿渉逺而来當甚勞頓今賜卿某物至宜領之秋冷卿比平安好將士並存問之賜尚結贊第二書趙聿及論拱熱等至得卿表奏具見懇誠省覽言辭即稱和好及覩事跡唯務侵凌矛楯若斯將何取信審察書中之意盖求四鎮北庭如此事宜足得商議既言通好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神祗豈其可罔又聞放縱兵馬蹂踐禾苗邉境之人大遭驅掠在此未為深損於彼殊非逺謀卿之用心何乃至是國家利害計須久長和好之道既虧仁義之風何在卿智識明悟朕所深知頃年猶發義師救此災患今豈不存大信遂棄令名故遣使見卿欲得審知来意必若守其盟誓務在同和即收斂兵車速歸本界所掠百姓一切放回然後可表卿直心信卿来奏續即遣使與論拱熱同往諸事並有商量交歡必令得所或宻懐他意將欲别謀彼雖未説實情此亦略為凖擬但縁誓約本重朕意不欲先違以此勤勤合有相問佇聞来奏以副朕懐賜尚結贊第三書勅尚結贊蕃使論拱熱等與趙聿同到卿所陳奏朕具悉之誠意勤勤志敦和好上以成舅甥之義次以結鄰援之歡外以彰禮讓之風内以息戰爭之患兼此數事昔賢所難非卿材越等倫識通今古豈能匡輔大國𢎞宣逺圗施美利於當時傳盛名於不朽眷懐明略歎尚良多然以贊普来書務於叶睦卿之所奏亦貴通和初覽其言實嘉徳義及觀其事頗訝乖違以卿賢明朕所信重棄義踰約計必不然未測事由因何至此頃年所定和好言約頗謂分明至如四鎮北庭元不割與蕃國及朱泚悖逆作亂上都卿仗義興師請收京邑遂許四鎮北庭之地將以報荅成功旋屬炎蒸蕃軍便退奉天之約豈可更論事甚分明固無疑惑凡言結好所貴和同通體商量有何不可大蕃必若要四鎮北庭之地即合直以情言彼但露其誠心此亦自有分義豈假曲徵前事廣起異端仍發師徒務張威勢蕃使猶未至此蕃軍早已越疆或稱欲自赴朝或云更定言誓既虧盟約且失禮儀言與事乖將何取信夫人君立國必不徒然惟漢與蕃各受天命勝負固有定分强弱寜由力爭卿欲以衆相侵以威相脅謂天地可罔謂盟誓可渝即當肆意所為不必更論和好儻欲守其前約敦以親鄰去就之間固宜有禮遣使来往足得商量張皇師徒是何道理和好者禮義之事甲兵者爭奪之由二端懸殊理不並用今欲以用兵之勢定和好之辭事必不成縱成何益卿識見通敏器宇沉詳如此事宜不言可悉未知来意竟擬如何且首末論和是卿商議清水㑹盟之日卿又親發誓辭將期去殺好生修文偃武永安兆庶垂法子孫天下稱嗟以為盛美未經數嵗遽有變移非獨見誚於四方亦將取笑於千古以此思度甚欲通和彼雖小以侵陵朕亦未即交惡故遣某官與卿更審籌量卿若必務同和更無他意即宜便歸本界遣使具述本情所須四鎮北庭朕當自有推議如或託稱繼好志在别圗依前縱兵不即歸國惟利是視亦識彼懐和與不和於兹决定書中事有不盡並令某官某口宣宜令速回竚望来奏所獻方物深表逺誠今賜卿某物至可領也秋冷比平安好翰苑集巻十
