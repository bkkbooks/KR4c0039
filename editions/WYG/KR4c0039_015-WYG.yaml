body:
  text: 翰苑集巻十五唐陸䞇撰奏草五興元論解姜公輔狀右欽漵奉宣聖旨縁唐安公主喪亡不可向此間遷厝權令造一塔安置待收復京城即擬將歸以禮葬送所造塔役功費用亦甚微小都不合是宰相所論之事姜公輔忽有表奏都無道理但欲指朕過失擬自取名朕本拔擢將為腹心今却如此豈不負朕至深卿宜商量如何穩便者公輔頃在翰林與臣久同職任臣今據理辨直則渉於私黨之嫌希旨順承則違於匡輔之義渉嫌止貽於身患違義實玷於君恩徇身忘君臣之耻也别嫌奬義主之明也臣今不敢冒行所恥亦賴陛下明聖而鑒焉古語有之順旨者愛所由来逆意者惡所從至故人臣皆争順旨而避逆意非忘家為國捐身成君者誰能犯顔色觸忌諱建一言開一説哉是以哲后興王知其若此求諫如不及納善如轉圜諒直者嘉之訐犯者義之愚淺者恕之狂誕者容之仍慮驕汰之易滋而忠實之不聞也於是置敢諫之鼓植告善之旌懸戒慎之鞀立司過之士猶懼其未也又設官制以言為常由是有史為書瞽為詩工誦箴諫大夫規誨士傳言庶人謗尚恐其怠也每嵗孟春遒人以木鐸徇于路而振警之官師相規工執藝事以諫其或不恭邦有常刑然非明智不能招直言非聖徳不能求過行招直則其智彌大求過則其徳彌光唯衰亂之朝闇惑之主則必諱其過行忿其直言以阿䛕為納忠以諫爭為揚惡怨讟溢於下國而耳不欲聞腥徳達於上天而心不求寤迨乎顛覆猶未知非情之昬迷乃至於是故明者廣納以成德闇者獨用而敗身成敗之途千古相襲與敗同轍者罔不覆與成同軌者罔不昌以陛下日月之明江海之量自當矯夏癸殷辛拒諫飾非之慝協大禹成湯拜言改過之誠矧又時運方屯物情猶鬱乃是陛下握髮吐哺之日宵衣旰食之辰士無賢愚咸宜錄用言無大小皆務招延固不可復有忤逆之嫌甘辛之忌也夫君人者以衆智為智以衆心為心恒恐一夫不盡其情一事不得其理孜孜訪納唯善是求豈但從諫不咈而已哉乃至求謗言聽輿誦葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隠必達今公輔官在諫議任居宰衡獻替彌綸乃其職分比於芻蕘葑菲豈不優而且重哉此理之常奚足怪也縱使引喻非當不猶愈於輿誦乎矯激過深不猶愈於謗言乎晉文聽輿人之誦而霸業興虞舜設誹謗之木而帝徳廣斯實聖賢之髙躅陛下何疾焉聖旨又以造塔役費微小非宰臣所論之事下臣愚戅竊謂不然當問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪夫小者大之漸微者著之萌故君子慎初聖人存戒知幾者所貴乎不逺而復制理者必在於未亂之前本立輔臣置之左右朝夕納誨意在防微微而弼之乃其職也涓涓不遏終變桑田燄燄靡除卒燎原野流煽巳甚禍災已成雖欲救之固無及矣書曰不矜細行終累大德易曰小人以小善為无益而不為也以小惡為无傷而不去也故惡積而不可掩罪大而不可解然則小之不可不慎也如此陛下安得使之勿論乎虞書載咎繇之言曰兢兢業業一日二日萬幾兢兢慎也業業危也幾者動之微也唐虞之際主聖臣賢庶績咸熈萬邦已協而猶上下相戒既慎且危慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎舜之為君始作漆器羣臣固爭咸謂非宜漆器之為用也甚堅其為費也盖寡然猶相繼諷諫者豈不欲杜其漸而慎其初歟是知君臣之間義同一體事罔大小相須而成故舜命其臣曰作朕股肱耳目夫股肱之奉元首不以煩細而闕於運行耳目之助心靈不以么微而廢於視聽是以臣子之於君父也盡其敬而敬焉盡其愛而愛焉敬則願及於尊榮愛則懼陷於過惡萬邦黎獻莫不皆然而況位列朝廷任當輔弼主辱與辱主安與安此而不言誰復言者禮曰近而不諫則尸利也若宰相者可謂近矣事或乖誤得無諫乎武丁賢君也傅說賢相也而武丁引金作礪以命其相說諭木從繩以戒其君是則輔弼之任匡救攸屬巨細之事悉宜盡規陛下所言役費微小非宰相所論之事又謂指朕過失擬自取名此誠異乎愚臣之所聞是以願披肺腸而不敢自黙者也若以諫爭為指過則剖心之主不宜見罪於哲王若以諫爭為取名則匪躬之臣不應垂訓于聖典獻替列職竟使奚為左右有人復將焉用臣竊謂指過以示直固不如改過以見稱進諫以取名固不如納諫之為美假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩已過而過彌著損彼名而名益彰果而行之所失大矣一獲一失可不慎乎伏願嘉忤旨之忠袪逆耳之吝平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠謹奏又荅論姜公輔狀右欽漵奉宣聖旨省卿所奏公輔事宜雖甚知卿盡忠然似未㑹朕意朕意以公輔才行共宰相都不相當在奉天時早欲停罷後因公輔辭退朕已對面許訖尋屬懐光背叛遂且因循容到山南公輔知朕必擬移改所以固論造塔事賣直取名據此用心豈是良善朕所以惆悵者秖緣如此卿今疑朕不能納諫殊乖本意者臣以戅執務在朴忠推理而言有懐必盡睿意元妙非凡所窺如臣懵昧之材且無希伺之志奏報失旨宜其固然所冀録微欵而矜至愚實天下幸甚古人有言曰明主者可以理奪又曰主聖則臣直今陛下禀天縱之才備明聖之資臣若抱理莫伸守直不固上虧至化罪莫大焉輒復據直道而理其前言惟陛下留意幸察臣竊以領覽萬幾必先虛其心鑑鏡羣情必先誠其意盖以心不虚則物或見阻意不誠則人皆可疑阻於物者物亦阻焉疑於人者人亦疑焉萬物阻之兆人疑之將欲感人心致於和平盡物理使無紕繆是猶却行而求及前人也無乃愈踈乎孔子曰不遷怒不億不信豈非懼於肆情逞憾以至于失中違道者哉臣之區區志欲匡輔是以前者奏疏願陛下平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠今陛下以素欲廢罷公輔之心而謂其所行皆非良善則是遷怒而積憤之氣未平也陛下揣公輔知必移改之意而謂其所言皆欲取名則是億不信而逆詐之情未弭也逆詐未弭積憤未平固宜公輔獲戾於蓄疑下臣見尤於乖意謂之至當則或不然夫臣之獻言以助理也君之求諫以弼違也言茍助理何必以人而廢言諫茍弼違何必責意而拒諫若彼言無足用意雖善而奚為諫有可從人雖咎而寜捨古先聖王所以採葑菲詢芻蕘傳謗言用仇怨急於聽納乃至於斯其意無他惟義所在願陛下不以憎嫌而遺其片善不務精察而謂之大明忠言者利於行而咈於情唯計慮至熟乃能無忤幸紆宸鑒更審所宜謹奏興元論請優奬曲環所領將士狀右曲環所領一軍悉是朱泚部曲或頃在鳳翔所管或本從河朔同来後因汴宋用兵權抽赴彼應援所以行營將士猶舉幽隴為名今之元兇乃其舊帥岐下則楚琳助亂薊門則朱滔黨姦獨此偏師漂然河上其營幕則寄于他土其家屬則陷于匪人又屬汴路姦虞浚城陷覆糧餉屢絶資裝久殫士卒常情固難安處是宜潰歸舊營否則散適樂郊而曲環撫之悉無離叛孤軍自守亦不茍從處危能安聞難輒赴甚推齊肅累著功勲近日將帥之中罕有如環之比考其才節絶有過人但縁羇寓多時窮匱轉甚繼陳章奏言及酸辛告急朝廷則力未能救求哀郡府則人莫見憂覽其辭情可為流涕若失於應接則終以危亡良將義徒實在深惜願陛下不以常人遇之不以常事遣之方今勢可相資惟有江左完實恐須宻勅韓滉切令贍恤此軍器甲衣糧咸使周足因賜劉洽手詔亦委加意保持若得自存必有成績非艱難無以表特操非英聖不能全異才有功見知人必恱勸臣不勝區區為國奬善拯危之意謹啟事以聞謹奏興元論解蕭復狀右欽漵齎蕭復表示臣兼奉宣聖旨朕比縁李懐光兇狂權且就此迴避山南既與京畿接近指麾兵馬日望收城今蕭復勸朕令幸江陵表狀之中張皇頗甚朕不㑹其意昨問從一從一亦甚驚怪不知事由蕭復奏事官李充朕適喚對共語亦似不是純良此人莫是李承昭家子弟否卿宜審看蕭復表中意趣斟酌奏来者臣伏覩其表兼揣其情盖以逺路傳聞事多失實大臣獻納務且竭誠雖有過當之虞失中之䇿但宜勿用不足為尤何則駐蹕奉天屯難已甚況又不駐艱危可知蕭復備位樞衡奉使宣撫忽聞變故寜免驚憂梁岷之間窮隘特甚輦輓攸止資奉實難凡在戀主之誠各懐徯后之志是以延賞奉迎於西蜀韓滉望幸於東吳此乃臣子之常情古今之通理蕭復所請亦類於斯事雖非宜意則可恕李充頃任御史臣嘗與之同寮其人是故福建觀察使李椅之男與承昭房從已逺才頗通敏性亦温恭宗族之中足稱佳器伏願更廣詢訪方驗臣言不誣謹奏又答論蕭復狀右欽漵奉宣聖旨卿所奏蕭復事朕已具悉假使更無别意終是不識事宜今巡行諸道轉恐事多乖失縁孟皥年老今欲除蕭復為福建觀察使便令赴任去就亦應得所卿意以為何如者伏以將相之任所委皆崇中外迭居亦是常理然君臣有禮進退不可以不全理體有宜本末不可以不稱頃盗興都邑駕適郊畿陛下悔征賦之殷繁念黎元之困悴誕降慈旨深示憫傷特遣大臣普詢疾苦本期還報將議優蠲衆情顒顒日望上達今若未終前命遽授逺藩則是膏澤將布而復收渙汗已發而中廢事既失望人何以觀斯乃進退之禮不全本末之宜不稱謂為得所臣實疑之儻慮處事乖方不欲淹留在外則當諭以詔旨促其歸程逺郡巡歷未周但令副介分往待其復命親訪物情革弊垂恩用符徳號使務既畢能否益彰徐擇所宜以圗進退庶於事體允得厥中謹奏興元論續從賊中赴行在官等狀右欽漵奉宣聖旨近日往往有卑官從山北来皆稱自京城偷路奔赴行在大都此軰多非良善有一邢建論說賊中體勢語最張皇察其事情頗是窺覘今且令留在一處安置如此之類更有數人若不根尋恐有姦計卿宜商量如何穩便者臣伏以任緫百揆者與一職之守不同富有萬國者與百揆之體復異盖尊領其要卑主其詳尊尚恢𢎞卑務近細是以練覈小事糺察微姦此有司之守也維御萬樞選建庶長緫綱而衆目咸舉明邇而羣方自通此大臣之任也愚智兼納洪纎靡遺盖之如天容之如地垂旒黈纊而黜其聦察匿瑕藏疾而務於包含不示威而人畏之如雷霆不用明而人仰之如日月此天子之徳也以卑而僭用尊道則職廢于下以尊而降代卑職則徳喪于上職廢則事不舉徳喪則人不歸事不舉者弊雖切而患輕人不歸者釁似微而禍重兹道得失所闗興亡聖王知宇宙之大不可以耳目周故清其無為之心而觀物之自為也知億兆之多不可以智力勝故壹其至誠之意而感人之不誠也異於是者乃以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺故宣尼述陶唐之盛曰惟天為大惟堯則之周詩美文王之德曰不識不知順帝之則是皆覆育萬物渾然大同無好無惡不忌不克之謂也項籍納秦降卒二十萬慮其懐詐復叛一舉而盡坑之其於防虞亦已甚矣漢髙豁達大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴衞雄猜而荆軻奮其隂計光武寬容博厚而馬援輸其款誠豈不以虛懐待人人亦思附任數御物物終不親情思附則感而恱之雖宼讎化為心膂有矣意不親則懼而阻之雖骨肉結為仇慝有矣臣故曰兹道得失所闗興亡伏惟陛下睿哲文思光被四表孝友勤儉行髙百王然猶化未大同俗未至理者良以智出庶物有輕待人臣之心思周萬幾有獨馭區㝢之意謀吞衆略有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勲業者懼於不容懐反側者迫于攻討馴致離叛搆成禍災兵連于外變起于内嵗律未半乗輿再遷國家艱屯古未嘗有以陛下至聖之德而遘兹殷憂之期天其或者欲大啟睿心儆小失而崇丕業耳臣謂陛下當奉若天意追咎已然凡所致寇之由悉已詳知其故將革前弊以消羣疑今承徳音尚襲流誤若未悔禍何由弭災臣獲蒙過知又辱下問若務順旨是為欺天庸敢指陳庶裨闕漏往嵗初奮師旅四征不庭義烈之徒人思自効捨逆歸款者繼獻于闕下陳謀諫失者争詣于禁門陛下能於此時乗軍氣之方雄因人心之願盡輟沐吐哺虛􅁭坦懐海納風行不疑不滯功者報之義者旌之直者奬之才者任之其或有志而無補於時敢言而不當其理亦必恕其妄作録其善心率皆優容以禮進退如此則海内風靡翕然歸心賢愚咸懐小大畢力蕞爾凶醜曾何足平臣固知久已理安必無奉天之幸矣其所以孕禍胎而索義氣者在乎獨斷宸慮專任睿明降附者意其窺覦輸誠者謂其遊說論官軍撓敗者猜其挾姦毁沮陳兇黨强狡者疑其為賊張皇獻計者防其漏言進諫者憚其宣謗凡此之類悉貽聖憂咸使拘留謂之安置或詰責而寘於客省或勞慰而延于紫庭雖呵奬頗異其辭然於圏閑一也既杜出入勢同狴牢解釋無期死生莫測守䕶且峻家私不通一遭縶維動歴年嵗想其痛憤何可勝言由是歸化漸稀而上封殆絶矣徇義之心既阻脅從之黨彌堅而貴近之臣往来之使希望風旨詭辭取容唯揣樂聞不憂失實咸言聖謀深逺策略如神小寇孤危滅亡無日陛下急於誅惡皆謂其事信然窮兵竭財坐待平一人心轉潰寇亂愈滋遂至轂下生戎宫闈不守儻陛下能於此際遽敷大號謝過萬方敘忠良見忌之冤而舉其尤鯁亮者加之厚秩糾阿䛕不實之罪而數其極姦妄者處之大刑賞罰既明忠邪畢辨以此臨下誰敢不誠以此懐人何有不服過而能改亂亦遄安臣固知尋復京師必無梁岷之遊矣陛下既闕慎于始又失圖于中收之西隅唯在兹日豈可復使一事紕繆一言過差哉今賊泚未平懐光繼叛都邑城闕猰㺄迭居闗輔郊畿豺狼雜處朝廷僻介于逺郡道路縁歷於連山杖策從君其能有幾推心降接猶恐未多稍不禮焉固不来矣若又就加猜劾且復囚拘使反者得辭来者懐懼則天下有心之士安敢復言忠義哉卵胎不傷麟鳳方至魚鼈咸若龜龍乃遊盖恱近者来逺之資懐小者致大之術也竊料邢建等軰必非助逆之徒假如過有張皇跡渉疑似亦望矜愚惜體屈法裕人並量器能隨事甄貸武者措之於戎伍文者付之於宰司大則授以職員次但優其選序必有須離行在難處親軍則或除諸道一官或委諸使録用就其常分各稍加恩古人有言撫我則后虐我則讎惠澤所及謳歌乃歸流聞四方孰不欣戴昔趙殺鳴犢聖人輟行燕尊郭隗賢士繼往況乎天子所作天下式瞻一言阻物則天下莫不自疑一事恤人則天下莫不同恱固不可以小失為無損而不悔亦不可以小善為無益而不行小猶慎之矧又非小願陛下惟事無大小皆以覆車之轍為戒實宗社無疆之休謹奏翰苑集巻十五
