body:
  text: 翰苑集巻二十唐陸贄撰中書奏議四請還田緒所寄撰碑文馬絹狀馬一匹并鞍絹二千匹右田緒使節度隨軍劉瞻送書與臣其書意縁奉進止令為其亡父承嗣撰遺愛碑文故送前件馬絹等以申情貺臣先奉恩㫖令撰碑文於今半年竟未綴緝良以勸戒之道忠義攸先襃貶之詞春秋所重爵位有僥倖而致名稱非詐力可求将使循軌轍者畏昭憲而莫渝怙姦妄者顧清議而知恥仲尼修春秋而亂臣賊子懼豈必臨之以武脅之以刑哉襃貶茍明亦足助理田承嗣阻兵犯命靡惡不為竟逭天誅全歸土壤此乃先朝所愧恨義士所惋嗟今田緒尚干宸嚴請頌遺愛微臣隘跼實憤於心謬承恩光備位台輔既未能滌除姦慝匡益大猷而又飾其愧詞以贊兇徳納彼重賂以襲貪風情所未安事固難强是以屢嘗執翰不能措詞輒投所操太息而止縁承聖誨姑務懷柔昨見田緒使人臣亦婉為報答但告云所為碑頌皆奉德音既異私情難承厚貺候稍休暇續當撰成既無拒絶之言計亦不至疑阻其來書謹封進所送馬及絹等令劉瞻便領却迴訖不敢不奏謹奏請依京兆所請折納事状京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉勑宜依度支續奏稱據時估豌豆毎斗七十價巳上大豆每斗三十價已下京兆府所請將大豆替豌豆望令據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟蜮為殃豌豆全損檢覆若非虚謬地稅固合免徵直道而行大體斯在府司折納充數已為尅下從權度支準估計錢乃是幸災規利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚微舊例所支唯充畜料凖數迴給大豆諸司誰曰不然計價剩徵義將安在理無所據事不可從望依前勅處分未審可否議汴州逐劉士寧事狀右希顔奉宣聖旨適得李萬榮奏劉士寧因出遊獵三軍將士遂閉城門不放入發遣令赴朝廷萬榮安撫軍州今已寧帖卿等宜知悉者伏以劉士寧昏荒暴慢惡貫久盈聖情愛人久為含忍親離衆叛自取奔亡不勞師徒克靖方鎮㳟承宣諭欣賀實深然梁宋之間地當要害鎮壓齊魯控引江淮得其人則安則强失其人則危則弱今士寧見逐雖是衆情萬榮搃軍且非朝旨此亦安危强弱之機也陛下審之慎之或恐奏事之人茍私所奉之將妄陳體勢輒欲徼求承前授任失宜多為此輩所誤假使心無詐㒺其如識乏經通與之籌量鮮不撓敗今軍州既定足得安詳望且選一朝臣馳往宣勞更淹旬日徐察事情見情而後圖之則冀免有差失候至坐日續更面陳謹先狀以聞謹奏請不與李萬榮汴州節度使状右希顔奉宣進止萬榮安撫有功聞亦忠義甚得衆心若更淹遲却恐事不穩便今商量除一親王充節度使且令萬榮知留後其節度制便從内出萬榮須與改官卿等即商量進來者臣性習懦頑藝識空乏辱當奨任待罪宰司事關安危不敢容黙雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之險地則覆致之夷地則平材如負焉唯在所授授踰其力則踣授當其力則行故負重者不可以微劣勝器大者不可以輕易處有巨力而加重負猶懼蹶跌之不虞擇安地而寘大器尚慮傾覆之難備焉有委非所任置非所安而望其不顚不危固亦難矣劉士寧窮兇極暴衆所不容李萬榮因人之心閉城拒逐為國除害亦有可嘉誠宜星夜上聞請擇節将今所陳奏頗渉張皇但露徼求之情殊無退讓之禮據兹鄙躁殊異純良又聞本是滑人偏厚當州將士與之相得纔止三千諸營之兵已甚懷怨據此頗僻亦非將材且邀君而力取其位不忠逐帥而謀代其權不義犯此二者而加之非材得志驕盈不悖則敗悖謂犯上敗謂僨軍俱為厲階莫見其可今雖遽加寵命務饜貪求曲示保持冀消㓙慝然其所行不遜所得無名縱之則反側而益疑奪之則觖望而肆惡夫善始而克終者猶寡况始於不善而求能以義自全者乎又縁嘗自蓄謀以危主將及居人上恒恐見圗必於部校之間多有疑阻之釁上下猜貳何能久安縱未干紀亂常亦必喪師蹙境所以承前方鎮之任選建才徳而不副所委者則有矣其不由才徳而授終能殿邦固節者未之有也是猶置器欲安而不擇可安之勢負重欲濟而不量可濟之材處非所宜不敗何待陛下若謂臣說體迂濶有異軍機引喻乖疎不同事實臣請指陳汴宋一管近代成敗之跡皆陛下之所經見者以為殷鑒惟陛下覽而察之往者田神功作鎮河南領汴宋徐泗兖鄆曹濮八州之地兵食兼足職貢備修左肅青齊右弭滑魏南控淮浙北輔滎瀍殷如長城不震不竦此由制置於可安之地付授得可濟之材其為利冝斯謂大矣及神功入覲遘厲不還先皇帝示眷悼之優崇貪因循之便易知神玉才不勝任排衆議而竟授之既而維御無方經略失制權歸豪將勢散列城禍機一興内叛外破委三軍於暴帥陷五郡於匪人轉輸所經塗路亟阻此由制置於必危之地付授於必躓之才其為敗傷亦已甚矣近者劉元佐驅攘巨猾厎復大梁即鎮如兹幾將十載雖不能勤身節用以撫疲甿畢力竭誠以揚丕烈然尚號令由已部屬畏威緝修戎旅振耀聲勢逺邇談矚且為完軍制持東方猶有所倚及元佐殂沒朝廷命吴湊代之士寧兇頑輙敢眦睚素非得衆且甚不材緩之旬時必自離沮隨機制馭指顧可平陛下念深黎元姑務容養適使姦徒得計庸豎作狂但肆醜厲之詞豈懷任置之恵運路幾絶生人重殘殷然垣翰之軍鞠為汙染之俗追思致患之本豈不失於茍且哉今若又授萬榮則與士寧何異負力而取誰曰不然邀取而除孰為非據茍邀則不順茍允則不誠君臣之間勢必嫌阻與其圗之於滋蔓不若絶之於萌芽忘久逺而樂因循固非英主御天下長筭逺慮之計也且為國之道以義訓人將教事君先令順長用能弭爭奪之禍絶窺覬之心聖人所以興敬譲而服暴强禮達而分定故也假使士寧為將慢上虐人萬榮懷奉國之誠稟嫉惡之性棄而違之斯可矣討而逐之亦可矣謀其帥而篡其位則不可焉何者方鎮之臣事多専制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非獨長亂之道亦開謀逆之端四方諸侯誰不解體得一夫而喪羣帥其何利之有焉矧兹一夫猶未可保徒亂風教以生人心昨者所逐士寧蓋起於倉卒諸郡守將固非連謀一城師人亦未協志況又待之不一撫之不均黨助萬榮其能有幾仍各計度於成敗之勢迴遑於逆順之名安肯捐軀與之同惡今所以未即變者皆為萬榮所誘許其賞給貨財且相服從以候制㫖陛下但於文武羣臣之内選一和恵寛敏素為軍旅所愛信者命為節度仍降優詔慰勞彼軍奬萬榮以撫定之功别加寵任襃將士以輯睦之義厚賜資装衆知保安人且懷恵舎此助亂更將何求揆其大情理必寧息萬榮縱欲跋扈勢何能為三軍既自離心列城又不為援縁其迫逐主將諸道必復憎嫌邇無所親逺無所與不勞天討必自殲夷陛下何所為虞而欲受其邀致臣雖孱怯竊有未安昨因希顔宣㫖却迴已與趙憬等同附口奏展轉申吐慮多闕遺臣更通夕詳思恐亦無易於此不勝拳拳愚懇謹復密啓以聞如䝉聖㤙察納臣即與趙憬等商量應須處置事宜具作條件聞奏儻後事有愆素臣請受敗撓之罪謹奏論度支令京兆府折稅市草事狀度支奏縁當年稅草支用不充諸場和市所得又少所以毎至秋夏常有欠闕請令京兆府折今年秋稅和市草一千萬束便令人户送入城輸納毎束兼車脚與折錢二十五文既利貧人兼濟公用希顔奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非宜曷由無擾臣等毎承睿㫖常以百姓為憂審知事不可行安敢黙而無述毎年蓄聚芻藁所司素有恒規計料稅草不充即便開場和市既優價直復及農収人皆樂輸事不勞擾陛下追想往年之事豈嘗有縁草不足上關宸慮者乎延齡欲􅃷已能頗隳舊制茍收經費之用以資贏羡之功遂使儲備空虛支計寥落廐圉告闕頻煩聖聦去歳已然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徵地稅草數毎年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納唯二百三十萬而已百姓般運已甚艱辛常迫春農僅能得畢今若更徵一千萬束仍令並送入城即是一年之間併徵三年稅草計其所加車脚則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於途程徃復理須淹厯歳時牛廢耕犂人妨播植東作既闕西成曷期况烝黎之間貧富不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徵稅草買草價必倍髙是使豪富之徒乘急令以邀其利窮乏之軰因暴斂以毁其家非所謂均節財物凖平賦法之術也臣等又勘度支京兆比來雇車估價及所載多少大率毎一車載一百二束毎一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設令逺近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計般運已當三十有五文買草本價又更半之而度支曽不計量自我作古徑以胷臆斟酌限為二十五文謂之加徵則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈如官自置埸要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徵固不同等幸有舊制足可遵行何必捨易而即難棄利而從害臣誠暗滯未見其宜伏望戒勅度支令依舊例和市承前既有恒用以後不得闕供稍峻隄防使知懍懼妄作但不施用歳計必免愆違陛下若以軍廐之中馬畜漸衆度支所營藁芻纔可供給當年或慮水旱不虞别須蓄積為備今屬歳稔亦是其時但要收斂有方不宜科配致擾若度支併市延齡必復辭難須有區分使之均濟望委京兆尹勾當别和市草五百萬束以充貯備其所和市並隨要便官自置場毎場貯錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數内以給用不盡者充毎市滿十萬束一度聞奏便以府司郵遞車牛并更雇脚相添轉徙場所般載送付苑中輸納如䝉聖㤙允許臣即依此宣行既免擾人又不増費以資儲蓄足禦㓙災度支謹守恒規亦自不闕常用臣等商度将為合宜謹録奏聞伏聽進止論左降官准赦合量移事状右竄謫之徒皆在遐僻或廹於衰暮顧景思還或困於瘴癘翹心望徙既關霈澤許以量移企躍之情逺想可見若准所司舊例須俟州府錄申盤勘檢尋動踰年歳上稽恤宥之㫖下虧慶頼之心臣等商量恐須釐革望令所司據承貞元六年恩赦檢勘已量移未量移官及貞元六年恩後左降官等除遷改亡歿之外具名銜及貶責事由年月速報中書門下不須更待州府申請臣等據所司報到則便進擬不出歳内冀悉霑恩未審可否謹録奏聞伏聽進止再奏量移官狀右伏以國之令典先徳後刑所後者法當舒遲故決罪不得馳驛行下所先者體宜疾速故赦書日以五百里為程誠以聖王之心務𢎞慶恵必迴翔於行罰而企躍於舒恩不加罰於典法之外不虧恩于徳令之内則受責者莫得興怨荷貸者咸思自新所謂威之斯懲宥之斯感懲以致理感以致和致理則尊致和則愛為人父母必在兼行陛下徳配上元澤流下土頃因郊祀普降鴻恩凡是貶責之人並許量移近處臣等任叨輔翼職在宣行尋具奏聞請便進擬聖心精一務欲均齊令待所司檢尋一時類例處分其左降官内或罪非可棄才有足甄亦許别狀商量不拘常例奨用臣等據所司檢勘左降官及流人送名到者都比擬量移及别追用分為三状前月十二日封進其流人量移状已䝉印出行下訖餘兩状至今未奉進止竊以赦書宣布僅欲半年若更淹遲恐乖事體又諸州刺史及臺省官等繼有事故頗多缺員睿㫖精於選求至今常不充備以眚掩徳見非古人録用棄瑕允歸聖造願廣含𢎞之美庶増誘掖之途謹奉状陳聞伏聽進止三進量移官状右希顔奉宣進止舊例左降官毎准恩赦量移不過三百五百里今度進擬稍似超越又多是近兵馬處及當路州縣事非穏便宜更商量伏以罰宜從輕赦宜從重所以昭仁恕之道廣徳澤之恩也夫位尊者其恵不可以不重言大者其實不可以不豐位尊而恵輕則體非宜言大而實寡則人失望陛下躬行盛禮渙發徳音念謫居之荒遐哀負累之沉棄俾移近處将合新恩赦令初行室家相慶恵亦至矣言亦大矣竊料竄逐窮僻喜聞霈澤降臨固必破産以飾行装計日而俟休命荏苒淹息復經半年儻又所移之官還與舊任隣近竊恐乖陛下垂愍之意虧制書行慶之恩口恵重而事實輕非所以掦鴻休而布大信也謹按承前格令左降官非元勅令長任者毎至考滿即申所司量其舊資便與改叙縱或未有遷轉亦即任其歸還逮于開元末李林甫固權専恣凡所斥黜類多非辜慮其却廻或復寃訴遂奏左降官考滿未别改轉者且給俸料不湏即停外示優矜實欲羈係從此已後遂為恒規一經貶官便同長往迴望舊里永無還期縱遇非常之恩許令移逺就近雖名改轉不越幽遐或自西徂東或從大適小時俗之語謂之横移馴致忌尅之風積成天寳之亂展轉流弊以至於今天下咸病此法深苛而不能改從舊典者良以猜嫌之慮易惑上心将謂負譴之人悉包樂禍之意已經黜責遂欲隄防故髙論則痛嫉林甫之陰邪而密網則習行林甫之弊法憸邪為蠧乃至於斯然則左降永絶於歸還量移不離于僻逺蓋是姦臣詭計殊非國典舊章且貶黜之中情状各異犯有輕重責有淺深固非盡是回邪皆須備慮王者之道待人以誠有責怒而無猜嫌有懲沮而無怨忌斥逺以儆其不恪甄恕以勉其自新不儆則浸及威刑不勉則復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進叙人知復用誰不増修何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦兇恒處防閑之中長從擯棄之例則是悔過者無由自補藴才者終不見伸凡人之情窮則思變含悽貪亂或起於兹雖則何患能為亦足感傷和氣謂非帝王開懷含垢之大體聖哲誘人遷善之良圗也臣等昨進擬商度非不精詳既審事宜亦尋舊例參求折衷兼務齊平大約所擬之官各移近地一道郡邑稍優於舊任官資序進於本銜並無降差亦不超越其有累經移改已至關畿則但以大州増其常秩所冀人皆受賜施不失平上副鴻恩下塞延望纔將得所殊匪為優今若裁限所移不過三五百里則有改職而疆域不離於本道遷居而風土反惡於舊州徒有徙家之勞是増移配之擾又當今郡府多有軍兵所在封疆少無舘驛應合量移之例約有二百許人道路須訃其逺邇之差州縣則校其髙下之等若必選非當路復不近兵則恐類例失倫署置偏併示人疑慮體又非𢎞幸希聖聦更賜裁審其擬官状並未敢改革謹重封進伏聽進止請邊城貯備米粟等状右兵之所屯食最為急若無儲蓄是棄封疆自昔敗亂之由多因餽餉不足臣以任當體國職合分憂奏減河運脚錢用充軍鎮和糴幸䝉聖恩允許又屬頻歳順成二年之間㳂邊諸軍共計收糴米粟一百八十餘萬石準元敇各委當道節度及監軍中使度支知巡院官同勾當檢納仍以貯備軍糧為名非縁城守乏絶及不承别敇處分並不得輙有費用若能堅守此制有用隨即却填則是邊城當貯十五萬人一歳之糧以為急難之備永無懸絶足固軍情去歳版築五原大興師旅所司素無備擬臨事支計缺然齎送悉貸此糧乃得軍行辦集過事之後准敇合填迨今二年竟不支遣加以諸鎮軍食例皆闕供及其告急上聞宣㫖下迫則又請貸貯粟以充将士月糧既務廢隳且無愧畏所未匱竭其能幾何夫栽植至難毁拔至易古人以植楊為喻能不為之歎惜哉况水旱流行固宜有備戎狄為患可不為虞將欲安邉先宜積穀今當嵗稔令益軍儲反罄聚蓄之資用供朝夕之費儻遇災難則如之何惟陛下詳思後圗不貽他日所悔臣之願也疆場之幸也不勝區區慮患之意謹冒昧以聞謹奏翰苑集巻二十
