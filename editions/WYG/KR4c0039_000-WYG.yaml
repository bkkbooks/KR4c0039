body:
  text: 翰苑集别集類一唐提要臣等謹按翰苑集二十二巻唐陸贄撰贄事蹟具唐書本傳按藝文志載贄議論表疏集十二巻又翰苑集十巻常䖏厚纂陳振孫書録觧題載陸宣公集二十二巻中分翰苑榜子為二集其目亦與史志相同惟晁公武讀書志所載乃袛有奏議十二巻且稱舊有榜子集五巻議論集三巻翰苑集十巻元祐中蘇軾乞校正進呈改從今名疑是裒諸集成此書與史志名目全不相合今考尤袤遂初堂書目所列實作翰苑集而錢曽讀書敏求記載所見宋槧大字本二十二巻者亦作翰苑集則自南宋以後已合議論表疏為一集而總題以翰苑之名公武所見乃元祐本恐非全冊而今世刋行贄集亦有題作陸宣公奏議者則又沿讀書志而失之者也宋祁作贄傳賛稱其論諫數十百篇譏陳時病皆本仁義炳炳如丹青而惜徳宗之不能盡用故新唐書例不録排偶之作獨取贄文十餘篇以為後世法司馬光作資治通鑑尤重贄議論採奏疏三十九篇其後蘇軾亦乞以贄文校正進讀盖其文雖多出于一時􅋌救規切之語而于古今來政治得失之故無不深切著明有足為萬世龜鑑者故厯代寳重焉贄尚有詩文别集十五巻乆佚不傳全唐詩所録僅存試帖詩三首及語林所載逸句然經世有用之言悉具是書其所以為贄重者固不必在雕章繪句之末矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士􅐧總校官臣陸費墀欽定四庫全書集部二翰苑集目錄别集類一唐巻一制誥奉天改元大赦制平朱泚後車駕還京大赦制巻二制誥貞元改元大赦制冬至大禮大赦制巻三制誥貞元九年冬至大禮大赦制蝗蟲避正殿降免囚徒徳音誅李懐光後原宥河中將吏幷招諭淮西詔誅李希烈後原宥淮西將吏幷授陳仙竒節度詔重宥淮西將士詔巻四制誥賑䘏諸道將吏百姓等詔優䘏畿内百姓幷除十縣令詔重優復興元府及洋鳯等州百姓詔議減鹽價詔賜京城及同華等州百姓種子賑給貧人詔賜將士名奉天定難功臣詔改梁州為興元府升洋州為望州詔巻五制誥奉天遣使宣慰諸道詔收復京師遣使宣慰將吏百姓詔平淮西後宴賞諸軍將士放歸本道詔加王武俊李抱真官封幷招諭朱滔詔招諭淮西將吏詔招諭河中詔安撫淮西歸順將士百姓勅甄奨陷賊守節官詔令百寮議大禮期日詔不許諸軍侵擾勅放淮西生口歸本貫勅令諸道募靈武鎮守人詔巻六制誥冊淑妃王氏為皇后文冊嘉誠公主文冊蜀王妃文冊杞王妃文告謝昊天上帝冊文告謝元宗廟文告謝肅宗廟文告謝代宗廟文祭大禹廟文制策問賢良方正能直言極諌科制策問博通墳典逹於教化科制策問識洞韜略堪任將帥科答宰臣請停大禮表答百寮請停大禮表答第二表答第三表答百寮賀利州連理木表答宰臣請復御膳表答百寮請復御膳表巻七制誥李晟司徒兼中書令制蕭復劉從一姜公輔平章事制張延賞中書侍郎平章事制渾瑊侍中制盧翰劉從一門下中書侍郎平章事制劉滋崔造齊映平章事制李納檢校右僕射平章事制韓滉檢校左僕射平章事制李勉太子太師制姜公輔左庶子制崔造右庶子制盧翰太子賔客制巻八制誥賈耽東都留守制崔縱東都留守制普王荆襄江西等道兵馬都元帥制馬燧渾瑊副元帥招討河中制李晟鳯翔隴西節度兼涇原副元帥制劉洽檢校司空充諸道兵馬都統制巻九制誥渾瑊京畿金商節度使制杜亞淮南節度使制䖍王申光随蔡等州節度使制唐朝臣振武節度使論惟明鄜坊觀察使制韓滉加檢校右僕射制嘉王横海軍節度使制馬燧李臯賜實封制韓滉度支鹽鐵轉運等制李叔明右僕射制李澄贈司空制除鄧州歸順官制李納檢校司空制巻十制誥賜李納王武俊等鐵券文賜安西管内黄姓纛官鐵券文慰問四鎮北庭將吏勅書與回紇可汗書賜吐蕃將書賜吐蕃宰相尚結贊書三巻十一奏草論兩河及淮西利害狀論闗中事宜狀巻十二奏草論敘遷幸之由狀奉天論奏當今所切務狀奉天論前所答奏未施行狀巻十三奏草奉天請數對羣臣兼許令論事狀奉天論尊號加字狀重論尊號狀奉天論赦書事條狀巻十四奏草奉天論擬與翰林學士改轉狀奉天請罷瓊林大盈二庫狀奉天論觧蕭復狀奉天薦袁高等狀奉天論李晟所管兵馬狀奉天奏李建徽揚惠元兩節度兵馬狀駕幸梁州論進獻𤓰果人擬官狀又論進𤓰果人擬官狀巻十五奏草興元論觧姜公輔狀又答論姜公輔狀興元論請優奬曲環所領將士狀興元論觧蕭復狀又答論蕭復狀興元論續從賊中赴行在官等狀巻十六奏草興元賀吐蕃尚結贊抽軍迴歸狀興元奏請許渾瑊李晟等諸軍兵馬自取機便狀興元請撫循李楚琳狀興元論中官及朝官賜名定難功臣狀興元論賜渾瑊詔書為取散失内人等議狀鑾駕將還宫闕論發日狀請釋趙貴先罪狀論替換李楚琳狀收河中後請罷兵狀巻十七中書奏議請許臺省長官舉薦屬吏狀請遣使臣宣撫諸道遭水州縣狀論淮西管内水損處請同諸道遣宣慰使狀謝宻㫖因論所宣事狀巻十八中書奏議論嶺南請於安南置市舶中使狀論宣令除裴延齡度支使狀論齊映齊抗官狀請減京東水運收脚價於縁邉州鎮儲蓄軍糧事宜狀巻十九中書奏議論縁邉守備事宜狀商量處置竇參事體狀奏議竇參等官狀請不簿録竇參莊宅狀巻二十中書奏議請還田緒所寄撰碑文馬絹狀請依京兆所請折納事狀議汴州逐劉士寧事狀請不與李萬榮汴州節度使狀論度支令京兆府折税市草事狀論左降官準赦合量移事三狀論邉城貯備米粟等狀巻二十一中書奏議論裴延齡姦蠹書一首論朝官闕員及刺史等改轉倫序狀巻二十二中書奏議均節賦税恤百姓六條翰苑集原序嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聰而盡其善排羣議而試厥謀道之難行亦已久矣東陽綘灌何代無之嘻一薫一蕕善齊不能同其器方鑿圎枘良工無以措巧心所以理世少而亂日多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿呉郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸夀春刺史張鎰有名於時一獲晤言大加賞識暨别鎰以泉貨數萬為賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而已是嵗以書判拔萃調渭南簿本傳作尉御史府以監察换之徳宗皇帝春宫時知名召對翰林即日為學士由祠部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機㑹倉卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶㡬羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以徳宗克平寇亂不惟神武之功爪牙宣力葢亦資文徳腹心之助焉及還京師李抱真来朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也公自行在帶本職拜諌議大夫中書舍人精敏小心未嘗有過艱難扈從行在輒隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職内署母韋氏尚在呉中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩附𦵏河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子為之興改容叙弔優禮如此内外屬望旦夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉茍且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦䛕從而間之屢至不悦親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在徳宗實録及竇參納劉士寧之賂為李巽所發得罪左遷横議者以公與參素不協歸罷相之議於公户部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士呉通元忌公先逹每切中傷隂結延齡互言公短宰相趙憬公之引拔升為同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公為賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州别駕上怒不可測賴陽城張萬福救之獲免蜀帥韋令抗表請以贄代已嵗賂資糧公在南賔閉門却埽郡人稀識其靣復避謗不著書惟考校醫方撰集驗方五十巻行於世江峡十稔永貞初與鄭餘慶陽城同徵還公已薨殁時年五十二公之秉筆内署也搉古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫増氣則有制誥集一十巻覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七巻覽公之奏則知公之為臣也其在相位也推賢與能舉直措枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊説争衡考其文也與典謨接軫則有中書奏議七巻覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟惟公才不謂不長位不謂不逹逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏争列盖道未至也應之曰道雖在我𢎞之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者盖時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五巻其闗於時政昭昭然與金石不朽者惟制誥奏議乎雖已流行多謬編次今以類相從􅃣于編首兼略書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟唐權徳輿撰宋進呈奏議劄子元祐八年五月七日蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空疎備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經効於世間不必皆從於已出伏見唐宰相陸贄才本王佐學為帝師論深􅋀於事情言不離於道徳智於子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時徳宗以苛刻為能而贄諌之以忠厚徳宗以猜疑為術而贄勸之以推誠徳宗好用兵而贄以消兵為先徳宗好聚財而贄以散財為急至於用人聴言之法治邉馭將之方罪已以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使徳宗盡用其言則貞觀可得而復臣等每退自西閤即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄靣反復熟讀如與贄言必能發聖性之髙明成治功於嵗月臣等不勝區區之意欽定四庫全書翰苑集巻一唐陸贄撰制誥赦宥上
