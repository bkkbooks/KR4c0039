  text: 唐陸宣公集卷第十七中書奏議卷第一
  hash: sha256:3e6e9d9e9c57682231a17da4d2b1d014369afcbf4424d2e13a12bfb07aaac55f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_017-1a}
body:
  text: 請許臺省長官舉薦屬吏狀請遣使臣宣撫諸道遭水州縣狀論淮西管内水損處請同諸道遣宣慰使狀謝宻㫖因論所宣事狀請許臺省長官舉薦屬吏狀今月十七日顧少連延英對迴奉宣宻㫖卿先奏令臺省長官各舉屬吏近聞外議云諸司所舉皆有情故兼受賄賂不得實才此法甚非穩便巳後除改卿宜並自揀擇不可信任諸司者臣以闇劣謬當大任果速官謗上貽聖憂過蒙恩私曲降􅄌誨感戴循省寢興不寍緣是宻旨特宣不敢對衆陳謝祇禀成命所宜必行恭惟聖規又合無隱苟有未達安敢勿言雖知塵煩固不可巳夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧偽䌓興而貞方之人罕進狥聲華則趨競彌長而沈退之士莫升自非素與交親備詳本末探其志行閲其器能然後守道藏用者可得而知沽名飾貌者不容其偽故孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里舉選之法長吏辟署之制所以明厯試廣旁求敦行能息馳騖也昔周以伯冏為太僕命之曰愼柬乃寮罔以巧言令色便僻側媚其惟吉士是則古之王朝但命其大官而大官得自柬僚屬之明驗也漢朝務求多士其選不唯公府辟召而巳又有父任兄任皆得為郎選入之初雜居三署臺省有闕即用補之是則古之􅀰官皆以任舉充選此其明驗也魏晉已後曁於國初採擇庶官多由選部惟高位重職乃由宰相考庶官之有成效者請而命焉故晉代山濤為吏部尚書中外品員多所啟授宋朝以蔡廓為吏部尚書郎先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答云黄散巳下悉委蔡廓猶憤恚以為失職遂不之官是則黄門散騎侍郎皆由吏部選授不必朝廷列位盡合柬在臺司此其明驗也國朝之制庶官五品巳上制敕命之六品巳下則並旨授制敕所命者蓋宰相商議奏可而除拜之也旨授者蓋吏部銓材署職然後上言詔旨但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刋未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序倖臣專朝舍僉議而重已權廢公舉而行私惠是使周行庶品苟不出時宰之意者則莫致焉任衆之道益微進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉凌遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熙固亦難矣臣實駑鈍一無所堪猥􅀩任使待罪宰相雖懷竊位之懼且乏知人之明自揣庸虛終難上報惟廣求才之路使賢者各以彙征啟至公之門令職司皆得自達臣當謹守法度考課百官奉揚聰明信賞必罰庶乎人無滯用朝不乏才以此爲酬恩之資以此爲致理之具爰初受命即以上陳求賢審官粗立綱制凡是百司之長兼副貳等官及兩省供奉之職并因察舉勞效須加􅅄任者並宰臣敘擬以聞其餘臺省屬僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各於除書之内具摽舉授之由示衆以公明章得失得賢則進考增秩失實則奪俸贖金亟得則褒升亟失則黜免非止搜揚下位亦可閲試大官前志所謂達觀其所舉即此義也自􅀩允許即以宣行南宫舉人􅂊至十數或非臺省舊吏則是使府佐僚累經薦延多厯事任議其資望旣不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聰道之難行亦可知矣陛下勤求理道務循物情因謂舉薦非宜復委宰臣揀擇其為崇任輔弻博採輿詞可謂聖德之盛者然於委任責成之道聽言考實之方閑邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人愼謀其始旣謀其始詳慮其終終始之閒事必前定有疑則物果於用旣用則不復有疑待終其謀乃考其事事愆于素者革其弊而黜其人事協于初者賞其人而成其美使受賞者無所與讓見黜者莫得為辭夫如是則苟無其才孰敢當任苟當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實虛受廣納􅀪接下之規明目達聰廣濟人之道欲知事之得失不可不聽之於言欲辯言之眞虛不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徵行善之跡論人之惡者必明辨爲惡之端凡聽其言皆考其實旣得其實又察以情旣盡其情復稽於衆衆議情實必叅相得然後信其說奬其誠如或矯誣亦寘明罰夫如是則言者不壅聽者不勞無浮妄亂敎之談無陰邪傷善之說無輕信見欺之失無濳陷不辨之􅁈此古之聖王聽言考實不出戸而知天下之方也陛下旣納臣言而用之旋聞横議而止之於臣謀不責成於横議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸􅀋而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恒必由之昔齊桓公將啟覇圖問管仲以害覇之事管仲對曰得賢不能任害覇也任賢不能固害覇也固始而不能終害覇也與賢人謀事而與小人議之害覇也所謂小人者不必悉懷險詖故覆邦家蓋以其意性憸邪趣尚狹促以沮議為出衆以自異為不羣趨近利而昧逺圖效小信而傷大道故論語曰言必信行必果硜硜然小人也夫以能信於言能果於行唯以硜硜淺近不克􅀪通宣尼猶謂其小人管仲尚憂其害覇況又有言行難保而恣其非心者乎此皆任不責成言不考實之􅁦也聖旨以謂外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閲實謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦贓不加辯詰私其公議不出主名使無辜見疑有罪􅀗縱枉􅀡同貫人何賴焉聖㫖又以官長舉人法非穩便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能徧諳多士備閲羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明􅆒以暗投儻如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失人之􅁦必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其􅁦非逺聖鑒明知今又將徇浮言專任宰臣除吏宰臣不徧諳識踵前須訪於人若訪於親朋則是悔其覆車不易前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官愼柬僚屬所柬既少所求亦精得賢有鑒識之名失實當闇謬之責人之常性莫不愛身況於臺省長官皆是當朝髙選孰肯狥私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則往日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行業頓殊豈有為長官之時則不能舉一二屬吏居宰臣之位則可擇千百狊寮物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人於不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失􅀋以􅀋則詳知實行有倫則杜絶徼求將務得人無易於此是故選自卑遠始升於朝者各委長吏任舉之則下無遺賢矣寘於周行旣任以事者於是宰臣序進之則朝無曠職矣才德兼茂厯試不渝者然後人主倚任之則海内無遺士矣夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也考精在於按名責實宰臣之序進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則苟取備員是以考課之法不暇精也考不精則能否無別能否無別則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格浸微是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益麤塞源浚流未見其可臣欲詳徵舊説伏恐聽覽為煩粗舉一端以明其理往者則天太后踐祚臨朝欲收人心尤務㧞擢􅀪委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輒試其於選士之道豈不傷於容易哉然而課責旣嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明累朝頼多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寶厯思致理平雖好賢之心有踰前哲而得人之盛未逮往時蓋由鑒賞獨任於聖聰搜擇頗難於公舉但速登延之路罕施練覈之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下愼柬之規太精而失士是知雖易於舉用而不易於苟容則所易者適足廣得人之資不爲害也不精於法制而務精於選才則所精者適足梗進賢之途不爲利也人之才行自昔罕全苟有所長必有所短若録長補短則天下無不用之人責短舍長則天下無不棄之士加以情有憎愛􅃐有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問於孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之蓋以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下愼選宰臣必以為重於庶品精擇長吏必以為愈於末流及至宰臣獻規長吏薦士陛下則但納横議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毁之虛實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而巳乎臣之切言固非為已所惜者致理之道所感者見遇之恩輒因陳謝布露以聞惟陛下幸察謹奏請遣使臣宣撫諸道遭水州縣狀右頻得鹽鐵轉運及州縣申報霖雨為災彌月不止或川瀆汎漲或谿谷奔流淹没田苗損壞廬舍又有漂溺不救轉徙乏糧䘮亡流離數亦非少臣等任處臺輔職調陰陽一物失宜尸曠斯在五行愆度黜責何逃陛下德邁禹湯恕人咎己臣等每奉詞旨倍益慙惶所以僶俛在公不敢頻煩請罪前者面陳事體須遣使撫綏陛下尚謂詢問來人所損殊少即議優䘏恐長姦欺臣等旬日巳求更番借訪􅀋㑹行旅所説悉與申報符同但恐所聞聖聰或未盡陳事實夫流俗之􅁦多徇諂諛揣所悦意者則侈其言度所惡聞者則小其事制備失所恒病於斯初聞諸道水災臣等屢訪朝列多云無害於物以為不足致懷退省其私言則頓異霖潦非可諱之事縉紳皆有識之人與臣比肩尚且相媚况乎事或曖昧人或瑣微以利已之心希至尊之旨其於情實固不易知如斯之流足誤視聽所願事皆覆驗則冀言無詐欺大明照臨天下之幸也昔子夏問於孔子曰何如斯可謂人之父母孔子對曰四方有敗必先知之斯可謂人之父母矣蓋以君人之道子育為心雖深居九重而慮周四表雖恒處安樂而憂及困窮近取諸身如一體之於四支其疾病無不恤也遠取諸物如兩曜之於萬􅀋其鑒照無不均也故時有凶害而人無流亡恃天聽之必聞知上澤之必至是以有母之愛有父之尊古之聖王能以天下為一家中國為一人用此術也今水潦為敗綿數十州奔告于朝日月相繼若哀其疾苦固宜降旨優矜儻疑其詐欺亦當遣使臣巡視安可徇往來之浮説忘惠䘏之大猷失人得財是將焉用况災害已甚申奏亦頻縱不􅀩恩復除自當准式蠲免徒失事體無資國儲恐須速降德音深示憂憫分道命使明敕弔災寛息征徭省察􅁈濫應家有溺死及漂没居產都盡父子不存濟者各量賜粟帛便委使臣與州府以當處官物給付其損壞廬舍田苗者亦委使臣與州府據所損作分數等第聞奏量與蠲減租税如此則殁者􅀩􅄟酹之惠存者霑煦嫗之恩霈澤下施孰不欣戴所費者財用所收者人心若不失人何憂乏用臣等巳約支計所費亦不甚多儻􅀩聖恩允從即具條件續進臣又聞聖人作則皆以天地為本陰陽為端慶賞者順陽之功故行於春夏刑罸者法陰之氣故用之秋冬事或愆時人必罹咎是以月令所載夏行秋令則苦􅀨數來丘隰水潦夏行冬令則後乃大水敗其城郭典籍垂誡言固不誣天人同符理當必應旣有繫於舒慘是能致於災祥頃自夏初大臣得罪親黨坐累其徒實繁邦憲巳行宸嚴未解畏天之怒中外竦然若以月令推之水潦或是其應雖天所降沴不在郊畿然海内為家無論遐邇伏願滌瑕以德消沴以和威惠之相濟合宜陰陽之運行自序臣等不勝覩災慙負之至謹奉狀陳請以聞謹奏論淮西管内水損處請同諸道遣宣慰使狀右奉進止淮西管内貢賦旣闕所緣水損簡擇宣慰使此道亦不要遣去者臣聞聖王之於天下也人有不得其所者若巳納之於隍故夏禹泣辜殷湯引罪蓋以率土之内莫非王臣或有昬迷不恭是由敎化未至常以善救則無棄人自希烈亂常汚染淮甸職貢廢闕責當有歸在於編甿豈任其咎陛下息師含垢宥彼渠魁惟兹下人久罹脅制想其翹望聖化誠亦有足哀傷儻􅀪善救之心當軫納隍之慮今者遣使宣命本緣䘏患弔災諸道災患旣同朝廷弔䘏或異是使慕聲敎者絶望懷反側者得詞棄人而固其㓂讎恐非所以爲計也昔晉饑乞糴于秦大夫百里奚曰天災流行國家代有救災䘏鄰道也行道有福丕豹則請因而伐之穆公用百里奚之言拒丕豹之請且曰其君是惡其人何罪遂輸粟以救之其後秦饑乞糴于晉晉大夫虢射曰無損於怨而益於㓂不如勿與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義不如與之惠公信虢射之謀違慶鄭之議遂閉糴以絶焉是􅀊晉國復饑秦伯又饋之粟曰吾怨其君而矜其人終於秦穆覇强晉惠擒辱是知棄怨而施惠者可以懷敵計利而忘義者罔不失人此乃列國諸侯猶務䘏鄰救災矧君臨天下而可使德澤不均被者乎議者多謂淮右荐饑國家之利臣等愚見以為不然必若興有征之師問不庭之罪因災幸濟巳爽德政儻又難於用兵望其艱窘自􅁦利害之勢或未可知夫悍獸之情窮則攫􅅮暴人之態急則猖狂當其迫阨之時尤資撫馭苟得招攜以禮便可底寍備慮乖方亦足生患竊以帝王之道頗與敵國不同懷柔萬邦唯德與義寍人負我無我􅀒人故能使億兆歸心逺邇從化猶有兇迷不復必當人鬼同誅此其自取覆亡尚亦不足含怒今因供税有闕遂令施惠不均責帥及人恐未為允伏惟聖鑒更審細裁量其所擇諸道使並未敢宣行伏候進止謝宻㫖因論所宣事狀前日顧少連奉諭宻旨每於延英對卿緣有諸人言不得盡中間卿所奏去冬薦人實緣對趙憬執論所以有言相拒亦不是阻卿之意若有要便事但依前者意旨自手疏密封進來卿又頻與苗粲進官朕未放過恐卿未知朕意此人即苗晉卿之子晉卿往年攝政曾有不臣之言又諸子皆與古帝王同名意甚不善緣非諸子之過不欲明行斥逐終是不合令在朝廷卿宜密知此意苗粲兄弟並改與在外閒僻處官仍不得令近兵馬者猥􅀩天􅄌屢降深旨慰眷稠曡誨諭周詳骨肉之恩無以加此士感知已尚合捐軀臣雖孱微能不激勵至於彌綸庶績督課羣官始終不渝夙夜匪懈是皆常分曷足酬恩自揣凡庸之才又無奇崛之効惟當輸罄忠節匡補聖猷衆人之所難言臣必無隱常情之所易溺臣必不回冏然貞心持以上報此愚夫一至而不易者也惟明主矜亮而保容之頃以去冬薦人頻於街衢披訴旣是准制許集理合量才授官進擬再三未􅀩允許伏慮事轉淹滯所以因對奏陳懵於忖量推理輒發以趙憬與臣並命俱掌樞衡參奉謀猷事當無間不知避忌輕黷宸嚴陛下特宥惷愚曲加奬導寵遇踰等恩私倍常顧惟何人叨幸若此偶有所見敢不盡言是彰無隱之誠以申上報之分臣聞王者之道坦然著明奉三無私以勞天下平平蕩蕩無側無偏所謂三無私者如天之無私覆也如地之無私載也如日月之無私照也其或有過如日月之有蝕焉過也人皆見之更也人皆仰之日月不疾於蔽虧人君不吝於過失虧而能復無損於明過而能改不累於德昨者臣所奏惟有趙憬得聞陛下以至勞神委曲防護是於心膂之内尚有形迹之拘職同事殊鮮克以濟恐爽無私之德且傷不吝之明夫元首股肱義實同體諮詢獻納一日萬機宣之使言猶未盡意言若有阻意何由通啟沃旣難機務斯壅雖荷綢繆之顧實増曠廢之憂仰希聖聰更賜裁處苗粲少以門子早登朝班厯拾遺補闕起居員外郎中前後二十餘年温恭有加恪愼無怠端敏足以守職文學足以飾身詳其器能堪處近侍陛下以粲先父常有過言名子之方又乖義􅀋不忍明加斥黜但令改授外官伏以理國化人在於􅅄一善使天下之爲善者勸罰一惡使天下之爲惡者懲是以爵人必於朝刑人必於市惟恐衆之不覩事之不彰君上行之無愧心兆庶聽之無疑義受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也奬而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不明而恩倖之門啟中傷則枉直莫辨而䜛間之道行此柄一虧為害滋大凡是􅉲愬之輩多非信實之言利於中傷懼於公辨或云歳月巳久不可究尋或云事體有妨須為隱忍或云惡跡未露宜假他事為名或云但棄其人何必明言責辱詞皆近於情理意實苞於矯誣傷善售姦莫斯為甚伏惟聖鑒之下必無浸􅃳之流然於稱毁之言不可不辨賞罰之典不可不明陛下若以晉卿跡實姦邪粲等法應坐累則當公議典憲豈令陰受播遷陛下若察晉卿見誣又知粲等非罪則合隨才􅅄用不宜降意猜防今忽不示端由但加斥逐謂之掄材則失序謂之行罰則無名徒使粲等受錮於聖朝晉卿銜憤於幽壤以臣蔽滯未見其宜夫聽訟辨䜛貴於明恕明者在驗之以迹恕者在求之以情迹可責而情可矜聖王懼疑似之陷非辜不之責也情可責而迹可宥聖王懼逆詐之濫無罪不之責也惟情見迹具詞服理窮者然後加刑罰焉是以下無􅁈人上無繆聽苛慝不作敎化以興晉卿起自文儒致位台輔能以謙柔自處故為三朝所推當諒闇之辰攝冡宰之任是將備禮豈足擅權安肯露不臣之言招覆族之釁雖甚狂險猶應不為矧伊老臣寍忍及此假有忍人之意其如言發禍隨求之以情旣無端驗之以迹又無兆宜􅀩昭恕理在不疑又自陛下御極已來粲及兄丕皆厯清近若以舊事為累豈復含容至今恐有無良之徒憎嫉丕粲兄弟造成飛語務欲挫傷大抵任重􅀔疑易生嫌謗以周公之聖不免流言霍光之忠亦遭吿訐向非成王覺寤昭帝保明則二主之德美不傳二臣之􅁈誣莫辨陛下追懷往事得失豈不相遠哉後之視今固亦如此凡所舉措安可不詳伏願稍留睿思特加省察斯實羣臣庶免於戾豈惟苗氏一族存殁幸賴而巳乎少連又向臣説云聖旨察臣􅀌貞猶謂清愼太過都絶諸道饋遺􅁍恐事情不通如不能納諸財物至如鞭靴之􅀋受亦無妨者伏以貨賄之利耳目之娛人間常情孰不貪悦況臣性實凡鄙寍忘顧私家本窶貧安能無欲所以深自刻愼勉脩亷隅者蓋由􅀒戴厚恩尸竊大任旣不克導揚風敎致俗清湻又未能減息征徭濟人窮困若無恥懼更啟賄門是忘憂國之誠仍速焚身之禍由是危行特操杜絶交私誠知無補大猷所冀免貽深累陛下責臣以清愼太過斯謂皇明陛下慮事之不通有乖理道或恐貪惏之輩務逞無厭之求巧陳異端惑亂聖聽稽諸事實則甚不然夫以胥吏末流苞苴微貺苟或違道且猶知慙况乎公卿大臣之間方岳連帥之任豈資納賄然後致誠若因財利交歡是以姑息爲事旣乖直道必有過求遂之則法度浸隳阻之則􅔵望彌甚爲害如此國何賴焉髙祖太宗著法垂制監臨受賄盈尺有刑陛下每發德音敷宥下土大辟之屬皆􅀩滌除唯於犯贓往往不赦豈不以貪饕爲􅁦殘蠧最深至於士吏之微尚當嚴禁矧居風化之首反可通行凡上之所為以導下也上所不為以檢下也上所不為而下或為之然後可以設峻防寘明辟若上為之而下亦為之固其理也又可禁乎今吏有受監臨之賄者則以為罪不可容朝廷之制四方所監臨也而宰司公受其賄是亦無恥而不恕者歟孔子曰大臣不可不敬也是人之表也邇臣不可不愼也是人之道也表傾則影曲道僻則行邪若大臣邇臣可以受財則庶長寀寮孰為不可朝廷取之於方鎮方鎮復取之於州州取之於縣縣取之於鄉鄉將安取哉是皆出於疲人之肝腦筋髓耳自大盗猾夏耗斁生人天下常屯百萬之師坐受衣食農夫􅁞婦凍而織餒而耕殫力忍死以供十倍之賦日日引頸望覩昇平之化惠恤之恩凡四十九年矣荐屬多故有加無瘳持利權食厚祿者當憂隱忸怩憫愧􅀺庶而又交通私賄扇起貪風是令已困之甿重遭過分之擾陛下尚以為鞭靴之􅀋受亦無妨若使天下納賂惟有二三宰臣四方誅求止於鞭靴細物行之不足以傷化絶之不足以利人則臣固已微抑私心將順睿旨矣若使國家致理必資饋遺通情辭之足以失天下之心受之足以濟天下之務則臣固亦不避汙行助我聖功矣臣所以未敢奉詔冒昧塵煩者審知此道不惟於無益必有甚損故也亦冀陛下詳察其理普澄其源􅀪清浄無欲之風守􅄌儉不貪之寶是將感人心而天下服何有事情不通之患乎夫貨賄上行則賞罰之柄失貪求下布則亷恥之道衰何者善惡不分功過無辨者以貨賄之多少為課績之重輕守道闕供或時致怨招累求得當欲可以釋罪賈榮忍行刻剥者見謂公忠巧飾玩好者􅀗稱才智此謂賞罰之柄失也上好利則下思聚斂上求賄則下肆侵蟊不懷愧心但逞私欲遞相企效習以成風閭閻日殘紀綱日壞不可以禮義勸不可以刑法懲此由亷恥之道衰也作法於涼其􅁦猶貪作法於貪其􅁦斯亂利於小者必害於大易於始者必悔於終賄道一開展轉滋甚鞭靴不已必及衣裘衣裘不巳必及幣帛幣帛不巳必及車輿車輿不巳必及金璧目見可欲何能自窒于心巳與交私固難中絶其意是以涓流不止谿壑成災毫末旣差丘山聚釁自昔國家敗亡多矣何嘗有以約失之者乎臣竊料郡府之不願行賄於朝廷猶鄉閭之不願輸貨於郡府也但以行之者有利不行者有虞故為安身保位之謀不得不行耳夫豈樂而行之哉假如四方俱賂於朝廷朝廷受其三而却其一有所受有所􅁍二端相反則遇却者或有意疑乎見拒而不通焉四方俱賂於朝廷朝廷俱辭而不受則咸知不受者乃朝廷之常理耳適所以服其心而誘其善復何嫌阻之有乎陛下若謂問遺可以通物情絜矩不足敦理化則自建中以來股肱耳目之間蓋常有交利行私者矣乃其所也陛下何尤焉陛下嗣位之初躬行節儉郡國無來獻朝廷無私求行李無黷貨之人邇臣無受賂之事四方風動幾致清平旋以刑峻賦繁兵連禍結理功中否至化未凝洎大憝殲夷皇運興復征伐之役頗息於前時清約之風亦虧於往日此則雖革一􅁦亦䘮一美焉曩興師徒人困􅁀賦今罷征伐人困私求是乃殘瘁之餘永無蘇息之望使萬方􅀺獻當陛下休明之代不登富夀不洽雍熙追懷前修實用心􅀬而議者反以納賄通情之理以惑陛下斯不亦誣上行私之甚者乎夫天下公器也王綱大權也執大權者不任其小數守公器者不徇於私情任小數而御大權則忿戾之禍起徇私情以持公器則姦亂之釁生故春秋傳曰在上位者洒濯其心壹以待之而後可以理人言私曲之不可以􅊩衆庶也又曰國家之敗由官邪也官之失德寵賂彰也君人者將昭德塞違以臨照百官百官於是乎戒懼而不敢易紀律言賄利之不可以化百官也又曰長國家者非無賄之難無令名之難諸侯之賄聚於公室則諸侯貳言貪欲之不可以懷諸侯也古之懷諸侯者蓋有其道矣惟不務賄然後得之故禮記云凡為天下國家有九經其一曰理亂持危朝聘以時厚往而薄來所以懷諸侯也是知懷撫之道貴德賤財於往也則厚其贈送之資於來也則薄其䞇幣之禮訓人以尊讓示人以不貪始於朝廷行於郡國亷節之風漸廣侵漁之害不萌里閭􅀗安郡國斯乂郡國旣乂朝廷益尊所謂化自上流理由下濟近者悦服而遠者歸懷是皆無賄之致也及夫王綱浸壞德化陵夷然後滅公議而徇私情盛誅求而崇饋獻故禮記曰天子微諸侯􅆫於是相覿以貨相賂以利而天下之禮亂矣是知傷風害禮莫甚於私􅁀物殘人莫大於賂利於絶私去賄者莫先於君主務於愛人助理者莫切於輔臣然則君主輔臣之閒固不可以語及於私賄矣况又躬行乎臣以受恩特深志欲巨細裨補苟懐疑慮不敢因循亦賴遭逢聖明庶得竭盡愚直所以每事獻替不以犯忤為虞意懇詞繁伏用慙悚謹奏唐陸宣公集卷第十七
