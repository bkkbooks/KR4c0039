body:
  text: 本朝名臣進奏議劄子元祐八年五月七日蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空踈備貟講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所爲􅀼謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若巳經效於世間不必皆從於已出伏見唐宰相陸䞇才本王佐學爲帝師論深切於事情言不離於道德智於子房而文則過辯如賈􅁩而術不踈上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻爲能而䞇諌之以忠厚德宗以猜疑爲術而䞇勸之以推誠德宗好用兵而䞇以消兵爲先德宗好聚財而䞇以散財爲急至於用人聽言之法治邊馭將之方罪已以収人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則正觀可得而復臣等毎退自西閤即私相告言以陛下聖明必喜䞇議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文爲之太息魏相條􅏯董之對則孝宣以致中興􅀂陛下能自得師莫􅀂近取諸䞇夫六經三史諸子百家非無可觀皆足爲治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如䞇之論開卷了然聚古今之精英實治亂之􅀛鑑臣等欲取其奏議稍加校正繕冩進呈願陛下置之坐隅如見䞇面反復熟讀如與䞇言必能發聖性之髙明成治功於歳月臣等不勝區區之意唐陸宣公集目録唐陸宣公集卷第一制誥卷第一奉天改元大赦制平朱泚後車駕還京大赦制唐陸宣公集卷第二制誥卷第二貞元改元大赦制冬至大禮大赦制唐陸宣公集卷第三制誥卷第三貞元九年冬至大禮大赦制蝗蟲避正殿降免囚徒德音誅李懷光後原有河中將吏并招諭淮西詔誅李希烈後原宥淮西將吏并授陳仙竒節度詔重宥淮西將士詔唐陸宣公集卷第四制誥卷第四賑䘏諸道將吏百姓等詔優䘏畿内百姓并除十縣令詔重優復興元府及洋鳯等州百姓詔議減鹽價詔賜京城及同華等州百姓種子賑給貧人詔賜將士名奉天定難功臣詔改梁州爲興元府升洋州爲望州詔唐陸宣公集第五制誥卷第五奉天遣使宣慰諸道詔收復京師遣使宣慰將吏百姓詔平淮西後宴賞諸軍將士放歸本道詔加王武俊李抱眞官封并招諭朱滔詔招諭淮西將吏詔招諭河中詔安撫淮西歸順將士百姓勑甄奬䧟賊守節官詔令百寮議大禮期日詔不許諸軍侵擾勑放淮生口歸本貫勑令諸道募靈武鎭守人詔唐陸宣公集卷第六制誥卷第六􅁽淑妃王氏爲皇后文􅁽嘉誠公主文􅁽蜀王妃文􅁽􅂎王妃文告謝昊天上帝􅁽文告謝玄宗廟文告謝肅宗廟文告謝代宗廟文􅀕大禹廟文制䇿問賢良方正能直言極諫科制䇿問愽通墳典逹於敎化科制䇿問識洞韜略堪任將帥科答宰臣請停大禮表答百寮請停大禮表答第二表答第三表答百寮賀利州連理木表答宰臣請復御膳表答百寮請復御膳表唐陸宣公集卷第七制誥卷第七李晟司徒兼中書令制蕭復劉從一姜公輔平章事制張延賞中書侍郎平章事制渾瑊侍中制盧翰劉從一門下中書侍郎平章事制劉滋崔造齊映平章事制李納檢校右僕射平章事制韓滉檢校左僕射平章事制李勉太子太師制姜公輔左庶子制崔造右庶子制盧翰太子賔客制唐陸宣公集卷第八制誥卷第八賈耽東都留守制崔縱東都留守制普王荆襄江西等道兵馬都元帥制馬燧渾瑊副元帥招討河中制李晟鳯翔隴西節度兼涇原副元帥制劉洽檢校司空充諸道兵馬都統制唐陸宣公集卷第九制誥卷第九渾瑊京畿金商節度使制杜亞淮南節度使制䖍王申光隨蔡等州節度使制唐朝臣振武節度使論惟明鄜坊觀察使制韓滉加檢校右僕射制嘉王橫海軍節度使制馬燧李皐賜實封制韓滉度支鹽鐡轉運等制李叔明右僕射制李澄贈司空制除鄧州歸順官制李納檢校司空制唐陸宣公集卷第十制誥卷第十賜李納王武俊等鐡劵文賜安西管内黃姓纛官鐡劵文慰問四鎭北庭將吏勑書與回紇可汗書賜吐蕃將書賜吐蕃宰相尚結賛書三唐陸宣公集卷第十一奏草卷第一論兩河及淮西利害狀論關中事冝狀唐陸宣公集卷第十二奏草卷第二論叙遷幸之由狀奉天論奏當今所切務狀奉天論前所答奏未施行狀唐陸宣公集卷第十三奏草卷第三奉天請數對羣臣兼許令論事狀奉天論尊號加字狀重論尊號狀奉天論赦書事條狀唐陸宣公集卷第十四奏草卷第四奉天論擬與翰林學士改轉狀奉天請罷瓊林大盈二庫狀奉天論解蕭復狀奉天薦􅀽髙等狀奉天論李晟所管兵馬狀奉天奏李建徽􅀭惠元兩節度兵馬狀駕幸梁州論進獻􅀲果人擬官狀又論進􅀲果人擬官狀唐陸宣公集卷第十五奏草卷第五興元論解姜公輔狀又答論姜公輔狀興元論請優奬曲環所領將士狀興元論解蕭復狀又答論蕭復狀興元論續從賊中赴行在官等狀唐陸宣公集卷第十六奏草卷第六興元賀吐蕃尚結賛抽軍迴歸狀興元奏請許渾瑊李晟等諸軍兵馬自取機便狀興元請撫循李楚琳狀興元論中官及朝官賜名定難功臣狀興元論賜渾瑊詔書爲取散失内人等議狀鑾駕將還宫闕論發日狀請釋趙貴先罪狀論替換李楚琳狀收河中後請罷兵狀唐陸宣公集卷第十七中書奏議卷第一請許臺省長官舉薦屬吏狀請遣使臣宣撫諸道遭水州縣狀論淮西管内水損處請同諸道遣宣慰使狀謝宻旨因論所宣事狀唐陸宣公集卷第十八中書奏議卷第二論嶺南請於安南置市舶中使狀論宣令除裴延齡度支使狀論齊映齊抗官狀請减京東水運收脚價於縁邊州鎭儲蓄軍糧事宜狀唐陸宣公集卷第十九中書奏議卷第三論縁邊守備事冝狀商量處置竇參事體狀奏議竇參等官狀請不簿録竇參莊宅狀唐陸宣公集卷第二十中書奏議卷第四請還田緒所􅀉撰碑文馬絹狀請依京兆所請折納事狀議汴州逐劉士寧事狀請不與李萬榮汴州節度使狀論度支令京兆府折稅市草事狀論左降官准赦合量移事三狀論邊城貯備米粟等狀唐陸宣公集卷第二十一中書奏議卷第五論裴延齡姦蠹書一首論朝官闕貟及刺史等改轉倫序狀唐陸宣公集卷第二十二中書奏議卷第六均節賦稅恤百姓六條
