front:
  text: 唐陸宣公翰苑集序唐權德輿撰甞讀賈􅁩書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聦而盡其善排羣議而試厥謀道之難行亦巳乆矣東陽絳灌何代無之嘻一薫一蕕善齊去声不能同其器方鑿圓枘良工無以措巧心所以理丗少而亂日多大雅衰而正聲􅃦漢道未融旣失之於賈傅吾唐不幸復擯棄於陸公公諱䞇字敬輿吴郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸壽春刺史張鎰有名於時一獲晤言大加賞識曁別鎰以泉貨數萬爲賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而巳是嵗以書判拔萃調渭南簿本傳作尉御史府以監察換之德宗皇帝春宮時知名召對翰林即日爲學士由祠部貟外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初􅀂不經思慮及成而奏無不曲盡事情中於機㑹倉卒塡委同職者無不拱手歎伏不能復有所助甞從容奏曰此時詔書陛下冝痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶幾羣盗革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以德宗克平㓂亂不惟神武之功爪牙宣力蓋亦資文德腹心之助焉及還京師李抱眞來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思􅁬臣節臣知賊不足平也公自行在帶本職拜諌議大夫中書舎人精敏小心未甞有過艱難扈從行在輙隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而巳初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸䞇者賞千金頃之公至太子親王皆賀初公旣職内署母韋氏尚在吴中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩附葬河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子爲之興改容叙弔優禮如此内外屬望旦夕俟其輔政爲竇叅忌嫉故緩之眞拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉苟且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦䛕從而間之屢至不恱親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在德宗實録及竇叅納劉士寧之賂爲李巽所發得罪左遷橫議者以公與叅素不恊歸罷相之議於公户部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士吴通玄忌公先逹毎切中傷隂結延齡互言公短宰相趙憬公之引抜升爲同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公爲賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸䞇軰怨望鼔扇軍人也貶公忠州别駕上怒不可測頼陽城張萬福救之獲免蜀帥韋令抗表請以䞇代巳歳賂資糧公在南賔閉門却掃郡人稀識其面復避謗不著書惟考校醫方撰集驗方五十卷行於丗江峽十稔永貞初與鄭餘慶陽城同徴還公巳薨殁時年五十二公之秉筆内署也􅅦古􅀭今雄文藻思敷之爲文誥伸之爲典謨俾􅘀狡向風懦夫増氣則有制誥集一十卷覽公之作則知公之爲文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七卷覽公之奏則知公之爲臣也其在相位也推賢與能舉直措枉將斡璿衡而掲日月清氛沴而平泰階敷其道也與伊說爭衡考其文也與典謨接軫則有中書奏議七卷覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟惟公才不謂不長位不謂不逹逢時而不盡其道非命歟裴氏之子焉能使公不遇哉說者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭列蓋道未至也應之曰道雖在我弘之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行􅀂使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者蓋時不幸也豈公不幸哉以爲其道未至不亦誣乎公之文集有詩文賦集表狀爲別集十五卷其關於時政昭昭然與金石不朽者惟制誥奏議乎雖巳流行多謬編次今以􅀋相從冠于編首兼略書其官氏景行以爲序引俾後之君子覽公制作效之爲文爲臣事君之道不其偉歟
