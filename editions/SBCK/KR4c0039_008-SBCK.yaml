front:
  text: 唐陸宣公集卷第八制誥卷第八除授
  hash: sha256:33c46ee242de5f8ca1445c8a5546da6b2bf7738fce35f098627837b1e651e71c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_008-1a}
body:
  text: 賈耽東都留守制河洛舊都時廵乆曠命以居守俾之保綏間者淮甸不寧汝墳屢警増置軍府作藩王畿職任旣分威望非重思有揔制一其典刑爰資信臣往乂東夏銀青光禄大夫守工部尚書魏國公賈耽豁逹貞方識通大體明九域山川之要究五方風俗之冝恒因物情以施敎化所莅之郡靄其休聲恱李廣之風人皆自便懷羊祜之德敵不敢侵自誠而明在乆彌著分我憂􅀉實惟其人董制軍師安集疲瘵統禦都邑提持紀綱懋昭厥猷無替朕命可守本官兼御史大夫充東都留守東都畿汝州都防禦觀察等使判東都尚書省事散官勲封如故崔縱東都留守制居守之重固難其人近歳以來益又繁綜領廉察之任專禦備之權地廣務殷一皆咨禀非利用罔以通濟非純德不能保綏周爰咨詢公論有屬銀青光禄大夫行尚書吏部侍郎上柱國安平縣公崔縱素風自逺代濟忠貞慶之所鍾繼有才哲氣質淳茂識度淹通藴經逺之沉謀宣適時之利用寛而不㢮簡則能周以兹公方多歷要重小大之務必聞休聲輟於周行式是東夏擢居春官之長且兼副相之雄懋昭厥庸期復先構可檢校禮部尚書兼御史大夫充東都留守判東都尚書省充東都畿汝唐鄧等州都防禦觀察處置使散官勲封如故普王荆襄江西道兵馬都元帥制君人立極所務於勝殘秉律成師寔先於謀帥申明號令揔持紀綱弘九合之功决百勝之略非愼柬不可以濟事非僉屬不可以臨民集大勲者必舉於宏綱體至公者無避於内舉爰擇蕃翰俾掌元戎開府儀同三司舒王謨性禀忠厚訓知禮樂居常樂善動不違仁察其内恕外温必能安人和衆體方識敏諒可成功庶乎知子之明授以貞師之律可掦州大都督持節充荆襄江西􅃆鄂等道節度使及諸軍行營兵馬都元帥餘如故仍賜名􅁩改封普王嗚呼小子􅁩其敬聽朕命我國家之有天下百七十載于兹矣祖宗垂化紹統功德繼茂威加殊俗惠洽普天海隅蒼生代受亭育躋之於福壽煦之以仁和源廣流長慶深祚逺曆數有嗣纉于朕躬兢兢業業懼不負荷䖍恭寅畏歳五周星循列聖之耿光稽上古之謨訓一物失所是用疚心萬方有罪毎懷咎已懸法皆考於天則舉事必酌於人謀期合大中罔循私欲而渉道猶淺燭理未明文闕於化成武乏於定亂刑賞失中授任乖方厚澤未均大信未著致使兇慝熾禍干紀亂常悖違君親蔑棄天地盗據我都邑痛毒我士庶驅脅丁壯暴骸於原野攘奪羸老轉死於溝壑忠良隕命義烈銜􅁈廹以兇殘莫由自奮憤深骨髓怨結蒼旻朕所以中宵屢興終食三歎哀蒼生之無告閔赤子之非辜爲人父母寧忘愧悼頼三事大夫竭誠於内羣帥爪牙宣力於外交修不逮日冀康寧江漢上游建瓴制㓂亘千里之地連十萬之師保大定功冝有統壹允副兹選徃哉汝諧無以貴驕人無以善自伐無縱已之慾無咈衆之謨從諌如流改過勿吝卑躬降志以奉賔傅絶甘分少以撫軍師布誠信以歸人心明賞罰以盡士力詰姦誅􅁀懋昭乃勲敬事恤人無替朕命膺兹重任可不勉歟建中四年九月二十六日馬燧渾瑊副元帥招討河中制天地殊位君臣異制苟不率道兹謂亂常退而増修於是有舞干之義諭以遷善於是有文告之辭􅀂猶不悛乃用致討興戎動衆豈得巳哉李懷光擢自軍候委之節制亟有勤績累加寵榮揔衆駿奔自逺赴難解圍逐㓂朕甚德之位極上台􅀉崇揔帥親之􅀂同體信之無間言朕於斯人亦巳厚矣而器小任重固貽顚覆有功自棄無罪自疑崇信䜛邪脅逐將帥養㓂資亂蓄姧幸災朕素所推誠猶謂非實優容任遇坦然如􅀄凶跡旣􅄹醜跡彌露謀危社稷通結渠魁公相往來無復忌畏窮極兇悖所不忍言朕播遷巴梁違逺陵寢大懼失墜爲列聖羞頼先澤在人兆庶知感朔方將士忠節不渝懷光旣沮姦謀詭稱効順累陳􅅃䟽請詣闕庭朕深惟舊勲務欲全貸授以師保之任疇其井賦之食璽書勞問誓以終始懷光遂殺辱使臣完聚守保將以悖慢之罪加於忠義之軍因兹脅從冀與同惡謂衆可罔謂天可欺覆載所不容人臣所共棄討除大憝招輯非辜爰咨輔臣以董戎􅀉銀青光禄大夫檢校司空同中書門下平章事兼太原尹北都留守充河東保寧軍節度使北平郡王馬燧操業端亮器宇宏逹秉難奪之節負不羈之才常持至公深識大體感激而三軍有勇彌綸而庶績允諧威聲所臨郡邑皆復殿于北土隱􅀂長城奉天定難功臣開府儀同三司行侍中兼靈州大都督靈鹽豐夏等州節度使管内度支營田觀察處置押蕃部落等使充朔方邠寧振武等道奉天永平等軍行營節度兵馬副元帥上柱國樓煩郡王渾瑊淳粹積中仁厚成性布寛大以容衆著誠信以撫人事必沉詳臨危益辦節惟貞固在險逾彰弘濟艱難懋昭勲閥出納朕命光膺具瞻並文武全材安危注意副我憂屬時惟二臣比德恊謀往清多難燧可兼充奉誠軍及晉隰磁等州節度管内諸軍行營兵馬副元帥餘並如故瑊可兼河中尹充河中絳州觀察處置等節度使仍充河中絳州同陜􅉑等管内諸軍行營兵馬副元帥功臣散官勲封如故嗚呼朕不敏不明失於君道連禍未息勞師靡居中心自咎鬱􅀂焚灼又以朔土之衆代著忠勞横遭汚脅深所憫惜爾其敬敷朕命明諭朕懷務於招綏非黷威武惟輸誠歸順罔有不赦惟執逆拒命罰止元兇寧失不經無濫無罪列爵懸賞用俟勲賢布告逺邇咸令知委李晟鳯翔隴西節度兼涇原副元帥制周之元老以分陜爲重漢之丞相以憂邊見稱故方岳克寧疆􅂣不聳安人保大致理之端今所以重煩上台作鎭西土奉天定難功臣司徒兼中書令充神䇿軍節度鄜坊丹延等州觀察處置等使仍充京畿渭北鄜州華州兵馬副元帥上柱國合川郡王李晟勵精剛之操體􅀶大之德適時通變而大節不奪虚受廣納而獨斷自明奉法以身推功以下衆無犯命人用樂從懷德畏威令行禁止誓羣師於危疑之際駐􅀌軍於版蕩之中氣凌風雲誠動天地一鼓而兇徒懾北再駕而都邑廓清師皆如歸人不知戰再安社稷功格皇天而明識秉彛清風激俗雅尚恬曠撝謙有光朕以汧隴近郊扶風右地川阜連亘抵於回中限界諸夷蕃屏王室所屬誠重付之元臣兼二將之甲兵崇十連之元帥宣威耀武罷警息兵俾予仰成時乃丕烈可兼鳳翔尹充鳳翔隴右節度營田觀察處置等使仍充鳳翔隴右涇原節度管内諸軍及四鎭北亭行營兵馬副元帥改封西平郡王功臣本官兼官如故劉洽檢校司空充諸道兵馬都統制論道經􅀖允歸碩望建牙統衆必藉雄才中外具瞻安危注意今以二柄付之元臣開府儀同三司檢校尚書左僕射同中書門下平章事持節宋州諸軍事兼宋州刺史充宣武軍節度營田宋亳頴等州觀察處置等使仍權知汴滑宋亳等州都統兵馬事懷德郡王劉洽秉志端亮􅅚躬簡儉􅀶厚足以容衆和易足以長人純孝榮親盡忠事國分我閫􅀉殿于大藩扼制淮夷保障楚甸戎捷繼至軍聲再􅀭殪群兇於宛丘驅大憝於梁野控引漕輓委輸京師予嘉乃勲懋乃貞節用錫丕命俾􅀭洪休爕賛三台紀綱羣帥式是大任爾惟欽哉可檢校司空同中書門下平章事依前宣武軍節度使度支營田宋亳等州觀察處置等使仍充宋亳頴等州管内諸軍兵馬都統散官勲封如故唐陸宣公集卷第八
