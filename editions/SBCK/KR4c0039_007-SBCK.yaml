front:
  text: 唐陸宣公集卷第七制誥卷第七除授
  hash: sha256:e08833c1e306e39ff038d21e27a0e18b09dd5602f30513ef535e5276ddc03c38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_007-1a}
body:
  text: 李晟可徒兼中書令制雲雷搆屯㝢縣興難非山岳降神不生良弼非股肱叶契不集大勲故髙宗得傅說中興殷􅀖宣王任吉甫重光周道天寳之季㓂䧟二京時則先臣子儀翼戴肅宗戡定禍亂再造區夏于今頼之肆子小子獲纉丕構不克負荷失守宗祧天祚我唐降生忠烈有社稷之臣曰開府儀同三司檢校尚書左僕射中書門下平章事充神䇿軍節度鄜坊等州管内觀察處置等使京畿渭南渭北商華等州兵馬副元帥上柱國合川郡王李晟沉肅有勇堅明能斷聞難感憤誓軍徂征誠激于􅂨義形于色自河之右萬里濟師殷然雷奔大盗懾駭屬皇家不造戎師誘姦重兹播遷郊甸震蕩而晟蓄銳養士深壘固軍以謀吞元兇以義紏羣帥躬擐甲胄率先啓行布忠信爲軍聲持義烈爲戰器廓清氛沴寧復皇都宗廟載安宇宙斯泰佐予興運時乃茂功德厚者任崇業盛者報重升以元輔建于上公熈庶績而翼宣九歌擾兆人而敬敷五教用疇井賦貽厥子孫與國咸休永播丕烈可司徒兼中書令仍賜食封一千戸餘並如故俟還京後所司擇日備禮􅁽拜宣示中外以彰元勲蕭復劉從一姜公輔平章事制宰輔之任獻替爲務内凝庶績外撫四夷調隂陽以成歳功賛化育而熈帝載􅀂金用礪其弼予違如旱爲霖允從人望矧時屬多難彌切任賢朕未甞不朝夕論思夢􅄰懷想道之所在人逺乎哉朝議大夫守戸部尚書兼御史大夫充荆襄江西等道都元帥統軍長史豐縣開國公賜紫金魚袋蕭復性質端亮理識精敏約巳弘物體方用圎爲􅀖必表其理能及霤亟聞於鯁議動可成範立不易方守尚書吏部郎中兼御史中丞充荆襄江西等道都元帥判官賜緋魚袋劉從一貞白其行温恭其文居簡而適用必通禮和而臨事有立持重能斷端慤有恒累更委任多所弘益守京兆府户曹叅軍翰林學士賜緋魚袋姜公輔志懷濟物監必通理主文而諫忠靡退言經始以謀事皆前定道無屈撓智適變通並可以叅賛大猷光膺僉屬兵戎未靖期爾經綸都邑未康期爾還定予一人有過爾是用匡伊萬姓不寧爾是用乂欽哉愼乃有位罔癏厥官復可守吏部尚書同中書門下平章事散官封賜如故從一可守尚書刑部侍郎同中書門下平章事賜紫金魚袋公輔可守諫議大夫同中書門下平章事賜紫金魚袋張延賞中書侍郎平章事制兩漢致理由乎審官多以牧宰髙第入居台輔黃覇自頴川而次遷丞相卓茂由宻令而超拜三公蓋以爲國本於親人舉賢先於稱職旌能勸善風化大端今革車荐興賦煩人散匡弼寡昩屬于才臣光禄大夫檢校吏部尚書兼成都尹御史大夫充劒南西川副大使管内度支營田觀察處置等使上柱國魏國公張延賞崇飭文行勵精理道踐歷中外所至有聲慮必周宻心無屈撓簡廉以肅吏慈惠以愛人明以照姦和以定衆去􅀂始至久而見思秉志不渝課績常最以爾循良之化佐予綏兆人以爾經綸之才佐予熈庶績仍資威重兼領蕃維式慰甘棠之思且繼緇衣之美懋昭􅀖典勿替家聲可中書侍郎平章事依前兼成都尹餘如故渾瑊侍中制論道經􅀖興戎定亂執是二柄毗予一人得諸全才康濟大難懋官昨土備舉彛章開府儀同三司檢校尚書左僕射同中書門下平章事兼靈州大都督府長史充靈鹽銀夏等節度管内觀察處置度支營田押蕃落等使仍充朔方邠寧振武等道奉天永軍行營節度副元帥柱國樓煩郡王渾瑊神降才傑天資忠厚叶于興運爲國輔臣往以盗起上京駕言出狩羣兇怙亂再犯郊畿時乃奮􅀭武威董制師律深居籌畫姧慝寢謀當敵旨揮士旅増氣危城克固我伐用張重以賊臣蔑恩養㓂資亂再罹艱阻播越巴梁時乃并轡載馳執羈從邁有見危致命之節有憂國滅私之誠凛然貞規介􅀂金石縱横有夷難之略感激陳復國之謀分緫偏師徑出重險秉大節以誓羣帥布寛令以宥脅從師次近郊摧兇非抗軍臨近甸下邑如歸推成功以不居期盡敵以自効率其全衆􅀭斾前追雄威疾馳元惡授首柔德懷服餘黨歸心掃闢氛昏安復園寢懋乃嘉績其維格天范爕之讓能耿弇之殄㓂揔是二美瑊其有焉足以垂勲旂常垂美竹帛冝首台階之列仍疇井邑之賦祗膺時命無替厥庸可侍中仍賜實封八百戸餘如故虜翰劉從一門下中書侍郎平章事制寅亮天工弘宣理本俾予從乂時乃輔臣扈蹕載驅以勞定國懋官遷列式是彛章銀青光禄大夫行尚書兵部侍郎同中書門下平章事范陽縣開國公盧翰嚴重不撓貞方自持養恬鎭俗居簡濟衆言思無隱事必同恒守刑部侍郎同中書門下平章事賜紫金魚袋劉從一質厚氣深識精體逺沖用無竭貞規不渝從容以和出納惟允自鸞車載駕薄狩于梁執羈有從我之勤及霤勵匪躬之節交修不逮庶績其凝俾承命於掖垣仍叅掌於樞務今百度伊始六府載張論駮是非不可以不審宣􅀭憲令不可以不明爾其欽承無墜我休命翰可門下侍郎同中書門下平章事散官勲封如故從一可中書侍郎同中書門下平章事餘如故劉滋崔造齊映平章事制朕嗣位君臨精求理道小大之務靡不經心日愼一日于今八載教化未洽烝􅀺未康因之以甲兵繼之以災沴斯固鑒有所不至慮有所不周予深浩然􅀂渉深水思所以匡我致理􅂇我官人宣其澤而四方以寧執其要而百工式叙允是大任其惟輔臣夢想勞懷數求俊乂察言而觀行因事以考能周行之中乃得良弼權知吏部侍郎劉滋操履貞清介然自守居能愼獨重不違仁析理究其精微勵學探於奥㫖守給事中賜緋魚袋崔造性合道要誠通化源適時有成務之才事上懷匪躬之節藴蓄器業居爲名臣中書舎人賜紫金魚袋齊映修己以立自明而誠體賢人可大之規用君子時中之道虚受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振條綱惟映之精深可以該物理我有大典爾其叅之懋昭厥猷勿替休聞滋可充散􅀐常侍同平章事造仍賜金魚袋其有散官封賜並如故李納檢校右僕射平章事制忠所貴乎竭誠善莫大於改過況茂勲有舊崇德日新翼戴勵勤王之節經綸申盡敵之略敦奬之道時惟國章平盧淄青節度管内度支營田處置等使開府儀同三司檢校工部尚書使持節鄆州諸軍事兼鄆州刺史隴西郡王李納禀性端厚執心寛簡通變適用和順積中服勞王家夙有成績乗秋備塞克著威聲累歳專城載揚理行間者心懷險阻誠義鬱堙旋能歸􅅃上聞期於率德自効忠節純固乆而益彰爰整銳師式遏亂略保障宋服塡壓浚郊嶷如長城作固東土嘉乃率服之美懋乃輸力之勤擢升衮司載董戎翰玄成嗣台輔之業亞夫繼社稷之勲俾爾兼榮無替厥服檢校右僕射平章事餘如故韓滉檢校左僕射平章事制周召由輔弼之臣兼方伯之任蓋以理化根本在於親人通兆庶之情以佐天子秉家􅀖之慶以臨諸侯故能中外允􅁵上下無壅今我有命意其在兹金紫光禄大夫檢校尚書左僕射兼潤州刺史御史大夫充鎭海軍浙江東西節度觀察處置等使上柱國南陽郡開國公韓滉文行忠信備修身之道勤儉貞固有成務之才累更委遇多處繁重一心奉職終始不渝内告謀猷以匡時化外持憲法以一人心理尚廉平事皆􅁵飭姧盗衰息禮義興行惠兹一方時乃之德陳師旅以遏㓂讎納餽糧以修職貢張我威武實我資儲令必應期謀無愆素濟于多難時乃之功冝其叅務中樞翼宣大化仍兼漕運兼領蕃維樹南國之風猷贍中都之廪實予則有望爾其懋哉繼于前人無替厥服可檢校左僕射同平章事依前鎭海軍浙江東西節度觀察處置等使兼充江淮轉運使餘如故李勉太子太師制立國之本所繫於元良弘教之方必由於端士非精識前典德冠當時恭敬温文其將安倣吾是以輟台階之老選宗室之賢輔翼春闈是資教諭檢校司徒同平章事充太清宫使崇文館大學士上柱國汧國公李勉忠信孝友直方簡儉逹君臣父子之際知禮樂教化之端虚澹保和貞明寡欲求舊則德懋叙親則屬尊師範國儲無易其選可檢校司徒兼太子太師散官封勲如故姜公輔左庶子制君之任臣有優賢賜告之義臣之事君有量力知止之道故能進退以禮終始可勝此朕三事大夫濟理圖全之意也守諫議大夫同平章事賜紫金魚袋姜公輔首舉髙第擢居諫曹爰資美才叅掌密命居易勵修身之操見危著從我之勤自處台司累䟽陳乞忌滿思退持􅄹守謙留中乆之重難其請式光撝揖俾尹宫坊可太子左庶子勲賜如故崔造右庶子宰相之職允􅁵百工時惟仰成不可廢闕中散大夫行給事中同平章事上柱國安平縣開國男賜紫金魚袋崔造頃居掖垣叅掌樞宻緫領䌓重積勞疹深亦旣優賢賜之長告歳聿云暮有加無瘳披誠自陳章䟽三上知止之道守之甚堅處以休閑俾遂頥養可太子右庶子勲賜如故盧翰太子賔客求賢審官以康庶績就閑優秩以處舊臣蓋欲敦終始之恩全進退之禮金紫光禄大夫行門下平章事范陽郡公盧翰頃因多難從我于征以其年及老成任推先進方將求舊擢處台衡荏苒迄今亟淹星歳勤勞旣乆衰疢有加冝徙職於春闈用優賢於暮齒可太子賔客勲賜如故唐陸宣公集卷第七
