front:
  text: 唐陸宣公集卷第二十中書奏議卷第四請還田緒所􅀉撰碑文馬絹狀請依京兆所請折納事狀議汴州逐劉士寧事狀請不與李萬榮汴州節度使狀論度支令京兆府折稅市草事狀論左降官准赦合量移事三狀
  hash: sha256:63ebc6c7cc06368ddc5e2c382feeafc9306b579d5e27eb26943a96d216bb5b3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_020-1a}
body:
  text: 論邊城貯備米粟等狀請還田緒所􅀉撰碑文馬絹狀馬一匹并鞍絹二千匹右田緒使節度隨軍劉瞻送書與臣其書意縁奉進止令爲其亡父承嗣撰遺愛碑文故送前件馬絹等以申情貺臣先奉恩旨令撰碑文于今半年竟未綴緝良以勸戒之道忠義攸先襃貶之詞春秋所重爵位有僥倖而致名稱非詐力可求將使循軌轍者畏昭憲而莫渝怙姦妄者顧清議而知恥仲尼脩春秋而亂臣賊子懼豈必臨之以武脅之以刑哉襃貶苟明亦足助理田承嗣阻兵犯命靡惡不爲竟逭天誅全歸土壤此乃先朝所愧恨義士所惋嗟今田緒尚干宸嚴請頌遺愛微臣隘跼實憤于心謬承恩光備位台輔旣未能滌除姦慝匡益大猷而又飾其愧詞以賛兇德納彼重賂以襲貪風情所未安事固難強是以屢甞執翰不能措詞輒投所操太息而止縁承聖誨姑務懷柔昨見田緒使人臣亦婉爲報荅但告云所爲碑頌皆奉德音旣異私情難承厚貺候稍休暇續當撰成旣無拒絶之言計亦不至疑阻其來書謹封進所送馬及絹等令劉瞻便領却廻訖不敢不奏謹奏請依京兆所請折納事狀京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉勑冝依度支續奏稱據時估豌豆毎斗七十價巳上大豆毎斗三十價巳下京兆府所請將大豆替豌豆望令據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟蜮爲殃豌豆全損檢覆若非虚謬地稅固合免徴直道而行大體斯在府司折納充數巳爲尅下從權度支凖估計錢刀是幸災窺利所得無幾其傷實多傷風得財非謂理道且豌豆爲物入用甚微舊例所支唯充畜料凖數廻給大豆諸司誰曰不然計價剰徴義將安在理無所據事不可從望依前勑處分未審可否議汴州逐劉士寧事狀右希顔奉宣聖旨適得李萬榮奏劉士寧因出遊獵三軍將士遂閉城門不放入發遣令赴朝廷萬榮安撫軍州今巳寧帖卿等冝知悉者伏以劉士寧昏荒􅁀慢惡貫乆􅄹聖情愛人乆爲含忍親離衆叛自取奔亡不勞師徒克靖方鎭恭承宣諭欣賀實深然梁宋之間地當要害鎭􅎹齊魯控引江淮得其人則安則強失其人則危則弱今士寧見逐雖是衆情萬榮揔軍且非朝旨此亦安危強弱之機也陛下審之愼之或恐奏事之人苟私所奉之將妄陳體勢輒欲徼求承前授任失冝多爲此輩所誤假使心無詐罔其如識乏經通與之籌量鮮不撓敗今軍州旣定足得安詳望且選一朝臣馳往宣勞更淹旬日徐察事情見情而後圗之則冀免有差失候至坐日續更面陳謹先狀以聞謹奏請不與李萬榮汴州節度使狀右希顔奉宣進止萬榮安撫有功聞亦忠義甚得衆心若更淹遲却恐事不穩便今商量除一親王充節度使且令萬榮知留後其節度制便從内出萬榮須與改官卿等即商量進來者臣性習懦頑藝識空乏辱當􅅄任待罪宰司事􅀜安危不敢容黙雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之險地則覆致之夷地則平材如負焉唯在所授授踰其力則踣授當其力則行故負重者不可以微劣勝器大者不可以輕易處有巨力而加重負猶懼蹷跌之不虞擇安地而寘大器尚慮傾覆之難備焉有委非所任置非所安而望其不顚不危固亦難矣劉士寧窮兇極􅁀衆所不容李萬榮因人之心閉城拒逐爲國除害亦有可嘉誠冝星夜上聞請擇節將今所陳奏頗渉張皇但露徼求之情殊無退讓之禮據兹鄙躁殊異純良又聞本是滑人偏厚當州將士與之相得􅂊止三千諸營之兵巳甚懷怨據此頗僻亦非將材且邀君而力取其位不忠逐帥而謀代其權不義犯此二者而加之非材得志驕􅄹不悖則敗悖謂犯上敗謂僨軍俱爲厲階莫見其可今雖遽加寵命務饜貪求曲示保持兾消凶慝然其所行不遜所得無名縱之則反側而益疑善之則觖望而肆惡夫善始而克終者猶寡況始於不善而求能以義自全者乎又縁甞自蓄謀以危主將及居人上恒恐見圖必於部校之間多有疑阻之釁上下猜貳何能乆安縱未干紀亂常亦必䘮師蹙境所以承前方鎭之任選建才德而不副所委者則有矣其不由才德而授終能殿􅀖固節者未之有也是猶置器欲安而不擇可安之勢負重欲濟而不量可濟之材處非所冝不敗何待陛下若謂臣􅀃體迂闊有異軍機引喻乖踈不同事實臣請指陳汴宋一管近代成敗之跡皆陛下之所經見者以爲殷鑒惟陛下覽而察之徃者田神功作鎭河南領汴宋徐泗兖鄆曹濮八州之地兵食兼足職貢備脩左肅青齊右弭滑魏南控淮浙北輔榮􅈆殷如長城不震不聳此由制置於可安之地付授得可濟之材其爲利宜斯謂大矣及神功入覲遘厲不還先皇帝示眷悼之優崇貪因循之便易知神玉才不勝任排衆議而竟授之旣而維御無方經略失制權歸豪將勢散列城禍機一興内叛外破委三軍於􅁀帥䧟五郡於匪人轉輸所經塗路亟阻此由制置於必危之地付授於必躓之才其爲敗傷亦巳甚矣近者劉玄佐驅攘巨猾底復大梁即鎭如兹幾將十載雖不能勤身節用以撫疲甿畢力竭誠以􅀭丕烈然尚號令由巳部屬畏威緝脩戎旅振耀聲勢逺邇談矚且爲完軍制持東方猶有所􅀝及玄佐殂没朝廷命吴湊代之士寧兇頑輒敢眦睚素非得衆且甚不材緩之旬時必自離沮隨機制馭指顧可平陛下念深黎元姑務容飬適使姦徒得計庸竪作狂但肆醜厲之詞豈懷任置之惠運路幾絶生人重殘殷然垣翰之軍鞠爲汚染之俗追思致患之本豈不失於苟且哉今若又授萬榮則與士寧何異負力而取誰曰不然邀取而除孰爲非據苟邀則不順苟允則不誠君臣之間勢必嫌阻與其圖之於滋蔓不若絶之於萌芽忘乆逺而樂因循固非英主御天下長筭逺慮之計也且爲國之道以義訓人將敎事君先令順長用能弭爭奪之禍絶窺覬之心聖人所以興敬讓而服􅁀強禮逹而分定故也假使士寧爲將慢上虐人萬榮懷奉國之誠禀嫉惡之性棄而違之斯可矣討而逐之亦可矣謀其帥而篡其位則不可焉何者方鎭之臣事多專制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潜滋禍必難救非獨長亂之道亦開謀逆之端四方諸侯誰不解體得一夫而喪羣帥其何利之有焉矧兹一夫猶未可保徒亂風敎以生人心昨者所逐士寧蓋起於倉卒諸郡守將固非連謀一城師人亦未恊志況又待之不壹撫之不均黨助萬榮其能有幾仍各計度於成敗之勢廻遑於逆順之名安肯􅂢軀與之同惡今所以未即變者皆爲萬榮所誘許其賞給貨財且相服從以候制㫖陛下但於文武羣臣之内選一和惠寛敏素爲軍旅所愛信者命爲節度仍降優詔慰勞彼軍􅅄萬榮以撫定之功别加寵任襃將士以輯睦之義厚賜資裝衆知保安人且懷惠舎此助亂更將何求揆其大情理必寧息萬榮縱欲跋扈勢何能爲三軍旣自離心列城又不爲援縁其迫逐主將諸道必復憎嫌邇無所親逺無所與不勞天討必自殱夷陛下何所爲虞而欲受其邀致臣雖孱怯竊有未安昨因希顔宣㫖却廻巳與趙憬等同附口奏展轉申吐慮多闕遺臣更通夕詳思恐亦無易於此不勝拳拳愚懇謹復宻啓以聞如􅀩聖恩察納臣即與趙憬等商量應須處置事冝具作條件聞奏儻後事有愆素臣請受敗撓之罪謹奏論度支令京兆府折稅市草事狀度支奏縁當年稅草支用不充諸􅂣和市所得又少所以每至秋夏常有欠闕請令京兆府折今年秋稅和市草一千萬束便令人戸送入城輸納毎束兼車脚與折錢二十五文旣利貧人兼濟公用希顔奉宣進止冝依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非冝曷由無擾臣等每承睿旨常以百姓爲憂審知事不可行安敢黙而無述每年蓄聚蒭藁所司素有恒䂓計料稅草不充即便開􅂣和市旣優價直復及農收人皆樂輸事不勞擾陛下追想往年之事豈甞有縁草不足上關宸慮者乎延齡欲衒已能頗隳舊制苟收經費之用以資嬴羡之功遂使儲備空虚支計寥落廐圉告闕頻煩聖聦去歳巳然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徴地稅草數毎年不過三百萬束其中除留供諸縣館驛及鎭軍之外應合入城輸納唯二百三十萬而巳百姓般運巳甚艱辛常迫春農僅能得畢今若更徴一千萬束仍令並送入城即是一年之間併徴三年稅草計其所加車脚則又四倍常時物力有窮求取無藝其爲騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於途程往復理須淹歷歳時牛廢耕犂人妨播植東作旣闕西成曷期况蒸􅀺之間貧冨不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徴稅草買草價必倍髙是使豪冨之徒乗急令以邀其利窮乏之輩因􅁀斂以毀其家非所謂均節財物凖平賦法之術也臣等又勘度支京兆此來雇車估價及所載多少大率毎一車載一百二束毎一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設令逺近相􅀘通以百里爲程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計般運巳當三十有五文買草本價又更半之而度支曽不計量自我作估徑以胷臆斟酌限爲二十五文謂之加徴則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈如官自置􅂣要便收市欲少市則平其估以節費欲多市則優其價以招人買賣旣和貧冨俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徴固不同等幸有舊制足可遵行何必捨易而即難棄利而從害臣誠暗滯未見其冝伏望戒勑度支令依舊例和市承前旣有恒用以後不得闕供稍峻隄防使知懔懼妄作但不施用歳計必免愆違陛下若以軍廐之中馬畜漸衆度支所營藁蒭􅂊可供給當年或慮水旱不虞别須蓄積爲備今屬歳稔亦是其時但要收斂有方不冝科配致擾若度支併市延齡必復辭難須有區分使之均濟望委京兆尹勾當别和市草五百萬束以充貯備其所和市並隨要便官自置􅂣毎􅂣貯錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數内以給用不盡者充每市滿十萬束一度聞奏便以府司郵遞車牛并更雇脚相添轉徙􅂣所般載送付􅁐中輸納如蒙聖恩允許臣即依此宣行旣免擾人又不増費以資儲蓄足禦凶災度支謹守恒規亦自不闕常用臣等問度將爲合冝謹録奏聞伏聽進止論左降官准赦合量移事狀三首右􅇡謫之徒皆在遐僻或迫於衰暮顧景思還或困於瘴癘翹心望徙旣關霈澤許以量移企躍之情逺想可見若准所司舊例須俟州府録申盤勘檢尋動踰年歳上稽恤宥之旨下虧慶頼之心臣等商量恐須􅁵革望令所司據承貞元六年恩赦檢勘巳量移未量移官及貞元六年恩後左降官等除遷改亡殁之外具名銜及貶責事由年月速報中書門下不須更待州府申請臣等據所司報到則便進擬不出歳内冀悉霑恩未審可否謹録奏聞伏聽進止又奏量移官右伏以國之令典先德後刑所後者法當舒遲故决罪不得馳驛行下所先者體冝疾速故赦書日以五百里爲程誠以聖王之心務弘慶惠必廻翔於行罰而企躍於舒恩不加罰於典法之外不虧恩於德令之内則受責者莫得興怨荷貸者咸思自新所謂威之斯懲宥之斯感懲以致理感以致和致理則尊致和則愛爲人父母必在兼行陛下德配上玄澤流下土頃因郊祀普降鴻恩凡是貶責之人並許量移近處臣等任叨輔翼職在宣行尋具奏聞請便進擬聖心精一務欲均齊令待所司檢尋一時􅀋例處分其左降官内或罪非可棄才有足甄亦許别狀商量不拘常例奬用臣等據所司檢勘左降官及流人送名到者都比擬量移及别追用分爲三狀前月十二日封進其流人量移狀巳􅀩印出行下訖餘兩狀至今未奉進止竊以赦書宣布僅欲半年若更淹遟恐乖事體又諸州刺史及臺省官等繼有事故頗多缺貟睿㫖精於選求至今常不充備以眚掩德見非古人録用弃瑕允歸聖造願廣含弘之美庶増誘拔之途謹奉狀陳聞伏聽進止又進量移官右希顔奉宣進止舊例左降官每准恩赦量移不過三百五百里今度進擬稍似超越又多是近兵馬處及當路州縣事非穩便冝更商量伏以罰冝從輕赦冝從重所以昭仁恕之道廣德澤之恩也夫位尊者其惠不可以不重言大者其實不可以不豐位尊而惠輕則體非冝言大而實寡則人失望陛下躬行盛禮渙發徳音念謪居之荒遐哀負累之沉棄俾移近處將合新恩赦令􅀄行室家相慶惠亦至矣言亦大矣竊料􅇡逐窮僻喜聞霈澤降臨固必破産以飾行裝計日而俟休命荏苒淹䘏復經半年儻又所移之官還與舊任鄰近竊恐乖陛下垂愍之意虧制書行慶之恩口惠重而事實輕非所以􅀭鴻休而布大信也謹按承前格令左降官非元勑令長任者毎至考滿即申所司量其舊資便與改叙縱或未有遷轉亦即任其歸還逮于開元末李林甫固權專恣凡所斥黜􅀋多非辜慮其却廻或復􅁈訴遂奏左降官考滿未别改轉者且給俸料不須即停外示優矜實欲羈係從此巳後遂爲􅁪規一經貶官便同長任廻望舊里永無還期縱遇非常之恩許令移逺就近雖名改轉不越幽遐或自西徂東或從大適小時俗之語謂之横移馴致忌剋之風積成天寳之亂展轉流弊以至于今天下咸病此法深苛而不能改從舊典者良以猜嫌之慮易惑上心將謂􅀒譴之人悉包樂禍之意巳經黜責遂欲隄防故髙論則痛嫉林甫之隂邪而密網則習行林甫之弊法憸邪爲蠹乃至於斯然則左降永絶於歸還量移不離於僻逺蓋是姦臣詭計殊非國典舊章且貶黜之中情狀各異犯有輕重責有淺深固非盡是回邪皆須備慮王者之道待人以誠有責怒而無猜嫌有懲沮而無怨忌斥逺以儆其不恪甄恕以勉其自新不儆則浸及威刑不勉則復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進叙人知復用誰不増脩何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦兇恒處防閉之中長從擯棄之例則是悔過者無由自􅀘藴才者終不見伸凡人之情窮則思變含悽貪亂或起於兹雖則何患能爲亦足感傷和氣謂非帝王開懷含垢之大體聖哲誘人遷善之良圖也臣等昨進擬商度非不精詳旣審事冝亦尋舊例參求折􅂨兼務齊平大約所擬之官各移近地一道郡邑稍優於舊任官資序進於本銜並無降差亦不超越其有累經移改巳至關畿則但以大州増其常秩所兾人皆受賜施不失平上副鴻恩下塞延望􅂊將得所殊匪爲優今若裁限所移不過三五百里則有改職而疆域不離於本道遷居而風土反惡於舊州徒有徙家之勞是増移配之擾又當今郡府多有軍兵所在封疆少無館驛應合量移之例約有二百許人道路須計其逺邇之差州縣則校其髙下之等若必選非當路復不近兵則恐􅀋例失倫署置偏併示人疑慮體又非弘幸希聖聦更賜裁審其擬官狀並未敢改革謹重封進伏聽進止請邊城貯備米粟等狀右兵之所屯食最爲急若無儲蓄是棄封疆自昔敗亂之由多因餽餉不足臣以任當體國職合分憂奏減河運脚錢用充軍鎭和糴幸􅀩聖恩允許又屬頻歳順成二年之間縁邊諸軍共計収糴米粟一百八十餘萬石凖元勑各委當道節度及監軍中使度支知廵院官同勾當檢納仍貯備軍糧爲名非縁城守乏絶及不承别勑處分並不得輙有費用若能堅守此制有用隨即却塡則是邊城常貯十五萬人一歳之糧以爲急難之備永無縣絶足固軍情去歳版築五原大興師旅所司素無備擬臨事支計缺然齎送悉貸此糧乃得軍行辦集過事之後准勑合塡迨今二年竟不支遣加以諸鎭軍食例皆闕供及其告急上聞宣旨下迫則又請貸貯粟以充將士月糧旣務廢隳且無愧畏所未匱竭其能幾何夫栽植至難毀拔至易古人以樹楊爲喻能不爲之歎惜哉況水旱流行固冝有備戎狄爲患可不爲虞將欲安邊先冝積榖今當歳稔令益軍儲反罄聚蓄之資用供朝夕之費儻遇災難則如之何惟陛下詳思後圖不貽他日所悔臣之願也疆􅂣之幸也不勝區區慮患之意謹冒昧以聞謹奏唐陸宣公集卷第二十
