body:
  text: 論叙遷幸之由狀奉天奏當今所切務狀奉天論前所荅奏未施行狀論叙遷幸之由狀臣前日􅀩恩召見陛下叙說涇原叛卒驚犯宫闕及􅀄行幸之事因自剋責辭旨過深臣奏云陛下引咎在躬誠堯舜至德之意臣竊有所見以爲致今日之患者羣臣之罪也陛下又曰卿以君臣之禮不忍歸過於朕故有此言然自古國家興衰皆有天命今遇此厄運雖則是朕失德亦應事不由人未及對詔之閒陛下遂言及宗祧涕泗交集主憂臣憤人理之常情激於􅂨不覺嗚咽旋屬游瓌請對臣言未獲畢辭今輒上煩以盡愚懇臣所謂致今日之患是羣臣之罪者非敢徒飾浮說苟寛聖懷事皆有由言庶可復自胡羯稱亂遺患未除朝廷因循乆務容養事多􅆫越禮闕㑹朝陛下神武統天將壹區宇乃命將帥四征不庭兇渠稽誅逆將繼亂兵連禍結行及三年徴師四方無逺不曁父子訣別夫妻分離一人征行十室資奉居者有餽送之苦行者有鋒刃之憂去留騷然而閭里不寧矣聚兵日衆供費日多常賦不充乃令促限促限􅂊畢復命加徴加徴旣殫又使別配別配不足於是榷筭之科設率貸之法興禁防滋章條目纎碎吏不堪命人無聊生農桑廢於徴呼膏血竭於笞棰市井愁苦室家怨咨兆庶嗷然而郡邑不寧矣邊陲之戍用保封疆禁衛之師以備廵警二者或闕則生戎心國之大防莫重於此陛下急於靖難累遣東征邊備空虚親軍寡弱㝷又搜閱私牧以取馬薄責將家以出兵凡有私牧者例元勲貴戚之門所謂將家者皆統帥岳牧之後是乃甞􅀩親委或著忠勞復除征傜固有常典今忽奪其畜牧事其子孫有乞假以給資裝有破産以營卒乗道路悽憫部曲感傷貴位崇勲孰不解體加以聚斂之法轂下尤嚴邸第侯王咸輸屋稅禆販夫婦畢筭緡錢貴而不見優近而不見異其爲憤慼又甚諸方誅求轉繁庶􅀋恐懼興發無已羣情動揺朝野嚻然而京邑􅀜畿不寧矣陛下又以百度弛廢志期肅清持義以掩恩任法以成理神斷失於太速睿察傷於太精斷速則寡恕於人而疑似之閒不容辯也察精則多猜於物而臆度之際未必然也寡恕則重臣懼禍反側之釁易生多猜則羣下防嫌苟且之風漸扇是以叛亂繼起怨讟並興非常之虞億兆同慮惟陛下穆然凝邃獨不得聞至使兇卒鼔行白晝犯闕重門無結草之禦環衛無誰何之人自古禍變之興未有若斯之易豈不以乗我閒􅂩因人􅂝離哉陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能効其死所謂致今日之患是羣臣之罪者豈徒言歟聖㫖又以家國興衰皆有天命今遇此厄運應不由人者臣志性介劣學識庸淺凡是占筭祕術都不渉其源流至於興衰大端則甞聞諸典籍書曰天視自我人視天聽自我人聽又曰德惟一動罔不吉德二三動罔不凶惟吉凶不􅆫在人惟者有其理者也故君子安而不忘危存而不忘亡理而不忘亂是以身安而國家可保又曰視履考祥又曰吉凶者得失之象也夫易之爲書窮變知化其於性命可謂研精及乎論天人祐助之由辯安危理亂之故必本於履行得失而吉凶之報象焉此乃天命由人其義明矣春秋傳曰禍福無門唯人所召又曰人受天地之中以生所謂命也是以有動作威儀禮義之則以定命能者養之以福不能者敗以取禍禮記引詩而釋之曰大雅云殷之未喪師克配上帝儀監于殷駿命不易言得衆則得國失衆則失國也又引書而釋之曰康誥云惟命不于常言善則得之不善則失之此則聖哲之意六經㑹通皆爲禍福由人不言盛衰有命蓋人事著於下而天命降於上是以事有得失而命有吉凶天人之間影響相准詩書巳後史傳相承理亂廢興大略可記人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也六經之教旣如彼歷代明驗又如此尚恐其中有可疑者臣請復以近事證之自頃征討頗頻刑網稍密物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下逹烝􅀺日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非悉知筭術皆曉占書則明致㓂之由未必盡關天命伏惟陛下鑒旣往之深失建將來之令圖拯宗社阽危刷億兆憤恥在於審察時變愽詢人謀王化聿修天祐自至恐不冝推引厄運謂爲當然撓追咎之誠沮惟新之望臣聞理或生亂亂或資理有以無難而失守有因多難而興􅀖理或生亂者恃理而不修也亂或資理者遭亂而能懼也無難失守者忽萬機之重而忘憂畏也多難興􅀖者渉庶事之艱而知敕愼也今生亂失守之事則旣往不可復追矣其資理興􅀖之業在陛下剋勵而謹脩之當至危至難之機得其道則興失其道則廢其閒不容復有所悔也惟陛下勤思焉熟計焉捨已以從衆焉違欲以遵道焉逺憸佞而親忠直焉推至誠而去逆詐焉杜䜛沮之路廣諫諍之門焉掃求利之法務息人之術焉録片善片能以盡羣材焉忘小瑕小怨俾無棄物焉斯道甚易知甚易行不勞神不苦力但在約之於心耳又陛下天資睿哲有必致之具安得捨而不爲哉斯道夕誓之於心則可以感神明動天地朝施之於事則可以服庶類懷萬方何憂乎亂人何畏乎厄運何患乎天下不寧昔太公以避狄而興周文以百里而王是乃因危難而恢盛業由僻小而闡丕圖況陛下禀英姿承寳暦四海之利權由已列聖之德澤在人苟能増修蔑有不濟至如東北羣孽荏苒逋誅涇原亂兵倉卒犯禁蓋上玄保祐陛下恐陛下神武果斷有輕天下之心使知艱難將永福祚耳伏願悔前禍以荅天戒新聖化以承天休勿謂時鍾厄運而自疑勿謂事不由人而自解勤勵不息足致昇平豈止盪滌祅氛旋復宫闕而巳愚臣不勝區區憂國奉君之至誠有所切辭不􅁴煩伏惟陛下不以人廢言不以言廢直千慮一得或有取焉謹奏奉天論奏當今所切務狀隱朝昨日奉宣聖旨逆賊雖退猶未收城令臣審思當今所務何者最切具條録奏來者伏以􅀄經大變海内震驚無論順逆賢愚必皆企竦觀聽陛下一言失則四方解體一事當則萬姓屬心動􅀜安危不可不愼臣謂當今急務在於審察羣情􅀂羣情之所甚欲者陛下先行之羣情之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心況乎當變故動揺之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖􅀖家乎此誠當今之所急也然尚恐爲之不易者蓋以朝廷播越王命未行施之空言人或不信何以言其然今天下之所欲者在息兵在安業天下之所惡者在斂重在法苛陛下欲息兵則宼孽猶存兵固不可息矣欲安業則征徭未罷業固未可安矣欲薄斂則郡縣懼乏軍用令必不從矣欲去苛則行在素霽威嚴言且無驗矣此皆勢有所未制意有所未從雖施於德音足慰來蘇之望而稽諸事實未符悔禍之誠且動人以言者其感不深動人以行者其應必速蓋以言因事而易發行違欲而難成易發故有所未孚難成故無思不服今陛下將欲平禍亂拯阽危恤􅀺烝安反側旣未有息人之實又乏於施惠之資唯當違欲以行已所難布誠以除人所病乃可以彰追咎之意副惟新之言若猶不然未見其可頃者竊聞輿議頗究羣情四方則患於中外意乖百辟又患於君臣道隔郡國之志不逹於朝廷朝廷之誠不􅂛於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際眞僞雜糅於其間聚怨嚻嚻騰謗藉藉欲無疑阻其可得乎物論則然人心可見蓋謂含弘聽納是聖主之所難鬱抑猜嫌是衆情之所病伏惟陛下神無滯用鑒必窮微愈其病而易其難如淬鋒潰疣决防注水耳可以崇德美可以濟艱難陛下何慮不行而直爲此懔懔也臣謂冝因文武羣官入叅之日陛下特加延揖親與敘言備詢禍亂之由明示咎悔之意各使極言得失仍令一一面陳軍務之除到即引對不拘時限用表憂勤周公勤握髮吐餐而天下歸心則此義也又當假之優禮恱以温顔言切而理愜者必賞導以盡其情識寡而辭拙者亦容恕以嘉其意有諫諍無隱者願陛下叶成湯改過之美褒其直而勿􅈔其非有謀猷可用者願陛下體大禹拜言之誠􅅄其能而亟行其䇿至於匹夫片善採録不遺庶士傳言聽納無倦是乃揔天下之智以助聦明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與爲亂化疑梗爲訢合易怨謗爲謳歌浹辰之間可使丕變陛下儻行之不猒用之得中從義如轉圎進善如不及推廣此道足致和平其於昭德塞違恐不止當今所急也慮有愚而近道事有要而似迂冀垂睿思反覆詳覽必或無足觀採捨棄非遥謹奏奉天論前所荅奏未施行狀臣某言賊泚逋誅尚穴宫禁陛下思念宗廟痛傷􅀺元仁孝交感至於憤激猥以急務下詢微臣臣雖鄙懦尊慕仁義荷陛下知已之遇感陛下思理之誠愚􅂨所懷承問輙發不以淺深自揆不以喜怒上虞誠缺於周防承順之規是亦忠於陛下一至之分也前奉詔問㝷具上陳請延羣臣稍與親接廣咨訪之路開諫諍之門通壅鬱之情弘採拔之道自獻荅奏迨兹彌旬不聞施行不賜酬詰未審宸旨以爲何如昧於忖量但務竭盡恐由辭理蹇拙不能暢逹事情慺慺血誠敢願披瀝頻煩黷冒豈不慙惶蓋犬馬感恩思效之心睠睠而不能自止者也臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所由生也是則時之否泰事之損益萬化所繫必因人情情有通塞故否泰生情有薄厚故損益生通天下之情者莫智於聖人盡聖人之心者莫深於易象其別卦也乾下坤上則曰泰坤下乾上則曰否其取象也損上益下則曰益損下益上則爲損乾爲天爲君坤爲地爲臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也氣不交則庶物不育情不交則萬􅀖不和天氣下降地氣上騰然後歳功成君澤下流臣誠上逹然後理道立損益之義亦由是焉上約已而􅁉於人人必恱而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容易哉故喻君爲舟喻人爲水水能載舟亦能覆舟舟即君道水即人情舟順水之道乃浮違則没君得人之情乃固失則危是以古先聖王之居人上也必以其心從天下之心而不敢以天下之人從其欲乃至兢兢業業一日二日萬幾夫幾者事之微也以聖人之德天子之尊且猶愼事之微乃至一日萬慮豈不以居上接下懼失其情歟書曰人心惟危道心惟微微則萬幾之慮不得不精也危則覆舟之戒不得不畏也夫揆物以意宣意以言言或是非莫􅀂考於有跡跡或成敗莫􅀂驗於巳行自昔王業盛衰君道得失史􅁽盡在粲然可徴與衆同欲靡不興違衆自用靡不廢從善納諫靡不固逺賢恥過靡不危故詩書稱堯德則曰稽于衆捨已從人數舜之功則曰明四目逹四聦言務同欲也序禹之所由興則曰益賛于禹禹拜昌言述湯之所以王則曰用人惟已改過不􅈔言能納諫也歌文王作周則曰濟濟多士文王以寧美武王剋殷則曰亂臣十人同心同德言皆從善也堯舜禹湯文武此六君者天下之盛王也莫不從諫以輔德詢衆以成功是則德益盛者慮益微功愈髙者意愈下及代之衰也則道亦反焉故書曰紂有億兆夷人離心離德言違衆也詩曰汝炰烋于中國斂怨以爲德不明爾德時無背無側爾德不明以無陪無卿又曰雖無老成人尚有典刑曽是莫聽大命以傾言逺賢也書曰謂人莫已􅀂者亡詩曰惟彼不愼自獨俾臧自有肺膓俾人卒狂言自用也前史數桀紂之惡曰強足以拒諌辯足以飾非言恥過也考得失於巳行之迹鑒盛衰於巳驗之符孰失道而不衰孰得理而不盛報應以􅀋影響不差胡可不則而象之敬而畏之乎粤自秦漢曁于周隋其間將歷千祀代興者非一姓繼覆者非一君雖所遇殊時所爲異迹然失衆必敗得衆必成與堯舜禹湯同務者必興與桀紂幽厲同趣者必覆全失衆則全敗全得衆則全成多同於善則功多甚同於惡則禍甚善惡從􅀋端如貫珠成敗象行明􅀂觀火此歷代之元􅀛也尚恐議者曰時異事異臣請復爲賢君理代則企竦思齊言及稼穡艱難則上下相匡務遵勤儉言及閭閻疾苦則君臣同慮議息征傜懋德懲違觸􅀋滋長尚恐過言謬舉旣往難追毎召宰相平章必遣諫官俱入小有頗失隨即箴規得一善必遽命甄昇聽一諫必明加褒錫故得時無闕事人樂輸誠又引文學之流更直􅀫於内署或講求典禮或諷誦詩書毎至夜分情忘厭倦夫以太宗之德美貞觀之理安且猶務得人心其勤􅀂此是則人心之於理道可一日而不接乎髙宗始年亦親聽納故當時翕然歸美以爲有貞觀之風兼頼遺澤在人先範垂􅁉幸無改作俗以阜康數十年間天下無事承平之業滋乆倦勤之意頗彰燕居益深接下彌簡前哲之耿光浸逺中宫之威柄潛移卒有嗣聖臨朝天授革命豈不以經􅀖之道闕疇咨於大猷宴安之懷溺偏信於近狎馴致禍變幾將傾􅀖雖亂匪自他然其失一也弊俗一靡餘風遂流訖神龍景雲之間皆嬖倖亂朝聦明不逹玄宗躬定大難手振宏綱開懷納忠剋己從諫尊用舊老採拔羣才大臣不敢壅下情私昵不敢干公議朝清道泰垂三十年謂化已行謂安可保耳目之娱漸廣憂勤之志稍衰侈心一萌邪道並進貪權竊柄者則曰德如堯舜矣焉用勞神承意趣媚者則曰時已太平矣胡不爲樂有深謀逺慮者謂之迃誕驚衆有讜言切諫者謂之誹謗邀名至尊收視於穆清上宰養威於廊廟議曹以頌美爲奉職法吏以識旨爲當官司府以厚斂爲公忠權門以多賂爲問望外寵持竊國之勢内寵檀廻天之謡禍機熾然􅆋􅆋滋甚舉天下如居積薪之上人人懼焚而朝廷相􅀩曽莫之省日務遊宴方謂有無疆之休大盗一興至今爲梗豈不以忽於戒備逸於居安憚忠骾之怫心甘䛕詐之從欲漸漬不聞其失以至於大失者乎肅宗懲致宼之由藴發亂之略虚受廣納同符乎太宗招延詢謀輟食廢寢洞啓誠腑推心與人豁披􅇩􅁭忘己應物故得來蘇之望允塞配天之業勃興先皇帝繼守恭勤而益之以和惠惠則有感和則有親雖時繼艱屯而衆不離析理尚寛大務因循而重作爲然於紫宸聽朝常限三人奏事亦宣諭德令課責侍臣或賞其盡規或讓以容黙性本仁恕事多含弘諫雖未從且不深忤情苟有阻終獲上通故君臣相安而人亦小息陛下英姿逸辯邁絶人倫武略雄圖牢寵物表憤習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊自乆浚恒太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不逹於睿聦臣於往年曽任御史獲奉朝謁僅欲半年陛下嚴䆳髙居未甞降旨臨問羣臣跼蹐趨退亦不列事奏陳軒墀之閒且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔旣殊師錫且異公言未行者則戒以樞宻勿論巳行者又謂之遂事不諫漸生拘礙動渉猜嫌由是人各隱情以言爲諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰眞孰虚何得何失則事之通塞備詳之矣人之情僞盡知之矣列聖升降之效歷歷如彼當今理亂之由昭昭如此未有不興於得衆殆於失人􅁉於僉諧蔽於偏信濟美因乎納諫虧德由乎自賢善始本乎憂勤失全萌乎安泰今陛下將欲悔禍徼福去危從安􅀂不循太宗創業之規襲肅宗中興之理鑒天寳致亂之所以懲今者遷幸之所由則何以孚聖懷彰令問新逺邇之聽歸反側之心乎前承德音訪及庸鄙敢縁斯議輒以獻聞自爾巳來反覆千慮愚智有分信非可移至今拳拳猶滯所見不勝愚誠懇􅅃謹復布露以聞臣某惶怖死罪謹言唐陸宣公集卷第十二
