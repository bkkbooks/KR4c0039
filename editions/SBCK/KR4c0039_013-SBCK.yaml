body:
  text: 奉天請數對羣臣兼許令論事狀奉天論尊號加字狀重論尊號狀奉天論赦書事條狀奉天請數對羣臣兼許令論事狀朝隱奉宣聖㫖頻覽卿表狀勸朕數對羣臣兼許令論事辭理懇切深表盡忠朕本心甚好推誠亦能納諫但縁上封事及奏對者少有忠良多是論人長短或探朕意㫖朕雖不受䜛􅉲岀外即謾生是非以爲威福朕往日將謂君臣一體都不隄防縁推誠信不疑多􅀍姦人賣弄今所致患害朕思亦無他故却是失在推誠又諫官論事少能愼宻例自矜衒歸過於朕以自取名朕從即位以來見奏對論事者甚多大都皆是雷同道聽塗說試加質問即便辭窮􅀂有竒才異能在朕豈惜拔擢朕見從前巳來事秖如此所以近來不多取次對人亦不是倦於接納卿冝深悉此意者聖德廣大如天包容俯矜狂愚仍賜奬諭嘉臣以懇切目臣以盡忠雖甚庸駑實懷感勵夫知無不言之謂盡事君以義之謂忠臣之夙心乆以自誓以此爲奉上之道以此爲報主之資幸逢休明獲展誠願旣免罪戾又􅀩襃稱庶奉周旋不敢失墜儻陛下廣推此道施及萬方咸􅅄直以矜愚各録長而捨短人之欲善誰不如臣自然聖德益彰羣心盡逹愚􅂨懇懇實在於斯睿眷特深縷宣密旨備該物理曲盡人情其於慮逺防微固非常識所逮然臣竊謂天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納帝王之盛莫盛於堯雖四凶在朝而僉議靡輟故曰惟天爲大惟堯則之是知人有邪直賢愚在處之各得其所而巳必不可以忠良者少而闕於詢謀獻納之道也昔人有因噎而廢食者又有懼溺而自沉者其爲矯枉防患之慮豈不過哉願陛下取鑒於兹勿以小虞而妨大道也臣聞人之所􅂇在乎信信之所立由乎誠循誠於中然後俾衆無惑存信於已可以教人不欺唯信與誠有補無失一不誠則心莫之保一不信則言莫之行故聖人重焉以爲食可去而信不可失也又曰誠者物之終始不誠無物物者事也言不誠則無復有事矣匹夫不誠無復有事況王者頼人之誠以自固而可不誠於人乎陛下所謂失於誠信以致患害者臣竊以斯言爲過矣孔子曰可與言而不與之言失人不可與言而與之言失言智者不失人亦不失言由此論之陛下可審其所言而不可不愼信其所與而不可不誠海禽至微猶識情僞含靈之􅀋固必難誣前志所謂衆庶者至愚而神蓋以􅃖􅃖之徒或昬或鄙此其似於愚也然而上之得失靡不辯上之好惡靡不知上之所祕靡不傳上之所爲靡不効此其􅀋於神也故馭之以智則人詐示之以疑則人偷接不以禮則徇義之意輕撫不以恩則効忠之情薄上行之則下從之上施之則下報之􅀂響應聲􅀂影從表表枉則影曲聲􅁋則響邪懷鄙詐而求顔色之不形顔色形而求觀者之不辯觀者辯而求衆庶之不惑衆庶惑而求叛亂之不生自古及今未之得也故唯天下至誠爲能盡其性能盡其性則能盡人之性􅀂不盡於已而望盡於人衆必紿而不從矣不誠於前而曰誠於後衆必疑而不信矣今方岳有不誠於國者陛下則興師以伐之臣庶有虧信於上者陛下則出令以誅之有司順命誅伐而不敢縱捨者蓋以陛下之所有責彼之所無故也向􅀂陛下不誠於物不信於人人將有辭何以致討是知誠信之道不可斯湏去身願陛下愼守而行之有加恐非所以爲悔者也臣聞春秋傳曰人誰無過過而能改善莫大焉易曰日新之謂盛德禮記曰德曰新日日新又日新商書仲虺述成湯之德曰用人惟已改過不吝周詩吉甫美宣王之功曰衮職有闕惟仲山甫補之夫禮易春秋百代不刋之典也皆不以無過爲美而謂大善盛德在於改過日新成湯聖君也仲虺聖輔也以聖輔而賛􅀭聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明唯以改過爲能不以無過爲貴蓋爲人之行己必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德曰新是爲君子遂非則其惡彌積斯謂小人故聞義能徙者常情之所難從諫勿咈者聖人之所尚至於賛揚君德歌述主功或以改過不吝爲言或以有闕能補爲美中古巳降湻風浸微臣旣尚䛕君亦自聖掩盛德而行小道於是有入則造􅂰出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑􅉲臣之罪由此生媚道一行爲害斯甚太宗文皇帝挺秀千古清明在躬再恢聖謨一變流弊以虚受爲理本以直言爲國華有面折廷爭者必爲霽雷霆之威而明言􅅄納有上封獻議者必爲黜心意之欲而手勑襃揚故得有過必知知而必改存致雍熈之化没齊堯舜之名向􅀂太宗徇中主之常情滯習俗之凡見聞過則羞己之短納諌又畏人之知雖有求理之心必無濟代之効雖有悔過之意必無從諌之名此則聽納之實不殊隱見之情小異其於損益之際巳有􅀂此相懸又況不及中才師心自用肆于人上以遂非拒諌孰有不危者乎且以太宗有經緯天地之文有底定禍亂之武有躬行仁義之德有致理太平之功其爲休烈耿光可謂盛極矣然而人到于今稱詠以爲道冠前古澤􅀍無窮者則從諌改過爲其首焉是知諌而能從過而能改帝王之美莫大於斯陛下所謂諌官論事少能愼密例自矜衒歸過於朕者臣以爲不密自矜信非忠厚其於聖德固亦無虧陛下􅀂納諌不違則傳之適足増美陛下􅀂違諌不納又安能禁之勿傳伏願以貞觀故事爲楷模使太宗風烈重光於聖代恐不可謂此爲歸過而阻絶直言之路也臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之義是則聖賢爲理務徇衆心不敢忽細微不敢侮鰥寡侈言無驗不必用質言當理不必違遜于志者不必然逆于心者不必否異於人者不必是同於衆者不必非辭拙而効速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他唯善所在則可以盡天下之理見天下之心夫人之常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所欲信旣偏則聽言而不考其實由是有過當之言疑旣甚則雖實而不聽其言於是有失實之聽輕其人則遺其可重之事欲其事則存其可弃之人斯並苟縱私懷不稽皇極于以虧天下之理于以失天下之心故常情之所輕乃聖人之所重圖逺者先驗於近務大者必愼於微將在愽採而審用其中固不在慕髙而好異也陛下所謂比見奏對論事皆是雷同道聽塗說者臣竊以衆多之議足見人情必有可行亦有可畏恐不冝一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣竊以陛下雖窮其辭而未盡其理能服其口而未服其心何以知其然臣每讀史書見亂多理少因懷感歎嘗試思之竊謂爲下者莫不願忠爲上者莫不求理然而下毎苦上之不理上毎苦下之不忠􅀂是者何兩情不通故也下之情莫不願逹於上上之情莫不求知於下然而下􅁪苦上之難逹上􅁪苦下之難知􅀂是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辯給􅅭聦明厲威嚴恣彊愎此六者君上之弊也謟䛕顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之謟䛕者順旨而忠實之語不聞矣上騁辯必勦說而折人以言上􅅭明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之說不申矣夫以區域之廣大生靈之衆多宫闕之重深髙卑之限隔自􅀺獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其閒則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然考其􅀄心不必􅁋􅁀亦在乎兩情相阻馴致其失以至于艱難者焉昔龍逢誅而夏亡比干剖而殷滅宫竒去而虞敗屈原放而楚衰臣謂夏殷虞楚之君若知四子之盡忠必不勦弃若知四子之可用必不拒違所以至於忍害而捨絶者蓋謂其言不足行心不足保故也四子旣去四君亦危然則言之固難聽亦不易趙武呐呐而爲晉賢臣綘侯木訥而爲漢元輔公孫􅀪上書論事帝使難􅀪以十䇿􅀪不得其一及爲宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一詶一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才臣是以竊慮陛下雖窮其辭而未窮其理能服其口而未服其心良有以也古之王者明四目逹四聦蓋欲幽抑之必通且求聞己之過也垂旒於前黈纊於側蓋惡視聽之太察唯恐彰人之非也降及末代則反於斯聦明不務通物情視聽秖以伺罪釁與衆違欲與道乖方於是相尚以言相示以智相冒以詐而君臣之義薄矣以陛下性含仁聖意務雍熈而使至道未孚臣竊爲陛下懷愧於前哲也古人所以有恥君不如堯舜者故亦以是爲心乎夫欲理天下而不務於得人心則天下固不可理矣務得人心而不勤於接下則人心固不可得矣務勤接下而不辯君子小人則下固不可接矣務辯君子小人而惡其言過恱其順已則君子小人固不可辯矣趣和求媚人之甚利存焉犯顔取怨人之甚害存焉居上者易其害而以美利利之猶懼忠告之不蔇況有踈隔而勿接又有猜忌而加損者乎天生烝人合以爲國人之有口不能無言人之有心不能無欲言不宣於上則怨讟於下欲不歸於善則湊集於邪聖人知衆之不可以力制也故植謗木陳諫鼔列爭臣之位置采詩之官以宣其言尊禮義安誠信厚賢能之賞廣功利之途以歸其欲使上不至於亢下不至於窮則人心安得而離亂兆何從而起古之無爲而理者其率用此歟苟有理之之意而不知其方苟知其方而心守不壹則得失相半天下之理亂未可知也其又違道以師心弃人而任已謂欲可逞謂衆可誣謂專斷無傷謂詢謀無益謂䛕說爲忠順謂獻替爲妄愚謂進善爲比周謂嫉惡爲嫌息謂多疑爲御下之術謂深察爲照物之明理道全乖國家之顚危可立待也理亂之戒前哲備言之矣安危之效歷代甞試之矣舊典盡在殷鑒足徴其於措置施爲在陛下明識所擇耳伏願廣接下之道開􅅄善之門􅀪納諫之懷勵推誠之美其接下也待之以禮煦之以和虚心以盡其言端意以詳其理不禦人以給不自􅅭以明不以先覺爲能不以臆度爲智不形好惡以招謟不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍􅃖而妍􅃖自彰莫得而怨也有犯顔讜直者􅅄而親之有利口䜛佞者踈而斥之自然物無壅情言不苟進君子之道浸長小人之態日消何憂乎少忠良何有乎作威福何患乎妄說是非如此則接下之要備矣其􅅄善也求之若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪㳙必容能小事則處之以小官立大勞則報之以大利不忌怨不避親不抉瑕不求備不以人廢舉不以己格人聞其才必試以事能其事乃進以班自然無不用之才亦無不實之舉如此則􅅄善之道得矣其納諌也以補過爲心以求過爲急以能改其過爲善以得聞其過爲明故諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆爲盛德是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得採納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之德光矣其推誠也在彰信在任人彰信不務於盡言所貴乎出言則可復任人不可以無擇所貴乎巳擇則不疑言而必誠然後可以求人之聽命任而勿貳然後可以責人之成功誠信一虧則百事無不紕繆疑貳一起則羣下莫不憂虞是故言或乖冝可引過以改其言而不可苟也任或乖當可求賢以代其任而不可疑也如此則推誠之義孚矣微臣所以屢屢塵黷而不能自抑者蓋以陛下有拯亂之志而多難未平有務理之誠而庶績未乂有堯舜聦明之德而未光宅於天下有覆載含􅀪之量而未翕受於衆情故臣毎中夜靜思無不竊歎而深惜也向􅀂陛下有其位而無必行之志有其志而無可致之資則臣固巳從俗浮沉何苦而汲汲如是惟陛下詳省所闕亟行所冝歸天下之心濟中興之業此臣之願也億兆之福也宗社無疆之休也謹奏奉天論尊號加字狀右冀寍奉宣聖旨往年百官請上尊號曰聖神文武皇帝今縁經此宼難諸事並冝改變衆議欲得於朕舊號之中更加一兩字卿冝商量事體穩便得否者伏以睿德神功參天配地巍巍蕩蕩無得而名臣子之心務崇美號雖或増累盈百猶恐稱述未周陛下旣越常情俯稽至理愚􅂨未諭安敢不言竊以尊號之興本非古制行於安泰之日巳累謙沖襲乎喪亂之時尤傷事體今者鑾輿播越未復宮闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下誠冝深自懲勵以收攬羣心痛自貶損以答謝靈譴豈可近從末議重益美名旣虧追咎之誠必累中興之業以臣庸蔽未見其冝乞更詳思不爲兇孽所幸此臣之至願也謹奏重論尊號狀右冀寧奉宣聖旨卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿冝爲朕更審思量應亦無妨者臣聞德合天者謂之皇德合地者謂之帝德合人者謂之王父天母地以養人理物各得其冝者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黃帝堯舜自生人巳來君德之最神聖者天下尊之美之亦巳至矣而其指以爲號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫匪大聖尚自菲薄降號爲王嬴秦德衰於殷周而名竊於羲皥兼皇與帝始揔稱之流及後代昬僻之君乃有聖劉天元之號是知人主輕重不在名稱崇其號無補於徽猷損其名不傷於德美然而損之有謙光稽古之善崇之獲矜能納謟之譏得失不侔居然可辯況今時遭屯否事屬艱難尤冝懼思以自貶抑必也俯稽術數須有變更與其増美稱而失人心不􅀂黜舊號以祇天戒天時人事理必相扶人旣好謙天亦助順陛下誠能斷自宸鑒渙發德音引咎降名深自剋責惟謙與順一舉而二美從之外可以收物情内可以應􅀇運上可以髙德於夐古下可以垂法於無窮興廢典矯舊失至明也損虚飾收美利大智也前聖之所以永保鴻名常爲稱首者逹於兹義而巳矣陛下何恡而不革反欲加冗號以受實患哉􅀇元道德經曰王侯自謂􅀌寡不穀以賤爲本也周襄王遭亂出居于鄭告於諸侯曰不榖不德鄙在鄭地春秋禮之以其能降名也漢光武詔令上書者不得言聖史􅁽稱之以其能損已也臣顧以賤微獲承訪議伊尹耻其君不如堯舜臣亦耻之是以誠發於中不復防慮忌諱赦其愚而鑒其理惟明主行焉謹奏奉天論赦書事條狀右隱朝奉宣聖旨并以中書所撰赦文示臣令臣審㸔可否如有須改張處及事冝不盡條錄奏來者臣謹如詔旨詳省再三猶懼所見不周兼與諸學士等參考得失僉以爲綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寳志壹中區窮用甲兵竭取財賦甿庶未逹於暫勞之旨而怨咨巳深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盗據宫闈九廟鞠䧟於匪人六師出次於郊邑奔逼憂厄言之痛心自古禍亂所鍾罕有􅀂此之􅁀今重圍雖解逋㓂尚存裂土假王者四兇滔天􅆫帝者二竪又有顧瞻懷貳叛援黨姦其流寔繁不可悉數皇輿未復國柄未歸勞者未獲休功者未及賞困窮者未暇恤滯抑者未克申將欲紓多難而收羣心唯在赦令誠言而巳安危所屬其可忽諸動人以言所感巳淺言又不切人誰肯懷昔成湯遇災禱于桑野躬自髠剔以爲犧牲古人所謂割髪冝及膚翦爪冝侵體良以誠不至者物不感損不極者益不臻今兹德音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不􅀪宣暢鬱堙不可不洞開􅁭抱洗刷疵垢不可不盪去瘢痕使天下聞之廓然一變􅀂披重昬而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具別狀同進除此之外尚有所虞竊以知過非難改過爲難言善非難行善爲難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形於事人或未諭故宣之以言言必顧心心必副事三者符合不相越踰本於至誠乃可求感事或未致則如勿言一虧其誠終莫之信伏惟陛下先斷厥志乃施於辭度其可行而宣之其不可者措之無苟於言以重其悔言克誠而人心必感人心旣感而天下必平事何可不詳言何可不務罄輸愚懇伏聽聖裁謹奏唐陸宣公集卷第十三
