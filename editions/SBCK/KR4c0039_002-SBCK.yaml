  text: 唐陸宣公集卷第二制誥卷第二
  hash: sha256:1bd42ee24c4ec778f6eeac39d382a939a76651a9005179265e263ef34e8120e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_002-1a}
body:
  text: 貞元改元大赦制興元二年正月一日門下王者體元立極欽􅀂乎天地纂業承統嚴奉于祖宗用能百神允諧兆庶永頼立國之本斯其大經朕燭理不明違道招損往遭多難淪䧟國都天地宗祧曠而莫主則是欽􅀂嚴奉之義缺矣甚用懼焉洎復京師遽將告謝有司以人力耗斁禮物廢隳日居月諸歳聿云暮卜其􅁻日俯在上春齊心永懷坐以待曙而百辟卿士抗䟽上言咸謂人心未寧不足以盡敬㓂孽猶在不足以告功迫於群情俯抑誠願郊廟孔邇瞻言莫從悼心慚顔胡寧自處重以和平未洽災沴荐臻去歳旱蝗兩河爲甚人流不息師出靡居加之以徴求因之以荒饉困窮殍餒轉死丘墟􅀜輔之間冬無積雪土膏未發宿麥不滋詳思咎徴有爲而致兵戎之後餘祲尚存獄犴之中深􅁈未釋又河中淮右逆將阻兵汙脅齊人䧟之死地雖欲自雪厥路無由抱義銜􅁈足傷和氣此皆由朕爽德播災于人爲之父母實用愧耻今玄隂已謝春曰載陽勾萌畢伸幽蟄咸震思與海内同心自新發號更元用符天意宜改興元二年爲貞元元年自正月一日昧爽巳前犬辟罪巳下巳發􅁴未發􅁴巳結正未結正繫囚見徒罪無輕重咸赦除之先准勑令量移收叙人所司據節文速與處分應河中脅從將士多是奉天赴難功臣本居朔陲夙尚忠節豈以一夫詿誤棄其累代勲庸朕於此軍􅀹所不忍特冝洗滌以待初誠自非與官軍决戰死於鋒刃其餘雖臨陣擒獲亦從釋放棄逆歸順者在身先有官爵實封一切如舊仍准前後勑所在便給賞錢并與甄叙如有因危効節建立殊庸量其事績特加􅅄擢李懷光若能飜然悔過束身赴朝念其甞有大勲必當終始全護仍准前勑授之官封朕於功臣庶亦無負淮西將吏百姓等皆被刼制乆爲匪人詢事原情諒非獲已今王師四合計日誅夷玉石俱焚用増惻憫冝令諸道進軍之日唯存首惡一人自餘徒黨悉從原宥如有歸順及立功者並准河中將士例褒奬夫爲國之要在於審官共理分憂守宰彌切闔境性命繫乎其人將使里閭無愁苦之聲風俗興廉讓之教得不愼柬髦彦􅀉之化源自今巳後諸州刺史有闕中書門下於朝官中精擇有理人才術者授之如刺史縣令在任頻年課績􅀹異者擢授侍郎給舎郎官御史中外迭處用觀其能賞罰必行期於競勸自頃選曹署吏唯以書判求人務騁浮華莫稽實行且能言者不必適用藴用者或未能言凢爲擇人其在精覈冝令清資常叅官毎年於吏部選人中各舉所知一人堪任縣令録事叅軍者所司依資叙注擬便於甲暦之内具摽舉主名銜仍牒報御史臺如到任後政尤異者有贓犯事跡著明者所司録舉官姓名聞奏以爲褒貶其内外貟及京城諸使名目委御史審勘㑹啇量并省停減仍集百寮定議務從簡約息費便人其京官職田及息利官錢等􅃛吏詆欺移易疆畔或貧人轉徙捕繋親隣日月滋深耗弊彌甚亦令百寮議其折􅂨擇善而行往以賦役殷繁人不堪命定爲兩稅事額易從比屬軍興或踰始制法無所守吏益爲姦哀我勞人汔可小息自諸道州府除兩稅外應有權冝科率差使一切悉停京畿及近縣所欠百姓和糴價直委度支即勘㑹支給諸道非臨宼賊州縣自冬巳來􅀧召官徤子弟並冝放散任營生業應經䧟賊州縣百姓屋宇􅀍焚毀并貧病老弱及遭傷損之􅀋所在量加優恤使得安存天下名山大川并自古聖帝明王賢臣烈士祠廟墳基各委當處長吏擇日致􅀕必資精㓗以逹志誠班制有差所以序賢也廪秩有等所以明勸也今或髙卑失序中外相踰至於卿士之家尚罹凍餒之患忠信重禄豈其然耶内外官禄及俸錢手力雜給等委中書門下度支即叅詳定額聞奏應赴奉天及收城將士等並功存社稷節著艱危中心藏之豈忘酬報頃縁府藏空竭賞給未周乃眷勲臣實用増愧應准元勑合請賞錢人委所司節減在官及百司費用據所有財物速與給付應在京城及諸道立功將士等先有詔旨並許甄􅂛所司勘㑹淹歷時月委中書門下即准元勑處分諸軍行營并河中朝邑被脅從將士家口在京及諸州府者冝令本道節度觀察使安存賑恤各令優給應諸軍使立仗見在城將士等共賜七萬匹制書有未該備所司速皆􅀋條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里遐邇咸知冬至大禮大赦制貞元元年十一月門下君天下者受命于天地繼業于祖宗致其誠心惟敬與孝違敬莫大乎廢祀虧孝莫大乎黷神朕以􅆌身屬承大統縱欲敗度浸生厲階兵連禍深變起都邑六師播蕩九服震驚郊廟園陵䧟於凶逆神人乏主將迨周星列聖大業幾墜于地違虧敬孝罪由朕躬撫臨萬􅀖甚用自愧側身思咎庶補將來股肱元臣比義叶德爪牙衆士戮力同心誅大憝而都邑廓清剪逋㓂而􅀜河底定兹再與王公卿尹洎億兆之人備其盛容脩其禮物薦誠清廟展敬圜丘陳謝罪􅄽告雪憤耻感慕慙惕􅀂無所容上帝顧懷再新景命豈伊匪德獨荷鴻休思與普天誕膺多福可大赦天下自貞元元年十一月十一日昧爽巳前大辟巳下巳發􅁴未發􅁴巳結正未結正繫囚見徒罪無輕重常赦不原者咸赦除之左降官量移近處流人及藩鎭効力並即放還應有痕殿禁錮前後恩赦節文未該及者亦冝洗雪勿以爲累李希烈僣逆不道誠所難容朕憫念蒼生務息征討頻有詔命許其自新􅀂能歸降依前勑待以不死淮西管内將士官吏百姓等一切原宥與之如初先有官封亦皆復舊如能特建功効者當別抽擢􅀂家口親屬在諸道者長吏綏撫各使安存其歸順百姓仍委節度觀察使刺史給空閑地任便安居優復終身務令全濟待事平巳後聽歸本貫天下百姓去年十二月巳前欠負官稅官租及諸色人逋懸一物巳上但不在官典復内者一切免放内外文武官見任及致仕官三品巳上賜爵三級四品巳下加一階天下諸使諸將軍士三品巳上賜爵一級四品巳下加一階白身人賜勲三轉自頃􅇯渠倡亂逆臣附姦保據國都慿陵甸服朕出次郊邑再遷巴梁險阻艱難靡不經歷􅁀亂之後仍彰烈士之功憂危之中方見直臣之節録勲進善其可弭忘應奉天興元元年扈從立功并收京城將士食實封者各隨文武與一子官餘並加兩階仍賜勲三轉其文武百官應扈從到興元府者五品巳上賜爵一級六品巳下加一階合入三品五品者不拘考限聽叙其五品巳下父母未經追贈者與追贈應平河中將士即准元勑速與甄􅅄自建中四年巳來有身死王事義烈著明未經褒贈者本道即具名銜事跡聞奏諸道有解退官健州府長吏切務安存仍量以空閑田地給付免其差役任自營生社稷之勲以輔興王業統帥之任以緫制戎麾叅衮職者其德崇授旄節者其功大方鎭乃國之垣翰禁衛實予之爪牙尹京實頼於肅清主計􅀹資於辦集所頒慶澤冝越常倫司徒兼中書令晟冝與一子五品正貟官并四品階諸道副元帥與一子六品正貟官中書門下平章事充節度使各與一子七品正貟官節度使及神䇿兵馬使六軍統軍金吾六軍大將軍判度支侍郎各與一子八品正貟官都團練都防禦等使京兆河南尹金吾六軍將軍殿前射生兵馬使各與一子九品正貟官多難以來三十餘載克平禍亂屬在戎臣或節著艱危或勲髙戰伐受任雖專於緫帥成功亦頼於羣材懋賞推恩冝加㣧嗣諸道大將功業崇髙者各與一子官本使即詳定録名聞奏副元帥都統兼節度下毎道各二十人都團練都防禦使下各十人如大將子孫之中有藝業優長性行純確者本使具狀聞薦仍量事資給令赴上都朕當隨材授官以充侍衛庶使忠臣之後與國無窮故尚父子儀先朝元勲再復京邑贈太尉秀實以死爲國節冠古今冝令與子孫一人五品正貟官自至德巳後節度使大將有忠烈績効著明其後淪翳者所司即條録聞奏與子孫一人正貟官諸色人應在賊中濳奉神主頃巳甄賞冝便賜優崇三品巳上賜爵一級四品巳下加一階江淮轉運使檢校左僕射同中書門下平章事韓滉勵精勤職夙夜在公漕輓資儲千里相繼事無􅄽素人不告勞拯于凶災厥有成績可進封晉國公􅀜畿之内連􅀊興戎荐屬天災稼穡不稔􅂖糴翔貴烝􅀺困窮倉廪空虚莫之賑贍毎一興念憫然痛心冝令度支取江西湖南見運到襄州米十五萬石設法般赴上都以救百姓荒饉如山路險阻車乗難通仍召貧人令其般運以米充脚價務於全活流庸庶事優饒副朕勤恤立國之道始於親親所以厚骨肉之恩明教化之本況荐經艱故宗族漂淪敦睦之情有加常典大長公主長公主公主各與一子七品官嗣王郡王郡主縣主各與一子官出身應陪位皇親五等巳上諸親三等已上者三品巳上賜爵一級四品五品加一階六品巳下及常選官散官等簡選日優與處分未出身人量授文武散官如宗子中有德行才能宗正卿具名聞奏當别􅅄任致理之本在乎審官審官之由資乎選士將務選士之道必精養士之方魏晉巳還澆風未革國庠郷校唯尚浮華選部禮闈不稽實行學非爲已官必徇人法且非精弊將安救冝令百寮詳思所冝各修議狀中書門下叅較得失擇善而行有虞建官三載考績在漢爲吏或長子孫蓋吏乆於官則人情不苟官乆於事則理化有成日者制度廢隳考課乖舛淹速靡凖􅂛降無名欲令庶寮何以懲勸自今以後刺史縣令未經三考不得改移自餘非在職績効殊􅀹亦不得越次遷轉刺史停替湏待魚書内外五品巳上及常叅官在任年考巳深者即量才効用與改中外迭處以觀其能夫明目逹聦務廣聞見或慮懷才抱器輸忠納諌之倫地處幽遐無由自逹永言於此夢想不忘應諸色人有長䇿濟時忠規匡主任具陳所見詣所居之州委刺史略與討論觀其旨趣但有裨治道不渉私情便與附驛遞送朕當親覽自立兩稅經今百年或􅀄定之時巳有偏併或戸口減耗舊額猶存輕重不均流亡轉甚委度支即折􅂨條理以䘏困窮古者雖有水旱人無菜色皆由儲畜不匱勸導有方前代所置義倉國初亦循其制備災救乏甚便於人即冝准貞觀故事天下所墾見田上自王公下及百姓毎豐稔之􅀊秋夏兩時州縣長官以理勸課據頃畒多少隨所種粟豆稻麥遂便貯納以爲義倉如年榖不登即量取賑給官司但爲其立法勸諭不得收管仍各委本道觀察使逐便冝處置聞奏敦本厚生必資播殖當今所切莫甚於斯自今百姓有墾闢田疇加於常􅀊者所加之地不得輙徴租稅刺史令長考課亦以本界墾田多少爲殿最今年蝗旱損甚州府開春之後量給種子使就農功天下應荒閑田有肥沃堪置屯田處委當管節度使觀察都􅇛練都防禦等使刺史審細檢行以諸色人及百姓情願者使營佃如部署精當收獲數多本道刺史特加褒􅂛屯田等節度優賞如是逃戸田地本主復業即却給還輦轂之下四方㑹同供應旣多難爲凖定急賦繁役人何以堪冝令京兆尹與度支計㑹長安萬年兩縣毎季各先支貯備錢五千貫文於縣庫收納定清幹官專知應縁卒湏別索及雜供擬并工匠等縣令與專知官先對給價錢季終之後申度支勘㑹所是和市和雇並湏先給價錢兩稅外一物巳上不得科配百姓御史臺朝廷紀綱尚書省治化根本百度得失繫乎其人自頃制勑頒行所司多不遵守王臣奉職豈所冝然委御史臺左右丞切糾稽違無壅朕命南郊太清宫太廟應職掌行事官郊廟攝將軍中郎郎將及留守副留守内定行從官三品巳上各賜爵一級四品巳下加一階並賜勲兩轉其諸色支供作官司直長上流外灼然要職掌者並賜勲兩轉行事室長掌坐齋郎禮生賛者減二年勞無勞可減者簡選日優與處分崇賢舘學生見在者減帖䇿各一道國子監陪位學生賜勲一轉介公􅈶公各與一子官如無子孫賜物一百匹神䇿六軍殿前左右射生英武威逺皇城左右金吾街使將士應縁大禮􅀫衛御樓立仗及守本庫本營者共賜物􅀂干端疋天災作沴深儆予􅂨跼蹐憂慚罔知攸措今􅂖價騰踊人情震驚郷閭不居骨肉相棄流離殞斃所不忍聞公私之間廪食俱闕旣無賑恤又復徴求財殫力竭繼以鞭箠㢮征則軍糧乏贍厚取則人何以堪念兹困窮痛切心骨思所以濟浩無津涯補過實在於増脩救患莫如於息費致咎之本旣由朕躬謝譴之誠冝自朕始冝令尚食所進御膳每日各減下一半應宫人等每月惟供給糧米一千五百碩飛龍廐馬從今巳後至三十日巳前並減一半料京兆府應差科百姓及和市和買等諸色目事無大小一切並停公私債負容待蠶麥熟後徴理唐陸宣公集卷第二
