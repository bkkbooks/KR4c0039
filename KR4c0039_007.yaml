front:
  text: 唐陸宣公集卷第七制誥卷第七除授
  hash: sha256:e08833c1e306e39ff038d21e27a0e18b09dd5602f30513ef535e5276ddc03c38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_007-1a}
body:
  text: 李晟可徒兼中書令制雲雷搆屯宇縣興難非山嶽降神不生良弼非股肱叶契不集大勳故髙宗得傅説中興殷邦宣王任吉甫重光周道天寶之季寇陷二京時則先臣子儀翼戴肅宗戡定禍亂再造區夏于今賴之肆子小子獲纘丕構不克負荷失守宗祧天祚我唐降生忠烈有社稷之臣曰開府儀同三司檢校尚書左僕射中書門下平章事充神䇿軍節度鄜坊等州管內觀察處置等使京畿渭南渭北商華等州兵馬副元帥上柱國合川郡王李晟沉肅有勇堅明能斷聞難感憤誓軍徂征誠激于衷義形于色自河之右萬里濟師殷然雷奔大盜懾駭屬皇家不造戎師誘姦重兹播遷郊甸震蕩而晟蓄鋭養士深壘固軍以謀吞元凶以義紏羣帥躬擐甲胄率先啓行布忠信為軍聲持義烈為戰器廓清氛沴寧復皇都宗廟載安宇宙斯泰佐豫興運時乃茂功德厚者任崇業盛者報重升以元輔建于上公熙庶績而翼宣九歌擾兆人而敬敷五教用疇井賦貽厥子孫與國咸休永播丕烈可司徒兼中書令仍賜食封一千戶餘並如故俟還京後所司擇日備禮册拜宣示中外以彰元勳蕭復劉從一薑公輔平章事制宰輔之任獻替為務內凝庶績外撫四夷調隂陽以成歲功贊化育而熙帝載若金用礪其弼豫違如旱為霖允從人望矧時屬多難彌切任賢朕未嘗不朝夕論思夢寐懷想道之所在人逺乎哉朝議大夫守戶部尚書兼御史大夫充荆襄江西等道都元帥統軍長史豐縣開國公賜紫金魚袋蕭復性質端亮理識精敏約巳弘物體方用圎為邦必表其理能及霤亟聞於鯁議動可成範立不易方守尚書吏部郎中兼御史中丞充荆襄江西等道都元帥判官賜緋魚袋劉從一貞白其行溫恭其文居簡而適用必通禮和而臨事有立持重能斷端慤有恆纍更委任多所弘益守京兆府户曹參軍翰林學士賜緋魚袋薑公輔志懷濟物監必通理主文而諫忠靡退言經始以謀事皆前定道無屈撓智適變通並可以參贊大猷光膺僉屬兵戎未靖期爾經綸都邑未康期爾還定豫一人有過爾是用匡伊萬姓不寧爾是用乂欽哉愼乃有位罔癏厥官復可守吏部尚書同中書門下平章事散官封賜如故從一可守尚書刑部侍郎同中書門下平章事賜紫金魚袋公輔可守諫議大夫同中書門下平章事賜紫金魚袋張延賞中書侍郎平章事制兩漢致理由乎審官多以牧宰髙第入居台輔黃霸自頴川而次遷丞相卓茂由密令而超拜三公蓋以為國本於親人舉賢先於稱職旌能勸善風化大端今革車荐興賦煩人散匡弼寡昧屬于才臣光祿大夫檢校吏部尚書兼成都尹御史大夫充劒南西川副大使管內度支營田觀察處置等使上柱國魏國公張延賞崇飭文行勵精理道踐歷中外所至有聲慮必周密心無屈撓簡廉以肅吏慈惠以愛人明以照姦和以定衆去若始至久而見思秉志不渝課績常最以爾循良之化佐豫綏兆人以爾經綸之才佐豫熙庶績仍資威重兼領蕃維式慰甘棠之思且繼緇衣之美懋昭邦典勿替家聲可中書侍郎平章事依前兼成都尹餘如故渾瑊侍中制論道經邦興戎定亂執是二柄毗豫一人得諸全才康濟大難懋官昨土備舉彛章開府儀同三司檢校尚書左僕射同中書門下平章事兼靈州大都督府長史充靈鹽銀夏等節度管內觀察處置度支營田押蕃落等使仍充朔方邠寧振武等道奉天永軍行營節度副元帥柱國樓煩郡王渾瑊神降才傑天資忠厚叶于興運為國輔臣往以盜起上京駕言出狩羣凶怙亂再犯郊畿時乃奮揚武威董制師律深居籌畫姧慝寢謀當敵旨揮士旅增氣危城克固我伐用張重以賊臣蔑恩養寇資亂再罹艱阻播越巴梁時乃并轡載馳執羈從邁有見危致命之節有憂國滅私之誠凛然貞規介若金石縱橫有夷難之略感激陳復國之謀分總偏師徑出重險秉大節以誓羣帥布寬令以宥脅從師次近郊摧凶非抗軍臨近甸下邑如歸推成功以不居期盡敵以自效率其全衆揚斾前追雄威疾馳元惡授首柔德懷服餘黨歸心掃闢氛昏安復園寢懋乃嘉績其維格天范燮之讓能耿弇之殄寇揔是二美瑊其有焉足以垂勳旗常垂美竹帛冝首台階之列仍疇井邑之賦祗膺時命無替厥庸可侍中仍賜實封八百戶餘如故虜翰劉從一門下中書侍郎平章事制寅亮天工弘宣理本俾豫從乂時乃輔臣扈蹕載驅以勞定國懋官遷列式是彛章銀青光祿大夫行尚書兵部侍郎同中書門下平章事范陽縣開國公盧翰嚴重不撓貞方自持養恬鎮俗居簡濟衆言思無隱事必同恆守刑部侍郎同中書門下平章事賜紫金魚袋劉從一質厚氣深識精體逺沖用無竭貞規不渝從容以和出納惟允自鸞車載駕薄狩于梁執羈有從我之勤及霤勵匪躬之節交修不逮庶績其凝俾承命於掖垣仍參掌於樞務今百度伊始六府載張論駮是非不可以不審宣揚憲令不可以不明爾其欽承無墜我休命翰可門下侍郎同中書門下平章事散官勳封如故從一可中書侍郎同中書門下平章事餘如故劉滋崔造齊映平章事制朕嗣位君臨精求理道小大之務靡不經心日愼一日于今八載教化未洽蒸黎未康因之以甲兵繼之以災沴斯固鑒有所不至慮有所不周豫深浩然若涉深水思所以匡我致理助我官人宣其澤而四方以寧執其要而百工式敘允是大任其惟輔臣夢想勞懷數求俊乂察言而觀行因事以考能周行之中乃得良弼權知吏部侍郎劉滋操履貞清介然自守居能愼獨重不違仁析理究其精微勵學探於奧旨守給事中賜緋魚袋崔造性合道要誠通化源適時有成務之才事上懷匪躬之節藴蓄器業居為名臣中書舍人賜紫金魚袋齊映修己以立自明而誠體賢人可大之規用君子時中之道虛受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振條綱惟映之精深可以該物理我有大典爾其參之懋昭厥猷勿替休聞滋可充散騎常侍同平章事造仍賜金魚袋其有散官封賜並如故李納檢校右僕射平章事制忠所貴乎竭誠善莫大於改過況茂勳有舊崇德日新翼戴勵勤王之節經綸申盡敵之略敦奬之道時惟國章平盧淄青節度管內度支營田處置等使開府儀同三司檢校工部尚書使持節鄆州諸軍事兼鄆州刺史隴西郡王李納稟性端厚執心寬簡通變適用和順積中服勞王家夙有成績乘秋備塞克著威聲纍歲專城載揚理行間者心懷險阻誠義鬱堙旋能歸𣢾上聞期於率德自效忠節純固久而益彰爰整鋭師式遏亂略保障宋服填壓浚郊嶷如長城作固東土嘉乃率服之美懋乃輸力之勤擢升衮司載董戎翰玄成嗣台輔之業亞夫繼社稷之勳俾爾兼榮無替厥服檢校右僕射平章事餘如故韓滉檢校左僕射平章事制周召由輔弼之臣兼方伯之任蓋以理化根本在於親人通兆庶之情以佐天子秉家邦之慶以臨諸侯故能中外允釐上下無壅今我有命意其在兹金紫光祿大夫檢校尚書左僕射兼潤州刺史御史大夫充鎮海軍浙江東西節度觀察處置等使上柱國南陽郡開國公韓滉文行忠信備修身之道勤儉貞固有成務之才纍更委遇多處繁重一心奉職終始不渝內告謀猷以匡時化外持憲法以一人心理尚廉平事皆釐飭姧盜衰息禮義興行惠兹一方時乃之德陳師旅以遏寇讎納餽糧以修職貢張我威武實我資儲令必應期謀無愆素濟于多難時乃之功冝其參務中樞翼宣大化仍兼漕運兼領蕃維樹南國之風猷贍中都之廪實豫則有望爾其懋哉繼于前人無替厥服可檢校左僕射同平章事依前鎮海軍浙江東西節度觀察處置等使兼充江淮轉運使餘如故李勉太子太師制立國之本所繫於元良弘教之方必由於端士非精識前典德冠當時恭敬溫文其將安倣吾是以輟台階之老選宗室之賢輔翼春闈是資教諭檢校司徒同平章事充太清宫使崇文館大學士上柱國汧國公李勉忠信孝友直方簡儉逹君臣父子之際知禮樂教化之端虛淡保和貞明寡欲求舊則德懋敘親則屬尊師範國儲無易其選可檢校司徒兼太子太師散官封勳如故薑公輔左庶子制君之任臣有優賢賜告之義臣之事君有量力知止之道故能進退以禮終始可勝此朕三事大夫濟理圖全之意也守諫議大夫同平章事賜紫金魚袋薑公輔首舉髙第擢居諫曹爰資美才參掌密命居易勵修身之操見危著從我之勤自處台司纍疏陳乞忌滿思退持盈守謙留中久之重難其請式光撝揖俾尹宫坊可太子左庶子勳賜如故崔造右庶子宰相之職允釐百工時惟仰成不可廢闕中散大夫行給事中同平章事上柱國安平縣開國男賜紫金魚袋崔造頃居掖垣參掌樞密總領繁重積勞疹深亦既優賢賜之長告歲聿云暮有加無瘳披誠自陳章疏三上知止之道守之甚堅處以休間俾遂頥養可太子右庶子勳賜如故盧翰太子賔客求賢審官以康庶績就間優秩以處舊臣蓋欲敦終始之恩全進退之禮金紫光祿大夫行門下平章事范陽郡公盧翰頃因多難從我于征以其年及老成任推先進方將求舊擢處台衡荏苒迄今亟淹星歲勤勞既久衰疢有加冝徙職於春闈用優賢於暮齒可太子賔客勳賜如故唐陸宣公集卷第七
