front:
  text: 唐陸宣公集卷第六制誥卷第六冊命祝冊祭文䇿問答表
  hash: sha256:a192074e1ca26c375090ca6145d3755f508fa38e1a0b8b71799b81c391df9d44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_006-1a}
body:
  text: 冊淑妃王氏為皇后文維貞元二年歲次丙寅十一月丁亥十一日丁酉皇帝若曰乾坤合德聖人則之惟帝承天惟后配帝嗣續百代母臨萬邦位定于中而尊加於外德修諸已而化被於人御於家邦所繫斯在三代崇替靡不由之豫是以詢衆採賢重難兹命中壼虛位於今歷年隂儀或虧宗事無主缺於典禮朕甚愧焉稱是徽章聿歸全德咨爾淑妃王氏天與淳粹氣鍾元和含章在中發秀于外卓爾風操穆然容輝周旋中規進退有度仁愛共儉禀于生知詩書禮樂成自師氏竭其孝敬祗事先朝承事無違克諧尊旨往居桂苑淑問巳彰洎奉椒塗謙光載路言無伐善志在匿瑕柔嘉自持喜愠莫見六宫攸序九族以親嘗屬艱迍纍從行幸思賢才以輔佐知臣下之勤勞庶績伊凝頗資內助永念頃筐之志且懷求劒之情崇位長秋永懷盛典矧惟元子貞我萬邦稽以舊章是冝從貴今遣攝太尉某官某持節冊命爾為皇后嗚呼敬哉王教之端始於內範風美關睢之化雅詠思齊之德罔懈厥位忝于前修克念有終庶無後悔奉承休命可不愼歟冊嘉誠公主文惟貞元元年嵗次乙丑六月甲子朔十二日乙亥皇帝若曰王者以義睦宗親以禮敦風俗義之深實先於友愛禮之重莫大於婚姻故春秋書築館之儀易象著歸妹之吉豫是用祗考令典率由舊章咨爾嘉誠公主孝友柔謙外和內敏公宫禀訓四德備修疏邑啓封命為公主徽章所被禮實冝之今遣光祿大夫檢校司徒同平章事汧國公勉持節冊命爾惟欽哉下嫁諸侯諒惟古制肅雍之德見美詩人和可以克家敬可以行己奉若兹道永孚于休懋敦王風勿墜先訓光膺盛典可不愼歟冊蜀王妃文維建中二年十一月某日皇帝若曰夫茂建親戚以敦族固本明愼選納以厚別蕃嗣實人倫之始王教之端也朕奉若謨訓允求淑哲賢必有象鍾慶於令門姻不失親載光於戚里故某官駙馬都尉田擇交第若干女生禀柔惠習知禮則容德純備孝睦洽聞可以叶美好逑輔成樂善是用使某官某持節冊命為蜀王妃嗚呼敬之哉備禮以崇其好合起家而居其爵位非義信不固非溫順不親克恭匪懈則罔攸悔朕言必復可不愼歟冊祀王妃文維建中二年十一月某日甲子皇帝使某官持節冊命某官竇兟第若干女為𣏌王妃曰於戲禮以大婚崇繼嗣本人倫之教詩言淑女配君子繫王化之綱蓋率人成風由內及外得不采嘉耦以固盤石形閨門以御家邦詳求惟難歷選兹久時乃之擇得于舊姻柔婉禀乎天和禮樂成于家法明章婦順䖍奉姆儀克茂鵲巢之規叶宣麟趾之美其祗膺嘉禮欽率內教淑愼厥心無替於後嗚呼可不愼歟告謝昊天上帝冊文維貞元元年歲次乙丑十一月癸巳朔十一日癸卯嗣天子臣某敢昭告于昊天上帝顧惟寡昧不克明道丕膺眷命俾作神主常恐獲戾上下而播災於人兢兢業業夙夜祗畏居位五祀德馨蔑聞皇靈不歆是用大警殷憂播蕩踰歷三時誠懼烈祖之耿光墜而不耀側身思咎庶𥙷將來上帝顧懷誘衷悔禍勦凶慝之凌暴雪人神之憤耻舊物不改神心載新兹乃九廟遺休兆人介福以臣之責其何解焉間屬寇虞久稽告謝今近郊甫定長至在辰謹以玉帛犧齊粢盛庶品冀慿禋燎式薦至誠太祖景皇帝配神作主尚饗告謝玄宗廟文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯孝曽孫嗣皇帝臣某敢昭告于皇曽祖考玄宗至道大聖大明孝皇帝皇祖妣元獻皇后楊氏臣猥承聖緒獲主大器懼德不嗣靡所安寧任重道悠竟貽顚越京闕生變神人無依臣懷永圖不敢自棄忍耻含憤逮于載遷戴天履地俯仰慙惕幸賴烈祖遺澤感深于人人心攸歸天意允若肆豫小子慿宗廟之積慶再復于鎬京在臣愆尤曷云有𥙷豈敢自蔽以重于厥辜頃以寇孽在郊禮物未備久稽告謝伏積兢惶今祗見閟宫引慝請罪謹以一元柔毛剛鬛明粢薌合薌萁嘉𬞞醴齊因時備物䖍奉嚴禋尚饗告謝肅宗廟文維貞元元年歲次乙丑十一月癸巳朔十一日癸卯孝孫嗣皇帝臣某敢昭告于皇祖考肅宗文明武德大聖大宣皇帝皇祖妣章敬皇后吳氏臣嗣服先業不克負荷人流於下事失其中姧魁乘舋作亂京邑播遷之咎臣實自貽震驚宗祧曠時乏祀外憂內愧若墜深泉勵己誓心期刷大耻實賴聖祖中興之業全育兆人澤深慶逺流福裔嗣故上天悔禍羣孽就誅非臣寡昧所能纘服今祗率百辟見于廟廷謹以一元大武柔毛剛鬛明粢薌萁嘉薦嘉𬞞醴齊備物潔誠聿申告謝尚饗告謝代宗廟文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯孝子嗣皇帝臣敢昭告于皇考代宗睿文孝皇帝伏惟玄德廣運重光盛業武平多難仁育羣生謂臣克堪付以大寶臣自底不類再罹播遷宗祧乏享億兆靡依下辜人心上負先顧敢愛隕越苟全眇身大懼社稷阽危以增九廟之愧由是忍耻誓志庶𥙷前羞列聖在天鑒臣精懇敷錫丕祐俾之纘承凶渠殄夷都邑如舊兹臣獲執犧牲圭幣載見于廟廷感慕慚惶若罔攸厝謹以云云陳誠待罪式奉嚴禋尚饗祭大禹廟文維貞元元年某月某日皇帝遣某官以牢醴之奠敬祭于大禹之靈惟王德配乾坤智侔造化拯萬類於昏墊分九州於洪波經啓之功于今是賴巍巍蕩蕩無得而名顧以眇身辱承大寶時則異于今古道寧間於幽明雖依聖垂休諒非可繼而勤人勵巳竊有所希逮兹八年理道猶昧沴氣鬱結降為凶災邦無宿儲野有餓殍上愧明哲下慚生靈夙夜憂惕如蹈泉谷所資漕運用極困窮底柱之間河流迅激舟楫所歷罕能獲全爰命工徒鑿山開道避險從易涉安代危嗷嗷蒸人俟此求濟仰祈幽贊以集丕功享于克誠庶答精意䇿問賢良方正能直言極諫科皇帝苦曰蓋聞上古至道之君垂拱無為以臨海內不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之變明利害之鄉威之以刑道之以禮敦其俗而彌薄防其人而益偷豈澆淳必繫於時耶何聖賢間生而莫之振也朕祗膺纍聖之業猥居兆人之上乾居克勵如恐失墜憂濟庶務夕惕晨興永惟前王之典謨是憲是則師大禹以崇儉法髙宗以求賢興夏啓之征作周文之罰旌孝悌舉直言養髙年敦本業平均徭稅黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姧犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀蒸黎無安居之志賦入日減而私室愈貧廉察日增而吏道愈濫意者朕不明歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於丈而有據備陳本末將舉而行無或憚煩略於條對自頃隂陽舛候祲沴頻興仍嵗旱蝗稼穡不稔上天作孽必有由然屢推凶災其咎安在傳曰時之不乂厥罰常暘又曰堯湯水旱數之常也二者乖反其誰云從今人靡蓋藏國無廪積朕屢延卿士詢訪謀猷至乃減冗食之徒罷不急之務既聞嘉話亦巳遵行而停廢之餘所費猶廣俟轉糧於江徼則逺不及期將搜粟於關中則撓而無獲節軍食則功臣懷怨省吏貟則多士靡歸中心浩然罔知攸濟子大夫藴畜才器通明今古副我虛求森然就列匡朕之寡昧拯時之艱災畢志直言無有所隱䇿問博通墳典逹於教化科皇帝若曰朕承祖宗之鴻烈獲主神器任大守重懼不克堪思與賢士大夫共康理道虛襟以佇側席以求而羣議紛然所見異指或牽古義而不變或趨時㑹而不經依違以來七年於兹矣國制多缺朕甚恧焉今子大夫博習墳典深明教化褒然充舉咸造于庭其極思精心以喻朕之未寤仲尼叙禮樂刪詩書修春秋廣易道六經之教所尚各殊豈學者修行理當區别將聖人立意本異宗源施之於時孰為先後考之於道何者淺深差次等倫指明其義夫知本乃能通於變學古所以行於今今之教人則異於是工祝陳禮樂之器而不知其情生徒誦禮樂之文而不試以事欲人無惑其可得耶將革前非固有良術堯舜率天下以義比屋可封桀紂率天下以暴比屋可戮然則上之化下罔或不從而三仁四凶較然自異有教無類豈虛言哉作樂移風聞諸昔典夫至雅必淡至音希聲文侯列國之賢君猶曰則惟恐寐矧彼流俗其能化乎將使天地同和災沴不作黎人丕變姦慝不萌何施何為以致於此王者制理必因其時故忠敬質文更變迭救三代之際罔不由之自秦剗古法漢雜霸道紛淪千祀玉教不興國家接周隋之餘俗未淳一處都邑者利巧而無耻服田畒者朴野而近愚尚文則彌長其澆風復質又莫救其鄙俗立教之本將安所從自昔哲王惟以三正互用後之術士乃言五運相生以漢應火行則周為木德禮稱尚赤義例頗乖永言於兹莫識厥理九流得失之論歷代興亡之由王鄭識理之異同公榖傳經之優劣必精必究用沃虛懷䇿問識洞韜略堪任將帥科皇帝若曰朕遐觀典謨詳求理道三代之際粲然可懲未嘗不文武並興農戰兼務故能居則足食動則足兵兵足則威食足則固威則暴亂息固則教化行理國之本實在於此秦漢已降王制不修選士廢射御之儀教人無搜狩之禮即戎者不知其稼穡力本者罕習於干戈於是異文武之人分農戰之道守則乏食征則鮮兵歷兹千年竟莫能復抑知者蓋寡將行之惟艱歟朕念之甚勤思繼前躅良以軍旅之士役戍靡寧勳庸既多爵秩咸貴俾服田畒慮興怨咨仰給縣官不可勝計由是版圖曰減阡陌歲荒水旱小愆廪餉咸竭欲使軍人恱歸於耜耒儒者兼逹於韜鈐田萊盡耕攻取必勝誘人孔易其術安施王者之師本於立德兵家之法方務出竒德以信成竒以詐勝理有違反將何適從宋襄成列而敗軍見嘉魯䇿韓信决囊以摧敵取貴漢朝然則喪國亡身豈霸王之道冒危乘厄非仁誼之心所冝討論以定褒貶夫衆寡不敵克必以謀樂生下齊孫子破楚魏武之勝袁紹宋髙之滅姚泓成敗之由備陳本末古人有言曰誅伐不可偃於天下又曰善為國者不師二端異焉其有深旨子房序次兵法任宏論撰軍書指明異同詳録名氏想聞商略擇善而行答宰臣請停大禮表朕失德致寇再經播越郊廟乏主禋祀曠時感憤積中憂愧形外日月以冀庶𥙷前修賴天地降休祖宗儲慶再新景命祗復皇都自秋涉冬巳遷於律候因心致享未展於孝思而公卿上言邀豫以備物都鄙興誦諷豫以勞人禮將俟於他年卜不先於近日永懷感慕情實未安雖則嘉話重違其如至誠難抑所冝參㑹群彥更擇近期無或因循以增不德答百寮請停大禮表朕再經播遷久曠禋祀不惟霜露之感實貽墜失之憂賴先澤在人上帝臨我克平大難再復舊京朕之失德非曰能補旋欲請罪宗廟展敬郊丘迫以羣情俟于獻嵗今滌牲撰吉甫及近期齊心永懷明發不寐忽覽來表良深矍然雖嘉備慮之誠實乖昭事之意朕志先定期於必行即斷來表也答第二表國之大事首在祀典所冝嚴奉以逹至誠况今之所懷又異常日不克嗣守馴致寇戎淪陷國都震驚園寢幸憑玄祐再續鴻休播越三時久虧禋祀之禮旋歸半嵗末申告謝之誠感愧積中若墜泉谷坐而待曙跋及上春庶乎天地靈祇以歆精意胡乃股肱卿士尚執疑謀出既不及告辭入又廢於朝獻罔極之慕何心自安冝潔乃誠以祗所奉副豫懇切勿復頻煩答第三表三省來表深體乃誠明孝敬之大端陳安危之上計祗率嘉話天豈不懷永言思之固亦難抑進退慙惕罔知所裁中宵求衣當饋忘食且聿修祀事所貴專精苟未至誠則如勿祭今近期甫及當齊潔敬之心而輿誦紛然猶執異同之論禮既虧於嚴奉事奚展於孝思以義制心勉依來請重豫不德愧歎良深答百寮賀利州連理表珍木呈祥允符靈貺顧惟不德何以當之朕聞人事聿修天休乃答今則凶渠尚在戎役方殷虐旱妨農飛蝗害稼諒咎徴之未弭曷嘉瑞而復臻所冀公卿大夫交匡不逮覩兹稱述益用懷慙答宰臣請復御膳表嘗覽典謨每嘉儉德愛人惜費是朕素懷况大兵之餘繼以荒饉軍儲國計資用皆空凋戶疲氓膏澤巳竭致人於此過實在豫內懷憂慚躬自損貶今凶渠殘滅粟麥豐成皆祖宗垂休非寡薄所致矧乎邦畿之內餒殍猶多役戍之徒傷夷未復孜孜訓戒克已增修猶懼辱守寶圗罔答玄祐豈冝暇逸以厚厥躬卿等誠在致君將順其美顧惟虛缺非所冝然答百寮請復御膳表頃者大勞不息至化未孚雨澤愆期蟲蝗為害朕以銷災謝譴莫大於修誠節用愛人必先於克己顧慚愆咎躬貶膳羞下以均衆庶之憂上以答昊穹之警至誠或感嘉應遂臻宿麥方成元凶巳殄慶深德薄惕厲彌加忽覽表章過為稱述雖將順其美則曰乃誠而戒愼不忘諒惟朕志未喻來請深體此懷唐陸宣公集卷第六
