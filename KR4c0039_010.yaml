  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_010-1a}
body:
  text: 賜安西管内黃姓纛官鐡劵文維貞元二年歳次丙寅八月丁巳朔三日已未皇帝若曰咨爾四鎭節度管内黃姓纛官驃騎大將軍行左金吾衞大將軍貟外置同正貟兼試太常卿頓啜護波支惟爾乃祖乃父代服聲敎勤勞王家勲書于鼎彛族列于藩籍爾克紹先祖之烈而重之以忠貞嗣守職官祗若朝化率其種落保我邊陲丹誠向化萬里如近是用稽諸令典錫以劵書若金之堅永代無變子孫繼襲作我藩臣爾其欽承勿替休命慰問四鎭北庭將吏勑書四鎭北庭將士官吏僧道耆壽百姓自禄山首亂中夏不安蕃戎乗舋侵敗封略道路梗絶往來不通哀我士庶忽如異域控告無所歸還莫從朕未嘗一夕忘懷而事勢不及相䘏興言軫念忽以涕流卿等咸藴忠誠誓死不屈或早從征鎭白首軍中或生在戎行長身塞外克奉正朔堅保封疆援絶勢孤以寡敵衆晝夜勞苦不得休息歳時捍禦不解甲胄勲髙百戰義叶一心介然孤城獨守臣節日來月往三十餘年奉國之誠乆而彌勵求諸今古忠烈莫儔義激人倫名光史冊蠢動知感况於朕懷朕嗣守洪業君臨宇内思安兆庶以絶戰爭遂與賛普約定好和集藩漢士庶告天地神祗設壇㑹盟永息邊患疆埸罷警于今六年近以賊臣朱泚背恩驚犯宫闕賛普又遣師旅助討姦兇兩國交懽事同一體北庭去此遥逺信使難通於西蕃旣非便冝在國家又絶來往永念士庶隔在殊方歸路無因親戚永訣爲人父母實所感傷巳共西蕃定議兼立誓約應在彼將士官吏僧道耆壽百姓等並放歸漢界仍累路置頓供擬發遣待卿等進發然後以土地隷屬西蕃今故遣太常少卿兼御史大夫沈房及中使韓朝彩等往彼宣諭仍便與西蕃交割卿等冝遞相慰勉叶力同心互相提携速圖進路復歸郷井重見宗親生人之情莫重於此一勞永逸固不合辭卿等誠節昭宣勲閥茂著到此之後當時甄升仍給田園以贍生業必令優厚用荅忠勞如有資産巳成不願歸此亦任便住各遂所安冝勉良圖副我勤想夏熱卿等各平安好遣書指不多及與回紇可汗書皇帝敬問可汗弟兩國和好積有歳年申之以昬姻約之以兄弟誠信至重情義至深頃因賊臣背恩構成嫌舋天不長惡㝷巳誅夷使我兄弟恩好如舊周皓及踏本啜黒逹于等至得弟來書省覽乆之良以爲慰弟天資雄傑智識通明親仁善隣敦信明義罷戰爭之患弘禮讓之風保合大和用寧區宇惟兹盛美何以加焉朕之素懷與弟叶契爲君之道本務愛人同日月之照臨體天地之覆育其於廣𬒳彼此何殊況累代以來繼敦姻戚與弟俱承先業所冝遵奉令圖自兹以還情契彌固垂之百代永逺無窮𬗟想至誠當同此意所附踏本啜奏請降公主姻不失舊頗叶通規待弟表到即依所請宣示百寮擇日發遣縁諸軍兵馬收京破賊頻立功勲賞給數多府藏虚竭其馬價物且付十二萬疋至來年三月更發遣一般餘並續續支付弟冝悉也安西北庭使人入奏並却歸本道至彼冝差人送過令其速逹弟所寄馬並到深愧厚意賜吐蕃將書勑尚覽鑠論莫陵悉繼等至省所陳奏朕具悉之國家與大蕃親則舅甥義則隣援悉人繼好固是常規朕嗣位君臨思安兆庶常以信讓爲事不以爭競爲心區域雖殊覆育寧别賛普天資仁德好生惡殺與朕同心重修舊好㑹蕃漢將相告天地神祇約誓之言至嚴至重大信一立義無改移所請奉天盟書勒於清水碑石審詳事理頗甚乖違往歳賊臣稱兵竊據城闕尚結賛志惟嫉惡義在救災頻獻表章請收京邑朕以宗廟社稷悉在上都但平㓂戎豈惜詶賞遂許四鎮之地以荅收京之功旋屬炎蒸又多疾疫大蕃兵馬便自抽歸旣未至京有乖始望奉天盟約豈合更論朕欲苟循彼情便令鐫刻則是非務實信不由衷欺天罔神莫大於此凡曰通好貴於推誠將垂百代之名豈顧一時之利但以事之去就湏定是非若不辨明便成姑息親隣之義豈所冝然故遣使臣與卿詳議卿是大蕃輔佐必當智識通明事理昭然不足疑惑儻有他見冝具奏聞審細研窮湏歸至當所論先許毎年與賛普綵絹一萬匹叚者本來立約亦爲收京然於舅甥之情此乃甚爲小事二國和好即同一家此有所湏便當不恡彼有所要此固合供以有均無蓋是常理賛普若湏繒帛朕即隨要支分多少之間豈拘定限假使踰於萬疋亦當稱彼所求朕之所重者信誠所輕者財利思與率土同臻大和想卿深體至公務存大義安人保境垂美無窮勉思令圖以副朕意今遣倉部郎中兼侍御史趙聿與來使同往書中意有不盡並令趙聿口宣尚結賛論莽羅等嘗緫師徒逺來赴難功雖未就義則可嘉其所領將士等朕先許與賜物一萬匹叚並巳排比許卿所啇量指定此使却回即發遣往今各賜卿少物至冝領之賜吐蕃宰相尚結賛書勑尚結賛卿天資材術作輔太蕃識通古今志奉忠信義聲著積逺近流傳比聞入典樞衡近知還緫戎務二國所定和好首末是卿啇量得卿却來深以爲慰昨者邊軍狀奏彼國兵馬踰越封疆朕以畫界立盟先有定分賛普素敦仁儀卿又特禀純誠背約侵漁必無此理但勑邊城自備不令輙動干戈若使効尤恐成交惡𥘉疑界首遊奕少有乖冝不謂大發師徒漸加侵軼興兵動衆必合有名蕃軍此行未測其故朕自嗣膺寳位即與賛普通和敦以舅甥結爲隣援懲戰爭之弊知禮讓之風彼此大同務安衆庶乃於境上建立壇埸契約至明誓詞至重告于皇天后土諸物百神有渝此盟殃及其國朕敬奉誠約分毫不移信使交懽歳時無絶理文具在可以明徴豈有一事不行一言不守頃令趙聿專徃近方從彼却回兼聞彼蕃使同來至今獨在道路卿所論奏朕並未知待詳事由乃可啇議旣稱和好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神明豈其可罔卿智識明逹朕所深知頃年猶舉義師救此災患今豈不存大信遂棄令名故專遣使見卿欲得審知來意竚聞還奏以副所懐趙聿及蕃使合到待覽表中意㫖續即啇量報卿卿渉逺而來當甚勞頓今賜卿某物至冝領之秋冷卿比平安好將士並存問之賜尚結賛第二書趙聿及論拱熱等至得卿表奏具見懇誠省覽言辭即稱和好及覩事跡唯務侵凌矛楯若斯將何取信審察書中之意蓋求四鎭北庭如此事冝足得啇議旣言通好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神祇豈其可罔又聞放縱兵馬蹂踐禾苗邊境之人大遭驅掠在此未爲深損於彼殊非逺謀卿之用心何乃至是國家利害計湏乆長和好之道旣虧仁義之風何在卿智識明悟朕所深知頃年猶發義師救此災患今豈不存大信遂棄令名故遣使見卿欲得審知來意必若守其盟誓務在同和即收斂兵車速歸本界所掠百姓一切放回然後可表卿直心信卿來奏續即遣使與論拱熱同往諸事並有商量交歡必令得所或宻懷他意將欲别謀彼雖未說實情此亦略爲准擬但縁誓約本重朕意不欲先違以此勤勤合有相問佇聞來奏以副朕懷賜尚結賛第三書勑尚結賛蕃使論拱熱等與趙聿同列卿所陳奏朕具悉之誠意勤勤志敦和好上以成舅甥之義次以結隣援之歡外以彰禮讓之風内以息戰爭之患兼此數事昔賢所難非卿材越等倫識通今古豈能匡輔大國弘宣逺圖施美利於當時傳盛名於不朽眷懷明略歎尚良多然以賛普來書務於叶睦卿之所奏亦貴通和𥘉覽其言實嘉德義及觀其事頗訝乖違以卿賢明朕所信重棄義踰約計必不然未測事由因何至此頃年所定和好言約頗謂分明至如四鎭北庭元不割與蕃國及朱泚勃逆作亂上都卿仗義興師請收京邑遂許四鎭北庭之地將以報荅成功旋屬炎蒸蕃軍便退奉天之約豈可更論事甚分明固無疑惑凡言結好所貴和同通體啇量有何不可大蕃必若要四鎭北庭之地即合直以情言彼但說其誠心此亦自有分義豈假曲徴前事廣起異端仍發師徒務張威勢蕃使猶未至此蕃軍早巳越疆或稱欲自赴朝或云更定言誓旣虧盟約且失禮儀言與事乖將何取信夫人君立國必不徒然惟漢與蕃各受天命勝負固有定分強弱寧由力爭卿欲以衆相侵以威相脅謂天地可罔謂盟誓可渝即當肆意所爲不必更論和好儻欲守其前約敦以親隣去就之間固冝有禮遣使來往足得啇量張皇師徒是何道理和好者禮義之事甲兵者爭奪之由二端懸殊理不並用今欲以用兵之勢定和好之辭事必不成縱成何益卿識見通敏器宇沉詳如此事冝不言可悉未知來意竟擬如何且首末論和是卿啇議清水㑹盟之日卿又親發誓辭將期去殺好生修文偃武永安兆庶垂法子孫天下稱嗟以爲盛美未經數歳遽有變移非獨見誚於四方亦將取笑於千古以此思度甚欲通和彼雖小以侵陵朕亦未即交惡故遣某官與卿更審籌量卿若必務同和更無他意即冝便歸本界遣使具述本情所湏四鎭北庭朕當自有推議如或託稱繼好志在别圖依前縱兵不即歸國惟利是視亦識彼懷和與不和於兹决定書中事有不盡並令某官某口宣冝令速回竚望來奏所獻方物深表逺誠今賜卿某物至可領也秋冷比平安好唐陸宣公集卷第十
