seq: 10
front:
  text: 在朕躬我實不德兆人何咎俾廢其生業離於室家䧟于困窮死于戰陣老疾廢養孤惸靡依怨結蒼生感傷和氣朕爲人父母得不愧于心哉晨興以思夕惕以悼自嗣位迄今六載天將悔禍朕方覺悟爾亦知衆心之厭亂思所以保安叶于朕懷若應符契非天地合德人神合謀將茂育羣生則何以臻此朕是用上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如𥘉功載鼎彛名藏王府子孫代代爲國勲臣河山帶礪傳祚無絶朕方布大信承天子人若食其言何以享國嗚呼其祗若命用保無疆之休
  hash: sha256:4ca7a1788c9079aa033df6d36ca3e3b167bac5684af4899b7b56c013fa7b5732
