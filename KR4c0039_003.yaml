front:
  text: 唐陸宣公集卷第三制誥卷第三赦宥下
  hash: sha256:6a35c842c7cefc0012baa5eb7bcf67ba516ebaf147dcdc670495d7ef39be6a88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0039_SBCK_003-1a}
body:
  text: 貞元九年冬至大禮大赦制門下朕以寡德屬當大統皇天眷佑俾主兆人懼不克承夙夜祗畏緬懷前烈致于昇平予心浩然罔知攸濟小大之務曷甞不勤芻蕘之言亦莫不敬慮毎存於致理志常在於恤人中宵屢興終食累歎一事乖張惄焉疚懷一夫罹殃惻若傷體思與海内同臻大和息其生業降心從衆實匪有辭克已利人誠無所恡然以視聽有極思慮難周況乎長自深宫安於近習損益之理寧免過差幽逺之情固多未逹由是兢兢砥礪悔徃修來燭理所患於不明推心庶幾於無負曰愼一日于今十有五年矣上靈降監多士叶誠五稼屢豐四鄙不擾方鎭輯睦干戈底寧邊壘繕完殊方𣢾附恊天地㑹昌之運實宗社無疆之休慶旣荷於玄功禮有昭于大報矧惟霜露之感永切孝思禋燎之儀毎勤精意將申誠敬其在躬親是與公卿大夫䖍奉犧牲圭璧陳其文物薦其馨香類秩於㤗壇朝享于清廟率職來助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈惟朕躬思俾普天均承惠澤可大赦天下貞元九年十一月十日昧爽巳前繫囚見徒大辟巳下罪無輕重咸赦除之其見於官辯對者亦並放免官人犯入己贓不可令其却上巳後勿以爲累左降官及流人並量移近處其官巳經量移未復資者還其階爵竄謫遐裔冀速沾恩比者准制量移所司皆例申牒屢加盤覆累渉歳年旣甚淹遟且不均一冝令吏部刑部審勘檢本流貶及量移勑旨比類元犯事狀輕重兩月内與處分外文武見任及致仕家并諸軍諸使將士等三品巳上賜爵一級四品巳下加一階將百姓自置義倉仍凖貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠莫先於竭節惟爾師長卿校洎乎方岳列藩保乂皇家交修庶績竭節之効旣昭乃誠榮親之恩冝洽國典内外文武清望職事官并節度觀察都防禦都團練經略等使父在未有官量授檢校五品官母在未有邑號者各封邑號父母亡没者量與追贈巳經追贈者更與改贈佐運之臣納忠之輔功旣存於社稷慶冝及於子孫故周錫田土漢傳帶礪疇其爵邑與國終始以明報德之恩勸爲臣之節其或年代未逺利澤猶存祠宇巳變於荒墟㣧嗣不編於仕籍思其人猶愛其樹況奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大端應九廟配享功臣及武德以來將相名節特髙有封爵廢絶祠廟無主者冝許子孫一人紹封以時享祀自今以後應有家廟子孫但傳襲封爵者並許享祔于廟其有毀賣私廟及買之者各以犯教義贓論自古聖帝明王忠臣烈士各令所在長吏以禮致祭書叙明目逹聦垂拱而理詩稱濟濟多士文王以寧舎己從人故能通天下之志棄瑕録用故能盡天下之才昔在太宗勤求理道納諫如響任賢勿疑致俗於太平垂範於永代朕獲承鴻緒追慕聖猷書之座隅常自儆勵朝夕翹想庶聞嘉謀夢寐勞懷思得賢士凢厥在位所冝共成諸司官有陳便冝者各盡所見條䟽封進事有冤滯政有闕遺悉當極言無或隱避詔勑不便於時者所司執奏以聞天下有藴德懷才隱居不仕委所在觀察使表薦當以禮邀致諸色人中賢良方正能直言極諫或愽通墳典逹於教化或詳練故事長於著述或精習律令曉暢法理或該明吏術可委理人或識洞韜略堪任將帥者委所在州府長吏及臺省常叅官詳録行能舉奏並限來年七月内到京朕當親試應縁大禮掌職行事仗内引駕攝將軍中郎郎將留守副留守并諸道表狀陪位法駕三引官等三品巳上更賜爵一級四品巳下加一階其郊壇宫廟行事官仍各賜勲兩轉皇親諸親應陪位者三品巳上賜爵一級四品五品加一階六品巳下及常選官至選日優與處分白身人及諸色應陪位官等各賜勲兩轉親王大長公主郡主縣主賜物各有差􅈶公介公各賜物若干叚行事室長掌坐齋郎禮生賛者各減一年勞無勞可減者至簡選日優與處分崇賢舘學生減䇿一道國子監學生陪位者及應縁祗應諸司作官直長長上流外要職掌内侍省白身諸州行綱考典兩京耆壽諸色畨役當上在城并量留十月畨人等各賜勲一轉鴻臚蕃客共賜物若干神䇿六軍英武威逺皇城金吾街使諸軍諸使將士應縁大禮宿衛御樓立仗及守本庫本營者共賜物若干端匹天下耆老百嵗巳上者各賜錦帛五叚米五碩八十巳上及鰥寡惸獨不能自存者委刺史縣令各加優恤應縁大禮加階及賜勲爵等申報叙奏期限並准貞元六年十二月二日勑處分餘依常式所司不湏更作條件赦書日行五百里布告遐邇咸使聞知蝗蟲避正殿降免囚徒德音夫人事失於下則天變形於上咎徴之作必有由然自去嵗巳來災沴仍集雨澤不降延歷三時蟲蝗旣臻彌亘千里榖糴翔貴稼穡卒癉嗷嗷烝人聚泣田畒興言及此實所痛傷徧祈百神曽不獲應方悟禱祀殊救患之術言詞非謝譴之誠憂心如焚深自刻責得非刑法舛謬忠良鬱堙暴賊未蠲勞師靡息事或無益而重爲煩費任或非當而横肆侵蟊有一於兹足傷和氣本其所以罪實在予百姓何辜重罹殍餒所冝出次貶食節用緩刑側身増修以謹天戒朕避正殿不御百寮奏事並於延英處分尚食進膳冝更節減百司不急之務一切且除諸軍將士外自餘應食官糧人及諸色用度等並委本使長官啇量權行停減以救荒饉仍限十日内具元額及所釐革條件聞奏待至豐稔却令依舊畿内百姓委京兆尹切加慰撫除正稅正役外徴科差遣並冝禁絶非交相侵奪㝷常訴訟不湏追擾務且息人京畿内外及京兆府諸縣見禁囚徒死罪降從流以下一切放免畿内及河中同州界應有因戰陣殺戮遺骸暴露者各委所在長吏隨事埋瘞咨爾卿佐實惟股肱所當一其誠心同恤災患勉修厥職副我憂勤誅李懷光後原宥河中將吏并招諭淮西詔自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方來同苟或昧於德綏務以力勝士旅疲耗烝黎困窮幸以成功豈云有𥙷李懷光乆從戎旅頗著勤勞抜於等倫授以旄鉞誓師河朔奔難奉天有夷兇嫉惡之誠有弭患釋圍之績俾介元帥仍升上台秉心匪彞自底不類怙衆貪亂附姦脅君朕用再遷幾危宗廟洎股肱宣力賊泚就誅率土之人咸懷奮擊朕獨排羣議未忍加兵命復官封志期全貸而乃昏迷不返悖慢逾彰殘害使臣侵敗畿略密邇京邑人愁無聊諭之不悛乃用致討上帝悔禍元臣叶謀克集茂勲以夷大難渠魁授首餘衆革心制勝以謀兵無血刃雖事非獲巳義在救人而本其所由情深罪已蓋以信誠未著撫馭或乖至使功臣䧟於誅戮謂之克敵寧不愧心然以懷光一家法當殱戮念其昔居將相甞寄腹心罪雖掛於刑書功巳藏於王府以干紀之跡固合滅身以赴難之勲所冝有後非常之澤俾洽幽明雖屈彞章庶旌往効大夫君子無我有尤冝以懷光一男爲嗣賜莊宅各一所聽住京城仍還懷光首級及屍任便收葬其妻及諸子孫在室女等並遞送澧州委李臯逐便安置使得存立其出嫁女及諸親戚並冝釋放應先䧟河中將士等皆嬰迫脅無路申明多是朔方舊人素藴忠義并幽州涇原將士頃被朱泚脅從收京之時奔竄在彼究其本末情有足矜況能恊力同謀舉城歸順録其成効咸與惟新冝一切洗雪勿爲瑕累先有官爵實封者並許仍舊其中首謀効順事績著明者委副元帥條件聞奏別加甄獎河中及同州絳州百姓並經䧟賊又乆屯軍骨肉流離生業廢棄興言軫念良用惻然冝各給復一年京兆府奉先美原等縣縁與同州接近隨便供運杼軸旣繁流亡頗衆委京兆尹即量事優恤條件聞奏仍加招輯使各安存河中保義軍保寧軍節度使并管内諸軍行營兵馬副元師河中保寧等軍節度度支營田觀察處置等使銀青光禄大夫檢校司徒同中書門下平章事兼太原尹北都留守北平郡王燧惟嶽降生鬰爲時傑奉上勵匪躬之節訓師懷盡敵之謀略地無遺攻城必拔發揚以威強宼感激而服叛徒嘉謀屢聞能事畢備朔方河中同絳陜􅉑汴等州及管内諸軍副元帥河中絳州節度觀察處置等使開府儀同三司行侍中兼河中尹咸寧郡王瑊鑒識精明宇量弘愽秉義率衆推誠待人堅制不奪之心亟陳必勝之略輯睦士旅安慰流庸盛德克彰崇功允集惟乃二帥一其誠心奉行天誅同奬王室有崇讓之美有禁暴之能元惡旣除全城厎定是加寵命以荅崇勲燧可兼侍中仍與一子五品正貟官并階餘並如故瑊可檢校司空仍與一子五品正貟官并階餘並如故華州潼關鎭國軍節度使開府儀同三司檢校右僕射并華州刺史上柱國武康郡王駱元光邠寧慶等州刺史御史大夫上柱國許昌郡王韓遊瓌鄜坊丹延等州節度觀察使檢校兵部尚書兼御史大夫上柱國東平郡王唐朝臣等並節著艱危功成討伐鎭于衝要隱若長城取彼兇殘進無堅陣比義同德廓清方隅冝増食于眞封且延榮於㣧子可各賜實封二百戸仍與一子六品正貟官并五品階餘並如故應諸道諸軍同討懷光將士等一自征役淹歷歳時被服干戈略無寧息頼兹勤効是有成功冝並賜三十萬端匹以充宴賞仰度支即般次送赴並各放歸本道仍令所司叙録即超資與改轉其中大將及功効殊尤者委所司速具名銜聞奏先與處分其先在河中將士亦冝依例賜錢宴賞如本是奉天定難功臣准條合給賞者度支即排比支付嗚呼自國家多難二紀于兹朕嗣位七年連兵五載追惟徃事悔恨于懷今二孽旣誅諸方甫定哀彼淮右獨爲匪人其帥不龔其衆何罪朕晨夕惕慮念之甚詳罷征討則阻命止於數州窮戰爭則流禍及於天下利病之勢較然相懸俾人罹殃寧我忍耻今勲賢列鎭疆理有經縱未偃戈足以保境況天地之大無所不容豈令是邦猶隔朝化因兹大慶使洽鴻恩諸道應與淮西接連冝且各守封境非𬒳侵軼不湏進討仍委所在長吏明加招諭宣布朕懷李希烈若能歸降待以不死其餘將士官吏百姓等一切並與洗滌與之更新先有官封亦皆仍舊如能去逆効順因事建功理當甄升以示褒勸其所以優賞科條並准前勑處分朕思與海内去危圖安有過自新雖大必宥朗然明信彰示兆人期爾庶邦自求多福無有逺邇咸使聞知誅李希烈後原淮西將士并授陳仙竒節度詔反易天常悖違人紀衆之所棄罔或逃誅李希烈蔑義背恩窮姦極暴謂神器可以力取謂生靈可以詐欺志在兇殘躬行僭竊罪無與比法實難容以君德不修致人於禍究其端本過實在予不忍烝黎重相攻戰屢施詔命務欲懷柔抑羣師奮發之誠駐諸軍討逐之勢不憚屈已期於息人希烈曽無悛心益逞驕志虐毒滋甚吞噬無厭惡貫旣盈自厎夷滅開府儀同三司御史中丞臨漳郡王陳仙竒忠勇有餘沉毅能斷攄闔境受汚之憤導三軍思順之心唱義一呼羣情響附廓清氛祲殱戮渠魁驛書上聞凾首入獻方隅旣又役戍其休懸賞之科是冝必信其以仙竒爲檢校工部尚書兼蔡州刺史御史大夫充淮西節度仍賜實封五百戸應淮西管内將士官吏百姓等頃迫兇威遂從脅制旣誅元惡俱是平人除李希烈一家其餘並准前後赦勑原放更無所問其將士等或本屬平盧或乆鎭淮右素推忠義累著勲庸果能叶志同謀輸誠奉順以兹節効良有可嘉委仙竒即以諸色官錢優與宴勞其中首建謀議同斬希烈人等冝並條録聞奏節次褒賞比年以來有潛圖効順節義著明計或未行爲賊屠害者亦當審加訪察具事績以聞如有子孫仍並録名聞奏百姓等乆經淪䧟兼被傷夷遐想凋殘實足哀憫除供當道軍用外冝給二年應𬒳希烈差點兵馬及團練子弟並即放散其本額將士之中有不樂在軍願歸農業者委節度刺史量給逃死戸田宅并借貸種糧優給復終身使之存濟冝令尚書左丞鄭叔則充淮西宣慰使嗚呼徃欽哉自希烈叛命于今五年王澤不通下情亦阻所冝宣我信令以釋危疑敷我惠和以慰疲瘵滌清汚俗咸與惟新厎難一方以稱朕意重原宥淮西將士詔乃者希烈亂常阻兵竊號汚脅士衆殘虐烝黎朕志在好生誠深罪已爲人受耻不忍加兵惟兹一軍代著忠節果殱元惡不替舊勲詢於衆情就拜戎帥人亦勞止期於小康旋乖䘏下之方重致䘮身之禍由朕薄德俾人不寧撫臨萬邦且愧且悼猶頼將校士旅秉其誠心邦人不驚軍部無撓以兹節効良有可嘉所冝慰安㑭洽寛澤應將士吏人承前所有諸過犯罪無輕重一切釋放曠然昭洗咸與惟新其有先請受莊宅財物者各以見管爲主將士衣賜節料并家口糧賜等一切並准舊例以時給付不得停減先令優與賞設亦准元勑處分務令豐厚以稱朕懷仍加曉諭各委知悉唐陸宣公集卷第三
