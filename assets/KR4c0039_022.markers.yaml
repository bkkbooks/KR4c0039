  - {type: variant, offset: 5, length: 1, content: 卷, WYG: 二十二巻中分翰苑榜子為二集其目亦與史志相同惟晁公武讀書志所載乃袛有奏議十二巻且稱舊有榜子集五巻議論集三巻翰苑集十巻元祐中蘇軾乞校正進呈改從今名疑是裒諸集成此書與史志名目全不相合今考尤袤遂初堂書目所列實作翰苑集而錢曽讀書敏求記載所見宋槧大字本二十二巻者亦作翰苑集則自南宋以後已合議論表疏為一集而總題以翰苑之名公武所見乃元祐本恐非全冊而今世刋行贄集亦有題作陸宣公奏議者則又沿讀書志而失之者也宋祁作贄傳賛稱其論諫數十百篇譏陳時病皆本仁義炳炳如丹青而惜徳宗之不能盡用故新唐書例不録排偶之作獨取贄文十餘篇以為後世法司馬光作資治通鑑尤重贄議論採奏疏三十九篇其後蘇軾亦乞以贄文校正進讀盖其文雖多出于一時􅋌救規切之語而于古今來政治得失之故無不深切著明有足為萬世龜鑑者故厯代寳重焉贄尚有詩文别集十五巻乆佚不傳全唐詩所録僅存試帖詩三首及語林所載逸句然經世有用之言悉具是書其所以為贄重者固不必在雕章繪句之末矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士􅐧總校官臣陸費墀欽定四庫全書集部二翰苑集目錄别集類一唐巻一制誥奉天改元大赦制平朱泚後車駕還京大赦制巻二制誥貞元改元大赦制冬至大禮大赦制巻三制誥貞元九年冬至大禮大赦制蝗蟲避正殿降免囚徒徳音誅李懐光後原宥河中將吏幷招諭淮西詔誅李希烈後原宥淮西將吏幷授陳仙竒節度詔重宥淮西將士詔巻四制誥賑䘏諸道將吏百姓等詔優䘏畿内百姓幷除十縣令詔重優復興元府及洋鳯等州百姓詔議減鹽價詔賜京城及同華等州百姓種子賑給貧人詔賜將士名奉天定難功臣詔改梁州為興元府升洋州為望州詔巻五制誥奉天遣使宣慰諸道詔收復京師遣使宣慰將吏百姓詔平淮西後宴賞諸軍將士放歸本道詔加王武俊李抱真官封幷招諭朱滔詔招諭淮西將吏詔招諭河中詔安撫淮西歸順將士百姓勅甄奨陷賊守節官詔令百寮議大禮期日詔不許諸軍侵擾勅放淮西生口歸本貫勅令諸道募靈武鎮守人詔巻六制誥冊淑妃王氏為皇后文冊嘉誠公主文冊蜀王妃文冊杞王妃文告謝昊天上帝冊文告謝元宗廟文告謝肅宗廟文告謝代宗廟文祭大禹廟文制策問賢良方正能直言極諌科制策問博通墳典逹於教化科制策問識洞韜略堪任將帥科答宰臣請停大禮表答百寮請停大禮表答}
