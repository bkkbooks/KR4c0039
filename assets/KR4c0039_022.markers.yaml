  - {type: variant, offset: 14, length: 0, content: '', WYG: 均節賦税恤百姓六條翰苑集原序嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聰而盡其善排羣議而試厥謀道之難行亦已久矣東陽綘灌何代無之嘻一薫一蕕善齊不能同其器方鑿圎枘良工無以措巧心所以理世少而亂日多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿呉郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸夀春刺史張鎰有名於時一獲晤言大加賞識暨别鎰以泉貨數萬為賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而已是嵗以書判拔萃調渭南簿本傳作尉御史府以監察换之徳宗皇帝春宫時知名召對翰林即日為學士由祠部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機㑹倉卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶㡬羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以徳宗克平寇亂不惟神武之功爪牙宣力葢亦資文徳腹心之助焉及還京師李抱真来朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也公自行在帶本職拜諌議大夫中書舍人精敏小心未嘗有過艱難扈從行在輒隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職内署母韋氏尚在呉中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩附𦵏河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子為之興改容叙弔優禮如此内外屬望旦夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉茍且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦䛕從而間之屢至不悦親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在徳宗實録及竇參納劉士寧之賂為李巽所發得罪左遷横議者以公與參素不協歸罷相之議於公户部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士呉通元忌公先逹每切中傷隂結延齡互言公短宰相趙憬公之引拔升為同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公為賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州别駕上怒不可測賴陽城張萬福救之獲免蜀帥韋令抗表請以贄代已嵗賂資糧公在南賔閉門却埽郡人稀識其靣復避謗不著書惟考校醫方撰集驗方五十巻行於世江峡十稔永貞初與鄭餘慶陽城同徵還公已薨殁時年五十二公之秉筆内署也搉古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫増氣則有制誥集一十巻覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七巻覽公之奏則知公之為臣也其在相位也推賢與能舉直措枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊説争衡考其文也與典謨接軫則有中書奏議七巻覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟惟公才不謂不長位不謂不逹逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏争列盖道未至也應之曰道雖在我𢎞之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者盖時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五巻其闗於時政昭昭然與金石不朽者惟制誥奏議乎雖已流行多謬編次今以類相從􅃣于編首兼略書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟唐權徳輿撰宋進呈奏議劄子元祐八年五月七日蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空疎備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經効於世間不必皆從於已出伏見唐宰相陸贄才本王佐學為帝師論深􅋀於事情言不離於道徳智於子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時徳宗以苛刻為能而贄諌之以忠厚徳宗以猜疑為術而贄勸之以推誠徳宗好用兵而贄以消兵為先徳宗好聚財而贄以散財為急至於用人聴言之法治邉馭將之方罪已以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使徳宗盡用其言則貞觀可得而復臣等每退自西閤即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄靣反復熟讀如與贄言必能發聖性之髙明成治功於嵗月臣等不勝區區之意欽定四庫全書翰苑集巻一唐陸贄撰制誥赦宥上奉天改元大赦制平朱泚後改建中五年為興元元年門下致理興化必在推誠忘已濟人不吝改過朕嗣守丕構君臨萬方失守宗祧越在草莽不念率徳誠莫追於既往永言思咎期有復於將來明徴厥初以示天下惟我烈祖邁徳庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤垂于後肆予小子獲纉鴻業懼徳不嗣罔敢怠荒然以長于深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察征戍之勞苦澤靡下究情不上通事既壅隔人懐疑阻猶昧省己遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不觧甲胄祀奠乏主室家靡依生死流離怨氣凝結力役不息田萊多荒暴命峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不悟人怨於下而朕不知馴致亂階變興都邑賊臣乘釁肆逆滔天曽莫愧畏敢行凌逼萬品失序九廟震驚上辱于祖宗下負于黎庶痛心􅌤貎罪實在予永言愧悼若墜深谷賴天地降祐神人叶謀將相竭誠爪牙宣力屛逐大盜載張皇維將𢎞永圗必布新令朕晨興夕惕惟念前非乃者公卿百寮累抗章疏猥以徽號加于朕躬固辭不獲俯遂輿議昨因内省良用矍然體隂陽不測之謂神與天地合徳之謂聖顧惟淺昧非所宜當文者所以成化武者所以定亂今化之不被亂是用興豈可更徇羣情茍膺虚美重余不徳祗益懐慙自今以後中外所上書奏不得更稱聖神文武之號夫人情不常繫于時化天道既隠亂獄滋豐朕既不能𢎞徳𨗳人又不能一法齊衆茍設宻網以羅非辜為之父母實増愧悼今上元統歴獻嵗發生宜革紀年之號式敷在宥之澤與人更始以荅天休可大赦天下改建中五年為興元元年自正月一日昧爽以前大辟罪已下罪無輕重咸赦除之李希烈田悦王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内騷擾皆由上失其道下罹其災朕實不君人則何罪屈已𢎞物予何愛焉庶懐引慝之誠以洽好生之徳其李希烈田悦王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推以至誠務欲𢎞貸如能効順亦與惟新其河南北諸軍兵馬並宜各於本道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其扇誘有廹以兇威茍能自新理可矜宥但官軍未到京城以前能去逆効順及散歸本道者並從赦例原免一切不問天下左降官即與量移近處已量移者更與量移流人配隸及藩鎮効力幷縁罪犯與諸使驅使官兼别勅諸州縣安置及得罪人家口未得歸者一切放還應先有痕累禁錮及返逆縁坐承前恩赦所不該者並宜洗雪亡官失爵放歸勿齒者量加收敘人之行業或未必兼構大厦者方集於羣材建竒功者不限於常檢茍在適用則無棄人况黜免之人沉欎既久朝過夕改仁何逺哉流移降黜亡官失爵配隸人等有材能著聞者特加録用勿拘常例諸軍使諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固全城驅除大憝濟危難者其節著復社稷者其業崇我圗爾功特加彞典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯遞減罪二等當户應有差科使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年内仍回給家口其有食實封者子孫相繼代代無絶其餘敘録及功賞條件待收京日並凖去年十月十七日十一月十四日勅處分諸道諸軍將士等久勤扞禦累著功勲方鎮克寧惟爾之力其應在行營者並超三資與官仍賜勲五轉不離鎮者依資與官賜勲三轉其累加勲爵仍許回授周親内外文武官三品已上賜爵一級四品已上各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼薶胔禮典所先雖効用而或殊在惻隐而何間諸道將士有死王事者各委所在州縣給遞送歸本管官為𦵏祭其有因戰陣殺戮及擒獲伏辜暴骨原野者亦委所在逐近便收𦵏應緣流貶及犯罪未𦵏者並許其家各據本官品以禮收𦵏自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及税間架竹木茶漆搉鐵等諸色名目悉宜停罷京畿之内屬此寇戎攻劫焚燒靡有寧室王師仰給人以重勞特宜減放今年夏税之半朕以兇醜犯闕遽用于征爰度近郊息駕兹邑軍儲克辦師旅攸寧式當襃旌以志吾過其奉天宜升為赤縣百姓並給復五年尚徳者教化之所先求賢者邦家之大本永言兹道夢想勞懐而澆薄之風趨競不息幽棲之士寂寞無聞盖誠所未孚故求之未至天下有隠居行義才徳髙逺晦跡丘園不求聞逹者委所在長吏具姓名聞奏當備禮邀致諸色人中有賢良方正能直言極諌及博通墳典逹於教化幷洞識韜鈐堪任將帥者委常參官及所在長吏聞薦天下孤老鰥寡惸獨不能自活者並委州縣長吏量事優恤其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用宜自朕躬當節乘輿之服御絶宫室之華飾率已師儉為天下先諸道貢獻自非供宗廟軍國之用一切並停應内外官有冗員及百司有不急之費委中書門下即商量條件停減聞奏布澤行賞仰惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懐赦書有所未該者委所司類例條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知平朱泚後車駕還京大赦制門下致理之體先徳後刑禮義興行故人知耻格教令明當則俗致和平然後姦慝不萌暴亂不作古先哲后莫不由斯國家受命百七十載八聖儲慶敷佑下人邁種寛大之徳累蠲苛酷之令盖仁之所積者厚故澤之所流者深兹予小子獲主重器懵於理亂之本溺於因習之安授任不明賞罰乖當立法以齊衆而犯命愈甚興戎以除害而長亂益繁賊臣蓄姦乗釁竊發九廟乏祀兆人靡依猰㺄肆其呑噬豺狼穴於宫闕嵗未云半載罹播遷仰慚穹昊俯愧臣庶敢愛霣越茍全眇躬誠懼益縱寇讎重辱宗社忍恥誓志庶補前羞賴億兆宅心不忘先徳諸帥勠力恭行天罰俾余寡昧再膺多祜總乾綱於既紊復天柱於將傾言旋鎬京不改舊物宗祧有序朝享有期責重慶多深増感惕嗚呼君者所以撫人也君茍失位人將安仰朕既不徳致寇興禍使生靈無告受制兇威茍全性命急何能擇或虧廢名節或貪冒貨利䧟於法網事匪一端究其所由自我而致不能撫人以道乃欲繩之以刑豈所謂恤人罪已之誠含垢布和之義滌清汚俗咸與更新可大赦天下自興元元年七月二十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正見繫囚徒常赦所不原者咸赦除之今年五月二十八日已前左降官即與量移未復資者更與移近處流人及犯配隸藩鎮効力並即放還亡官失爵放歸不齒者量加收敘未復資者更與進改其黜免人等有素著行能傍連譴累特加録用勿以為負不有忠者誰復社稷不有勞者誰從巡狩連帥之重所以殿邦禦侮也二千石之任所以分憂共理也方鎮將校勤奉戍役中外寮吏恪居官次國有大慶所宜同之内外文武及致仕官三品已上賜爵一級四品已上加一階仍並賜勲兩轉司徒兼中書令晟英特傑立光輔中興再定皇都一匡天下推恩之典貽慶無窮宜與一子五品正貟京官侍中瑊沉邃忠厚服勞王家保全危城翦除大憝嘉乃茂績次于寵章宜與一子六品正貟京官鎮國軍潼闗節度使檢校右僕射駱元光京畿渭南商州節度使檢校右僕射尚可孤邠寧等州節度使檢校右僕射韓遊瓌奉天行營諸軍節度使檢校右僕射戴休顔咸秉大節著于艱難同勲叶忠翼我興運宜各與一子七品正貟官諸道節度使及行在都知兵馬使興元扈從左右金吾大將軍金吾六軍大將軍等各與一子八品正貟官諸道團練觀察處置等使各與一子九品正貟官應諸軍赴上都收復將士等俱以純誠奮其勇節連年帶甲百戰摧鋒有忘身以効命有滅親以徇義誓平國難如復私讎競揚貔虎之雄克清梟獍之孽策勲行賞傳嗣榮親播乃功名與國終始自去年冬已来未經甄敘者即與超八資改轉已經甄敘者更與超三資進改三品已上祖父母在先無官封者量與致仕官及邑號亡者並與追贈四品已下父母在先無官封者亦授致仕官及邑號亡者與追贈其賞錢委所司即依元勅支給應扈從將士三品已上賜爵兩級四品已下各加兩階仍並賜勲其祖父母官封追贈並準收京城將士例處分應扈從官普恩之外三品已上賜爵兩級四品已下各加兩階仍普賜勲三轉其祖父母父母封贈並準收京城例處分應扈從官普恩之外三品已上更加爵一級四品已下更加一階若常參官祖父母父母在先無官封者量授致仕官及邑號亡者與追贈諸州刺史普恩外賜爵一級諸道進奏陪位者更加一階其奉天定難及元從功臣宜令本軍本使即定名聞奏所司各準元勅優賞其諸道軍鎮及行營將士三品已上賜爵一級四品已上加一階仍準今年正月一日制速與甄敘成徳淄青魏博等節度幷諸軍應歸順將士等各藴誠義積著功勞由朕失於撫綏頃嵗暫懷疑阻尋能勵節不替舊勲是資宴犒俾洽王澤宜委所司即約額支計各賜錢物賞設仍委本節度準前後勅速條疏甄敘其朔方幷諸軍應在河中管内及同州將士等自逺赴難觧其重圍念兹功勞並未酬報雖遭脅制情有可矜應到行營未經甄敘者並準元勅超五資改轉其賞錢比收京城將士例各給一半委本軍兵馬使條録名銜聞奏所司支計給付其食實封者亦便配額令其請受應天下諸道軍將士等如有年老及疾患尫弱不任軍旅願歸鄉里者並給終身優復州縣切加安存勿令侵擾如無家可歸者給田宅使得存濟見危致命先典所尚況忠衞社稷殺身成功朕於斯人義有加等贈太尉秀實天授貞烈沮兹姦邪蒼黄之中獨藴雄斷將紓國難詭收寇兵兇謀既虧吾事果濟忠誠奮發手撃渠魁英風凜然振邁千古宜即差官致祭幷旌表門閭府縣護其喪事緣𦵏所要一切官供仍於墓所官為立碑以揚徽烈其所賜實封五百户嫡子正貟三品官諸子授正貟五品官委中書門下即準元勅處分應諸道諸軍將士有身死王事者委本道本使具名銜聞奏即與褒贈仍以在身官爵授其子孫内外文武官及諸親諸色人等有横遭逆賊殺害者各聴其家及親識人於所司陳牒勘實聞奏亦與追贈如跡著忠烈衆所明知仍訪其子孫量加優恤尚齒養老王風之首三代制理未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰里閭京兆府耆夀年八十已上並與板授刺史仍賜紫八十已下及諸州府耆夀年八十已上並與板授本縣令仍賜緋天下侍侍字疑老耆夀亦各與板授官如年九十已上者州縣長吏嵗時躬親省問貧弱不能自存者量賜粟帛頃屬多難人流俗弊加之以師旅因之以饑饉賦役繁起農桑失時哀哉癉人汔可小息然以國計猶歉軍實靡充未盡復除良増愧悼應天下建中四年年終已前所有諸色逋欠在百姓復内者一切放免百司及諸軍諸使舉放利錢今年六月已前百姓欠負未納者亦並停徴京兆府百姓普恩外給復一年其供頓官吏委京兆尹類例具名銜聞奏量與優奨古者計户以署吏因時而建職既不乏事亦無冗貟今田畝汙萊版圗凋耗齊人編户託庇官􅈠貪吏猾胥誘為囊橐啓姧墮業為害尤深應在京百司色役人及流外等委御史大夫即與諸司使長官審詳商議據見所掌事之閑劇定額聞奏仍校名送中書門下務從減省副朕憂人以後應須署置並定名先奏仍永為常式今年正月一日赦書節目有所未行者所司並舉而行之赦書或有不該即比類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知翰苑集巻一欽定四庫全書翰苑集巻二唐陸贄撰制誥赦宥中貞元改元大赦制興元二年正月一日門下王者體元立極欽若乎天地纂業承統嚴奉于祖宗用能百神允諧兆庶永賴立國之本斯其大經朕燭理不明違道招損往遭多難淪陷國都天地宗祧曠而莫主則是欽若嚴奉之義缺矣甚用懼焉洎復京師遽將告謝有司以人力耗斁禮物廢隳日居月諸嵗聿云暮卜其吉日俯在上春齊心永懷坐以待曙而百辟卿士抗疏上言咸謂人心未寧不足以盡敬寇孽猶在不足以告功迫於羣情俯抑誠願郊廟孔邇瞻言莫從悼心慚顔胡寧自處重以和平未洽災沴荐臻去嵗旱蝗兩河為甚人流不息師出靡居加之以徵求因之以荒饉困窮殍餒轉死丘墟闗輔之間冬無積雪土膏未發宿麥不滋詳思咎徴有為而致兵戎之後餘祲尚存獄犴之中深寃未釋又河中淮右逆將阻兵汙脅齊人陷之死地雖欲自雪厥路無由抱義銜寃足傷和氣此皆由朕爽徳播災于人為之父母實用愧恥今元隂已謝春日載陽勾萌畢伸幽蟄咸震思與海内同心自新發號更元用符天意宜改興元二年為貞元元年自正月一日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之先準勅令量移收敘人所司據節文速與處分應河中脅從將士多是奉天赴難功臣本居朔陲夙尚忠節豈以一夫詿誤棄其累代勲庸朕於此軍尤所不忍特宜洗滌待以初誠自非與官軍決戰死於鋒刃其餘雖臨陣擒獲亦從釋放棄逆歸順者在身先有官爵實封一切如舊仍準前後勅所在便給賞錢幷與甄敘如有因危効節建立殊庸量其事績特加奬擢李懷光若能飜然悔過束身赴朝念其嘗有大勲必當終始全護仍準前勅授之官封朕於功臣庶亦無負淮西將吏百姓等皆被劫制久為匪人詢事原情諒非獲已今王師四合計日誅夷玉石俱焚用増惻憫宜令諸道進軍之日唯存首惡一人其餘徒黨悉從原宥如有歸順及立功者並準河中將士例褒奨夫為國之要在於審官共理分憂守宰彌切闔境性命繫乎其人將使里閭無愁苦之聲風俗興廉讓之教得不慎柬髦彦寄之化源自今已後諸州刺史有闕中書門下於朝官中精擇有理人才術者授之如刺史縣令在任頻年課績尤異者擢授侍郎給舍郎官御史中外迭處用觀其能賞罰必行期於競勸自頃選曺署吏唯以書判求人務騁浮華莫稽實行且能言者不必適用藴用者或未能言凡為擇人其在精覈宜令清資常參官每年於吏部選人中各舉所知一人堪任縣令録事參軍者所司依資敘注擬便於甲歴之内具摽舉主名銜仍牒報御史臺如到任後政尤異者有贓犯事跡著明者所司録舉官姓名聞奏以為褒貶其内外貟及京城諸使名目委御史審勘㑹商量幷省停減仍集百寮定議務從簡約息費便人其京官職田及息利官錢等黠吏詆欺移易疆畔或貧人轉徙捕繫親鄰日月滋深耗弊彌甚亦令百寮議其折衷擇善而行往以賦役殷繁人不堪命定為兩税事額易從比屬軍興或踰始制法無所守吏益為姦哀我勞人汔可小息自諸道州府除兩税外應有權宜科率差使一切悉停京畿及近縣所欠百姓和糴價直委度支即勘㑹支給諸道非臨寇賊州縣自冬已來㸃召官健子弟並宜放散任營生業應經陷賊州縣百姓屋宇被焚毁幷貧病老弱及遭傷損之類所在量加優恤使得安存天下名山大川幷自古聖帝明王賢臣烈士祠廟墳基各委當處長吏擇日致祭必資精潔以逹志誠班制有差所以序賢也廩秩有等所以明勸也今或髙卑失序中外相踰至於卿士之家尚罹凍餒之患忠信重禄豈其然耶内外官禄及俸錢手力雜給等委中書門下度支即叅詳定額聞奏應赴奉天及收城將士等並功存社稷節著艱危中心藏之豈忘酬報頃緣府藏空竭賞給未周乃眷勲臣實用増愧應準元勅合請賞錢人委所司節減在官及百司費用據所有財物速與給付應在京城及諸道立功將士等先有詔㫖並許甄升所司勘㑹淹歴時月委中書門下即準元勅處分諸軍行營幷河中朝邑被脅從將士家口在京及諸州府者宜令本道節度觀察使安存賑恤各令優給應諸軍使立仗見在城將士等共賜七萬匹制書有未該備所司速比類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里遐邇咸知冬至大禮大赦制貞元元年十一月門下君天下者受命于天地繼業于祖宗致其誠心惟敬與孝違敬莫大乎廢祀虧孝莫大乎黷神朕以眇身屬承大統縱欲敗度浸生厲階兵連禍深變起都邑六師播蕩九服震驚郊廟園陵陷於凶逆神人乏主將迨周星列聖大業㡬墜于地違虧敬孝罪由朕躬撫臨萬邦甚用自愧側身思咎庶補將來股肱元臣比義叶徳爪牙衆士勠力同心誅大憝而都邑廓清翦逋寇而闗河厎定兹再與王公卿尹洎億兆之人備其盛容修其禮物薦誠清廟展敬圜丘陳謝罪􅄽告雪憤恥感慕慙惕若無所容上帝顧懐再新景命豈伊匪徳獨荷鴻休思與普天誕膺多福可大赦天下自貞元元年十一月十一日昧爽已前大辟已下已發覺未發覺已結正未結正繫囚見徒罪無輕重常赦不原者咸赦除之左降官量移近處流人及藩鎮効力並即放還應有痕玷禁錮前後恩赦節文未該及者亦宜洗雪勿以為累李希烈僭逆不道誠所難容朕憫念蒼生務息征討頻有詔命許其自新若能歸降依前勅待以不死淮西管内將士官吏百姓等一切原宥與之如初先有官封亦皆復舊如能特建功効者當别抽擢若家口親屬在諸道者長吏綏撫各使安存其歸順百姓仍委節度觀察使刺史給空閑地任便安居優復終身務令全濟待事平已後聴歸本貫天下百姓去年十二月已前欠負官税官租及諸色人逋懸一物已上但不在官典復内者一切免放内外文武官見任及致仕官三品已上賜爵三級四品已下加一階天下諸使諸將軍士三品已上賜爵一級四品已下加一階白身人賜勲三轉自頃兇渠倡亂逆臣附姦保據國都憑陵甸服朕出次郊邑再遷巴梁險阻艱難靡不經歴暴亂之後仍彰烈士之功憂危之中方見直臣之節録勲進善其可弭忘應奉天興元元年扈從立功幷收京城將士食實封者各隨文武與一子官餘並加兩階仍賜勲三轉其文武百官應扈從到興元府者五品已上賜爵一級六品已下加一階合入三品五品者不拘考限聴敘其五品已下父母未經追贈者與追贈應平河中將士即準元勅速與甄奨自建中四年已来有身死王事義烈著明未經褒贈者本道即具名銜事跡聞奏諸道有觧退官健州府長吏切務安存仍量以空閑田地給付免其差役任自營生社稷之勲以輔興王業統帥之任以總制戎麾參衮職者其徳崇授旄節者其功大方鎮乃國之垣翰禁衞實予之爪牙尹京實賴於肅清主計尤資於辦集所頒慶澤宜越常倫司徒兼中書令晟宜與一子五品正員官幷四品階諸道副元帥與一子六品正貟官中書門下平章事充節度使各與一子七品正貟官節度使及神策兵馬使六軍統軍金吾六軍大將軍判度支侍郎各與一子八品正貟官都團練都防禦等使京兆河南尹金吾六軍將軍殿前射生兵馬使各與一子九品正貟官多難以来三十餘載克平禍亂屬在戎臣或節著艱危或勲髙戰伐受任雖專於總帥成功亦賴於羣材懋賞推恩宜加裔嗣諸道大將功業崇髙者各與一子官本使即詳定録名聞奏副元帥都統兼節度下每道各二十人都團練都防禦使下各十人如大將子孫之中有藝業優長性行純確者本使具狀聞薦仍量事資給令赴上都朕當随材授官以充侍衞庶使忠臣之後與國無窮故尚父子儀先朝元勲再復京邑贈太尉秀實以死為國節冠古今宜令與子孫一人五品正貟官自至徳已後節度使大將有忠烈績効著明其後淪翳者所司即條録聞奏與子孫一人正貟官諸色人應在賊中潛奉神主頃已甄賞宜便賜優崇三品已上賜爵一級四品已下加一階江淮轉運使檢校左僕射同中書門下平章事韓滉勵精勤職夙夜在公􅒩輓資儲千里相繼事無􅄽素人不告勞拯于凶災厥有成績可進封晉國公闗畿之内連嵗興戎荐屬天災稼穡不稔穀糴翔貴烝黎困窮倉廩空虚莫之賑贍毎一興念憫然痛心宜令度支取江西湖南見運到襄州米十五萬石設法般赴上都以救百姓荒饉如山路險阻車乘難通仍召貧人令其般運以米充脚價務於全活流庸庶事優饒副朕勤恤立國之道始於親親所以厚骨肉之恩明教化之本况荐經艱故宗族漂淪敦睦之情有加常典大長公主長公主公主各與一子七品官嗣王郡王郡主縣主各與一子官出身應陪位皇親五等已上諸親三等已上者三品已上賜爵一級四品五品加一階六品已下及常選官散官等簡選日優與處分未出身人量授文武散官如宗子中有徳行才能宗正卿具名聞奏當别奨任致理之本在乎審官審官之由資乎選士將務選士之道必精養士之方魏晉已還澆風未革國庠鄉校唯尚浮華選部禮闈不稽實行學非為已官必徇人法且非精弊將安救宜令百寮詳思所宜各修議狀中書門下參較得失擇善而行有虞建官三載考績在漢為吏或長子孫盖吏久於官則人情不茍官久於事則理化有成日者制度廢隳考課乖舛淹速靡準升降無名欲令庶寮何以懲勸自今以後刺史縣令未經三考不得改移其餘非在職績効殊尤亦不得越次遷轉刺史停替須待魚書内外五品已上及常參官在任年考已深者即量才効用與改中外迭處以觀其能夫明目逹聰務廣聞見或慮懐才抱器輸忠納諌之倫地處幽遐無由自逹永言於此夢想不忘應諸色人有長策濟時忠規匡主任具陳所見詣所居之州委刺史略與討論觀其㫖趣但有裨治道不渉私情便與附驛遞送朕當親覽自立兩税經今百年或初定之時已有偏倂或戸口減耗舊額猶存輕重不均流亡轉甚委度支即折衷條理以䘏困窮古者雖有水旱人無菜色皆由儲畜不匱勸導有方前代所置義倉國初亦循其制備災救乏甚便於人即宜準貞觀故事天下所墾見田上自王公下及百姓每豐稔之嵗秋夏兩時州縣長官以理勸課據頃畝多少随所種粟豆稻麥逐便貯納以為義倉如年穀不登即量取賑給官司但為其立法勸諭不得收管仍各委本道觀察使逐便宜處置聞奏敦本厚生必資播殖當今所切莫甚於斯自今百姓有墾闢田疇加於常嵗者所加之地不得輙徴租税刺史令長考課亦以本界墾田多少為殿最今年蝗旱損甚州府開春之後量給種子使就農功天下應荒閑田有肥沃堪置屯田處委當管節度使觀察都團練都防禦等使刺史審細檢行以諸色人及百姓情願者使管佃如部署精當收獲數多本道刺史特加襃升屯田等節度優賞如是逃戸田地本主復業即却給還輦轂之下四方㑹同供應既多難為準定急賦繁役人何以堪宜令京兆尹與度支計㑹長安萬年兩縣每季各先支貯備錢五千貫文於縣庫收納定清幹官專知應緣卒須别索及雜供擬幷工匠等縣令與専知官先對給價錢季終之後申度支勘㑹所是和市和雇並須先給價錢兩税外一物已上不得科配百姓御史臺朝廷紀綱尚書省治化根本百度得失繫乎其人自頃制勅頒行所司多不遵守王臣奉職豈所宜然委御史臺左右丞切糾稽違無壅朕命南郊太清宫太廟應職掌行事官郊廟攝將軍中郎郎將及留守副留守内定行從官三品已上各賜爵一級四品已下加一階並賜勲兩轉其諸色支供作官司直長上流外灼然要職掌者並賜勲兩轉行事室長掌坐齋郎禮生贊者减二年勞無勞可減者簡選日優與處分崇賢館學生見在者減帖策各一道國子監陪位學生賜勲一轉介公酅公各與一子官如無子孫賜物一百匹神策六軍殿前左右射生英武威逺皇城左右金吾街使將士應緣大禮宿衞御樓立仗及守本庫本營者共賜物若干端匹天災作沴深儆予衷跼蹐憂慚罔知攸措今榖價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廩食俱闕既無賑恤又復徴求財殫力竭繼以鞭箠弛征則軍糧乏贍厚取則人何以堪念兹困窮痛切心骨思所以濟浩無津涯補過實在於増修救患莫如於息費致咎之本既由朕躬謝譴之誠宜自朕始宜令尚食所進御膳每日各減下一半應宫人等每月惟供給糧米一千五百碩飛龍廏馬從今已後至三十日已前並減一半料京兆府應差科百姓及和市和買等諸色目事無大小一切並停公私債負容待蠶麥熟後徴理翰苑集巻二欽定四庫全書翰苑集巻三唐陸贄撰制誥赦宥下貞元九年冬至大禮大赦制門下朕以寡徳屬當大統皇天眷佑俾主兆人懼不克承夙夜祗畏􅃡懷前烈致于昇平予心浩然罔知攸濟小大之務曷嘗不勤芻蕘之言亦莫不敬慮每存於致理志常在於恤人中宵屢興終食累歎一事乖張惄焉疚懐一夫罹殃惻若傷體思與海内同臻大和息其生業降心從衆實匪有辭克已利人誠無所恡然以視聴有極思慮難周况乎長自深宫安於近習損益之理寧免過差幽逺之情固多未逹由是兢兢砥礪悔徃修来燭理所患於不明推心庶㡬於無負日慎一日于今十有五年矣上靈降監多士叶誠五稼屢豐四鄙不擾方鎮輯睦干戈厎寧邉壘繕完殊方款附協天地㑹昌之運實宗社無疆之休慶既荷於元功禮有昭於大報矧惟霜露之感永切孝思禋燎之儀每勤精意將申誠敬其在躬親是與公卿大夫䖍奉犧牲圭璧陳其文物薦其馨香類秩於泰壇朝享于清廟率職来助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈惟朕躬思俾普天均承惠澤可大赦天下貞元九年十一月十日昧爽已前繫囚見徒大辟已下罪無輕重咸赦除之其見於官辯對者亦並放免官人犯入已贓不可令其却上已後勿以為累左降官及流人並量移近處其官已經量移未復資者還其階爵竄謫遐裔冀速沾恩比者準制量移所司比例申牒屢加盤覆累渉嵗年既甚淹遲且不均一宜令吏部刑部審勘檢本流貶及量移勅㫖比類元犯事狀輕重兩月内與處分外文武見任及致仕家居幷諸軍諸使將士等三品已上賜爵一級四品已下加一階應百姓自置義倉仍準貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠莫先於竭節惟爾師長卿校洎乎方岳列藩保乂皇家交修庶績竭節之効既昭乃誠榮親之恩宜洽國典内外文武清望職事官幷節度觀察都防禦都團練經略等使父在未有官量授檢校五品官母在未有邑號者各封邑號父母亡沒者量與追贈已經追贈者更與改贈佐運之臣納忠之輔功既存於社稷慶宜及於子孫故周錫田土漢傳帶礪疇其爵邑與國終始以明報徳之恩勸為臣之節其或年代未逺利澤猶存祠宇已變於荒墟裔嗣不編於仕籍思其人猶愛其樹况奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大端應九廟配享功臣及武徳以来將相名節特髙有封爵廢絶祠廟無主者宜許子孫一人紹封以時享祀自今以後應有家廟子孫但傳襲封爵者並許享祔于廟其有毁賣私廟及買之者各以犯教義贓論自古聖帝明王忠臣烈士各令所在長吏以禮致祭書敘明目逹聰垂拱而理詩稱濟濟多士文王以寧舍已從人故能通天下之志棄瑕録用故能盡天下之才昔在太宗勤求理道納諌如響任賢勿疑致俗於太平垂範於永代朕獲承鴻緒追慕聖猷書之座隅常自儆勵朝夕翹想庶聞嘉謀夢寐勞懷思得賢士凡厥在位所宜共成諸司官有陳便宜者各盡所見條疏封進事有寃滯政有闕遺悉當極言無或隐避詔勅不便於時者所司執奏以聞天下有藴徳懷才隐居不仕委所在觀察使表薦當以禮邀致諸色人中賢良方正能直言極諌或博通墳典逹於教化或詳練故事長於著述或精習律令曉暢法理或該明吏術可委理人或洞識韜略堪任將帥者委所在州府長吏及臺省常參官詳録行能舉奏並限来年七月内到京朕當親試應緣大禮掌職行事仗内引駕攝將軍中郎郎將留守副留守幷諸道表狀陪位法駕三引官等三品已上更賜爵一級四品已下加一階其郊壇宫廟行事官仍各賜勳兩轉皇親諸親應陪位者三品已上賜爵一級四品五品加一階六品已下及常選官至選日優與處分白身人及諸色應陪位官等各賜勳兩轉親王大長公主郡主縣主賜物各有差酅公介公各賜物若干段行事室長掌坐齋郎禮生贊者各減一年勞無勞可減者至簡選日優與處分崇賢舘學生減策一道國子監學生陪位者及應緣祗應諸司作官直長長上流外要職掌内侍省白身諸州行綱考典兩京耆夀諸色番役當上在城幷量留十月番人等各賜勲一轉鴻臚番客共賜物若干神策六軍英武威逺皇城金吾街使諸軍諸使將士應緣大禮宿衞御樓立仗及守本庫本營者共賜物若干端匹天下耆老百嵗已上者各賜錦帛五段米五碩八十已上及鰥寡惸獨不能自存者委刺史縣令各加優恤應緣大禮加階及賜勳爵等申報敘奏期限並準貞元六年十二月二日勅處分餘依常式所司不須更作條件赦書日行五百里布告遐邇咸使聞知蝗蟲避正殿降免囚徒徳音夫人事失於下則天變形於上咎徴之作必有由然自去嵗已来災沴仍集雨澤不降延歴三時蟲蝗既臻彌亘千里穀糴翔貴稼穡卒痒嗷嗷烝人聚泣田畝興言及此實所痛傷徧祈百神曾不獲應方悟禱祀殊救患之術言詞非謝譴之誠憂心如焚深自刻責得非刑法舛謬忠良欎堙暴賊未蠲勞師靡息事或無益而重為煩費任或非當而横肆侵蟊有一於兹足傷和氣本其所以罪實在予百姓何辜重罹殍餒所宜出次貶食節用緩刑側身増修以謹天戒朕避正殿不御百寮奏事並於延英處分尚食進膳宜更節減百司不急之務一切且除諸軍將士外自餘應食官糧人及諸色用度等並委本使長官商量權行停減以救荒饉仍限十日内具元額及所釐革條件聞奏待至豐稔却令依舊畿内百姓委京兆尹切加慰撫除正税正役外徴科差遣並宜禁絶非交相侵奪尋常訴訟不須追擾務且息人京畿内外及京兆府諸縣見禁囚徒死罪降徒流以下一切放免畿内及河中同州界應有因戰陣殺戮遺骸暴露者各委所在長吏随事薶瘞咨爾卿佐實惟股肱所當一其誠心同恤災患勉修厥職副我憂勤誅李懷光後原宥河中將吏幷招諭淮西詔自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方来同茍或昧於徳綏務以力勝士旅疲耗烝黎困窮幸以成功豈云有補李懷光久從戎旅頗著勤勞拔於等倫授以旄鉞誓師河朔奔難奉天有夷兇嫉惡之誠有弭患釋圍之績俾介元帥仍升上台秉心匪彞自厎不類怙衆貪亂附姦脅君朕用再遷幾危宗廟洎股肱宣力賊泚就誅率土之人咸懷奮撃朕獨排羣議未忍加兵命復官封志期全貸而乃昬迷不返悖慢逾彰殘害使臣侵敗畿甸宻邇京邑人愁無聊諭之不悛乃用致討上帝悔禍元臣協謀克集茂勲以夷大難渠魁授首餘衆革心制勝以謀兵無血刃雖事非獲已義在救人而本其所由情深罪已盖以信誠未著撫馭或乖至使功臣陷於誅戮謂之克敵寧不愧心然以懷光一家法當殱戮念其昔居將相嘗寄腹心罪雖掛於刑書功已藏於王府以千紀之跡固合滅身以赴難之勲所宜有後非常之澤俾洽幽明雖屈彞章庶旌徃効大夫君子無我有尤宜以懷光一男為嗣賜莊宅各一所聽住京城仍還懐光首級及屍任便收𦵏其妻及諸子孫在室女等並遞送澧州委李臯逐便安置使得存立其出嫁女及諸親戚並宜釋放應先陷河中將士等皆嬰迫脅無路申明多是朔方舊人素藴忠義幷幽州涇原將士頃被朱泚脅從收京之時奔􅇡在彼究其本末情有足矜况能協力同謀舉城歸順録其成効咸與惟新宜一切洗雪勿為瑕累先有官爵實封者並許仍舊其中首謀効順事績著明者委副元帥條件聞奏别加甄奨河中及同州綘州百姓並經陷賊又久屯軍骨肉流離生業廢棄興言軫念良用惻然宜各給復一年京兆府奉先美原等縣緣與同州接近随便供運杼軸既繁流亡頗衆委京兆尹即量事優恤條件聞奏仍加招輯使各安存河中保義軍保寧軍節度使幷管内諸軍行營兵馬副元帥河中保寧等軍節度度支營田觀察處置等使銀青光禄大夫檢校司徒同中書門下平章事兼太原尹北都留守北平郡王燧惟嶽降生欎為時傑奉上勵匪躬之節訓師懷盡敵之謀略地無遺攻城必拔發揚以威強寇感激而服叛徒嘉謀屢聞能事畢備朔方河中同綘陜虢汴等州及管内諸軍副元帥河中綘州節度觀察處置等使開府儀同三司行侍中兼河中尹咸寧郡王瑊鑒識精明宇量𢎞博秉義率衆推誠待人堅制不奪之心亟陳必勝之略輯睦士旅安慰流庸盛徳克彰崇功允集惟乃二帥一其誠心奉行天誅同奨王室有崇譲之美有禁暴之能元惡既除全城底定是加寵命以荅崇勳燧可兼侍中仍與一子五品正貟官幷階餘並如故瑊可檢校司空仍與一子五品正貟官幷階餘並如故華州潼闗鎮國軍節度使開府儀同三司檢校右僕射幷華州刺史上柱國武康郡王駱元光邠寧慶等州刺史御史大夫上柱國許昌郡王韓遊瓌鄜坊丹延等州節度觀察使檢校兵部尚書兼御史大夫上柱國東平郡王唐朝臣等並節著艱危功成討伐鎮于衝要隠若長城取彼兇殘進無堅陣比義同徳廓清方隅宜増食于真封且延榮於䕃子可各賜實封二百戸仍與一子六品正貟官幷五品階餘並如故應諸道諸軍同討懷光將士等一自征役淹歴嵗時被服干戈略無寧息賴兹勤効是有成功宜並賜三十萬端匹以充宴賞仰度支即般次送赴並各放歸本道仍令所司敘録即超資與改轉其中大將及功効殊尤者委所司速具名銜聞奏先與處分其先在河中將士亦宜依例賜錢宴賞如本是奉天定難功臣準條合給賞者度支即排比支付嗚呼自國家多難二紀于兹朕嗣位七年連兵五載追惟往事悔恨于懐今二孽既誅諸方甫定哀彼淮右獨為匪人其帥不龔其衆何罪朕晨夕惕慮念之甚詳罷征討則阻命止於數州窮戰争則流禍及於天下利病之勢較然相懸俾人罹殃寧我忍耻今勲賢列鎮疆理有經縱未偃戈足以保境况天地之大無所不容豈令是邦猶隔朝化因兹大慶使洽鴻恩諸道應與淮西接連宜且各守封境非被侵軼不須進討仍委所在長吏明加招諭宣布朕懷李希烈若能歸降待以不死其餘將士官吏百姓等一切並與洗滌與之更新先有官封亦皆仍舊如能去逆効順因事建功理當甄升以示褒勸其所以優賞科條並準前勅處分朕思與海内去危圗安有過自新雖大必宥朗然明信彰示兆人期爾庶邦自求多福無有遐邇咸使聞知誅李希烈後原淮西將士幷授陳仙竒節度詔反易天常悖違人紀衆之所棄罔或逃誅李希烈蔑義背恩窮姦極暴謂神器可以力取謂生靈可以詐欺志在兇殘躬行僭竊罪無與比法實難容以君徳不修致人於禍究其端本過實在予不忍烝黎重相攻戰屢施詔命務欲懷柔抑羣帥奮發之誠駐諸軍討逐之勢不憚屈已期於息人希烈曾無悛心益逞驕志虐毒滋甚吞噬無厭惡貫既盈自厎夷滅開府儀同三司御史中丞臨漳郡王陳仙竒忠勇有餘沉毅能斷攄闔境受汚之憤導三軍思順之心唱義一呼羣情響附廓清氛祲殱戮渠魁驛書上聞函首入獻方隅既乂役戍其休懸賞之科是宜必信其以仙竒為檢校工部尚書兼蔡州刺史御史大夫充淮西節度仍賜實封五百戸應淮西管内將士官吏百姓等頃迫兇威遂從脅制既誅元惡俱是平人除李希烈一家其餘並準前後赦勅原放更無所問其將士等或本屬平盧或久鎮淮右素推忠義累著勳庸果能叶志同謀輸誠奉順以兹節効良有可嘉委仙竒即以諸色官錢優與宴勞其中首建謀議同斬希烈人等宜並條録聞奏節次褒賞比年以来有潛圗効順節義著明計或未行為賊屠害者亦當審加訪察具事績以聞如有子孫仍並録名聞奏百姓等久經淪陷兼被傷夷遐想凋殘實足哀憫除供當道軍用外宜給二年應被希烈差㸃兵馬及團練子弟並即放散其本額將士之中有不樂在軍願歸農業者委節度刺史量給逃死戸田宅幷借貸種糧優給復終身使之存濟宜令尚書左丞鄭叔則充淮西宣慰使嗚呼往欽哉自希烈叛命于今五年王澤不通下情亦阻所宜宣我信令以釋危疑敷我惠和以慰疲瘵滌清汚俗咸與惟新厎難一方以稱朕意重原宥淮西將士詔乃者希烈亂常阻兵竊號汚脅士衆殘虐烝黎朕志在好生誠深罪已為人受耻不忍加兵惟兹一軍代著忠節果殱元惡不替舊勲詢於衆情就拜戎帥人亦勞止期於小康旋乖䘏下之方重致喪身之禍由朕薄徳俾人不寧撫臨萬邦且愧且悼猶賴將校士旅秉其誠心邦人不驚軍部無撓以兹節効良有可嘉所宜慰安俾洽寛澤應將士吏人承前所有諸過犯罪無輕重一切釋放曠然昭洗咸與惟新其有先請受莊宅財物者各以見管為主將士衣賜節料幷家口糧賜等一切並準舊例以時給付不得停減先令優與賞設亦準元勅處分務令豐厚以稱朕懐仍加曉諭各委知悉翰苑集巻三欽定四庫全書翰苑集巻四唐陸䞇撰制誥優恤賜功臣名改州府賑恤諸道將吏百姓等詔國之經制儲畜備災雖遇凶年人無菜色時或弛征散利務穡勸分徙有以均無因豐而補敗救患之術抑其次焉自戍役繁興兩河尤極農桑日廢井邑為墟丁壯服其干戈疲羸委於溝壑傷夷未復荒饉荐臻歴河朔而至於太原自淮沂而被于洛汭蟲螟為害雨澤􅄽時稼穡卒痒烝黎重困然猶徴賦不息征役未寧凍餒流離寄命無所興言感悼焚灼于懐朕聞刑罰失中虐沴斯作致咎之本在予一人萬姓何辜遭罹其弊兢兢惕畏不敢遑安庶蠲下土之災用荅上天之戒其宣武等軍宋亳陳州等節度淄青等州節度河陽懷州節度東都畿汝等州節度潞美軍澤潞磁邢等州節度保寜軍節度成徳軍恒深趙等州節度易定等州節度每管各賜米五萬碩所司即般運都於楚州分付各委本道差官受領賑給將士百姓等務令均洽以惠困窮屬軍費方殷國儲尚歉今所賜賑給其數非多猶慮孤惸或未周贍穀價翔貴何能自資江淮之間連歲豐稔廹於供賦頗亦傷農收其有餘濟彼不足允孚發斂之術且叶變通之規宜令度支於淮南浙江東西等道量置塲加價和糴米三五十萬碩差官般運於諸道減價出糶貴從權便以利於人無或勞煩重予不徳方岳守將實朕股肱䘏患分憂與朕同體宜即遣使分道宣慰勞勉將士省問鄉閭有可以救歲之凶災除人之疾苦各與本道節度使商議具以聞奏必精必詳用稱朕意優恤畿内百姓并除十縣令詔朕以薄徳託於人上勵精思理期致雍熙鑒之不明事或乖當百度多闕四方靡寧傷夷未瘳而征役荐起流亡既甚而賦斂彌繁人怨聞上天災降下連歲蝗旱蕩無農收惟兹近郊遭害尤甚豈非昊穹作沴深儆予衷跼蹐憂慚罔知攸措今穀價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廩食俱竭既無賑恤猶復徴求財殫力疲繼以鞭箠弛征則軍莫之贍厚斂則人何以堪念兹困窮痛切心骨思所以濟浩無津涯補過實在於増修救患莫如於息費致咎之本既由朕躬謝譴之誠當自朕始宜令尚食每日所進膳各減一半宫人等每月惟供給糧米一千五百碩其餘悉皆停省年食支酒料宜減五百碩飛龍廐馬從今已後至四月三十日已前並減半料京兆府百姓應差科徴配及和市和糴等諸色名目事無大小一切並停公私債負容待蠶麥熟後徴收百司非至切之務如追擾百姓及追勘徴收等色府縣並不須承受其尋常訴訟非交相侵奪者亦不得為理百姓及諸色人等如能力行仁義均減有無賙貸貧人全活數衆者府司具事跡聞奏朕當授以官秩蠲其征徭如縣令勸導有方流庸克濟至夏初已來類例勘㑹但戸口無減田疇不荒亦以狀聞量加優奬百姓有廹於荒饉全家逐食者其田宅家具樹木麥苖等縣司並明立簿書印記令所由及近鄰人同檢校勿容輙有毁損及典賣塡納差科本戸却歸使令復業夫致理之本必在於親人親人之任莫切於令長導王者之澤以被於下求庶人之瘼以聞于朝得失之間所係甚大且一夫不獲辜實在予况百里之安危萬人之性命付以長吏豈容易哉今甸内凋殘亦已太甚每一興想䀌然傷懷非慈惠不能䘏疲甿非才術無以賑艱食臺郎御史選重當時得不分朕之憂救人之弊昨者詳延羣彦親訪嘉猷尚書司勲員外郎竇申等十人咸以器能理道精心究烝黎之疾苦知教化之宗源輟於周行往涖通邑申可長安縣令鄭珣瑜可檢校吏部貟外郎兼奉先縣令韋武可檢校禮部貟外郎兼昭應縣令賈全可咸陽縣令兼監察御史霍琮可華原縣令兼監察御史王倉可檢校禮部貟外郎兼昭應縣令李曽可􅉦厔縣令兼監察御史荀曽可三原縣令兼侍御史李緄可富平縣令兼殿中侍御史其有散官封賜者並如故應畿内縣令俸料宜準常參官例均融加給涇陽縣令韋滌潔已貞明處事通敏有禦災之術有字物之方人不流亡事皆辦集惟是一邑之内獨無愁怨之聲古之循良何以過此就加寵秩允叶前規可檢校工部貟外郎兼本官仍賜緋魚袋幷賜衣一襲絹百匹馬一匹嗚呼積行在躬雖微必著咨乃庶尹其惟欽哉朕聞為君者必擇人而官為臣者罔擇官而處弛張繫於理不繫於時升降在乎人不在乎位朕方抑浮華以敦教稽言行以進人非次之恩以待能者彰善黜惡期於必行凡百君子各宜自勉重優復興元府及洋鳯州百姓等詔朕巡狩山南自春渉夏師旋殷㑹日費既廣州閭杼軸歲計其空東作妨時西成罕望雖黽勉從事人不告勞而憫悼積衷予實知愧昨者減其租税優以復除庶乎有瘳汔用小息洎駕言旋軫躬履畏途絶磵縈廻危棧綿亘時經霖雨道阻且修工徒造舟縣人葺路靡幼靡耊莫獲寧居而又齎負糗糧供備頓舍渉于千里飫我六師居人露處以罔依宿麥過時而不穫覩兹妨奪彌増感傷前所復除未足酬䘏式敷惠澤以紓大勞其興元府除先優復外宜更給復二年鳯州全放今年税其興元府鳯州界内知頓及修道路閣橋州縣官將士等並委嚴震類例功効具名聞奏量與甄奬嗟乎古先哲王東征西怨顧予不徳重以勞人補費録勤是有申命長吏明加優諭稱朕意焉議減鹽價詔三代立制山澤不禁天地材利與人共之王道寖微強霸争騖於是設祈望之守興𣙜管之法以佐兵賦以寛地征公私之間猶謂兼澤歴代遵用遂為典常自頃寇難荐興已三十載服干櫓者農耕盡廢居里閭者杼軸其空革車方殷軍食屢調人多轉徙田畆汙萊乃專煮海之利以為贍國之術度其所入歲倍田租近者軍費日増榷價日重至有以榖一斗易鹽一升本末相踰科條益峻念彼貧匱何能自滋五味失和百疾生害以兹夭斃實為痛傷嗚呼朕丕承列聖之緒遐覽前王之典既不克静事以息用又不獲弛禁以便人征利滋深疲甿致困予則不恤其誰省憂應江淮幷峽内榷鹽宜令中書門下及度支商議裁減估價兼釐革利害速具條件聞奏削去苛刻止塞姦訛務於利人必稱朕意賜京畿及同華等州百姓種子賑給貧人詔春陽布和萬物暢茂實兆庶樂生之日農夫致力之時今兹吾人則異於是迫以荒饉愁怨無憀有離去井疆業於庸保有乞丐途路困於死亡鄉閭依然煙火斷絶種餉既乏農耕不興若東作􅄽時西成何望為人父母得不省憂雖國計猶虛公儲未贍濟人之急寧俟盈豐罄其有無庶拯艱厄京兆府百姓並宜賜種子二萬碩同華州各賜三千碩陜虢兩州賜四千碩委州長吏即於度支計㑹請受差公清仁恤之吏與縣令親至村閭隨便給付仍加勸課勿失農時應諸倉所有逺年粟麥宜令節度更分二萬碩京兆尹即差官逐便般載賑賜貧人先盡鰥寡孤惸目下不濟者務令均給全活流庸嗚呼朕徳之不敷誠之不感上帝降割丁寧厥躬元元何辜罹此災害思欲拯救未知其方長人之官寄任斯重所宜極慮與我同憂勉敷惠和以育疲瘵佇聞良術稱朕意焉賜將士名奉天定難功臣詔國家受天明命平一宇内自武徳迄于天寳百四十載海内無事崇徳廣化澤浸生人時洽和平俗登富教鰥寡孤獨咸得其所鳥獸魚鼈亦罔不寧凡今有生實賴亭育羯虜伺間盜起幽燕率土之人莫保性命肅宗以神武戡大難先朝以仁徳紹興運區域再造億兆再康室家離析而復安子孫煦嫗而相長勞來安集垂三十年則我列聖之於天下惠澤深矣朕以寡昧祗膺寳厯常恐不克負荷罔敢怠荒道有未明事多乖謬羣情壅而不逹大信鬱而不彰兩河之間羣盜連禍朕務除大患靡憚暫勞是以興有征之師問干紀之罪昨以涇原士徒將赴汝郊失於撫綏致使潰叛朱泚乘釁因構異圗肆其狼心誘我蟊賊謂君可叛謂天可欺縱恣凌悖無所愧畏朕失守宫闕出次郊畿九廟震驚萬姓奔駭内省思咎外顧懷慙罪實在予不敢自蔽意者宗社降祐大儆于朕躬夙夜殷憂庶乎有補實賴股肱心膂勵從戎之節方岳將校集勤王之師赴難如歸見危思奮堅貞勵操何日忘之平巨猾者必仗羣雄賞茂績者不限彞典保勲庸於帶礪傳爵邑於子孫崇功美名與國終始其諸軍使應到奉天縣將士等宜並賜名奉天定難功臣食實封者子孫相繼代代無絶身有過犯遞減罪二等子孫有過犯遞減罪一等當戸應有差科徭役一切蠲免其功臣已後雖衰老疾患不任軍旅者當分糧賜等並與全給身死之後回給家口十年勿絶如有能梟擒朱泚者即以朱泚在身官爵授之仍加實封二千戸朱泚所有田宅財物悉並充賜其梟擒賊大將已下幷節級特加優寵仍各與實封應梟擒人所有田宅財物亦使賜之其餘立功應合授官給賞並準今年七月勅處分其今日已前身死王事者追贈官爵亦稱奉天定難功臣子孫為功臣之家應合襲封減罪蠲免差役等一切同例宣告中外令知朕懷建中四年十一月二十三日改梁州為興元府升洋州為望州詔自昔多虞順時而動古公避狄兆永祚於岐下髙帝徙蜀建雄圗於漢中王蹟所興子孫是奉覩遷居於遐阻知致君之艱難矧天下為家不常厥邑王者所至四方㑹同崇號設都於是乎在朕遭罹寇難播越梁岷烝庶煩於供億武徒勤於扞衞凡百執事各奉厥司人皆競勸物以豐給嘉乃成績予懷不忘今大憝已除京邑甫定將旋法駕展敬園陵眷于是邦復我興運宜其崇大以示將來古者天子省方則問耆年䘏百姓以頒慶賜以茂勲勞用𢎞布澤之恩式慰來蘇之望宜改梁州為興元府其署置官資望一切與京兆河南府同南鄭縣升為赤縣諸縣並升為畿縣見在州縣官各令終考秩至考滿日放選依本資處分耆夀與板授五品官仍並賜緋先已賜緋並賜紫典正等各賜勲五轉百姓除先減放税錢外更給復一年洋州宜升為望州見任州官亦並令終考秩幷諸縣官等各減兩選無選可減者各加三階應山南西道節度下將士除扈從迎駕已經改官者餘並即與甄叙嗚呼古先哲王東征西怨顧予不徳重于勤人撫心咎已良増愧歎宣示有衆明知朕懷翰苑集巻四欽定四庫全書翰苑集巻五唐陸贄撰制誥慰勞招撫處分事奉天遣使宣慰諸道詔古者天子廵狩之義以考國典以觀人風在時多虞或所不暇乃命卿士使于四方問人疾苦廉吏善惡茍副所任則如親臨在理平之時尚資勤恤當喪亂之際得無省憂朕以不敏肆于人上撫馭失道誠感未孚冦盜繁興阻兵拒命哀哉臣庶陷于匪人顧兹田疇鞠為茂草不念柔復遽命徂征徴發兵甲萬里必至暴露營壘連年不息冒于鋒刃繼以死傷煢嫠無依父母廢食存者積思家之怨殁者倍異鄉之痛又以軍費滋廣公儲不充厚取於人罔率厥典科條互設誅斂無常農工廢棄其生業商賈咨嗟於道路軍營日益閭井日空凋瘵日窮徭役日甚以財力之有限供求取之無涯暴吏肆威鞭笞督責嗷嗷黔首控告何依怨氣上騰咎徴斯應疫癘荐至水旱相乗罪非朕躬誰任其責朕自嗣位迨今六年連兵不觧已踰四稔雖本非獲已義在濟人而事乃重勞敢忘咎已皆以朕之寡昧居安忘危致寇之由實在於此予則不徳人亦何辜愧恨積中痛心疾首昨者改元施令悔往布新將反側獲安則干戈日弭賦役差減則衆庶就康還定流亡與之休息猶懼思慮未周于庶務誠感未逹于遐方一理失中一夫不獲則何以謝天譴致人和俾代予言其在良弼宜令門下侍郎同中書門下平章事蕭復充山南東西鄂岳荆南江西淮南浙江東西嶺南福建等道宣慰安撫嗚呼往率乃職敬敷朕命慰勉征戍勞徠困窮訪其所安察其所弊淹滯必逹寃濫必申無憚幽逺而不被無略細微而不恤洎乎編甿比屋咸若朕之躬親股肱惟良予則有賴其諸道將士並準今年正月一日制嚴備疆界勿使侵擾仍各令本使本將速具名銜等聞奏悉與甄敘其殊功勁節超越常倫别條狀績當特優奬百姓除毎年兩税定額外自餘徴率一切並停課勸農桑各令安業寇難既定漸息干戈朕當躬先簡約庶務節省兩税之内亦更減除其諸道事縁急切須處分者即與所在節度觀察使商議裁度務合便宜其餘利害還日條奏朕當詳省以擇厥中宣布逺邇咸使聞知收復京師遣使宣慰將吏百姓詔朕獲承先顧付以大器懼徳不類貽列聖羞䖍恭惕厲罔敢暇逸將欲立法齊一致俗和平小信未孚衆心遂阻事理乖當百度失中君臣之間鬱堙不逹致寇雖深於罪已興戎猶昧於省躬期靖亂以濟人反勞師而黷武行者被殺傷之苦居者重齎送之勞四海騷然靡有寧處京輦之下杼軸亦空環列之中遣戍殆盡略内以勤逺居安而忘危賊臣誘姦乘間竊發豺狼穢于宫闕士庶陷于塗炭作威肆戮仇視我人萬姓嗷嗷呼天罔告有殞踣以抗節有脅從以假命且一夫不獲辜實在予朕君臨萬邦作人父母既不克覆育又從而咎之其心愧耻一食三歎退舍内訟介于梁岷庶乎有瘳以答譴戒皇天悔禍宗社降靈腹心爪牙奮謀宣力元惡稔慝脱身逃遁餘黨歸誠率衆欵附埽氛沴而闢閶闔翦鯨鯢以清郊原函夏載寧室家相慶非將士夾輔王室非卿士交修予違軍旅叶心畢命盡敵豈伊寡昩克復興運戡定大難載感予懐宜令吏部侍郎班宏充上都宣慰使勞問將士撫綏烝黎招輯流亡慰安反側朕續整飭法駕擇日還京告謝于祖宗請罪于天地策勲行賞大報忠烈銘功永代與國同休明宣朕懐咸使知悉平淮西後宴賞諸軍將士放歸本道詔朕纂奉丕業託于人上仁不被物義不勝姦頌聲蔑聞暴亂連起叛臣希烈竊據淮沂誠則彼夫無良亦由朕之不徳撫御之道失之於初師旅一興緜聫莫觧服勞者從役不暇受汚者無路自新旱蝗相乘穀糴翔貴兵氓餒死十室九空通邑化為丘墟遺骸遍于原野每念於此傷心涕流且自昔勞師靡有不悔以虞舜之聖屈於苗人漢武之強弊於戎虜矧乎徳猶不逮力或未全我其永懐求己自警乃者下哀痛之詔布寛大之恩普天載新殊死必宥然尚勞師旅作扞邉陲有累嵗棄離家室有經時不觧甲胄忠雖為國咎實在予君人若斯寧不知愧賴節將士旅一其誠心奮發武威愼固疆宇逺人思服元惡就誅烝黎方致於安寧役戍永期於休息懋官以旌善錫宴以勞旋賞不踰時式遵彞典都統檢校司空同中書門下平章事劉從一宜與子孫一人五品正員官鄭滑節度使檢校尚書右僕射李澄檢校兵部尚書曲環檢校戸部尚書李臯兼御史大夫樊澤等並與子孫一人七品正貟官都防禦使工部尚書御史大夫賈耽都團練使檢校左散騎常侍兼御史大夫盧元卿兼御史大夫張建封等並與子孫一人八品正貟官檢校司空同中書門下平章事李抱真檢校司空同中書門下平章事李納檢校尚書右僕射同中書門下平章事韓滉檢校工部尚書御史大夫田緒咸遣士旅逺赴行營同討不庭厥有成績抱真納滉宜並與子孫一人七品正貟官緒與子孫一人八品正貟官應與淮西接界州縣本界鎮守及諸道赴行營將士等宜共賜物三十萬端匹以充賞設度支即約據界首及行營軍額分配定數逐便支送仍委本道都統節度防禦都團練使即條録功第名銜聞奏並與甄叙其行營將士仍各放歸本道明加宣諭令悉朕懐授王武俊李抱真官封幷招諭朱滔詔三公之職論道經邦序五行之和任百事之理歴代崇重不常厥官天祚皇家茂生才傑比義齊列同寅協恭以徳允台階之望以勲當井賦之賜聿應並命式副具瞻開府儀同三司檢校司空同中書門下平章事使持節恒州諸軍事守恒州刺史充成徳軍恒冀深趙等州節度觀察處置等使琅邪郡王王武俊秉志沉宻臨事能斷忠而致力勇且有仁奮發之初渠魁即戮危疑之際大節首彰開府儀同三司檢校尚書左僕射同中書門下平章事潞州大都督府長史昭義軍澤潞磁邢等州節度觀察處置度支營田等使上柱國符陽郡王李抱真質重氣和内精外朗智窮變化守必以常學本明誠動有攸利謀猷屢告規益孔多皆勠力盡瘁志匡王室陳師鞠旅同討不庭仗大義而萬衆叶心體至公而千里同契合軍於呼吸之際決策於指揮之間幷轡載馳執桴親鼔兇徒殄殪河右廓清國家無北顧之虞姦慝阻南侵之計時乃同徳厥功茂焉敷五教而阜人均九土以居衆俾爾更踐備揚洪休乃加真實以貽後嗣武俊可檢校司徒同中書門下平章事抱真可檢校司空同中書門下平章事賜實封五百戸嗚呼古人有言曰惟理亂在庶官矧惟輔臣與國同體明朕徳命爾其欽承朕嗣位不明輕費尚力謂武可以靖暴慢謂刑可以懲姦邪徳之不修亂是用長士馬疲耗烝庶流離罪非朕躬誰任其咎自去歲遭變再經播遷歴山川之險艱知軍旅之勞苦惟省前過悔恨盈懐追逺事而不及庶後圗之可補以九廟為重而不憚屈身以百姓為心而不專私欲茍可以保安社稷休息甲兵𢎞濟蒼生蠲省徭賦含垢忍耻予無難焉朱滔受任薊門累著誠績委遇既重封秩亦崇臣節中虧自貽伊阻洎賊泚僭竊上京兄弟之親在法無赦朕以罪不相及情有可原待以如初之誠廣其自新之路執迷不復固敗是求蹙喪而歸既困方悟累獻欵疏深陳懇誠省之惻然良用憫歎雖將相嫉惡之志固所難容以君上懐柔之情未忍拒絶且善莫大於改過徳莫盛於好生叛而伐之服而舍之銷難愛人實惟朕志宜委武俊抱真開示大信明加曉諭若誠心益固善蹟克彰朕當掩舋録勲與之昭雪宣告衆庶咸使聞知招諭淮西將吏詔朕臨御已來連兵不息自經播越方歴險艱耳聞鼙鼓之聲目視殺傷之苦由是覺悟悔於興師既省已以知非亦欲人之遷善至乃歲有再赦事有屢言務於撫綏不憚煩冗冀朕之誠信日布冀人之患難日除毎議用兵惻然不忍而賊臣希烈煽禍滔天虐用其人仇視厥衆狼心多忌梟性無親以芟伐立威以猜刻為志朝為昵比夕為仇讎肆其芟夷蔑若草芥馮陵汝海流血盈川侵軼浚郊積骸徧野農耕廢業井邑成墟積彼妖氛發為災癘蕭條千里無復人煙朕哀彼生靈陷于塗炭茍存拯物不難屈身故於首春特布新令赦其殊死待以初誠使臣纔越於郊畿巨猾已聞於僭竊酷烈滋甚呑噬無厭將相大臣咸懐憤激繼陳章疏固請除討朕以所行天誅本去人害兵戈既接玉石難分言念忠良遭罹脅制雖欲却陳臣節厥路無由受汚終身銜寃沒代淪胥以逞誠足痛傷宜令諸道節度使每欲進軍先加曉諭今所致討唯止元兇其餘脅從一切不問如能去逆効順因事建功明設科條以示襃勸其以一州降者便授刺史封異姓王賜實封五百戸以一萬人已上降者授刺史封國公賜實封三百戸其餘各據功効節級甄升列爵建官以俟能者朗然明信朕不食言宣示逺人各令知悉招諭河中詔朔方諸軍應在河中綘州朝邑將士等並以義烈繼代勲業冠時艱虞已来常濟國難肅宗代宗再復京邑皆是朔方將士之功去嵗朕在奉天兇黨攻逼觧圍赴急亦賴此軍言念爪牙情均骨肉濟朕危厄感之豈忘頃以懐光背恩自生猜阻熒惑將士汚脅忠良朕頻降詔書再三曉諭皆被懐光隐匿兼亦志有加誣朕之誠懐竟未宣布夙夜自愧寢食不安時屬嚴凝屢頒衣賜豈以懐光一人拒命遂令將士俱不沾恩朕於功臣義存終始其朔方及諸軍應在河中綘州朝邑將士等今年春冬衣賜並準二月二十一日勅緣赴奉天觧圍功臣等第給錢物宜令所司幷許計料别收貯待道路通流即當時支遣其有歸順者續給其將士等有先賜實封一切準元勅並州給牒委馬燧渾瑊逐分送付其差人請受仍明加宣諭招撫務令忠義之士各悉朕意安撫淮西歸順將士百姓勅李希烈首亂淮濆又侵滎汴兇威所及罔不脅從百姓既罹於網羅將士兼質其家口哀我衆庶銜寃莫伸雖欲歸降何由自逹朕為人父母不克保安遂使忠良横遭脅汚興言憫悼思惻深衷今王師四臨所至尅捷將士百姓款附甚多或棄其鄉園或捐其家族脱身効節良有可嘉特宜撫綏以奬誠効應淮西界内及鄭汴等州將士歸順者委所在節度防禦等使便與收管切加存恤優給資糧仍各具名銜聞奏當與甄奬幷給遣衣賜其百姓從賊界内歸順者亦委所在觀察使刺史量以本道諸色錢物賑給令得存濟如情願便住者即配與死户田宅使營生業若欲赴諸州縣者隨其所之當時給文牒發遣不得止遏所至之處準前優賞率土之内莫非王臣雖陷寇中諒非獲已但能効順即是平人務於招綏副朕所恤甄奬陷賊守節官詔沮勸二柄國之大綱奬善懲違固不可廢頃者賊臣構亂京邑震騷惟兹土人奔竄無所或從其誘脅遂染汚名或守以純誠竟全貞節昨所司奏議但舉刑章坐累者各已條疏守節者並已甄異忠正而不報豈朕意焉應在京百司及京兆府長安萬年兩縣去年十月三日見在職事官在城陷於賊中潛藏不受逆命幷諸色前資官被偽署官爵頻遭迫脅首末不出事跡昭著衆所明知者並委御史臺訪察勘覈其事勿容虚濫仍限今月内具名銜事跡聞奏五品已上及常叅官已授替者委中書門下與處分六品已下各減三選不拘考例聽集其未得資被替非時放選仍稍優與處分如已喪亡者並與追贈使恩加存歿以稱朕懐令百寮議大禮期日詔朕自遷越旋於京師將欲請罪祖宗告謝天地所司擇日行有期矣議者多以大盜之後人勞匪居懼愆嵗功請俟農隙若俯順羣議則私懐不安將祗率典章又疲甿重擾夙夜憂惕罔知所裁宜令中書門下與常參官即詳議折𠂻聞奏不許諸軍侵擾勅李希烈阻兵淮右虐害烝人朕哀憫無辜横遭脅制若興師行伐則玉石俱焚所以頻下詔書再三開諭曽無悛革但益憑陵忠勇之徒皆思奮激朕悔於征伐務在含容以一夫無良遂百姓罹禍安人忍耻初是素懐今東作方興麥秋在近儻行侵抄深害農功一方之人實足矜憫應與淮西接界州縣各委本道都統節度都防禦團練等使明申前勅嚴設隄防務使農人遂其耕穫賊若不先侵軼但自保守封疆勿令越境暴犯田苗及有侵掠務宣朝化以洽逺人仍於所在界首明加招諭咸令知悉放淮西生口歸本貫勅遷徙家鄉分離骨肉有生之酷莫甚於斯朕撫育兆人庶臻理道懲過不可以不罰原情不可以不矜將推内恕之心用廣自新之路應從李希烈作亂以来諸道所有擒獲淮西生口配隸嶺南黔中等道宜一切釋放歸本道其投降人等權於諸州縣安置者亦任各從所適令諸道募靈武鎮守人詔朕以寡徳君臨兆人憂四鄙之不寧懼一物之失所降心以懐戎狄期息征徭極慮以綏烝黎冀遂安輯今諸夏岳牧咸能撫封九姓可汗荐克敦好寰瀛之内其謂小康愛人雖發於朕心濟理實由於藩輔豈惟菲薄所致於兹然獨吐蕃負恩背盟棄約尚勞師旅備禦西陲亦賴方岳同心簡練傑俊助其防鎮遏彼奔衝數年以来邉境寧謐乃眷靈武實惟雄藩扼東牧之咽喉控北門之管鍵軍懸寇邇地逺勢孤雖無交切之虞須建久安之策朕屬慮於此殆今累年晨思廢餐暮想忘寐征兵益戍則憚其勞師移人實邉又念其離土朕欲令萬姓各遂所安抑而使人情有不忍中懐結欎罔知所從古人有言主憂臣憤今朕憂矣將相牧守得不與我同其慮哉此乃忠臣盡規之時勇士建功之日茍𢎞良算必有其人宜令諸道節度觀察使各於本管諸色人中募能赴靈武鎮守者取其情願重設賞科仍須精選驍雄薄閑武藝便以本道諸色錢物給付仍優厚裝束發赴上都每道各據所管州縣多少通計每州所募多不得過五十人少不減三十人若欲將家口相隨便給資糧同發遣如有户貫在州者蠲免本戸差科其官健到日朕當超資與官至鎮便替朕之此意非務廣兵欲使四方驍雄俱到塞上壯邊城士旅之氣杜戎醜窺伺之心方岳信臣所當相悉勿令騷擾副我憂人翰苑集}
