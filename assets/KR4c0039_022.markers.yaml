  - {type: variant, offset: 16, length: 0, content: '', WYG: 若干女生稟柔惠習知禮則容徳純備孝睦洽聞可以叶美好逑輔成樂善是用使某官某持節冊命為蜀王妃嗚呼敬之哉備禮以崇其好合起家而居其爵位非義信不固非温順不親克恭匪懈則罔攸悔朕言必復可不慎歟冊杞王妃文維建中二年十一月某日甲子皇帝使某官持節冊命某官竇兟第若干女為杞王妃曰於戯禮以大婚崇繼嗣本人倫之教詩言淑女配君子繫王化之綱葢率人成風由内及外得不采嘉耦以固盤石刑閨門以御家邦詳求惟難歴選兹久時乃之擇得于舊姻柔婉稟乎天和禮樂成于家法明章婦順䖍奉姆儀克茂鵲巢之規叶宣麟趾之美其祗膺嘉禮欽率内教淑慎厥心無替於後嗚呼可不慎歟告謝昊天上帝冊文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯嗣天子臣某敢昭告于昊天上帝顧惟寡昧不克明道丕膺眷命俾作神主常恐獲戾上下而播災於人兢兢業業夙夜祗畏居位五祀徳馨蔑聞皇靈不歆是用大儆殷憂播蕩踰歴三時誠懼烈祖之耿光墜而不耀側身思咎庶補將来上帝顧懐誘衷悔禍𠞰兇慝之凌暴雪人神之憤耻舊物不改神心載新兹乃九廟遺休兆人介福以臣之責其何觧焉間屬寇虞久稽告謝今近郊甫定長至在辰謹以玉帛犧牲粢盛庶品冀憑禋燎式薦至誠太祖景皇帝配神作主尚饗告謝𤣥宗廟文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯孝曽孫嗣皇帝臣某敢昭告于皇曽祖考𤣥宗至道大聖大明孝皇帝皇祖妣元獻皇后楊氏臣猥承聖緒獲主大器懼徳不嗣靡所安寧任重道悠竟貽顛越京闕生變神人無依臣懐永圗不敢自棄忍耻含憤迨于戴遷戴天覆地俯仰慙惕幸賴烈祖遺澤感深于人人心攸歸天意允若肆予小子憑宗廟之積慶再復于鎬京在臣愆尤曷云有補豈敢自蔽以重于厥辜頃以寇孽在郊禮物未備久稽告謝伏積兢惶今祗見閟宫引慝請罪謹以一元柔毛剛鬛明粢薌合薌萁嘉蔬醴齊因時備物䖍奉嚴禋尚饗告謝肅宗廟文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯孝孫嗣皇帝臣某敢昭告于皇祖考肅宗文明武徳大聖大宣皇帝皇祖妣章敬皇后吳氏臣嗣服先業不克負荷人流於下事失其中姧魁乘舋作亂京邑播遷之咎臣實自貽震驚宗祧曠時乏祀外憂内愧若墜深泉勵已誓心期刷大耻實賴聖祖中興之業全育兆人澤深慶逺流福裔嗣故上天悔禍羣孽就誅非臣寡昧所能纘服今祗率百辟見于廟廷謹以一元大武柔毛剛鬛明粢薌萁嘉薦嘉蔬醴齊備物潔誠聿申告謝尚饗告謝代宗廟文維貞元元年嵗次乙丑十一月癸巳朔十一日癸卯孝子嗣皇帝臣敢昭告于皇考代宗睿文孝皇帝伏惟元徳廣運重光盛業武平多難仁育羣生謂臣克堪付以大寳臣自厎不類再罹播遷宗祧乏享億兆靡依下辜人心上負先顧敢愛隕越茍全眇身大懼社稷阽危以増九廟之愧由是忍耻誓志庶補前羞列聖在天鑒臣精懇敷錫丕祐俾之纘承兇渠殄夷都邑如舊兹臣獲執犧牲珪幣載見于廟廷感慕慚惶若罔攸厝謹以云云陳誠待罪式奉嚴禋尚饗祭大禹廟文維貞元元年某月某日皇帝遣某官以牢醴之奠敬祭于大禹之靈惟王徳配乾坤智侔造化拯萬類於昏墊分九州於洪波經啓之功于今是頼巍巍蕩蕩無得而名顧以眇身辱承大寳時則異于今古道寜間于幽明雖依聖垂休諒非可繼而勤人勵已竊有所希迨兹八年理道猶昧沴氣鬱結降為凶災邦無宿儲野有餓殍上愧明哲下慚生靈夙夜憂惕如蹈泉谷所資漕運用拯困窮底柱之間河流迅激舟楫所歴罕能獲全爰命工徒鑿山開道避險從易渉安代危嗷嗷烝人俟此求濟仰祈幽贊以集丕功享于克誠庶答精意策問賢良方正能直言極諫科皇帝若曰葢聞上古至道之君垂拱無為以臨海内不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以来制作滋廣異文質之變明利害之鄉威之以刑道之以禮敦其俗而彌薄防其人而益媮豈澆淳必繫于時耶何聖賢間生而莫之振也朕祗膺累聖之業猥居兆人之上乾居克勵如恐失墜憂濟庶務夕惕晨興永惟前王之典謨是憲是則師大禹以崇儉法髙宗以求賢興夏啓之征作周文之罰旌孝悌舉直言養髙年敦本業平均徭税黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姧犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀烝黎無安居之志賦入日減而私室愈貧廉察日増而吏道愈濫意者朕不明歟何古今之事同而得失之効異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行無或憚煩略於條對自頃隂陽舛候祲沴頻興仍嵗旱蝗稼穡不稔上天作孽必有由然屢推凶災其咎安在傳曰時之不乂厥罰常𤾉又曰堯湯水旱數之常也二者乖反其誰云從今人靡葢藏國無廩積朕屢延卿士詢訪謀猷至乃減冗食之徒罷不急之務既聞嘉話亦已遵行而停廢之餘所費猶廣俟轉糧於江徼則逺不及期將搜粟於闗中則撓而無獲節軍食則功臣懐怨省吏員則多士靡歸中心浩然罔知攸濟子大夫藴畜才器通明今古副我虚求森然就列匡朕之寡昧拯時之艱災畢志直言無有所隠策問博通墳典逹於教化科皇帝若曰朕承祖宗之鴻烈獲主神器任大守重懼不克堪思與賢士大夫共康理道虚􅁭以佇側席以求而羣議紛然所見異指或牽古義而不變或趨時㑹而不經依違以来七年于兹矣國制多缺朕甚恧焉今子大夫博習墳典深明教化褎然充舉咸造于庭其極思精心以喻朕之未寤仲尼叙禮樂刪詩書修春秋廣易道六經之教所尚各殊豈學者修行理當區别將聖人立意本異宗源施之於時孰為先後考之於道何者淺深差次等倫指明其義夫知本乃能通於變學古所以行於今今之教人則異於是工祝陳禮樂之器而不知其情生徒誦禮樂之文而不試以事欲人無惑其可得耶將革前非固有良術堯舜率天下以義比屋可封桀紂率天下以暴比屋可戮然則上之化下罔或不從而三仁四凶較然自異有教無類豈虚言哉作樂移風聞諸昔典夫至雅必淡至音希聲文侯列國之賢君猶曰則惟恐寐矧彼流俗其能化乎將使天地同和災沴不作黎人丕變姦慝不萌何施何為以致於此王者制理必因其時故忠敬質文更變迭救三代之際罔不由之自秦剗古法漢雜霸道紛淪千祀王教不興國家接周隋之餘俗未淳一處都邑者利巧而無恥服田畝者朴野而近愚尚文則彌長其澆風復質又莫救其鄙俗立教之本將安所從自昔哲王惟以三正互用後之術士乃言五運相生以漢應火行則周為木徳禮稱尚赤義例頗乖永言於兹莫識厥理九流得失之論歴代興亡之由王鄭識理之異同公穀傳經之優劣必精必究用沃虚懐策問識洞韜略堪任將帥科皇帝若曰朕遐觀典謨詳求理道三代之際粲然可徴未嘗不文武並興農戰兼務故能居則足食動則足兵兵足則威食足則固威則暴亂息固則教化行理國之本實在於此秦漢已降王制不修選士廢射御之儀教人無蒐狩之禮即戎者不知其稼穡力本者罕習于干戈於是異文武之人分農戰之道守則乏食征則鮮兵歴兹千年竟莫能復抑知者葢寡將行之惟艱歟朕念之甚勤思繼前躅良以軍旅之士役戍靡寧勲庸既多爵秩咸貴俾服田畝慮興怨咨仰給縣官不可勝計由是版圗日減阡陌嵗荒水旱小愆廩餉咸竭欲使軍人恱歸於耜耒儒者兼逹於韜鈐田莱盡耕攻取必勝誘人孔易其術安施王者之師本於立徳兵家之法方務出竒徳以信成竒以詐勝理有違反將何適從宋襄成列而敗軍見嘉魯策韓信決囊以推敵取貴漢朝然則喪國亡身豈霸王之道冒危乘厄非仁誼之心所宜討論以定襃貶夫衆寡不敵克必以謀樂生下齊孫子破楚魏武之勝袁紹宋髙之滅姚泓成敗之由備陳本末古人有言曰誅伐不可偃於天下又曰善為國者不師二端異焉其有深㫖子房序次兵法任宏論譔軍書指明異同詳録名氏想聞商略擇善而行答宰臣請停大禮表朕失徳致寇再經播越郊廟乏主禋祀曠時感憤積中憂愧形外日月以冀庶補前修賴天地降休祖宗儲慶再新景命祗復皇都自秋渉冬已遷於律候因心致享未展於孝思而公卿上言邀予以備物都鄙興誦諷予以勞人禮將俟於他年卜不先於近日永懐感慕情實未安雖則嘉話重違其如至誠難抑所宜參㑹羣彦更擇近期無或因循以増不徳答百寮請停大禮表朕再經播遷久曠禋祀不惟霜露之感實貽墜失之憂賴先澤在人上帝臨我克平大難再復舊京朕之失徳非曰能補旋欲請罪宗廟展敬郊丘廹以羣情俟于獻嵗今滌牲撰吉甫及近期齋心永懐明發不寐忽覽来表良深矍然雖嘉備慮之誠實乖昭事之意朕志先定期於必行即斷來表也答百寮請停大禮第二表國之大事首在祀典所宜嚴奉以逹至誠况今之所懐又異常日不克嗣守馴致寇戎淪陷國都震驚園寢幸憑元祐再續鴻休播越三時久虧禋祀之禮旋歸半嵗未申告謝之誠感愧積中若墜泉谷坐而待曙跂及上春庶乎天地靈祗以歆精意胡乃股肱卿士尚執疑謀出既不及告辭入又廢於朝獻罔極之慕何心自安宜潔乃誠以祗所奉副予懇切勿復頻煩答百寮請停大禮第三表三省来表深體乃誠明孝敬之大端陳安危之上計祗率嘉話夫豈不懐永言思之固亦難抑進退慙惕罔知所裁中宵求衣當饋忘食且聿修祀事所貴專精茍未至誠則如勿祭今近期甫及當齊潔敬之心而輿誦紛然猶執異同之論禮既虧于嚴奉事奚展於孝思以義制心勉依来請重予不徳愧歎良深答百寮賀利州連理木表珍木呈祥允符靈貺顧惟不徳何以當之朕聞人事聿修天休乃答今則兇渠尚在戎役方殷虐旱妨農飛蝗害稼諒咎徴之未弭曷嘉瑞而復臻所冀公卿大夫交匡不逮覩兹稱述益用懐慙答宰臣請復御膳表嘗覽典謨每嘉儉徳愛人惜費是朕素懐况大兵之餘繼以荒饉軍儲國計資用皆空凋户疲甿膏澤已竭致人於此過實在予内懐憂慚躬自損貶今兇渠殘滅粟麥豐成皆祖宗垂休非寡薄所致矧乎邦畿之内餒殍尤多役戍之徒傷夷未復孜孜訓戒克己増修猶懼辱守寳圗㒺答元祐豈宜暇逸以厚厥躬卿等誠在致君將順其美顧惟虚缺非所宜然答百寮請復御膳表頃者大勞不息至化未孚雨澤愆期蟲蝗為害朕以銷災謝譴莫大於修誠節用愛人必先於克己顧慚愆咎躬貶膳羞下以均衆庶之憂上以答昊穹之儆至誠或感嘉應遂臻宿麥方成元兇己殄慶深徳薄惕厲彌加忽覽表章過為稱述雖將順其美則曰乃誠而戒慎不忘諒惟朕志未喻来請深體此懐翰苑集巻六欽定四庫全書翰苑集巻七唐陸贄撰制誥除授李晟司徒兼中書令制雲雷構屯㝢縣興難非山岳降神不生良弼非股肱叶契不集大勲故髙宗得傅説中興殷邦宣王任吉甫重光周道天寳之季寇陷二京時則先臣子儀翼戴肅宗戡定禍亂再造區夏于今賴之肆予小子獲纘丕構不克負荷失守宗祧天祚我唐降生忠烈有社稷之臣曰開府儀同三司檢校尚書左僕射中書門下平章事充神策軍節度鄜坊等州管内觀察處置等使京畿渭南渭北商華等州兵馬副元帥上柱國合川郡王李晟沉肅有勇堅明能斷聞難感憤誓軍徂征誠激于衷義形于色自河之右萬里濟師殷然雷奔大盜懾駭屬皇家不造戎師誘姦重兹播遷郊甸震蕩而晟蓄鋭養士深壘固軍以謀吞元兇以義糾羣帥躬擐甲胄率先啓行布忠信為軍聲持義烈為戰器廓清氛沴寜復皇都宗廟載安宇宙斯泰佐予興運時乃茂功徳厚者任崇業盛者報重升以元輔建于上公熙庶績而翼宣九歌擾兆人而敬敷五教用疇井賦貽厥子孫與國咸休永播丕烈可司徒兼中書令仍賜實封一千戸餘並如故俟還京後所司擇日備禮冊拜宣示中外以彰元勲蕭復劉從一姜公輔平章事制宰輔之任獻替為務内凝庶績外撫四夷調隂陽以成嵗功贊化育而熙帝載若金用礪其弼予違如旱為霖允從人望矧時屬多難彌切任賢朕未嘗不朝夕論思夢寐懐想道之所在人逺乎哉朝議大夫守戸部尚書兼御史大夫充荆襄江西等道都元帥統軍長史豐縣開國公賜紫金魚袋蕭復性質端亮理識精敏約已𢎞物體方用圎為邦必表其理能及霤亟聞於鯁議動可成範立不易方守尚書吏部郎中兼御史中丞充荆襄江西等道都元帥判官賜緋魚袋劉從一貞白其行温恭其文居簡而適用必通體和而臨事有立持重能斷端慤有恒累更委任多所𢎞益守京兆府户曺參軍翰林學士賜緋魚袋姜公輔志懐濟物監必通理主文而諌忠靡退言經始以謀事皆前定道無屈撓智適變通並可以參贊大猷光膺僉屬兵戎未靖期爾經綸都邑未康期爾還定予一人有過爾是用匡伊萬姓不寧爾是用乂欽哉慎乃有位罔鰥厥官復可守吏部尚書同中書門下平章事散官封賜如故從一可守尚書刑部侍郎同中書門下平章事賜紫金魚袋公輔可守諌議大夫同中書門下平章事賜紫金魚袋張延賞中書侍郎平章事制兩漢致理由乎審官多以牧宰髙第入居台輔黄霸自穎川而次遷丞相卓茂由宻令而超拜三公葢以為國本於親人舉賢先於稱職旌能勸善風化大端今革車荐興賦煩人散匡弼寡昧屬于才臣光禄大夫檢校吏部尚書兼成都尹御史大夫充劍南西川副大使管内度支營田觀察處置等使上柱國魏國公張延賞崇飭文行勵精理道踐歴中外所至有聲慮必周宻心無屈撓簡廉以肅吏慈惠以愛人明以照姦和以定衆去若始至久而見思秉志不渝課績常最以爾循良之化佐予綏兆人以爾經綸之才佐予熙庶績仍資威重兼領蕃維式慰甘棠之思且繼緇衣之美懋昭邦典勿替家聲可中書侍郎平章事依前兼成都尹餘如故渾瑊侍中制論道經邦興戎定亂執是二柄毗予一人得諸全才康濟大難懋官胙土備舉彞章開府儀同三司檢校尚書左僕射同中書門下平章事兼靈州大都督府長史充靈鹽銀夏等節度管内觀察處置度支營田押蕃部落等使仍充朔方邠寧振武等道奉天永平軍行營節度副元帥柱國樓煩郡王渾瑊神降才傑天資忠厚叶于興運為國輔臣往以盜起上京駕言出狩羣兇怗亂再犯郊畿時乃奮揚武威董制師律深居籌畫姧慝寢謀當敵指揮士旅増氣危城克固我伐用張重以賊臣蔑恩養寇資亂再罹艱阻播越巴梁時乃幷轡載馳執羈從邁有見危致命之節有憂國滅私之誠凜然貞規介若金石縱横有夷難之略感激陳復國之謀分總偏師徑出重險秉大節以誓羣帥布寛令以宥脅從師次近郊摧兇靡抗軍臨近甸下邑如歸推成功以不居期盡敵以自効率其全衆揚斾前追雄威疾馳元惡授首柔徳懐服餘黨歸心埽闢氛昏安復園寢懋乃嘉績其維格天范燮之讓能耿弇之殄寇總是二美瑊其有焉足以銘勲旂常垂美竹帛宜首台階之列仍疇井邑之賦祗膺時命無替厥庸可侍中仍賜實封八百戸餘如故盧翰劉從一門下中書侍郎平章事制寅亮天工𢎞宣理本俾予從乂時乃輔臣扈蹕載驅以勞定國懋官遷列式是彞章銀青光禄大夫行尚書兵部侍郎同中書門下平章事范陽縣開國公盧翰嚴重不撓貞方自持養恬鎮俗居簡濟衆言思無隐事必有恒守刑部侍郎同中書門下平章事賜紫金魚袋劉從一質厚氣深識精體逺沖用無竭貞規不渝從容以和出納惟允自鸞車載駕薄狩于梁執羈有從我之勤及霤勵匪躬之節交修不逮庶績其凝俾承命於掖垣仍參掌於樞務今百度伊始六府載張論駮是非不可以不審宣揚憲令不可以不明爾其欽承無墜我休命翰可門下侍郎同中書門下平章事散官勲封如故從一可中書侍郎同中書門下平章事餘如故劉滋崔造齊映平章事制朕嗣位君臨精求理道小大之務靡不經心日慎一日于今八載教化未洽烝黎未康因之以甲兵繼之以災沴斯固鑒有所不至慮有所不周予深浩然若渉深水思所以匡我致理助我官人宣其澤而四方以寜執其要而百工式叙允是大任其惟輔臣夢想勞懐敷求俊乂察言而觀行因事以考能周行之中乃得良弼權知吏部侍郎劉滋操履貞清介然自守居能慎獨動不違仁析理究其精微勵學探於奥㫖守給事中賜緋魚袋雀造性合道要誠通化源適時有成務之才事上懐匪躬之節藴蓄器業居為名臣中書舍人賜紫金魚袋齊映修已以立自明而誠體賢人可大之規用君子時中之道虚受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振條綱惟映之精深可以該物理我有大典爾其參之懋昭厥猷勿替休聞滋可充散騎常侍同平章事造仍賜金魚袋其有散官封賜並如故李納檢校右僕射平章事制忠所貴乎竭誠善莫大於改過况茂勲有舊崇徳日新翼戴勵勤王之節經綸申盡敵之略敦奬之道時惟國章平盧淄青節度管内度支營田處置等使開府儀同三司檢校工部尚書使持節鄆州諸軍事兼鄆州刺史隴西郡王李納稟性端厚執心寛簡通變適用和順積中服勞王家夙有成績乘秋備塞克著威聲累嵗專城載揚理行間者心懐險阻誠義欎堙旋能歸款上聞期於率徳自効忠節純固久而益彰爰整鋭師式遏亂略保障宋服填壓浚郊嶷如長城作固東土嘉乃率服之美懋乃輸力之勤擢升衮司載董戎翰元成嗣台輔之業亞夫繼社稷之勲俾爾兼榮無替厥服檢校右僕射平章事餘如故韓滉檢校左僕射平章事制周召由輔弼之臣兼方伯之任葢以理化根本在於親人通兆庶之情以佐天子秉家邦之慶以臨諸侯故能中外允釐上下無壅今我有命意其在兹金紫光禄大夫檢校尚書左僕射兼潤州刺史御史大夫充鎮海軍浙江東西節度觀察處置等使上柱國南陽郡開國公韓滉文行忠信備修身之道勤儉貞固有成務之才累更委遇多處繁重一心奉職終始不渝内告謀猷以匡時化外持憲法以一人心理尚廉平事皆釐飭姧盜衰息禮義興行恵兹一方時乃之徳陳師旅以遏寇讎納餽糧以修職貢張我威武實我資儲令必應期謀無愆素濟于多難時乃之功宜其參務中樞翼宣大化仍兼漕運兼領蕃維樹南國之風猷贍中都之廩實予則有望爾其懋哉繼于前人無替厥服可檢校左僕射同平章事依前鎮海軍浙江東西節度觀察處置等使兼充江淮轉運使餘如故李勉太子太師制立國之本所繫於元良𢎞教之方必由於端士非精識前典徳冠當時恭敬温文其將安倣吾是以輟台階之老選宗室之賢輔翼春闈是資教諭檢校司徒同平章事充太清宫使崇文館大學士上柱國􅊈國公李勉忠信孝友直方簡儉逹君臣父子之際知禮樂教化之端虚澹保和貞明寡欲求舊則徳懋叙親則屬尊師範國儲無易其選可檢校司徒兼太子太師散官封勲如故姜公輔左庶子制君之任臣有優賢賜告之義臣之事君有量力知止之道故能進退以禮終始可勝此朕三事大夫濟理圗全之意也守諌議大夫同平章事賜紫金魚袋姜公輔首舉髙第擢居諌曺爰資美才參掌宻命居易勵修身之操見危著從我之勤自處台司累疏陳乞忌滿思退持盈守謙留中久之重難其請式光撝抑俾尹宫坊可太子左庶子勲賜如故崔造右庶子宰相之職允釐百工時惟仰成不可廢闕中散大夫行給事中同平章事上柱國安平縣開國男賜紫金魚袋崔造頃居掖垣參掌樞宻總領繁重積勞疹深亦既優賢賜之長告嵗聿云暮有加無瘳披誠自陳章疏三上知止之道守之甚堅處以休閑俾遂頤養可太子右庶子勲賜如故盧翰太子賔客求賢審官以康庶績就閑優秩以處舊臣葢欲敦終始之恩全進退之禮金紫光禄大夫行門下平章事范陽郡公盧翰頃因多難從我于征以其年及老成任推先進方將求舊擢處台衡荏苒迄今亟淹星嵗勤勞既久衰疢有加宜徙職於春闈用優賢于暮齒可太子賔客勲賜如故翰苑集巻七欽定四庫全書翰苑集巻八唐陸䞇撰制誥除授賈耽東都留守制河洛舊都時廵久曠命以居守俾之保綏間者淮甸不寜汝墳屢警増置軍府作藩王畿職任既分威望非重思有緫制一其典刑爰資信臣往乂東夏銀青光禄大夫守工部尚書魏國公賈耽豁達貞方識通大體明九域山川之要究五方風俗之宜恒因物情以施教化所莅之郡靄其休聲悅李廣之風人皆自便懐羊祜之徳敵不敢侵自誠而明在久彌著分我憂寄實惟其人董制軍師安集疲瘵統禦都邑提持紀綱懋昭厥猷無替朕命可守本官兼御史大夫充東都留守東都畿汝州都防禦觀察等使判東都尚書省事散官勲封如故崔縱東都留守制居守之重固難其人近嵗以来益又繁綜領亷察之任專禦備之權地廣務殷一皆咨稟非利用罔以通濟非純徳不能保綏周爰咨詢公論有屬銀青光禄大夫行尚書吏部侍郎上柱國安平縣公崔縱素風自逺代濟忠貞慶之所鍾繼有才哲氣質淳茂識度淹通藴經逺之沉謀宣適時之利用寬而不弛簡則能周以兹公方多厯要重小大之務必聞休聲輟於周行式是東夏擢居春官之長且兼副相之雄懋昭厥庸期復先構可檢校禮部尚書兼御史大夫充東都留守判東都尚書省充東都畿汝唐鄧等州都防禦觀察處置使散官勲封如故普王荆襄江西道兵馬都元帥制君人立極所務於勝殘秉律成師實先於謀帥申明號令緫持紀綱𢎞九合之功決百勝之略非慎柬不可以濟事非僉屬不可以臨人集大勲者必舉於宏綱體至公者無避於内舉爰擇藩翰俾掌元戎開府儀同三司舒王謨性稟忠厚訓知禮樂居常樂善動不違仁察其内恕外温必能安人和衆體方識敏諒可成功庶乎知子之明授以貞師之律可揚州大都督持節充荆襄江西沔鄂等道節度使及諸軍行營兵馬都元帥餘如故仍賜名誼改封普王嗚呼小子誼其敬聽朕命我國家之有天下百七十載于兹矣祖宗垂化紹統功德繼茂威加殊俗惠洽普天海隅蒼生代受亭育躋之於福壽煦之以仁和源廣流長慶深祚逺厯數有嗣纘于朕躬兢兢業業懼不負荷䖍恭寅畏嵗五周星循列聖之耿光稽上古之謨訓一物失所是用疚心萬方有罪每懐咎已懸法皆考於天則舉事必酌於人謀期合大中罔循私欲而渉道猶淺燭理未明文闕於化成武乏於定亂刑賞失中授任乖方厚澤未均大信未著致使兇慝熾禍干紀亂常悖違君親蔑棄天地盜據我都邑痛毒我士庶驅脅丁壯暴骸於原野攘奪羸老轉死於溝壑忠良隕命義烈銜寃迫以兇殘莫由自奮憤深骨髓怨結蒼旻朕所以中宵屢興終食三歎哀蒼生之無告閔赤子之非辜為人父母寜忘愧悼賴三事大夫竭誠於内羣帥爪牙宣力於外交修不逮日冀康寜江漢上游建瓴制宼亘千里之地連十萬之師保大定功宜有統壹允副兹選往哉汝諧無以貴驕人無以善自伐無縱巳之慾無咈衆之謨從諫如流改過勿吝卑躬降志以奉賔傅絶甘分少以撫軍師布誠信以歸人心明賞罰以盡士力詰姦誅暴懋昭乃勲敬事恤人無替朕命膺兹重任可不勉歟建中四年九月二十六日馬燧渾瑊副元帥招討河中制天地殊位君臣異制茍不率道兹謂亂常退而増修於是有舞干之義諭以遷善於是有文告之辭若猶不悛乃用致討興戎動衆豈得已哉李懐光擢自軍候委之莭制亟有勤績累加寵榮緫衆駿奔自逺赴難解圍逐宼朕甚徳之位極上台寄崇緫帥親之若同體信之無間言朕於斯人亦已厚矣而器小任重固貽顛覆有功自棄無罪自疑崇信讒邪脅逐將帥養宼資亂蓄奸幸災朕素所推誠猶謂非實優容任遇坦然如初凶跡既盈醜踪彌露謀危社稷通結渠魁公相往来無復忌畏窮極兇悖所不忍言朕播遷巴梁違逺陵寢大懼失墜為列聖羞賴先澤在人兆庶知感朔方將士忠莭不渝懐光既沮姦謀詭稱効順累陳款疏請詣闕庭朕深惟舊勲務欲全貸授以師保之任疇其井賦之食璽書勞問誓以終始懐光遂殺辱使臣完聚守保將以悖慢之罪加於忠義之軍因兹脅從冀與同惡謂衆可罔謂天可欺覆載所不容人臣所共棄討除大憝招輯非辜爰咨輔臣以董戎寄銀青光禄大夫檢校司空同中書門下平章事兼太原尹北都留守充河東保寜軍節度使北平郡王馬燧操業端亮器宇宏達秉難奪之莭負不羈之才常持至公深識大體感激而三軍有勇彌綸而庶績允諧威聲所臨郡邑皆復殿于北土隠若長城奉天定難功臣開府儀同三司行侍中兼靈州大都督靈鹽豐夏等州節度使管内度支營田觀察處置押蕃部落等使充朔方邠寜振武等道奉天永平等軍行營莭度兵馬副元帥上柱國樓煩郡王渾瑊淳粹積中仁厚成性布寬大以容衆著誠信以撫人事必沉詳臨危益辦莭惟貞固在險逾彰𢎞濟艱難懋昭勲閥出納朕命光膺具瞻並文武全材安危注意副我憂屬時惟二臣比徳協謀往清多難燧可兼充奉誠軍及晉隰磁等州節度管内諸軍行營兵馬副元帥餘並如故瑊可兼河中尹充河中絳州觀察處置等莭度使仍充河中絳州同陜虢等管内諸軍行營兵馬副元帥功臣散官勲封如故嗚呼朕不敏不明失於君道連禍未息勞師靡居中心自咎鬱若焚灼又以朔土之衆代著忠勞横遭汚脅深所憫惜爾其敬敷朕命明諭朕懐務於招綏非黷威武惟輸誠歸順罔有不赦惟執逆拒命罰止元兇寜失不經無濫無罪列爵懸賞用俟勲賢布告逺邇咸令知悉李晟鳳翔隴西節度兼涇原副元帥制周之元老以分陜為重漢之丞相以憂邉見稱故方岳克寜疆場不聳安人保大致理之端今所以重煩上台作鎮西土奉天定難功臣司徒兼中書令充神䇿軍節度鄜坊丹延等州觀察處置等使仍充京畿渭北鄜州華州兵馬副元帥上柱國合川郡王李晟勵精剛之操體博大之徳適時通變而大節不奪虛受廣納而獨斷自明奉法以身推功以下衆無犯命人用樂從懐徳畏威令行禁止誓羣帥於危疑之際駐孤軍於版蕩之中氣凌風雲誠動天地一鼔而兇徒懾北再駕而都邑廓清師皆如歸人不知戰再安社稷功格皇天而明識秉彞清風激俗雅尚恬曠撝謙有光朕以􅊈隴近郊扶風右地川阜連亘抵於回中限界諸夷蕃屏王室所屬誠重付之元臣兼二將之甲兵崇十連之元帥宣威耀武罷警息兵俾予仰成時乃丕烈可兼鳳翔尹充鳳翔隴右節度營田觀察處置等使仍充鳳翔隴右涇原節度管内諸軍及四鎮北庭行營兵馬副元帥改封西平郡王功臣本官兼官如故劉洽檢校司空充諸道兵馬都統制論道經邦允歸碩望建牙統衆必藉雄才中外具瞻安危注意今以二柄付之元臣開府儀同三司檢校尚書左僕射同中書門下平章事持莭宋州諸軍事兼宋州刺史充宣武軍莭度營田宋亳穎等州觀察處置等使仍權知汴滑宋亳等州都統兵馬事懐徳郡王劉洽秉志端亮飭躬簡儉博厚足以容衆和易足以長人純孝榮親盡忠事國分我閫寄殿于大藩扼制淮夷保障楚甸戎㨗繼至軍聲再揚殪羣兇於宛丘驅大憝於梁野控引漕輓委輸京師予嘉乃勲懋乃貞節用錫丕命俾揚洪休燮贊三台紀綱羣帥式是大任爾惟欽哉可檢校司空同中書門下平章事依前宣武軍莭度使度支營田宋亳等州觀察處置等使仍充宋亳穎等州管内諸軍兵馬都統散官勲封如故翰苑集巻八欽定四庫全書翰苑集巻九唐陸䞇撰制誥除授渾瑊京畿金商節度使制王者之制安不忘危𢎞其道則文武齊致教其人則農戰兼務故雖縣内不可去兵况宻邇宼虞干紀稔慝都邑郊甸騷然靡寜聿求信臣特建戎號濟人夷難允屬勲賢京畿渭北莭度使兵部尚書行在左都虞候渾瑊忠貞博厚温恭簡肅持重不撓好謀而成居業克敦其詩書受賜每陳於廊廡能推誠而撫下不伐巳以拒人委任中外咸著聲績夷險一貫隠然殿邦朕越在郊坰偪於兇醜授之師律式是戎昭侍衞増嚴斥候無爽檢身齊衆同士伍之勞苦敦陣整旅壯行列之威容静以伐謀動而制勝臨危勵莭予有賴焉王圻之内沃壤千里緜亘商嶺屏於南門觀風靖人詰禁誅暴俾爾兼領用孚于休可京畿渭北渭南金商莭度觀察處置等使餘並如故杜亞淮南節度使制淮海奥區一方都㑹兼水陸漕輓之利有澤漁山伐之饒俗具五方地緜千里聿求良牧豈易其才今又革車方興軍賦屢調體於寬大則事缺務於辦集則人殘自非剛柔適中文武兼備其何以副我憂屬惠綏南方正議大夫行尚書刑部侍郎上柱國扶風縣開國男杜亞識精體要學究宗源妙於用而有常通其變而能久為理敦教化之本立言參禮法之中道無淄磷行有枝葉回翔省闥表彌綸獻納之勤踐厯方州著清淨循良之稱其嚴重可以鎮俗其才術可以匡時休有令問輝映朝列朕以東南思乂注意求賢爰輟名臣俾寜藩服往率厥職時惟欽哉可揚州大都督府長史兼御史大夫充淮南節度觀察處置等使䖍王申光隨蔡等州節度使制自昔哲王疆理天下必選其明徳樹之宗親參制藩維夾輔王室賢戚並建時惟休哉長淮之西厥壤千里人靡寜息于兹有年朕其永懐慘若焚灼思得良帥代予安人釋其危疑彰我信惠以親而授其在于兹開府儀同三司䖍王諒性本温恭生知忠孝祗服訓導躬行不渝言皆副誠事必求當端慎可以鎮俗寬厚可以長人厎綏一方庶允憂屬可申光隨蔡等州莭度副大使管内觀察處置等使餘如故唐朝臣振武節度論惟明鄜坊觀察使制分命使臣統臨方岳弛張之道蓋亦從宜近甸無虞則但亷風俗邉陲式遏則兼假旌旄名制雖殊委任俱重膺是選命莫非勲賢開府儀同三司檢校兵部尚書兼鄜州刺史鄜坊丹延等州莭度觀察處置等使平樂郡王唐朝臣嘗緫偏師遘于多難仗義率衆臨危不迴保全闗衝抗絶兇逆守而能固出則有功每急病而攘夷嘗以寡而敵衆竟殱大憝克集茂勲炳然貞心堅若金石洎師旋歸按俗頒條軍旅慰安流庸恱附奉天定難功臣開府儀同三司檢校工部尚書兼左金吾衞大將軍充右街使上柱國建康郡王論惟明釋位勤王有赴難之節扞城禦寇有持危之功奉主忘身棄家從國越自郊甸再踰巴梁險阻艱難靡不陪扈忠義所在生死以之乆司禁戎益茂勲績器質敦實識度寛敏通明吏職練達武經本之以純良輔之以才術俾居藩翰僉謂汝諧朕以北控單于國之巨鎮彼方戎帥沉痼是嬰卧䕶邉軍已淹寒暑憫其盡瘁難以重煩爰咨信臣更踐厥職朝臣可依前檢校兵部尚書兼單于大都䕶御史大夫充振武綏銀鄜勝等州節度營田處置押兵蕃落等使惟明可依前檢校工部尚書兼鄜州刺史御史大夫充鄜坊丹延等都防禦觀察處置等使餘並如故韓滉加檢校右僕射制周制以輔翼之臣出作方伯漢官以牧守之最擢拜公卿其在匡時中外同體朕以大勞未乂勤卹於黎元多難荐興注意於藩岳就加命服式寵能賢則増秩進律亦古之道也金紫光禄大夫檢校吏部尚書使持節潤州諸軍使兼潤州刺史御史大夫充鎮江軍浙江東西莭度觀察等使韓滉忠肅剛直清公簡儉持至公以檢下强禦必繩秉大節以事君險艱無易惠能恤衆明足照姦嵗發勤王之師日増贍國之賦軍無撓敗俗以阜康殿于大邦理平訟息朝有勸典昭升乃庸胙土以報勤懋官以旌徳厎乂江甸永孚于休可檢校尚書右僕射進封昌黎縣開國公餘如故嘉王横海軍節度使制度土分疆設官涖事因時設制期在理安必順物宜且從人欲版圗既溢則疏邑以制州統攝或乖則分部而建長沿革之道亦何常哉滄海之隅地饒俗阜隠然北土實曰雄藩鎮撫之宜是資懿戚開府儀同三司嘉王運氣本元淳重承先訓忠肅孝友寬仁惠和勤於服儒樂在為善施於事任必有可觀舉不失親至公斯在欽率厥職永孚於休可横海軍莭度使滄景等州觀察處置等使勲封如故馬燧李臯實封制列爵以旌徳胙土以報功國有彞章是用襃勸朕以不徳間逢多虞蒲坂有叛亂之臣淮沂有僭逆之帥萬姓罹害四方靡寜奉誠軍莭度兵馬元帥檢校司徒兼侍中馬燧聞難之初忠誠奮發躬帥士旅討兹不庭略地如歸攻城必克晉絳磁隰靡然向風元兇勢窮竟就梟戮清我甸服時惟茂勲荆南莭度觀察處置等使檢校戸部尚書嗣曹王臯親率全軍抗於强虜晝夜不息迨於三年謀成必臧師出皆㨗復蘄黄之地拔安陸之城隠其威名保乂江漢並著莭于國存功于人跡効炳然僉議攸屬雖懋官已序而食賦未加疇庸之科無乃有闕宜其寵錫以荅殊休燧可賜實封五百户通前七百户臯可賜實封三百户韓滉度支鹽鐵轉運使制食貨所資邦家大本緫領之重必推元臣故周以冢宰制國用漢以丞相調軍食官給人足謂之善經今戸口凋傷財産衰耗邉疆未静役費尚多思欲均厚薄之征權重輕之制國無匱乏人不怨咨運籌佐時其在良輔金紫光禄大夫檢校尚書左僕射同中書門下平章事充鎮海軍浙江東西莭度兼江淮轉運等使晉國公韓滉昔事先朝常掌邦賦貞心獨立一志在公吏無姦欺財以饒羡自臨江甸事舉風行職貢有加轉餉相繼成功允集艱食用康介于方隅未極材術宜其𢎞濟式副具瞻可充度支及諸道鹽鐵轉運等使餘如故李叔眀右僕射制行止兩全必惟明哲致其用以匡國敦乎道以保身周旋令名始終不替斯賢者之極致而行之實難金紫光禄大夫守太子少傅檢校尚書右僕射持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事管内度支觀察處置等使蘇國公李叔明稟粹挺生鬱為邦傑虛懐朗暢達識周通早以器能累更任遇中外所踐必聞休聲嘗尹京師姦豪屏息洎臨方岳風俗澄清吏服嚴明人懐徳惠憂公奉職勵節存誠服勞王家行及三紀以兹盡瘁沉恙所嬰扶疾趨朝披誠告老固陳衰瘵深戒滿盈情皆發衷語且形泣視其激切良所軫懐敦勸既頻辭乞彌固繼獻章疏期於必從省之憮然用増感歎雖惜其舊徳往涖遐藩而憫以髙年難違懇志猶資碩望俾長庶寮罷方鎮之煩緫中臺之重式彰尚徳且示優賢可依前守太子少傅兼尚書右僕射李澄贈司空制既明且哲以保其身求之昔賢鮮克全備良以謀始匪易慎終尤難其有志奉公家力輔王室見危而立節將沒而陳誠操尚堅明謀猷深逺憂國無忘於顛沛周身不離於令名有臣如斯可以旌勸故義成軍節度滑鄭等州觀察處置等使開府儀同三司檢校尚書右僕射兼滑州刺史御史大夫上柱國武威郡王李澄天授將材勇而多智臨危不懼見義必為﨑嶇險艱勲莭兼著勤於廣業曽未遑安帶甲臨戎連年野處積勞成瘁霜露所侵痟疾攻中癰疽發外迨兹病亟不替忠誠憂國疚懐戀闕流涕懼軍戎之乏帥念方鎮以為虞上表披陳懇求代免辭情激切備慮精深視之感傷當宁興歎雖史魚之陳尸納諫吳漢之在疚獻謀比方於此不足多尚天胡不容奪我良帥惻然嗟悼用切深衷始終存義澄實有之襃美飾終是宜加等可贈司空賜物五百段米粟三百石以左散騎常侍歸崇敬充使弔祭所縁喪葬並準式官供仍以澄讓表宣付史館以彰忠莭除鄧州歸順官制迫以兇威陷于宼境義不受汚忠能奮誠履重險而不囘處疾風而逾勁忘軀徇義獻款投誠足以勵彼勤王激其汚俗去逆効順固先典之攸嘉懋賞勸功驗彞章而不昧咸從序用俾服官常可依前件云云李納檢校司空制鄭武公父子繼為周司徒内居股肱外作藩翰詩美緇衣之徳傳稱夾輔之勲我懐斯人今得良弼開府儀同三司檢校尚書右僕射同中書門下平章事充平盧淄青節度管内度支營田觀察處置陸運海運押新羅渤海兩蕃等使隴西郡王李納宇量宏博質性沉毅體仁能斷見善必遷藴非常之才守以純一秉難奪之節著于艱危昭升令問茂建勲績屬淮夷構亂東夏震騷奮旅徂征坐籌制勝解商邱之難攘彼兇殘釋陳城之危俘厥渠帥徳功克懋官賞宜崇庸建上台宜賜真食惟乃先服勤勞王家以殿邦之勲參論道之職俾爾嗣績光于前人荷國之寵章承家之丕構敬慎厥徳永孚于休可檢校司空同中書門下平章事仍賜實封五百户餘並如故翰苑集巻九欽定四庫全書翰苑集巻十唐陸䞇撰制誥鐵券慰問勅書賜李納王武俊等鐵券文維興元元年嵗次甲子正月癸酉朔二日甲戌皇帝咨爾某官某嗚呼王者所以撫人失於所撫則叛下者所以奉上失於所奉則刑各當其理徳用不擾各違其分亂於是生朕徳薄化淺昧於君道㒺知省已姑務責人是以徵師徂征連嵗靡息惟爾以誠志之不達反仄于厥衷阻衆興戎結黨拒命豈非上失於所撫而下失於所奉與書曰萬方有罪罪在朕躬我實不徳兆人何咎俾廢其生業離於室家陷于困窮死于戰陣老疾廢養孤惸靡依怨結蒼生感傷和氣朕為人父母得不愧于心哉晨興以思夕惕以悼自嗣位迄今六載天將悔禍朕方覺悟爾亦知衆心之厭亂思所以保安叶于朕懐若應符契非天地合徳人神合謀將茂育羣生則何以臻此朕是用上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載鼎彝名藏王府子孫代代為國勲臣河山帶礪傳祚無絶朕方布大信承天子人若食其言何以享國嗚呼其祗若命用保無疆之休賜安西管内黄姓纛官鐵券文維貞元二年嵗次丙寅八月丁巳朔三日已未皇帝若曰咨爾四鎮節度管内黄姓纛官驃騎大將軍行左金吾衞大將軍貟外置同正貟兼試太常卿頓啜䕶波支惟爾乃祖乃父代服聲教勤勞王家勲書于鼎彞族列于藩籍爾克紹先祖之烈而重之以忠貞嗣守職官祗若朝化率其種落保我邉陲丹誠向化萬里如近是用稽諸令典錫以券書若金之堅永代無變子孫繼襲作我藩臣爾其欽承勿替休命慰問四鎮北庭將吏勅書四鎮北庭將士官吏僧道耆夀百姓自祿山首亂中夏不安蕃戎乗釁侵敗封略道路梗絶徃来不通哀我士庶忽如異域控告無所歸還莫從朕未嘗一夕忘懐而事勢不及相卹興言軫念忽以涕流卿等咸藴忠誠誓死不屈或早從征鎮白首軍中或生在戎行長身塞外克奉正朔堅保封疆援絶勢孤以寡敵衆晝夜勞苦不得休息嵗時捍禦不解甲胄勲髙百戰義叶一心介然孤城獨守臣節日来月徃三十餘年奉國之誠久而彌勵求諸今古忠烈莫儔義激人倫名光史册蠢動知感況於朕懐朕嗣守洪業君臨宇内思安兆庶以絶戰爭遂與贊普約定好和集蕃漢士庶告天地神祗設壇㑹盟永息邉患疆埸罷警于今六年近以賊臣朱泚背恩驚犯宫闕贊普又遣師旅助討姦兇兩國交懽事同一體北庭去此遙逺信使難通於西蕃既非便宜在國家又絶来徃永念士庶隔在殊方歸路無因親戚永訣為人父母實所感傷已共西蕃定議兼立誓約應在彼將士官吏僧道耆夀百姓等並放歸漢界仍累路置頓供擬發遣待卿等進發然後以土地隸屬西蕃今故遣太常少卿兼御史大夫沈房及中使韓朝彩等往彼宣諭仍便與西蕃交割卿等宜遞相慰勉叶力同心互相提攜速圗進路復歸鄉井重見宗親生人之情莫重於此一勞永逸固不合辭卿等誠莭昭宣勲閥茂著到此之後當特甄升仍給田園以贍生業必令優厚用答忠勞如有資産已成不願歸此亦任便住各遂所安宜勉良圗副我勤想夏熱卿等各平安好遣書指不多及與回紇可汗書皇帝敬問可汗弟兩國和好積有嵗年申之以昬姻約之以兄弟誠信至重情義至深頃因賊臣背恩構成嫌釁天不長惡尋已誅夷使我兄弟恩好如舊周皓及踏本啜黒達干等至得弟来書省覽久之良以為慰弟天資雄傑智識通明親仁善鄰敦信明義罷戰爭之患𢎞禮讓之風保合大和用寜區宇惟兹盛美何以加焉朕之素懐與弟叶契為君之道本務愛人同日月之照臨體天地之覆育其於廣被彼此何殊况累代以来繼敦姻戚與弟俱承先業所宜遵奉令圗自兹以還情契彌固垂之百代永逺無窮緬想至誠當同此意所附踏本啜奏請降公主姻不失舊頗叶通規待弟表到即依所請宣示百寮擇日發遣縁諸軍兵馬收京破賊頻立功勲賞給數多府藏虛竭其馬價物且付十二萬匹至来年三月更發遣一般餘並續續支付弟宜悉也安西北庭使人入奏並却歸本道至彼宜差人送過令其速達弟所寄馬並到深愧厚意賜吐蕃將書勅尚覽鑠論莫陵悉繼等至省所陳奏朕具悉之國家與大蕃親則舅甥義則鄰援息人繼好固是常規朕嗣位君臨思安兆庶常以信讓為事不以爭競為心區域雖殊覆育寜别贊普天資仁徳好生惡殺與朕同心重修舊好㑹蕃漢將相告天地神祇約誓之言至嚴至重大信一立義無改移所請奉天盟書勒於清水碑石審詳事理頗甚乖違往嵗賊臣稱兵竊據城闕尚結贊志惟嫉惡義在救災頻獻表章請收京邑朕以宗廟社稷悉在上都但平宼戎豈惜詶賞遂許四鎮之地以荅收京之功旋屬炎蒸又多疾疫大蕃兵馬便自抽歸既未至京有乖始望奉天盟約豈合更論朕欲茍徇彼情便令鐫刻則是非務實信不由衷欺天罔神莫大於此凡曰通好貴於推誠將垂百代之名豈顧一時之利但以事之去就須定是非若不辨明便成姑息親鄰之義豈所宜然故遣使臣與卿詳議卿是大蕃輔佐必當智識通明事理昭然不足疑惑儻有他見宜具奏聞審細研窮須歸至當所論先許每年與贊普綵絹一萬匹段者本来立約亦為收京然於舅甥之情此乃甚為小事二國和好即同一家此有所須彼當不恡彼有所要此固合供以有均無蓋是常理贊普若須繒帛朕即隨要支分多少之間豈拘定限假使踰於萬匹亦當稱彼所求朕之所重者信誠所輕者財利思與率土同臻大和想卿深體至公務存大義安人保境垂美無窮勉思令圗以副朕意今遣倉部郎中兼侍御史趙聿與来使同往書中意有不盡並令趙聿口宣尚結贊論莽羅等嘗緫師徒逺来赴難功雖未就義則可嘉其所領將士等朕先許與賜物一萬匹段並已排比許卿所商量指定此使却囘即發遣往今各賜卿少物至宜領之賜吐蕃宰相尚結贊書勅尚結贊卿天資材術作輔大蕃識通古今志奉忠信義聲著積逺近流傳比聞入典樞衡近知還緫戎務二國所定和好首末是卿商量得卿却来深以為慰昨者邉軍狀奏彼國兵馬踰越封疆朕以畫界立盟先有定分贊普素敦仁義卿又特禀純誠背約侵漁必無此理但勅邉城自備不令輒動干戈若使効尤恐成交惡初疑界首遊奕少有乖宜不謂大發師徒漸加侵軼興兵動衆必合有名蕃軍此行未測其故朕自嗣膺寳位即與贊普通和敦以舅甥結為鄰援懲戰爭之弊知禮讓之風彼此大同務安衆庶乃於境上建立壇場契約至明誓詞至重告于皇天后土諸佛百神有渝此盟殃及其國朕敬奉誠約分毫不移信使交懽嵗時無絶碑文具在可以明徵豈有一事不行一言不守頃令趙聿專往近方從彼却回兼聞彼蕃使同来至今獨在道路卿所論奏朕並未知待詳事由乃可商議既稱和好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神明豈其可罔卿智識明達朕所深知頃年猶舉義師救此災患今若不存大信遂棄令名故專遣使見卿欲得審知来意竚聞還奏以副所懐趙聿及蕃使合到待覽表中意旨續即商量報卿卿渉逺而来當甚勞頓今賜卿某物至宜領之秋冷卿比平安好將士並存問之賜尚結贊第二書趙聿及論拱熱等至得卿表奏具見懇誠省覽言辭即稱和好及覩事跡唯務侵凌矛楯若斯將何取信審察書中之意盖求四鎮北庭如此事宜足得商議既言通好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神祗豈其可罔又聞放縱兵馬蹂踐禾苗邉境之人大遭驅掠在此未為深損於彼殊非逺謀卿之用心何乃至是國家利害計須久長和好之道既虧仁義之風何在卿智識明悟朕所深知頃年猶發義師救此災患今豈不存大信遂棄令名故遣使見卿欲得審知来意必若守其盟誓務在同和即收斂兵車速歸本界所掠百姓一切放回然後可表卿直心信卿来奏續即遣使與論拱熱同往諸事並有商量交歡必令得所或宻懐他意將欲别謀彼雖未説實情此亦略為凖擬但縁誓約本重朕意不欲先違以此勤勤合有相問佇聞来奏以副朕懐賜尚結贊第三書勅尚結贊蕃使論拱熱等與趙聿同到卿所陳奏朕具悉之誠意勤勤志敦和好上以成舅甥之義次以結鄰援之歡外以彰禮讓之風内以息戰爭之患兼此數事昔賢所難非卿材越等倫識通今古豈能匡輔大國𢎞宣逺圗施美利於當時傳盛名於不朽眷懐明略歎尚良多然以贊普来書務於叶睦卿之所奏亦貴通和初覽其言實嘉徳義及觀其事頗訝乖違以卿賢明朕所信重棄義踰約計必不然未測事由因何至此頃年所定和好言約頗謂分明至如四鎮北庭元不割與蕃國及朱泚悖逆作亂上都卿仗義興師請收京邑遂許四鎮北庭之地將以報荅成功旋屬炎蒸蕃軍便退奉天之約豈可更論事甚分明固無疑惑凡言結好所貴和同通體商量有何不可大蕃必若要四鎮北庭之地即合直以情言彼但露其誠心此亦自有分義豈假曲徵前事廣起異端仍發師徒務張威勢蕃使猶未至此蕃軍早已越疆或稱欲自赴朝或云更定言誓既虧盟約且失禮儀言與事乖將何取信夫人君立國必不徒然惟漢與蕃各受天命勝負固有定分强弱寜由力爭卿欲以衆相侵以威相脅謂天地可罔謂盟誓可渝即當肆意所為不必更論和好儻欲守其前約敦以親鄰去就之間固宜有禮遣使来往足得商量張皇師徒是何道理和好者禮義之事甲兵者爭奪之由二端懸殊理不並用今欲以用兵之勢定和好之辭事必不成縱成何益卿識見通敏器宇沉詳如此事宜不言可悉未知来意竟擬如何且首末論和是卿商議清水㑹盟之日卿又親發誓辭將期去殺好生修文偃武永安兆庶垂法子孫天下稱嗟以為盛美未經數嵗遽有變移非獨見誚於四方亦將取笑於千古以此思度甚欲通和彼雖小以侵陵朕亦未即交惡故遣某官與卿更審籌量卿若必務同和更無他意即宜便歸本界遣使具述本情所須四鎮北庭朕當自有推議如或託稱繼好志在别圗依前縱兵不即歸國惟利是視亦識彼懐和與不和於兹决定書中事有不盡並令某官某口宣宜令速回竚望来奏所獻方物深表逺誠今賜卿某物至可領也秋冷比平安好翰苑集巻十欽定四庫全書翰苑集巻十一唐陸贄撰奏草一論兩河及淮西利害狀内侍朱冀寜奉宣聖旨縁兩河宼賊未平殄又淮西兇黨攻逼襄城卿識古知今合有良策宜具陳利害封進者臣質性凡鈍聞見陋狹幸因乏使簪組昇朝荐承過恩文學入侍每自奮勵思酬奬遇感激所至亦能忘身但以越職干議典制所禁未信而言聖人不尚是以循循黙黙尸居榮近日日以愧自春徂秋心雖懐憂言不敢發此臣之罪也亦臣之分也陛下天縱聖徳神授英謀明照八表思周萬務猶慮闕漏下詢芻蕘此堯舜捨巳從人好問而好察邇言之意也臣每讀前史見開説納忠之士乃有泣血碎首牽裾斷鞅者皆以進議見拒懇誠激忠遂至發憤踰禮而不能自止故也況今勢有危迫事有機宜當聖主開懐訪納之時無昔人逆鱗顛沛之患儻又上探微旨慮匪恱聞傍懼貴臣將為沮議首尾憂畏前後顧瞻是乃偷合茍容之徒非有扶危救亂之意此愚臣之所痛心切齒於既往是以不忍復躬行於當世也心藴忠憤固願披陳職居禁闈當備顧問承問而對臣之職也寫誠無隠臣之忠也謹具件如後惟明主循省而備慮之豈直微臣獨荷容納之恩實億兆之幸社稷之福也臣本書生不習戎事竊惟霍去病漢將之良者也每言行軍用師之道顧方略何如耳不在學古兵法是知兵法者無他見其情而通其變則得失可辯成敗可知古人所以坐籌樽爼之間制勝千里之外者得此道也臣才不逮古人而頗窺其意是敢承詔不黙輒陳狂愚伏以尅敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用兵不足恃與無兵同將不為用與無將同將不能使兵國不能馭將非止費財翫寇之弊亦有不戢自焚之災自昔禍亂之興何嘗不由於此今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或有傍遭詿誤内蓄危疑蒼黄失圗勢不得止亦未必皆是處心積慮果為姦逆以僭帝稱王者也況其餘衆蓋並脅從茍知全生豈願為惡若招􅂝以法悔禍以誠使来者必安安者必久斯道積著人誰不懐縱有野心難馴臣知其從化者必過半矣舞干苗格豈獨虛言假使四五兇渠俱禀梟鴟之性其下同惡復有十百相從是皆卒伍庸流闒茸下品其志好不過聲色財貨之樂其材用不過蹴踘距踊之能其約從締交則迭相侮詐以為智謀其御衆使人則例質妻孥以為術數斯乃盗竊偷安之伍非有姦雄特異之資以陛下英神志期平壹君臣之勢不類逆順之理不侔形勢之大小不倫師徒之衆寡不敵然尚曠嵗持久師老費財加算不止於舟車徵卒殆窮於閩濮笞肉捶骨呻吟里閭送父别夫號呼道路杼軸已空興發已殫而將帥者尚曰財不足兵不多此微臣所以千慮百思而不悟其理也未審陛下嘗徵其説察其由乎股肱之臣日月獻納復為陛下察其事乎臣愚無知實所深惑遂乃過為臆度輒肆討論以為尅敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用今以陛下効其明聖羣帥畏威雖萬無此虞然亦不可不試省察也陛下若謂臣此説蓋虛體耳不足徵焉臣請復為陛下效其明徵以實前説田恱唱亂之始氣盛力全恒趙青齊迭為脣齒陛下特詔馬燧委之專征抱真李芃聲勢相援于時士吏畏法將帥感恩俱藴勝殘盡敵之誠未有爭功邀利之釁故能累摧堅陣深抵窮巢元惡幸脫於俘囚兇徒幾盡於鋒刃臣故曰尅敵之要在乎將得其人馭將之方在乎操得其柄此其明效也田悅既敗力屈勢窮且皆離心莫有固志乗我師勝㨗之氣躡亡虜傷夷之餘比於前功難易百倍既而大軍遂駐遺孽復安其後餽運日増師徒日益于兹再稔竟不交鋒量兵力則前者寡而今者多議軍資則前者薄而今者厚論氣勢則前者新集而今者乗勝度攻具則前者草創而今者繕完計兇黨則前者盛而今者殘揣敵情則前者銳而今者挫然而勢因時變事與理乖當易而反難當進而中止本末殊趣前後易方順理之常必不如此臣故曰將非其人者兵雖衆不足恃操失其柄者將雖材不為用此自昔必然之效但未審今兹事實得無近於此乎在陛下熟察而亟救之耳固不在益兵以生事加賦以殄人無紓目前之虞或興意外之患人者邦之本也財者人之心也兵者財之蠹也其心傷則其本傷其本傷則枝幹顛瘁而根柢蹷拔矣惟陛下重慎之愍惜之今師興三年可謂久矣稅及百物可謂繁矣陛下為之宵衣旰食可謂憂勤矣海内為之行齎居送可謂勞弊矣而寇亂有益翦滅無期人揺不寜事變難測是以兵貴拙速不尚巧遲速則乗機遲則生變此兵法深切之誡往事明著之驗也夫投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也是以勞心於服逺者莫若修近而其逺自来多方以救失者莫若改行而其失自去若不靖於本而務救於末則救之所為乃禍之所起也修近之道改行之方易於舉毛但在陛下然之與否耳儻或重難易制姑務持危則當校禍患之重輕辯攻守之緩急臣謂幽燕恒魏之寇勢緩而禍輕汝洛滎汴之虞勢急而禍重緩者宜圗之以計今失於屯戍太多急者宜備之以嚴今失於守禦不足何以言其然也自胡羯稱亂首起薊門中興已来未暇芟蕩因其降將即而撫之朝廷置河朔於度外殆三十年非一朝一夕之所急也田恱累經覆敗氣沮勢羸偷全餘生無復逺略武俊蕃種有勇無謀朱滔卒材多疑少決皆受田恱誘陷遂為猖狂出師事起無名衆情不附進退遑惑内外防虞所以纔至魏郊遽又退歸巢穴意在自保勢無他圗加以洪河太行禦其衝幷汾洺潞壓其腹雖欲放肆亦何能為又此郡兇徒互相劫制急則合力退則背憎是皆茍且之徒必無越軼之患此臣所謂幽燕恒魏之寇勢緩而禍輕希烈忍於傷殘果於吞噬據蔡許富全之地益鄧襄鹵獲之資意殊無厭兵且未衂東宼則轉輸將阻北窺則都城或驚此臣所謂汝洛滎汴之虞勢急而禍重代朔邠靈之騎士自昔之精騎也上黨盟津之歩卒當今之練卒也悉此彊勁委之山東勢分於將多財屈於兵廣以攻則曠嵗不進以守則數倍有餘各懐顧瞻逓欲推倚此臣所謂緩者宜圗之以計今失於屯戍太多李勉以文吏之材當浚郊奔突之㑹哥舒曜以烏合之衆扞襄野豺狼之羣陛下雖連發禁軍以為繼援累勅諸鎮務使協同睿旨殷憂人思自効但恐本非素習令不適從奔鯨觸羅倉卒難制首鼠應敵因循莫前此臣所謂急者宜備之以嚴今失於守禦不足陛下若察其緩急審其重輕使懐光帥師救襄城之圍李芃還鎮為東都之援汝洛既固梁宋亦安是乃取有餘救不足罷闗右賦車籍馬之擾減山東飛芻輓粟之勞無擾則禍亂不生息勞則物力可濟非止排難於變切亦將防患於未然徵發既停守備且固足得徐觀事勢更選良圖此於紓亂解紛抑亦計之次也議者若曰河朔羣盗尚未殱夷儻又減兵必更生患此盖好異不思之説耳臣請有以詰之前嵗伐叛之初唯馬燧抱真李芃三帥而已以攻必克以戰必彊是則力非不足明矣洎遲留不進乃請益師於是選神䇿銳卒以繼之而李晟往矣猶曰未足復請益師於是徵朔方全軍以赴之而懐光往矣幾遣加半之戍竟無分寸之功是則師不在衆又明矣然而可託以為解者必曰王師雖益賊黨亦増曩獨田悅寳臣今兼朱滔武俊臣請再詰以塞其辭曩之田悅寳臣皆蓄銳養謀劇賊之方彊者也尋而田悅喪敗寳臣殱夷雖復朱滔武俊加於前亦有孝忠日知乗其後是則賊勢不滋於曩日王師有溢於昔時又明矣曩以太原澤潞河陽三將之衆當田悅朱滔武俊三宼之兵今朱滔遁歸武俊退縮唯此田悅假息危城設使我師悉歸彼亦纔能自守況留抱真馬燧足得觀釁討除是則減兵東征勢必無患又明矣留之則彼為冗食徙之則此得長城化危為安息費從省舉一而兼數利惟陛下圗之謹奏論闗中事宜狀右臣頃覽載籍每至理亂廢興之際必反覆參考究其端由與理同道罔不興與亂同趣罔不廢此理之常也其或措置不異安危則殊此時之變也至於君人有大柄立國有大權得之必彊失之必弱是則厯代不易百王所同夫君人之柄在明其徳威立國之權在審其輕重徳與威不可偏廢也輕與重不可倒持也蓄威以昭徳偏廢則危居重以馭輕倒持則悖恃威則徳喪於身取敗之道也失重則輕移諸已啓禍之門也陛下天錫勇智志期削平忿兹昬迷整旅奮伐海内震疊莫敢寜居此誠英主撥亂拯物不得已而用之然威武四加非謂蓄矣所可兢兢保惜慎守而不失者唯居重馭輕之權耳陛下又果於成務急於應機竭國以奉軍傾中以資外倒持之勢今又似焉臣是以疚心如狂不覺妄發輒踰顧問之旨深測憂危之端此臣之愚於自量而忠於事主之分也古人所謂愚夫言之而明主擇之惟陛下幸留聽焉臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則小大適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用即不悖處則不危斯乃居重馭輕天子之大權也非獨為御諸夏而已抑又有鎮撫戎狄之術焉是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邉城其賦役則輕近而重逺也其惠化則恱近以来逺也太宗文皇帝既定大業萬方厎乂猶務戎備不忘慮危列置府兵分隸禁衞大凡諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中則居重馭輕之意明矣承平漸久武備浸微雖府衞具存而卒乗罕習故禄山竊倒持之柄乗外重之資一舉滔天兩京不守尚賴經制頗存典刑彊本之意則忘縁邉之備猶在加以諸牧有馬每州有糧故肅宗得以為資中復興運乾元之後大憝初夷繼有外虞悉師東討邉備既弛禁戎亦空吐蕃乗虛深入為寇故先皇帝莫與為禦避之東遊是皆失居重馭輕之權忘深根固柢之慮内寇則崤函失險外侵則汧渭為戎於斯之時朝市離析事變可慮須㬰萬端雖有四方之師寜救一朝之患陛下追想及此豈不為之寒心哉尚賴宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宫廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保祐深矣故示大儆將𢎞永圗陛下誠宜上副元心下察時變逺考前代成敗近鑒國朝盛衰垂無疆之休建不拔之業今則勢可危慮又甚於前伏惟聖謀巳有成算愚臣未達敢獻所憂先皇帝還自陜郛懲艾往事稍益禁衞漸修邉防是時闗中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精彊又徵諸道戍兵每嵗乗秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寳位威懾殊鄰蠢兹昆夷猶肆毒蠚舉國来寇志吞㟭梁貪冒既深覆亡幾盡遂求通好少息交侵盖縁馬喪兵疲務以計謀相緩固非畏威懐徳必欲守信結和所以厯年優柔竟未堅定要約息兵稍久育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺羣胡自爾已来絶無虜使其為嫌怨足可明徵借如吐蕃實和回紇無憾戎狄貪詐乃其常情茍有便利可窺豈肯端然自守今朔方太原之衆逺在山東神策六軍之兵繼出闗外儻有賊臣啗寇黠虜窺邉伺隙乗虛微犯亭障此愚臣所竊為憂者也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曽不料兵連禍結變故難測日引月長漸乖始圗故前志以兵為凶器戰為危事至戒至慎不敢輕用之者盖為此也當勝而反敗當安而倒危變亡而為存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以為鑒往嵗為天下所患咸謂除之則可致昇平者李正已李寳臣梁崇義田悅是也往嵗為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正已死李納繼之寳臣死惟岳繼之崇義卒希烈叛惟岳戮朱滔􅂝然則往嵗之所患者四去其三矣而患竟不衰往嵗之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圗循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無已之求望難必之效其於為人除患之意則已至矣其為宗社自重之計恐未至焉自頃將帥徂征久未盡敵茍以藉口則請濟師陛下乃為之輟邉軍缺環衞虛内廐之馬竭武庫之兵占將家之子以益師賦私養之畜以増騎猶且未戰則曰乏財陛下又為之算室廬貸商賈傾司府之幣設請𣙜之科闗輔之間徵發已甚宫苑之内備衞不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之以陛下聖徳君臨率土欣戴非常之慮豈所宜言然居安備危哲王是務以言為諱中主不行若備之已嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海盖由憑山河之形勝宅田里之上腴弱則内保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭徳也豪勇之在闗中者與籍於營衞不殊車乗之在闗中者與列於廐牧不殊財用之在闗中者與貯於帑藏不殊有急而須一朝可聚今執事者先拔其本弃重取輕所謂倒持太阿授人以柄議制置則彊幹弱枝之術反語綏懐則恱近来逺之道乖求諸通方無適而可顧臣庸懦竊為陛下惜之往者不可追来者猶可補臣不勝懇懇憂國之至輒敢效其狂鄙以備採擇之一端陛下儻俯照㣲誠過聽愚計使李芃援東洛懐光救襄城希烈兇徒勢必退衂則所遣神䇿六軍士馬及㸃召節將子弟東行應援者悉可追還河北既有馬燧抱真固亦無藉李晟亦令旋斾完復禁軍明勅涇隴邠寜但令嚴備封守仍云更不徵發使知各保安居又降徳音勞徕畿甸具言京輦之下百役殷繁且又萬方㑹同諸道朝奏卹勤懐逺理合優容其京城及畿縣所稅間架㩁酒抽貫貸商㸃召等諸如此類一切停罷則冀已輸者弭怨見處者獲寜人心不揺邦本自固禍亂無從而作朝廷由是益尊然後可以度時宜施教令弛張自我何有不從端本整棼無易於此謹奏翰苑集巻十一欽定四庫全書翰苑集巻十二唐陸䞇撰奏草二論敘遷幸之由狀臣前日蒙恩召見陛下敘說涇原叛卒驚犯宫闕及初行幸之事因自尅責辭旨過深臣奏云陛下引咎在躬誠堯舜至徳之意臣竊有所見以為致今日之患者羣臣之罪也陛下又曰卿以君臣之禮不忍歸過於朕故有此言然自古國家興衰皆有天命今遇此厄運雖則是朕失徳亦因事不由人未及對詔之間陛下遂言及宗祧涕泗交集主憂臣憤人理之常情激於衷不覺嗚咽旋屬游瓌請對臣言未獲畢辭今輒上煩以盡愚懇臣所謂致今日之患是羣臣之罪者非敢徒飾浮説茍寬聖懐事皆有由言庶可復自胡羯稱亂遺患未除朝廷因循久務容養事多僭越禮闕㑹朝陛下神武統天將壹區宇乃命將帥四征不庭兇渠稽誅逆將繼亂兵連禍結行及三年徵師四方無逺不暨父子訣别夫妻分離一人征行十室資奉居者有餽送之苦行者有鋒刃之憂去留騷然而閭里不寜矣聚兵日衆供費日多常賦不充乃令促限促限纔畢復命加徵加徵既殫又使别配别配不足於是𣙜算之科設率貸之法興禁防滋章條目纎碎吏不堪命人無聊生農桑廢於徵呼膏血竭於笞捶市井愁苦室家怨咨兆庶嗷然而郡邑不寜矣邉陲之戍用保封疆禁衞之師以備廵警二者或闕則生戎心國之大防莫重於此陛下急於靖難累遣東征邉備空虛親軍寡弱尋又捜閱私牧以取馬簿責將家以出兵凡有私牧者例元勲貴戚之門所謂將家者皆統帥岳牧之後是乃嘗蒙親委或著忠勞復除征徭固有常典今忽奪其畜牧事其子孫有乞假以給資裝有破産以營卒乗道路悽憫部曲感傷貴位崇勲孰不解體加以聚斂之法轂下尤嚴邸第侯王咸輸屋稅禆販夫婦畢算緡錢貴而不見優近而不見異其為憤慼又甚諸方誅求轉繁庶類恐懼興發無已羣情動揺朝野嚻然而京邑闗畿不寜矣陛下又以百度弛廢志期肅清持義以掩恩任法以成理神斷失於太速睿察傷於太精斷速則寡恕於人而疑似之間不容辯也察精則多猜於物而臆度之際未必然也寡恕則重臣懼禍反側之釁易生多猜則羣下防嫌茍且之風漸扇是以叛亂繼起怨讟並興非常之虞億兆同慮惟陛下穆然凝邃獨不得聞至使兇卒鼔行白晝犯闕重門無結草之禦環衞無誰何之人自古禍變之興未有若斯之易豈不以乗我間隙因人􅂝離哉陛下有股肱之臣有耳目之任有諫諍之列有備衞之司見危不能竭其誠臨難不能効其死所謂致今日之患是羣臣之罪者豈徒言歟聖旨又以家國興衰皆有天命今遇此厄運應不由人者臣志性介劣學識庸淺凡是占算秘術都不渉其源流至於興衰大端則嘗聞諸典籍書曰天視自我人視天聽自我人聽又曰徳惟一動罔不吉徳二三動罔不凶惟吉凶不僭在人惟天降災祥在徳又曰天難忱命靡常常厥徳保厥位厥徳靡常九有以亡此則天所視聽皆因於人天降災祥皆考其徳非於人事之外别有天命也故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰吾有命罔懲其侮此又捨人事而推天命必不可之理也易曰自天祐之吉无不利仲尼以為祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢是以自天祐之吉无不利又曰危者安其位者也亡者保其存者也亂者有其理者也故君子安而不忘危存而不忘亡理而不忘亂是以身安而國家可保又曰視履考祥又曰吉凶者得失之象也夫易之為書窮變知化其於性命可謂研精及乎論天人祐助之由辯安危理亂之故必本於履行得失而吉凶之報象焉此乃天命由人其義明矣春秋傳曰禍福無門唯人所召又曰人受天地之中以生所謂命也是以有動作威儀禮義之則以定命能者養之以福不能者敗以取禍禮記引詩而釋之曰大雅云殷之未喪師克配上帝儀監于殷駿命不易言得衆則得國失衆則失國也又引書而釋之曰康誥云惟命不于常言善則得之不善則失之此則聖哲之意六經㑹通皆為禍福由人不言盛衰有命盖人事著於下而天命降於上是以事有得失而命有吉凶天人之間影響相準詩書已後史傳相承理亂廢興大略可記人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也六經之教既如彼厯代明驗又如此尚恐其中有可疑者臣請復以近事證之自頃征討頗頻刑網稍宻物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下達烝黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非悉知算術皆曉占書則明致宼之由未必盡闗天命伏惟陛下鑒既往之深失建將来之令圗拯宗社阽危刷億兆憤恥在於審察時變博詢人謀王化聿修天祐自至恐不宜推引厄運謂為當然撓追咎之誠沮惟新之望臣聞理或生亂亂或資理有以無難而失守有因多難而興邦理或生亂者恃理而不修也亂或資理者遭亂而能懼也無難失守者忽萬機之重而忘憂畏也多難興邦者渉庶事之艱而知敕慎也今生亂失守之事則既徃不可復追矣其資理興邦之業在陛下尅勵而謹修之當至危至難之機得其道則興失其道則廢其間不容復有所悔也惟陛下勤思焉熟計焉捨巳以從衆焉違欲以遵道焉逺憸佞而親忠直焉推至誠而去逆詐焉杜讒沮之路廣諫諍之門焉埽求利之法務息人之術焉録片善片能以盡羣材焉忘小瑕小怨俾無棄物焉斯道甚易知甚易行不勞神不苦力但在約之於心耳又陛下天資睿哲有必致之具安得捨而不為哉斯道夕誓之於心則可以感神明動天地朝施之於事則可以服庶類懐萬方何憂乎亂人何畏乎厄運何患乎天下不寜昔太王以避狄而興周文以百里而王是乃因危難而恢盛業由僻小而闡丕圗況陛下禀英姿承寳厯四海之利權由已列聖之徳澤在人茍能増修蔑有不濟至如東北羣孽荏苒逋誅涇原亂兵倉卒犯禁盖上元保祐陛下恐陛下神武果斷有輕天下之心使知艱難將永福祚耳伏願悔前禍以荅天戒新聖化以承天休勿謂時鍾厄運而自疑勿謂事不由人而自解勤勵不息足致昇平豈止盪滌祅氛旋復宫闕而已愚臣不勝區區憂國奉君之至誠有所切辭不覺煩伏惟陛下不以人廢言不以言廢直千慮一得或有取焉謹奏奉天論奏當今所切務狀隠朝昨日奉宣聖旨逆賊雖退猶未收城令臣審思當今所務何者最切具條録奏来者伏以初經大變海内震驚無論順逆賢愚必皆企竦觀聽陛下一言失則四方解體一事當則萬姓屬心動關安危不可不慎臣謂當今急務在於審察羣情若羣情之所甚欲者陛下先行之羣情之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心況乎當變故動揺之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖邦家乎此誠當今之所急也然尚恐為之不易者蓋以朝廷播越王命未行施之空言人或不信何以言其然今天下之所欲者在息兵在安業天下之所惡者在斂重在法苛陛下欲息兵則寇孽猶存兵固不可息矣欲安業則征徭未罷業固未可安矣欲薄斂則郡縣懼乏軍用令必不從矣欲去苛則行在素霽威嚴言且無驗矣此皆勢有所未制意有所未從雖施於德音足慰来蘇之望而稽諸事實未符悔禍之誠且動人以言者其感不深動人以行者其應必速盖以言因事而易發行違欲而難成易發故有所未孚難成故無思不服今陛下將欲平禍亂拯阽危恤烝黎安反側既未有息人之實又乏於施惠之資唯當違欲以行已所難布誠以除人所病乃可以彰追咎之意副惟新之言若猶不然未見其可頃者竊聞輿議頗究羣情四方則患於中外意乖百辟又患於君臣道隔郡國之志不達於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際真偽雜糅於其間聚怨嚻嚻騰謗籍籍欲無疑阻其可得乎物論則然人心可見盖謂含𢎞聽納是聖主之所難鬱抑猜嫌是衆情之所病伏惟陛下神無滯用鑒必窮㣲愈其病而易其難如淬鋒潰疣決防注水耳可以崇德美可以濟艱難陛下何慮不行而直為此懔懔也臣謂宜因文武羣官入參之日陛下特加延接親與敘言備詢禍亂之由明示咎悔之意各使極言得失仍令一一面陳軍務之際到即引對不拘時限用表憂勤周公勤握髪吐餐而天下歸心則此義也又當假之優禮恱以温顔言切而理惬者必賞導以盡其情識寡而辭拙者亦容恕以嘉其意有諫諍無隠者願陛下叶成湯改過之美襃其直而勿吝其非有謀猷可用者願陛下體大禹拜言之誠奬其能而亟行其䇿至於匹夫片善采録不遺庶士傳言聽納無倦是乃緫天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂化疑梗為訢合易怨謗為謳歌浹辰之間可使丕變陛下儻行之不猒用之得中從義如轉圜進善如不及推廣此道足致和平其於昭德塞違恐不止當今所急也慮有愚而近道事有要而似迂冀垂睿思反覆詳覽必或無足觀採捨棄非遥謹奏奉天論前所荅奏未施行狀臣某言賊泚逋誅尚穴宫禁陛下思念宗廟痛傷黎元仁孝交感至於憤激猥以急務下詢微臣臣雖鄙懦尊慕仁義荷陛下知巳之遇感陛下思理之誠愚衷所懐承問輒發不以淺深自揆不以喜怒上虞誠缺於周防承順之規是亦忠於陛下一至之分也前奉詔問尋具上陳請延羣臣稍與親接廣咨訪之路開諫諍之門通壅鬱之情𢎞採拔之道自獻荅奏迨兹彌旬不聞施行不賜酬詰未審宸旨以為何如昧於忖量但務竭盡恐由辭理蹇拙不能暢達事情慺慺血誠敢願披􅅹頻煩黷冒豈不慙惶蓋犬馬感恩思効之心睠睠而不能自止者也臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所由生也是則時之否泰事之損益萬化所繫必因人情情有通塞故否泰生情有薄厚故損益生通天下之情者莫智於聖人盡聖人之心者莫深於易象其别卦也乾下坤上則曰泰坤下乾上則曰否其取象也損上益下則曰益損下益上則為損乾為天為君坤為地為臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也氣不交則庶物不育情不交則萬邦不和天氣下降地氣上騰然後歳功成君澤下流臣誠上達然後理道立損益之義亦猶是焉上約已而裕於人人必恱而奉上矣豈不謂之益乎上蔑人而肆諸巳人必怨而叛上矣豈不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容易哉故喻君為舟喻人為水水能載舟亦能覆舟舟即君道水即人情舟順水之道乃浮違則沒君得人之情乃固失則危是以古先聖王之居人上也必以其心從天下之心而不敢以天下之人從其欲乃至兢兢業業一日二日萬㡬夫幾者事之微也以聖人之德天子之尊且猶慎事之微乃至一日萬慮豈不以居上接下懼失其情歟書曰人心惟危道心惟微微則萬幾之慮不得不精也危則覆舟之戒不得不畏也夫揆物以意宣意以言言或是非莫若考於有跡跡或成敗莫若驗於已行自昔王業盛衰君道得失史冊盡在粲然可徵與衆同欲靡不興違衆自用靡不廢從善納諫靡不固逺賢恥過靡不危故詩書稱堯德則曰稽于衆捨巳從人數舜之功則曰眀四目達四聦言務同欲也序禹之所由興則曰益贊于禹禹拜昌言述湯之所以王則曰用人惟已改過不吝言能納諫也歌文王作周則曰濟濟多士文王以寜美武王尅殷則曰亂臣十人同心同德言皆從善也堯舜禹湯文武此六君者天下之盛王也莫不從諫以輔徳詢衆以成功是則德益盛者慮益微功愈髙者意愈下及代之衰也則道亦反焉故書曰紂有億兆夷人離心離德言違衆也詩曰汝炰烋于中國斂怨以為德不眀爾德時無背無側爾德不明以無陪無卿又曰雖無老成人尚有典刑曽是莫聽大命以傾言逺賢也書曰謂人莫已若者亡詩曰惟彼不慎自獨俾臧自有肺腸俾人則狂言自用也前史數桀紂之惡曰强足以拒諫辯足以飾非言恥過也考得失於已行之迹鑒盛衰於已驗之符孰失道而不衰孰得理而不盛報應以類影響不差胡可不則而象之敬而畏之乎粤自秦漢暨于周隋其間將厯千祀代興者非一姓繼覆者非一君雖所遇殊時所為異迹然失衆必敗得衆必成與堯舜禹湯同務者必興與桀紂幽厲同趣者必覆全失衆則全敗全得衆則全成多同於善則功多甚同於惡則禍甚善惡從類端如貫珠成敗象行明若觀火此厯代之元龜也尚恐議者曰時異事異臣請復為陛下粗舉近效之尤章章者以辯焉太宗文皇帝以天縱之才有神器之重武定禍亂文致太平威行如雷霆明照侔日月英略施於百務聖功被於九歌固非庶品之所度量常情之所鑽仰然猶兢兢畏慎懼失人心毎戒臣下獻規恒以危亡為慮夙興聽理日旰忘勞公卿迭趨庭奏庶務評議得失與衆共之下無滯情上無私斷退朝之暇宴接侍臣諮訪謀猷詢求過闕或論往古成敗或問人間事情毎言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則上下相匡務遵勤儉言及閭閻疾苦則君臣同慮議息征徭懋德懲違觸類滋長尚恐過言謬舉既往難追每召宰相平章必遣諫官俱入小有頗失隨即箴規得一善必遽命甄昇聽一諫必明加襃錫故得時無闕事人樂輸誠又引文學之流更直宿於内署或講求典禮或諷誦詩書每至夜分情忘厭倦夫以太宗之德美貞觀之理安且猶務得人心其勤若此是則人心之於理道可一日而不接乎髙宗始年亦親聽納故當時翕然歸美以為有貞觀之風兼賴遺澤在人先範垂裕幸無改作俗以阜康數十年間天下無事承平之業滋久倦勤之意頗彰燕居益深接下彌簡前哲之耿光浸逺中宫之威柄潛移卒有嗣聖臨朝天授革命豈不以經邦之道闕疇咨於大猷宴安之懐溺偏信於近狎馴致禍變幾將傾邦雖亂匪自他然其失一也弊俗一靡餘風遂流訖神龍景雲之間皆嬖倖亂朝聦明不達元宗躬定大難手振宏綱開懐納忠克已從諫尊用舊老採拔羣才大臣不敢壅下情私昵不敢干公議朝清道泰垂三十年謂化已行謂安可保耳目之娱漸廣憂勤之志稍衰侈心一萌邪道並進貪權竊柄者則曰德如堯舜矣焉用勞神承意趣媚者則曰時已太平矣胡不為樂有深謀逺慮者謂之迂誕驚衆有讜言切諫者謂之誹謗邀名至尊收視於穆清上宰養威於廊廟議曹以頌美為奉職法吏以識旨為當官司府以厚斂為公忠權門以多賂為問望外寵持竊國之勢内寵擅迴天之謠禍機熾然燄燄滋甚舉天下如居積薪之上人人懼焚而朝廷相蒙曽莫之省日務遊宴方謂有無疆之休大盗一興至今為梗豈不以忽於戒備逸於居安憚忠骾之怫心甘䛕詐之從欲漸漬不聞其失以至於大失者乎肅宗懲致宼之由藴撥亂之略虛受廣納同符乎太宗招延詢謀輟食廢寢洞啓誠腑推心與人豁披胷襟忘已應物故得来蘇之望允塞配天之業勃興先皇帝繼守㳟勤而益之以和惠惠則有感和則有親雖時繼艱屯而衆不離析理尚寬大務因循而重作為然於紫宸聽朝常限三人奏事亦宣諭德令課責侍臣或賞其盡規或讓以容黙性本仁恕事多含𢎞諫雖未從且不深忤情茍有阻終獲上通故君臣相安而人亦小息陛下英姿逸辯邁絶人倫武略雄圖牢籠物表憤習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊日久浚恒太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不達於睿聦臣於往年曽任御史獲奉朝謁僅欲半年陛下嚴􅃉髙居未嘗降旨臨問羣臣跼蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔既殊師錫且異公言未行者則戒以樞宻勿論已行者又謂之遂事不諫漸生拘礙動渉猜嫌由是人各隠情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰真孰虛何得何失則事之通塞備詳之矣人之情偽盡知之矣烈聖升降之效厯厯如彼當今理亂之由昭昭如此未有不興於得衆殆於失人裕於僉諧蔽於偏信濟美因乎納諫虧德由乎自賢善始本乎憂勤失全萌乎安泰今陛下將欲悔禍徼福去危從安若不循太宗創業之規襲肅宗中興之理鑒天寶致亂之所以懲今者遷幸之所由則何以孚聖懐彰令問新逺邇之聽歸反側之心乎前承德音訪及庸鄙敢緣私議輒以獻聞自爾已来反覆千慮愚智有分信非可移至今拳拳猶滯所見不勝愚誠懇款謹復布露以聞臣某惶怖死罪謹言翰苑集巻十二欽定四庫全書翰苑集巻十三唐陸贄撰奏草三奉天請數對羣臣兼許令論事狀朝隠奉宣聖旨頻覽卿表狀勸朕數對羣臣兼許令論事辭理懇切深表盡忠朕本心甚好推誠亦能納諫但縁上封事及奏對者少有忠良多是論人長短或探朕意旨朕雖不受讒譖出外即謾生是非以為威福朕往日將謂君臣一體都不隄防縁推誠信不疑多被姦人賣弄今所致患害朕思亦無他故却是失在推誠又諫官論事少能慎宻例自矜􅃷歸過於朕以自取名朕從即位以来見奏對論事者甚多大抵皆是雷同道聽塗說試加質問即便辭窮若有竒才異能在朕豈惜拔擢朕見從前已来事秪如此所以近来不多取次對人亦不是倦於接納卿宜深悉此意者聖徳廣大如天包容俯矜狂愚仍賜奬諭嘉臣以懇切目臣以盡忠雖甚庸駑實懐感勵夫知無不言之謂盡事君以義之謂忠臣之夙心久以自誓以此為奉上之道以此為報主之資幸逢休明獲展誠願既免罪戾又蒙襃稱庶奉周旋不敢失墜儻陛下廣推此道施及萬方咸奬直以矜愚各録長而捨短人之欲善誰不如臣自然聖徳益彰羣心盡達愚衷懇懇實在於斯睿眷特深縷宣宻旨備該物理曲盡人情其於慮逺防微固非常識所逮然臣竊謂天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納帝王之盛莫盛於堯雖四凶在朝而僉議靡輟故曰惟天為大惟堯則之是知人有邪直賢愚在處之各得其所而已必不可以忠良者少而闕於詢謀獻納之道也昔人有因噎而廢食者又有懼溺而自沉者其為矯枉防患之慮豈不過哉願陛下取鑒於兹勿以小虞而妨大道也臣聞人之所助在乎信信之所立由乎誠守誠於中然後俾衆無惑存信於已可以教人不欺唯信與誠有補無失一不誠則心莫之保一不信則言莫之行故聖人重焉以為食可去而信不可失也又曰誠者物之終始不誠無物物者事也言不誠則無復有事矣匹夫不誠無復有事況王者賴人之誠以自固而可不誠於人乎陛下所謂失於誠信以致患害者臣竊以斯言為過矣孔子曰可與言而不與之言失人不可與言而與之言失言智者不失人亦不失言由此論之陛下可審其所言而不可不慎信其所與而不可不誠海禽至微猶識情偽含靈之類固必難誣前志所謂衆庶者至愚而神盖以蚩蚩之徒或昬或鄙此其似於愚也然而上之得失靡不辯上之好惡靡不知上之所秘靡不傳上之所為靡不効此其類於神也故馭之以智則人詐示之以疑則人偷接不以禮則徇義之意輕撫不以恩則効忠之情薄上行之則下從之上施之則下報之若響應聲若影從表表枉則影曲聲淫則響邪懐鄙詐而求顔色之不形顔色形而求觀者之不辯觀者辯而求衆庶之不惑衆庶惑而求叛亂之不生自古及今未之得也故唯天下至誠為能盡其性能盡其性則能盡人之性若不盡於已而望盡於人衆必紿而不從矣不誠於前而曰誠於後衆必疑而不信矣今方岳有不誠於國者陛下則興師以伐之臣庶有虧信於上者陛下則出令以誅之有司順命誅伐而不敢縱捨者盖以陛下之所有責彼之所無故也向若陛下不誠於物不信於人人將有辭何以致討是知誠信之道不可斯須去身願陛下慎守而行之有加恐非所以為悔者也臣聞春秋傳曰人誰無過過而能改善莫大焉易曰日新之謂盛徳禮記曰徳日新日日新又日新商書仲虺述成湯之徳曰用人惟巳改過不吝周詩吉甫美宣王之功曰衮職有闕惟仲山甫補之夫禮易春秋百代不刋之典也皆不以無過為美而謂大善盛徳在於改過日新成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴盖為人之行已必有過差上智下愚俱所不免智者改過而遷善愚者耻過而遂非遷善則其徳日新是為君子遂非則其惡彌積斯謂小人故聞義能徙者常情之所難從諫勿咈者聖人之所尚至於贊揚君徳歌述主功或以改過不吝為言或以有闕能補為美中古巳降淳風浸㣲臣既尚䛕君亦自聖掩盛徳而行小道於是有入則造膝出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑譖臣之罪由此生媚道一行為害斯甚太宗文皇帝挺秀千古清明在躬再恢聖謨一變流弊以虛受為理本以直言為國華有面折廷爭者必為霽雷霆之威而明言奬納有上封獻議者必為黜心意之欲而手勅襃揚故得有過必知知而必改存致雍熙之化沒齊堯舜之名向若太宗徇中主之常情滯習俗之凡見聞過則羞已之短納諫又畏人之知雖有求理之心必無濟代之効雖有悔過之意必無從諫之名此則聽納之實不殊隠見之情小異其於損益之際已有若此相懸又況不及中才師心自用肆于人上以遂非拒諫孰有不危者乎且以太宗有經緯天地之文有底定禍亂之武有躬行仁義之徳有致理太平之功其為休烈耿光可謂盛極矣然而人到于今稱詠以為道冠前古澤被無窮者則從諫改過為其首焉是知諫而能從過而能改帝王之美莫大於斯陛下所謂諫官論事少能慎宻例自矜􅃷歸過於朕者臣以為不宻自矜信非忠厚其於聖徳固亦無虧陛下若納諫不違則傳之適足増美陛下若違諫不納又安能禁之勿傳伏願以貞觀故事為楷模使太宗風烈重光於聖代恐不可謂此為歸過而阻絶直言之路也臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之義是則聖賢為理務詢衆心不敢忽細微不敢侮鰥寡侈言無驗不必用質言當理不必違遜于志者不必然逆于心者不必否異于人者不必是同于衆者不必非辭拙而効速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他唯善所在則可以盡天下之理見天下之心夫人之常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所欲信既偏則聽言而不考其實由是有過當之言疑既甚則雖實而不聽其言於是有失實之聽輕其人則遺其可重之事欲其事則存其可弃之人斯並茍縱私懐不稽皇極于以虧天下之理于以失天下之心故常情之所輕乃聖人之所重圗逺者先驗於近務大者必慎於微將在博採而審用其中固不在慕髙而好異也陛下所謂比見奏對論事皆是雷同道聽塗説者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣竊以陛下雖窮其辭而未盡其理能服其口而未服其心何以知其然臣每讀史書見亂多理少因懐感歎嘗試思之竊謂為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願達於上上之情莫不求知於下然而下恒苦上之難達上恒苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辯給眩聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順旨而忠實之語不聞矣上騁辯必勦説而折人以言上眩明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之説不申矣夫以區域之廣大生靈之衆多宫闕之重深髙卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其閒則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然考其初心不必淫暴亦在乎兩情相阻馴致其失以至于艱難者焉昔龍逢誅而夏亡比干剖而殷滅宫竒去而虞敗屈原放而楚衰臣謂夏殷虞楚之君若知四子之盡忠必不𠞰弃若知四子之可用必不拒違所以至於忍害而捨絶者盖謂其言不足行心不足保故也四子既去四君亦危然則言之固難聽亦不易趙武呐呐而為晉賢臣絳侯木訥而為漢元輔公孫宏上書論事帝使難宏以十䇿宏不得其一及為宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一詶一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才臣是以竊慮陛下雖窮其辭而未窮其理能服其口而未服其心良有以也古之王者明四目達四聰盖欲幽抑之必通且求聞已之過也垂旒於前黈纊於側盖惡視聽之太察唯恐彰人之非也降及末代則反於斯聰明不務通物情視聽秪以伺罪釁與衆違欲與道乖方於是相尚以言相示以智相冒以詐而君臣之義薄矣以陛下性含仁聖意務雍熙而使至道未孚臣竊為陛下懐愧於前哲也古人所以有恥君不如堯舜者故亦以是為心乎夫欲理天下而不務於得人心則天下固不可理矣務得人心而不勤於接下則人心固不可得矣務勤接下而不辯君子小人則下固不可接矣務辯君子小人而惡其言過悅其順已則君子小人固不可辯矣趣和求媚人之甚利存焉犯顔取怨人之甚害存焉居上者易其害而以美利利之猶懼忠告之不蔇況有疎隔而勿接又有猜忌而加損者乎天生烝人合以為國人之有口不能無言人之有心不能無欲言不宣於上則怨讟於下欲不歸於善則湊集於邪聖人知衆之不可以力制也故植謗木陳諫鼓列爭臣之位置采詩之官以宣其言尊禮義安誠信厚賢能之賞廣功利之途以歸其欲使上不至於亢下不至於窮則人心安得而離亂兆何從而起古之無為而理者其率用此歟茍有理之之意而不知其方茍知其方而心守不壹則得失相半天下之理亂未可知也其又違道以師心弃人而任巳謂欲可逞謂衆可誣謂專斷無傷謂詢謀無益謂䛕説為忠順謂獻替為妄愚謂進善為比周謂嫉惡為嫌忌謂多疑為御下之術謂深察為照物之明理道全乖國家之顛危可立待也理亂之戒前哲備言之矣安危之効歷代嘗試之矣舊典盡在殷鑒足徵其於措置施為在陛下明識所擇耳伏願廣接下之道開奬善之門𢎞納諫之懐勵推誠之美其接下也待之以禮煦之以和虛心以盡其言端意以詳其理不禦人以給不自眩以明不以先覺為能不以臆度為智不形好惡以招諂不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍蚩而妍蚩自彰莫得而怨也有犯顔讜直者奬而親之有利口讒佞者疎而斥之自然物無壅情言不茍進君子之道浸長小人之態日消何憂乎少忠良何有乎作威福何患乎妄說是非如此則接下之要備矣其奬善也求之若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪㳙必容能小事則處之以小官立大勞則報之以大利不忌怨不避親不抉瑕不求備不以人廢舉不以已格人聞其才必試以事能其事乃進以班自然無不用之才亦無不實之舉如此則奬善之道得矣其納諫也以補過為心以求過為急以能改其過為善以得聞其過為明故諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為盛徳是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得採納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之徳光矣其推誠也在彰信在任人彰信不務於盡言所貴乎出言則可復任人不可以無擇所貴乎巳擇則不疑言而必誠然後可求人之聽命任而勿貳然後可責人之成功誠信一虧則百事無不紕繆疑貳一起則羣下莫不憂虞是故言或乖宜可引過以改其言而不可茍也任或乖當可求賢以代其任而不可疑也如此則推誠之義孚矣微臣所以屢屢塵黷而不能自抑者盖以陛下有拯亂之志而多難未平有務理之誠而庶績未乂有堯舜聰明之徳而未光宅於天下有覆載含𢎞之量而未翕受於衆情故臣每中夜静思無不竊歎而深惜也向若陛下有其位而無必行之志有其志而無可致之資則臣固已從俗浮沉何苦而汲汲如是惟陛下詳省所闕亟行所宜歸天下之心濟中興之業此臣之願也億兆之福也宗社無疆之休也謹奏奉天論尊號加字狀右冀寜奉宣聖旨往年百官請上尊號曰聖神文武皇帝今縁經此寇難諸事並宜改變衆議欲得於朕舊號之中更加一兩字卿宜商量事體穩便得否者伏以睿徳神功參天配地巍巍蕩蕩無得而名臣子之心務崇美號雖或増累盈百猶恐稱述未周陛下既越常情俯稽至理愚衷未諭安敢不言竊以尊號之興本非古制行於安泰之日已累謙沖襲乎喪亂之時尤傷事體今者鑾輿播越未復宫闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下誠宜深自懲勵以收攬羣心痛自貶損以荅謝靈譴豈可近從末議重益美名既虧追咎之誠必累中興之業以臣庸蔽未見其宜乞更詳思不為兇孽所幸此臣之至願也謹奏重論尊號狀右冀寜奉宣聖旨卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿宜為朕更審思量應亦無妨者臣聞徳合天者謂之皇徳合地者謂之帝徳合人者謂之王父天母地以養人理物各得其宜者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黄帝堯舜自生人已来君徳之最神聖者天下尊之美之亦已至矣而其指以為號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫匪大聖尚自菲薄降號為王嬴秦徳衰於殷周而名竊於羲皡兼皇與帝始緫稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱崇其號無補於徽猷損其名不傷於徳美然而損之有謙光稽古之善崇之獲矜能納諂之譏得失不侔居然可辯況今時遭屯否事屬艱難尤宜懼思以自貶抑必也俯稽術數須有變更與其増美稱而失人心不若黜舊號以祇天戒天時人事理必相扶人既好謙天亦助順陛下誠能斷自宸鑒渙發徳音引咎降名深自尅責惟謙與順一舉而二美從之外可以收物情内可以應元運上可以髙徳於夐古下可以垂法於無窮興廢典矯舊失至明也損虚飾收美利大智也前聖之所以永保鴻名常為稱首者達於兹義而巳矣陛下何恡而不革反欲加冗號以受實患哉元元道徳經曰王侯自謂孤寡不穀以賤為本也周襄王遭亂出居于鄭告于諸侯曰不穀不徳鄙在鄭地春秋禮之以其能降名也漢光武詔令上書者不得言聖史册稱之以其能損巳也臣顧以賤㣲獲承訪議伊尹恥其君不如堯舜臣亦恥之是以誠發於中不復防慮忌諱赦其愚而鑒其理惟明主行焉謹奏奉天論赦書事條狀右隠朝奉宣聖旨并以中書所撰赦文示臣令臣審看可否如有須改張處及事宜不盡條録奏来者臣謹如詔旨詳省再三猶懼所見不周兼與諸學士等參考得失僉以為綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寶志壹中區窮用甲兵竭取財賦甿庶未達於暫勞之旨而怨咨已深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盗據宫闈九廟鞠陷於匪人六師出次於郊邑奔逼憂厄言之痛心自古禍亂所鍾罕有若此之暴今重圍雖解逋寇尚存裂土假王者四兇淊天僭帝者二豎又有顧瞻懐貳叛援黨姦其流寔繁不可悉數皇輿未復國柄未歸勞者未獲休功者未及賞困窮者未暇恤滯抑者未克伸將欲紓多難而收羣心唯在赦令誠言而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懐昔成湯遇災而禱于桑野躬自髠剔以為犧牲古人所謂割髮宜及膚翦爪宜侵體良以誠不至者物不感損不極者益不臻今兹徳音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不𢎞宣暢鬱堙不可不洞開襟抱洗刷疵垢不可不盪去瘢痕使天下聞之廓然一變若披重昏而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具别狀同進除此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形於事人或未諭而宣之以言言必顧心心必副事三者符合不相越踰本於至誠乃可求感事或未致則如勿言一虧其誠終莫之信伏惟陛下先斷厥志乃施於辭度其可行而宣之其不可者措之無茍於言以重其悔言克誠而人心必感人心既感而天下必平事何可不詳言何可不務罄輸愚懇伏聽聖裁謹奏翰苑集巻十三欽定四庫全書翰苑集巻十四唐陸贄撰奏草四奉天論擬與翰林學士改轉狀右冀寜奉宣勅旨卿及諸學士名銜宜並鈔録進来冀寜又向臣說云聖意以臣等自到奉天書詔填委欲與改轉以奬勤勞者承命竦恧顧慙非宜進退徬徨不知所措臣謬以儒學選居翰林雖職異訏謀而恩參近侍當陛下用兵之㑹乏决勝之籌從陛下避狄之遊靡出竒之計見危闕授命之莭知難無伏死之爭事君大猷臣則皆曠屑屑供職曾何足云夫君之有臣以濟理也理不失道亂何由生亂之浸興由理乖也君之及難實臣罪也是以主憂則臣辱主辱則臣死今陛下躬罹逼脅露處郊畿園廟震驚斯謂辱矣宼讎宻邇亦云憂矣臣竊謂凡今在位任重者其罪大職近者其責深臣之職司頗亦為近是宜當責安可増榮又聞初到奉天已頒詔命應是扈從將吏一例並加兩階今若翰林之中獨蒙改轉乃是行賞不類命官以私録微勞則臣等遷位過優勸来者則從官加階太薄先後失次輕重不倫凡百具寮誰不解體夫行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺至如徇主忘家固是臣子常分追陪輦蹕曷足甄稱陛下必以朝官之中有来有否事須旌别以儆不從則望先録大勞次徧羣品然後以例均被臣亦何敢獨辭殊渥曲臨實傷大體不任靦懼之至謹奉狀以聞謹奏奉天請罷瓊林大盈二庫狀右臣聞作法於凉其弊猶貪作法於貪弊將安救示人以義其患猶私示人以私患必難弭故聖人之立教也賤貨而尊讓逺利而尚亷天子不問有無諸侯不言多少百乘之室不畜聚斂之臣夫豈皆能忘其欲賄之心哉誠懼賄之生人心而開禍端傷風教而亂邦家耳是以務鳩斂而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也天子所作與天同方生之長之而不恃其為成之收之而不私其有付物以道混然忘情取之不為貪散之不為費以言乎體則博大以言乎術則精微亦何必撓廢公方崇聚私貨降至尊而代有司之守辱萬乗以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過哉今之瓊林大盈自古悉無其制傳諸耆舊之說皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分稅賦當委之有司以給經用貢獻宜歸乎天子以奉私求元宗恱之新是二庫蕩心侈欲萌柢於兹迨乎失邦終以餌宼記曰貨悖而入必悖而出豈非其明效歟陛下嗣位之初務遵理道敦行約儉斥逺貪饕雖内庫舊藏未歸太府而諸方曲獻不入禁闈清風肅然海内丕變議者咸謂漢文却馬晉武焚裘之事復見於當今近以寇逆亂常鑾輿外幸既屬憂危之運宜増儆勵之誠臣昨奉使軍營出遊行殿忽覩右廊之下牓列二庫之名戄然若驚不識所以何則天衢尚梗師旅方殷瘡痛呻吟之聲噢咻未息忠勤戰守之効賞賚未行而諸道貢珍遽私别庫萬目所視孰能忍懐竊揣軍情或生觖望試詢候館之吏兼採道路之言果如所虞積憾巳甚或忿形謗讟或醜肆謳謠頗含思亂之情亦有悔忠之意是知甿俗昏鄙識昧髙卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外扞兇徒内防危堞晝夜不息迨將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啗功勞無猛制而人不攜懐所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謡讟方興軍情稍阻豈不以勇夫恒性嗜貨矜功其患難既與之同憂而好樂不與之同利茍異恬黙能無怨咨此理之常固不足怪記曰財散則民聚財聚則民散豈非其殷鑒歟衆怒難任蓄怨終泄其患豈徒人散而已亦將慮有構姦鼓亂干紀而强取者焉夫國家作事以公共為心者人必樂而從之以私奉為心者人必咈而叛之故燕昭築金臺天下稱其賢殷紂作玉杯百代傳其惡盖為人與為已殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大盖同利與專利異也為人上者當辨察兹理洒濯其心奉三無私以壹有衆人或不率於是用刑然則宣其利而禁其私天子所恃以理天下之具也捨此不務而壅利行私欲人無貪不可得已今兹二庫珍幣所歸不領度支是行私也不給經費非宣利也物情離怨不亦宜乎智者因危而建安明者矯失而成徳以陛下天姿英聖儻加之見善必遷是將化蓄怨為銜恩反過差為至當促殄遺孽永垂鴻名易如轉規指顧可致然事有未可知者但在陛下行與否耳能則安否則危能則成徳否則失道此乃必定之理也願陛下慎之惜之陛下誠能近想重圍之殷憂追戒平居之專欲器用取給不在過豐衣食所安必以分下凡在二庫貨賄盡令出賜有功坦然布懐與衆同欲是後納貢必歸有司毎獲珍華先給軍賞瓌異纎麗一無上供推赤心於其腹中降殊恩於其望外將卒慕陛下必信之賞人思建功兆庶恱陛下改過之誠孰不歸徳如此則亂必靖賊必平徐駕六龍旋復都邑興行墜典整緝棼綱乗輿有舊儀郡國有恒賦天子之貴豈當憂貧是乃散其小儲而成其大儲也損其小寶而固其大寶也舉一事而衆美具行之又何疑焉恡少失多亷賈不處溺近迷逺中人所非况乎大聖應機固當不俟終日不勝管窺願効之至謹陳冒以聞謹奏奉天論解蕭復狀右冀寜奉宣聖旨縁國家賦稅多出江淮既未收復京城恐逺路傳說過甚所以欲得遣一大臣往彼宣慰以安逺近之情初欲簡擇此使並先共宰相商量皆云蕭復久任江外刺史諳彼事宜又就宰相之中名望最重令其往彼宣慰人必望風恱服其時蕭復亦自見此商議更無異同朕猶不能自斷遂喚諸朝士般次對見一一親向說宣慰之意問其穩便已否皆云至要並無異辭朕所以更不疑惑已與擇得發日及其臨行從一等却論奏欲得且留蕭復又頻有朝官上封事亦與從一等意同朕忽見此翻覆非常悵恨數日思量不測其故意況必是蕭復計㑹遣其論奏蕭復又有何事苦欲得住其意深不可㑹卿比来諳此人性行否兼與朕子細思料若不肯去其意何在者蕭復往年曽任常州刺史臣其時寄住常州首尾二年閱其理行及到京邑多與往来嵗月滋深情意相得復之志性臣則備諳本是貴門又聨戚屬痛自修勵慕為清貞矯枉太深時或過當論經義則以守死善道執心不回為本議人物則以魏元忠宋璟為師已之所行皆欲盡善故渉好名之累亦無應變之才用雖不周行則可保至如二三爽徳翻覆挾姦復之為人必不至是安有親承計議退自變渝私誘官僚曲令干説是同兒戲非近人情雖甚狂愚猶應不敢若稍恭慎固當不為況乃見稱名流獲踐清貫備股肱之任承渥澤之私何心何顔忍至於此假令蕭復之意或欲逗留在於從一之徒寜肯附㑹臣縁自到行在常居禁中向外事情視聽都絶忽承顧問莫測端由陛下必欲研窮斯理不為難察初舉蕭復充使本是從一等商量後請蕭復不行又是從一等論奏一矛一楯理必有歸或遣或留意將安在但垂睿詰孰敢面謾蕭復若相屬求則從一等何容為隠從一等儻自迴互則蕭復不當受疑陛下奚憚而不辯明乃直為此悵恨也夫明則罔惑辯則罔寃惑莫甚於逆詐而不與明寃莫痛於見疑而不獲辯是使情偽相糅忠邪靡分兹實居上御下之要樞惟陛下留意幸察謹奏奉天薦袁髙等狀袁髙楊頊已上二人並曽任御史中丞裴諝曽任金吾將軍孫咸曽任京兆少尹周皓曽任丹延都團練觀察使裴胄曽任宣州刺史崔造殷亮李舟已上並任郎官何士幹姚南仲陸淳沈既濟已上曽任補闕拾遺右臣近因奏對言及任人陛下累歎乏才惘然憂見於色臣退而思省且喜且慙所喜者樂陛下急於求賢明君致理之資也所慙者恥近侍不能薦士微臣竊位之罪也輒自揣擇思舉所知猶懼鑒識不明品藻非當反覆參校未果上聞昨蒙宣示中書進擬量移官令臣審看可否者因悟貶降之軰其中甚有可稱臣以素所諳知兼聞公議此狀之内僅得十人狀所不該又有三四或因連累左黜或遭讒忌外遷互有行能咸著名跡寘之清列皆謂良材若但準例量移及令仍舊出守固非陛下愛賢之意亦乖海内望理之心儻蒙特恩追赴行在試垂訪接必有可觀録用棄瑕既符徳號振淹求舊亦闡大猷謹録薦陳庶備採擇其餘差序逺近並具别狀以聞謹奏奉天論李晟所管兵馬狀右賊泚稽誅保聚宫苑勢窮援絶引日偷生懐光緫仗順之師乗制勝之氣鼓行芟翦易若摧枯而乃寇奔不追師老不用諸帥每欲進取懐光輒沮其謀據兹事情殊不可解陛下意在全後委曲聽從觀其所為亦未知感若不别務規略漸相制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懐光偶論此事臣遂訊問所宜懐光乃云李晟既欲别行某亦都不要藉臣猶慮有翻覆因美其軍盛强懐光大自矜誇轉有輕晟之意臣又從容問云昨發行在之日未知有此商量今者從此却迴或恐聖旨顧問事之可否決定何如懐光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書勅下依奏别賜懐光手詔示以移軍事由其手詔之大意云昨得李晟奏請移軍城東以分賊勢朕縁未知利害本欲委卿商量適㑹陸䞇從彼宣慰迴奏云見卿論叙軍情語及於此仍言許去事亦無妨遂勅本軍允其所請卿宜授以謀略分路夾攻務使叶齊尅平宼孽如此則詞婉而直理順而明雖蓄異端何由起怨臣初奉使諭旨本縁糧賜不均偶屬移軍事相諧㑹又幸懐光詭對且無阻絶之言機宜合幷若有幽贊一失其便後何悔追伏望聖聰速垂裁斷謹奏奉天奏李建徽楊惠元兩節度兵馬狀右懐光當管師徒足以獨制兇寇逗留未進抑有他由所患太强不資傍助比者乂遣李晟李建徽楊惠元三節度之衆附麗其營無益成功秪足生事何則四軍接壘羣帥異心論勢力則懸絶髙卑據職名則不相統屬懐光輕晟等兵微位下而忿其制不從心晟等疑懐光養寇蓄姦而怨其事多凌已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全强者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊寇未平新患方起憂歎危切實堪疚心太上消慝於未萌其次救失於始兆況乎事情已露禍難垂成委而不謀何以寜亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然他日雖有良圗亦恐不能自拔拯其危急唯在此時今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為犄角仍先諭旨宻使促裝詔書至營即日進路懐光意雖不欲然亦計無所施是謂先聲有奪人之心疾雷不及掩耳者也夫制軍馭將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏䇿得其要契其時然後舉無敗謀措無危勢今者屯兵而不肯為用聚將而罔能叶心自為鯨鯢變在朝夕留之不足以相制徒長厲階析之各競於擅能或建勲績事有必應斷無可疑解鬭不可以不離救焚不可以不疾理盡於此惟陛下圗之以前件事宜臣昨晚自行營迴面奉進止以臣所商量許李晟移就城東灼然穩便但慮懐光不免悵望因此生詞轉難調息則不如不去令臣更審細思量奏来者臣以事機得失所繫安危千慮百思通夕忘寐誠以貪因循而不能矯失者終有大患處臲卼而不思出險者必無乆安罄陳芻蕘惟所省擇謹奏駕幸梁州論進獻𤓰果人擬官狀右欽溆奉宣聖旨自發洋州已来累路百姓進獻果子胡𤓰等雖甚㣲細且有此心今擬各與散試官卿宜商量可否者伏以爵位者天下之公器而國之大柄也唯功勲才徳所宜處之非此二途不在賞典恒宜慎惜理不可輕輕用之則是壊其公器而失其大柄也器壊則人將不重柄失則國無所持起端雖㣲流弊必大縁路所獻𤓰果蓋是野人微情有之不足光聖猷無之不足虧至化量以錢帛為賜足彰行幸之恩饋獻酬官恐非令典謹奏又論進𤓰果人擬官狀右欽漵齎中書所與進𤓰果人擬官狀示臣仍奉宣聖旨朕所到處欲得人心喜恱試官虛名無損於事宰臣已商量進擬與亦無妨者臣愚以為信賞必罰霸王之資輕爵䙝刑衰亂之漸信賞在功無不報必罰在罪無不懲非功而獲爵則爵輕非罪而肆刑則刑䙝爵賞刑罰國之大綱一綱或棼萬目皆弛雖有善理末如之何天寶季年嬖倖傾國爵以情授賞以寵加天下蕩然紀綱始紊逆羯乗釁遂亂中原遣戍嵗増策勲日廣財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉青朱雜沓於胥徒金紫普施於輿皁薰蕕無辨涇渭不分二紀于兹莫之能整當今所病方在爵輕設法貴之猶恐不重若又自棄將何勸人聖旨以為試官虛名無損於事臣伏恐陛下思之未熟偶有是言儻或謂之信然臣竊以為過矣夫立國之道惟義與權誘人之方惟名與利名近虛而於教為重利近實而於徳為輕凡所以裁是非立法制者則存乎其義至於參虛實揣輕重並行而不傷迭用而不悖因衆之欲度時之宜消息盈虛使人不倦者則存乎其權專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨故國家之制賞典錫貨財賦秩廩所以彰實也差品列異服章所以飾虛也居上者必明其義達其變相須以為表裏使人日用而不知則為國之權得矣謹按命秩之載于甲令者有職事官焉有散官焉有勲官焉有爵號焉雖以類而分其流有四然其掌務而授俸者唯繫於職事之一官以序才能以位賢徳此所謂施實利而寓之虛名者也其勲散爵號三者所繫大抵止於服色資䕃而已以馭崇貴以甄功勞此所謂假虛名以佐其實利者也虛實交相養故人不瀆賞輕重互相制故國不廢權今之員外試官頗同勲散爵號雖則授無費禄受不占員然而突銛鋒排患難者則以是賞之竭筋力展勤効者又以是酬之其為用也可謂重矣今或捧𤓰一器挈果一盛亦授試官以酬所獻則彼突銛鋒而竭筋力者必相謂曰吾以忘軀命而獲官此以進𤓰果而獲官是乃國家以吾之軀命同於𤓰果矣𤓰果草木也視人如草木誰復為用哉且員外試官無俸禄之資無攝管之柄無見敬之貴無免役之優唯假空名以籠浮俗浮俗所以若存若亡而未甚猒棄者徒以上之所惜耳今陛下若又輕用之以為無損於事人寤斯旨復何賴焉後之立功曷用為賞陛下若欲賞之以職事則官員有限而勲伐無窮固不勝其用矣陛下若欲賞之以貨財則人力已殫而帑藏皆匱固不充其費矣既未有實利以敦勸又不重虛名而濫施人無藉焉何以為國且植𤓰樹果多是野人貧者所資唯在衣食假以冗號亦奚用焉必欲使之歡欣不如厚賞錢帛人不失利國不失權各得所宜兩全其寶何有不可顧傷大猷願留睿思更少詳度謹奏翰苑集巻十四欽定四庫全書翰苑集巻十五唐陸䞇撰奏草五興元論解姜公輔狀右欽漵奉宣聖旨縁唐安公主喪亡不可向此間遷厝權令造一塔安置待收復京城即擬將歸以禮葬送所造塔役功費用亦甚微小都不合是宰相所論之事姜公輔忽有表奏都無道理但欲指朕過失擬自取名朕本拔擢將為腹心今却如此豈不負朕至深卿宜商量如何穩便者公輔頃在翰林與臣久同職任臣今據理辨直則渉於私黨之嫌希旨順承則違於匡輔之義渉嫌止貽於身患違義實玷於君恩徇身忘君臣之耻也别嫌奬義主之明也臣今不敢冒行所恥亦賴陛下明聖而鑒焉古語有之順旨者愛所由来逆意者惡所從至故人臣皆争順旨而避逆意非忘家為國捐身成君者誰能犯顔色觸忌諱建一言開一説哉是以哲后興王知其若此求諫如不及納善如轉圜諒直者嘉之訐犯者義之愚淺者恕之狂誕者容之仍慮驕汰之易滋而忠實之不聞也於是置敢諫之鼓植告善之旌懸戒慎之鞀立司過之士猶懼其未也又設官制以言為常由是有史為書瞽為詩工誦箴諫大夫規誨士傳言庶人謗尚恐其怠也每嵗孟春遒人以木鐸徇于路而振警之官師相規工執藝事以諫其或不恭邦有常刑然非明智不能招直言非聖徳不能求過行招直則其智彌大求過則其徳彌光唯衰亂之朝闇惑之主則必諱其過行忿其直言以阿䛕為納忠以諫爭為揚惡怨讟溢於下國而耳不欲聞腥徳達於上天而心不求寤迨乎顛覆猶未知非情之昬迷乃至於是故明者廣納以成德闇者獨用而敗身成敗之途千古相襲與敗同轍者罔不覆與成同軌者罔不昌以陛下日月之明江海之量自當矯夏癸殷辛拒諫飾非之慝協大禹成湯拜言改過之誠矧又時運方屯物情猶鬱乃是陛下握髮吐哺之日宵衣旰食之辰士無賢愚咸宜錄用言無大小皆務招延固不可復有忤逆之嫌甘辛之忌也夫君人者以衆智為智以衆心為心恒恐一夫不盡其情一事不得其理孜孜訪納唯善是求豈但從諫不咈而已哉乃至求謗言聽輿誦葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隠必達今公輔官在諫議任居宰衡獻替彌綸乃其職分比於芻蕘葑菲豈不優而且重哉此理之常奚足怪也縱使引喻非當不猶愈於輿誦乎矯激過深不猶愈於謗言乎晉文聽輿人之誦而霸業興虞舜設誹謗之木而帝徳廣斯實聖賢之髙躅陛下何疾焉聖旨又以造塔役費微小非宰臣所論之事下臣愚戅竊謂不然當問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪夫小者大之漸微者著之萌故君子慎初聖人存戒知幾者所貴乎不逺而復制理者必在於未亂之前本立輔臣置之左右朝夕納誨意在防微微而弼之乃其職也涓涓不遏終變桑田燄燄靡除卒燎原野流煽巳甚禍災已成雖欲救之固無及矣書曰不矜細行終累大德易曰小人以小善為无益而不為也以小惡為无傷而不去也故惡積而不可掩罪大而不可解然則小之不可不慎也如此陛下安得使之勿論乎虞書載咎繇之言曰兢兢業業一日二日萬幾兢兢慎也業業危也幾者動之微也唐虞之際主聖臣賢庶績咸熈萬邦已協而猶上下相戒既慎且危慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎舜之為君始作漆器羣臣固爭咸謂非宜漆器之為用也甚堅其為費也盖寡然猶相繼諷諫者豈不欲杜其漸而慎其初歟是知君臣之間義同一體事罔大小相須而成故舜命其臣曰作朕股肱耳目夫股肱之奉元首不以煩細而闕於運行耳目之助心靈不以么微而廢於視聽是以臣子之於君父也盡其敬而敬焉盡其愛而愛焉敬則願及於尊榮愛則懼陷於過惡萬邦黎獻莫不皆然而況位列朝廷任當輔弼主辱與辱主安與安此而不言誰復言者禮曰近而不諫則尸利也若宰相者可謂近矣事或乖誤得無諫乎武丁賢君也傅說賢相也而武丁引金作礪以命其相說諭木從繩以戒其君是則輔弼之任匡救攸屬巨細之事悉宜盡規陛下所言役費微小非宰相所論之事又謂指朕過失擬自取名此誠異乎愚臣之所聞是以願披肺腸而不敢自黙者也若以諫爭為指過則剖心之主不宜見罪於哲王若以諫爭為取名則匪躬之臣不應垂訓于聖典獻替列職竟使奚為左右有人復將焉用臣竊謂指過以示直固不如改過以見稱進諫以取名固不如納諫之為美假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩已過而過彌著損彼名而名益彰果而行之所失大矣一獲一失可不慎乎伏願嘉忤旨之忠袪逆耳之吝平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠謹奏又荅論姜公輔狀右欽漵奉宣聖旨省卿所奏公輔事宜雖甚知卿盡忠然似未㑹朕意朕意以公輔才行共宰相都不相當在奉天時早欲停罷後因公輔辭退朕已對面許訖尋屬懐光背叛遂且因循容到山南公輔知朕必擬移改所以固論造塔事賣直取名據此用心豈是良善朕所以惆悵者秖緣如此卿今疑朕不能納諫殊乖本意者臣以戅執務在朴忠推理而言有懐必盡睿意元妙非凡所窺如臣懵昧之材且無希伺之志奏報失旨宜其固然所冀録微欵而矜至愚實天下幸甚古人有言曰明主者可以理奪又曰主聖則臣直今陛下禀天縱之才備明聖之資臣若抱理莫伸守直不固上虧至化罪莫大焉輒復據直道而理其前言惟陛下留意幸察臣竊以領覽萬幾必先虛其心鑑鏡羣情必先誠其意盖以心不虚則物或見阻意不誠則人皆可疑阻於物者物亦阻焉疑於人者人亦疑焉萬物阻之兆人疑之將欲感人心致於和平盡物理使無紕繆是猶却行而求及前人也無乃愈踈乎孔子曰不遷怒不億不信豈非懼於肆情逞憾以至于失中違道者哉臣之區區志欲匡輔是以前者奏疏願陛下平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠今陛下以素欲廢罷公輔之心而謂其所行皆非良善則是遷怒而積憤之氣未平也陛下揣公輔知必移改之意而謂其所言皆欲取名則是億不信而逆詐之情未弭也逆詐未弭積憤未平固宜公輔獲戾於蓄疑下臣見尤於乖意謂之至當則或不然夫臣之獻言以助理也君之求諫以弼違也言茍助理何必以人而廢言諫茍弼違何必責意而拒諫若彼言無足用意雖善而奚為諫有可從人雖咎而寜捨古先聖王所以採葑菲詢芻蕘傳謗言用仇怨急於聽納乃至於斯其意無他惟義所在願陛下不以憎嫌而遺其片善不務精察而謂之大明忠言者利於行而咈於情唯計慮至熟乃能無忤幸紆宸鑒更審所宜謹奏興元論請優奬曲環所領將士狀右曲環所領一軍悉是朱泚部曲或頃在鳳翔所管或本從河朔同来後因汴宋用兵權抽赴彼應援所以行營將士猶舉幽隴為名今之元兇乃其舊帥岐下則楚琳助亂薊門則朱滔黨姦獨此偏師漂然河上其營幕則寄于他土其家屬則陷于匪人又屬汴路姦虞浚城陷覆糧餉屢絶資裝久殫士卒常情固難安處是宜潰歸舊營否則散適樂郊而曲環撫之悉無離叛孤軍自守亦不茍從處危能安聞難輒赴甚推齊肅累著功勲近日將帥之中罕有如環之比考其才節絶有過人但縁羇寓多時窮匱轉甚繼陳章奏言及酸辛告急朝廷則力未能救求哀郡府則人莫見憂覽其辭情可為流涕若失於應接則終以危亡良將義徒實在深惜願陛下不以常人遇之不以常事遣之方今勢可相資惟有江左完實恐須宻勅韓滉切令贍恤此軍器甲衣糧咸使周足因賜劉洽手詔亦委加意保持若得自存必有成績非艱難無以表特操非英聖不能全異才有功見知人必恱勸臣不勝區區為國奬善拯危之意謹啟事以聞謹奏興元論解蕭復狀右欽漵齎蕭復表示臣兼奉宣聖旨朕比縁李懐光兇狂權且就此迴避山南既與京畿接近指麾兵馬日望收城今蕭復勸朕令幸江陵表狀之中張皇頗甚朕不㑹其意昨問從一從一亦甚驚怪不知事由蕭復奏事官李充朕適喚對共語亦似不是純良此人莫是李承昭家子弟否卿宜審看蕭復表中意趣斟酌奏来者臣伏覩其表兼揣其情盖以逺路傳聞事多失實大臣獻納務且竭誠雖有過當之虞失中之䇿但宜勿用不足為尤何則駐蹕奉天屯難已甚況又不駐艱危可知蕭復備位樞衡奉使宣撫忽聞變故寜免驚憂梁岷之間窮隘特甚輦輓攸止資奉實難凡在戀主之誠各懐徯后之志是以延賞奉迎於西蜀韓滉望幸於東吳此乃臣子之常情古今之通理蕭復所請亦類於斯事雖非宜意則可恕李充頃任御史臣嘗與之同寮其人是故福建觀察使李椅之男與承昭房從已逺才頗通敏性亦温恭宗族之中足稱佳器伏願更廣詢訪方驗臣言不誣謹奏又答論蕭復狀右欽漵奉宣聖旨卿所奏蕭復事朕已具悉假使更無别意終是不識事宜今巡行諸道轉恐事多乖失縁孟皥年老今欲除蕭復為福建觀察使便令赴任去就亦應得所卿意以為何如者伏以將相之任所委皆崇中外迭居亦是常理然君臣有禮進退不可以不全理體有宜本末不可以不稱頃盗興都邑駕適郊畿陛下悔征賦之殷繁念黎元之困悴誕降慈旨深示憫傷特遣大臣普詢疾苦本期還報將議優蠲衆情顒顒日望上達今若未終前命遽授逺藩則是膏澤將布而復收渙汗已發而中廢事既失望人何以觀斯乃進退之禮不全本末之宜不稱謂為得所臣實疑之儻慮處事乖方不欲淹留在外則當諭以詔旨促其歸程逺郡巡歷未周但令副介分往待其復命親訪物情革弊垂恩用符徳號使務既畢能否益彰徐擇所宜以圗進退庶於事體允得厥中謹奏興元論續從賊中赴行在官等狀右欽漵奉宣聖旨近日往往有卑官從山北来皆稱自京城偷路奔赴行在大都此軰多非良善有一邢建論說賊中體勢語最張皇察其事情頗是窺覘今且令留在一處安置如此之類更有數人若不根尋恐有姦計卿宜商量如何穩便者臣伏以任緫百揆者與一職之守不同富有萬國者與百揆之體復異盖尊領其要卑主其詳尊尚恢𢎞卑務近細是以練覈小事糺察微姦此有司之守也維御萬樞選建庶長緫綱而衆目咸舉明邇而羣方自通此大臣之任也愚智兼納洪纎靡遺盖之如天容之如地垂旒黈纊而黜其聦察匿瑕藏疾而務於包含不示威而人畏之如雷霆不用明而人仰之如日月此天子之徳也以卑而僭用尊道則職廢于下以尊而降代卑職則徳喪于上職廢則事不舉徳喪則人不歸事不舉者弊雖切而患輕人不歸者釁似微而禍重兹道得失所闗興亡聖王知宇宙之大不可以耳目周故清其無為之心而觀物之自為也知億兆之多不可以智力勝故壹其至誠之意而感人之不誠也異於是者乃以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺故宣尼述陶唐之盛曰惟天為大惟堯則之周詩美文王之德曰不識不知順帝之則是皆覆育萬物渾然大同無好無惡不忌不克之謂也項籍納秦降卒二十萬慮其懐詐復叛一舉而盡坑之其於防虞亦已甚矣漢髙豁達大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴衞雄猜而荆軻奮其隂計光武寬容博厚而馬援輸其款誠豈不以虛懐待人人亦思附任數御物物終不親情思附則感而恱之雖宼讎化為心膂有矣意不親則懼而阻之雖骨肉結為仇慝有矣臣故曰兹道得失所闗興亡伏惟陛下睿哲文思光被四表孝友勤儉行髙百王然猶化未大同俗未至理者良以智出庶物有輕待人臣之心思周萬幾有獨馭區㝢之意謀吞衆略有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勲業者懼於不容懐反側者迫于攻討馴致離叛搆成禍災兵連于外變起于内嵗律未半乗輿再遷國家艱屯古未嘗有以陛下至聖之德而遘兹殷憂之期天其或者欲大啟睿心儆小失而崇丕業耳臣謂陛下當奉若天意追咎已然凡所致寇之由悉已詳知其故將革前弊以消羣疑今承徳音尚襲流誤若未悔禍何由弭災臣獲蒙過知又辱下問若務順旨是為欺天庸敢指陳庶裨闕漏往嵗初奮師旅四征不庭義烈之徒人思自効捨逆歸款者繼獻于闕下陳謀諫失者争詣于禁門陛下能於此時乗軍氣之方雄因人心之願盡輟沐吐哺虛􅁭坦懐海納風行不疑不滯功者報之義者旌之直者奬之才者任之其或有志而無補於時敢言而不當其理亦必恕其妄作録其善心率皆優容以禮進退如此則海内風靡翕然歸心賢愚咸懐小大畢力蕞爾凶醜曾何足平臣固知久已理安必無奉天之幸矣其所以孕禍胎而索義氣者在乎獨斷宸慮專任睿明降附者意其窺覦輸誠者謂其遊說論官軍撓敗者猜其挾姦毁沮陳兇黨强狡者疑其為賊張皇獻計者防其漏言進諫者憚其宣謗凡此之類悉貽聖憂咸使拘留謂之安置或詰責而寘於客省或勞慰而延于紫庭雖呵奬頗異其辭然於圏閑一也既杜出入勢同狴牢解釋無期死生莫測守䕶且峻家私不通一遭縶維動歴年嵗想其痛憤何可勝言由是歸化漸稀而上封殆絶矣徇義之心既阻脅從之黨彌堅而貴近之臣往来之使希望風旨詭辭取容唯揣樂聞不憂失實咸言聖謀深逺策略如神小寇孤危滅亡無日陛下急於誅惡皆謂其事信然窮兵竭財坐待平一人心轉潰寇亂愈滋遂至轂下生戎宫闈不守儻陛下能於此際遽敷大號謝過萬方敘忠良見忌之冤而舉其尤鯁亮者加之厚秩糾阿䛕不實之罪而數其極姦妄者處之大刑賞罰既明忠邪畢辨以此臨下誰敢不誠以此懐人何有不服過而能改亂亦遄安臣固知尋復京師必無梁岷之遊矣陛下既闕慎于始又失圖于中收之西隅唯在兹日豈可復使一事紕繆一言過差哉今賊泚未平懐光繼叛都邑城闕猰㺄迭居闗輔郊畿豺狼雜處朝廷僻介于逺郡道路縁歷於連山杖策從君其能有幾推心降接猶恐未多稍不禮焉固不来矣若又就加猜劾且復囚拘使反者得辭来者懐懼則天下有心之士安敢復言忠義哉卵胎不傷麟鳳方至魚鼈咸若龜龍乃遊盖恱近者来逺之資懐小者致大之術也竊料邢建等軰必非助逆之徒假如過有張皇跡渉疑似亦望矜愚惜體屈法裕人並量器能隨事甄貸武者措之於戎伍文者付之於宰司大則授以職員次但優其選序必有須離行在難處親軍則或除諸道一官或委諸使録用就其常分各稍加恩古人有言撫我則后虐我則讎惠澤所及謳歌乃歸流聞四方孰不欣戴昔趙殺鳴犢聖人輟行燕尊郭隗賢士繼往況乎天子所作天下式瞻一言阻物則天下莫不自疑一事恤人則天下莫不同恱固不可以小失為無損而不悔亦不可以小善為無益而不行小猶慎之矧又非小願陛下惟事無大小皆以覆車之轍為戒實宗社無疆之休謹奏翰苑集巻十五欽定四庫全書翰苑集巻十六唐陸贄撰奏草六興元賀吐蕃尚結贊抽軍迴歸狀右欽漵奉宣聖旨適得渾瑊奏比日尚結贊頻使人計㑹擬自領兵馬尅期同收京城縁春来蕃軍多有疾疫近得探報尚結贊等並抽兵退歸不知逺近朕意縁吐蕃士馬强盛又以和好之義自請將兵助國討賊朝夕望其成功今忽抽軍退歸甚失準擬渾瑊李晟等諸軍兵馬並不至絶多若無蕃軍應援深慮被賊衝突卿試料量事勢如何者臣質性孱昧不習兵機但以人情揆之時亦偶有所得自承此旨欣賀實深竊謂蕃戎退歸乃是社稷遐福昨日已附欽漵口奏訖伏恐未盡愚款尚勞聖憂謹附披陳庶解疑結彼吐蕃者犬羊同類狐鼠為心貪而多防狡而無恥威之不格撫之不懐雖或時有盛衰大抵常為邉患隂詐難御特甚諸夷陛下但舉建中已来近事準之則戎心難知固可明矣頃者方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求寖多翻覆靡定託因細事嘖有煩言首尾凡歷四年要約竟未堅決立碑纔畢復請改移猜矯多端於斯可驗逮至盗驚都邑駕幸郊畿結贊緫戎在邉因請將兵赴難陛下推誠允納厚賂招徠逗留持疑竟不時進無濟討除之用但攜將帥之心懐光遽至猖狂頗亦由兹促禍及皇輿再駕移蹕漢中陛下猶望蕃兵以寜内難親倚之情彌厚屈就之事亦多豺狼野心曾不知感翻受朱泚信使意在觀變推移頻與諸軍尅期至時皆不赴㑹致令羣帥進退憂虞欲捨之獨前則慮其懐怨乗躡欲待之合勢則苦其失信稽延既姦且驕曷望成績非唯變態難測且又妨擾實深戎若未歸宼終不滅臣請復為陛下根本其説則人情物理昭然皆可得而察焉向者謀誘蕃兵本是使臣失䇿陛下急於戡亂嘉彼効誠唯恐後時不暇詳議遽降優詔促令進軍逺近聞之莫不危駭將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺之擒百姓畏蕃戎之来有財必盡為所掠是以順於王化者其心不得不怠陷於寇境者其勢不得不堅怠我之師堅宼之衆戎心變詐復未可量以此益兵但招其損耳以此靖國適資其亂耳抑昨蕃戎未退臣又竊有過憂流聞結贊好謀恐其潛蓄姦計儻或幸朝廷播越之際乗賊泚窮蹙之時輕犯近郊若升虛邑耀兵牧馬不却不前外奉國家内通兇逆兩持誘脅之勢俱納贈遺之資旁觀戰爭坐乗衰弊如此則王師不得伐叛烝黎不得寜居賊必耗亡我亦困竭京甸所有勢無孑遺千里丘墟得將安用是乃戎有萬全之利我有不測之危臣所以痛心傷神晝驚夕惕者慮其意及於此也所賴天奪其魄神降之災覩機若瞑遘厲自遁實昊穹悔禍之應列聖垂祐之期廓清妖氛慶必非逺何以知其然也自賊泚之亂始於暴兵因徵役之繁興乗衞禁之闕備誘扇羣慝遂謀大姦逆天僭君躬肆攻逼凡有血氣皆知惋嗟矧伊忠良孰不痛憤獨惡無與何能乆存加以聖徳日新改過不吝布革弊之詔𢎞恤隠之懐天下黎元翕然遷善易心改觀厭亂思安和風既揚昏祲自斂蠢兹狂悖久合殱夷頃屬懐光昏迷緩師養宼吐蕃干撓生事惑人故使義士無施厲階猶梗今懐光别保蒲絳吐蕃逺避封疆形勢既分腹背無患瑊晟諸帥才力得伸又各士馬非多資糧向竭若不降賊即須建功此軰寵任巳崇貴位已極建功則寵増而位固降賊則名辱而身危況賊之兇愚滅亡可必賊之孤劣翦撲非難孰肯捨固而就危違寵而從辱棄垂成之業臣將滅之虜哉既牽於利害之情理不同惡又迫於單乏之急勢難久居勢理相驅安能無戰渾瑊統戴休顔韓遊瓌乗其西北李晟率駱元光尚可孤攻其東南同病相資自當合力但願陛下慎於撫接以奮起忠勇之心勤於砥礪以昭蘇逺近之望中興大業旬月可期不宜尚眷眷於犬羊之羣以失將士之情也臣愚不任懇悃之至輒以私懐忖度謹冒昧以聞謹奏興元奏請許渾瑊李晟等諸軍兵馬自取機便狀右欽漵奉宣聖旨省卿所奏蕃軍退歸及闗中體勢理皆切當甚慰朕懐然渾瑊李晟等諸軍須有商量規畫令其進取朕見欲遣使宣慰卿宜審細條疏速奏来者臣聞將貴專謀兵以竒勝軍機遙制則失變戎帥稟命則不威是以古之賢君選將而任分之於閫誓莫干也授之以鉞俾專斷也夫然故軍敗則死衆戰勝則策勲不用刑而師律貞不勞慮而武功立其於委任之體豈不博大哉其於責成之利豈不精覈哉自昔帝王之所以夷大艱成大業者由此道也其或疑於委任以制斷由已為大權昧於責成以指麾順旨為良將鋒鏑交於原野而決策於九重之中機㑹變於斯須而定計於千里之外違令則失順從令則失宜失順則挫君之嚴失宜則敗君之衆用捨相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷哉其於經綸之術豈不都謬哉自昔帝王之所以長亂繁刑喪師蹙國者由此道也兹道得失兵家大樞當今事宜所繫尤切盖以宼盗充斥乗輿播遷人心有觀變之揺王室無自固之重秦梁迴繚千里迢遥臨之以威則力勢不制授之以策則阻逺不精頃者驟降詔書教諭羣帥事無大小悉為規裁及乎章表陳誠使臣復命進退遲速率乖聖謀豈皆樂於違忤哉亦由傳聞與指實不同懸算與臨事有異故也設使其中或有肆情干命者陛下能於此時戮其違詔之罪乎臣竊恐未能也陛下復能奪其兵而易其將帥乎臣亦恐未能也是則違命者既不果行罰從命者又未必合宜徒費空言秖勞睿慮匪唯無益其損實多何則時方艱屯下陵上替凡在執干戈而衞社稷者皆自謂勲業由已義烈發心安於專行病於羈制陛下宜俯徇斯意因而委之遂其所安䕶其所病敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿闗言所賜詔書務從簡要慎其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而衆服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懐將自効忠兵自樂戰與夫迫於驅制不得已而從之者志氣何啻百倍哉夫君上之權特異臣下者唯不自用乃能用人其要在順於物情其契在通於時變今之要契頗具於兹儻蒙究思或有可取謹奏興元請撫循李楚琳狀右件官比縁性行無良多為時議所惡頻被封章論奏言其心挾兩端若不隄防恐妄生窺伺謂宜斥絶用杜姦邪近者鳳翔使来絶不蒙恩召見滯留數軰並未放還伏恐陛下不忍忿心頗從輿議以臣惷戅竊謂非宜李楚琳乗時艱危俶擾岐下賊殺戎帥款結兇渠奉天之圍頗亦有助其於叛亂海内彰聞論者今始紛紜一何知見之晚耶但以乘輿未復大憝猶存勤王之師悉在畿内急宣速告晷刻是争商嶺則道迂且遥雒谷復為盗所扼僅通王命唯在襃斜此路若又阻艱南北遂將夐絶以諸鎮危疑之勢居二逆誘脅之中洶洶羣情各懐向背賊勝則往我勝則来其間事機不容差跌儻或楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不甚病哉且楚琳本懐惟惡是務今能兩端顧望乃是天誘其衷故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其持疑便足集事儻能遷善亦可濟師今若徇褊狹之談露猜阻之跡懼者甚衆豈唯一夫自昔能建竒功或拯危厄未必皆是潔矩之士温良之徒驅駕擾馴唯在所馭朝稱兇悖夕謂忠純始為寇讎終作卿相知陳平無行而不棄忿韓信自王而遂封蒯通以折理獲全雍齒以積恨先賞此漢祖所以恢帝業也置射鈎之賊而任其才釋斬袪之怨以免於難此桓文所以𢎞霸功也然則當事之要雖罪惡不得不容適時之宜雖仇讎不得不用陛下必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又況阻命之軰脅從之流自知負恩安敢歸化斯釁非小所宜速圗孔子曰人而不仁疾之已甚亂也又曰小不忍則亂大謀君陳曰無忿疾于頑又曰必有忍其乃有濟伏願陛下必以英主大略聖人格言為元龜固不可納豎儒小忠以虧撓興復之業也臣不勝憂國至計謹啓事以聞謹奏興元論中官及朝官賜名定難功臣狀右欽漵奉宣聖旨比在奉天將士並賜名定難功臣今宰臣等商量扈從中官辛苦至甚亦合依例並賜此名朕以南衙朝士之中有經奉天重圍又似卿等昨者奔赴行在渉厯危險亦極艱難今不問中官朝官但經重圍又到山南者並擬賜名定難功臣卿宜商量豈不穩便者陛下惠霑􅉏御仁洽庶寮念隨難之憂危恤從巡之勞苦議増寵飾將錫嘉名事雖未行意則已就凡在貴近固知銜恩睿旨淹詳復詢庸賤惟精惟慎允謂防微顧省何知屬當下問臣若自貪榮號傍懼怨憎因循順成不極所見心且知負如天鑒何是以不揆言之淺深不計身之利害但輸狂直唯聖所裁臣聞賞以懋庸名以彰行賞乖其庸則忠實之効廢名浮於行則瀆冒之弊興一足以撓國權一足以亂風俗授受之際豈容易哉頃以駐蹕奉天迫於患難竟攘兇逆實賴武人遂旌定難之勲特賜功臣之目名頗符實事亦㑹時所霑雖多誰曰非允至如宫闈近侍班列具臣雖奔走恪居各循厥職而驅除翦伐諒匪所任又屬皇輿再遷天禍未悔見危無補曷謂功臣致宼方深孰云定難縱使遭罹圍逼跋履﨑嶇難則當之定將安據勞或有矣功其謂何大凡有生之倫莫不各親其類賤彼貴我抑惟常情黜異奬同亦是常性臣忝搢紳之列又當受賜之科竊自校量猶知不可而況於公議乎況於介胄之士乎人之多言靡所不至必謂陛下溺愛近習故徇其茍得之情汎該羣司以分其私昵之謗怨不在大釁皆自微必將沮戰士激勵之心結勲臣憤恨之氣所恱者寡所愠者多所與者虛名所失者實事所恱者臣下之夸志所病者國家之大猷利害皎然不為難辨且名者衆之所評也是曰公器亦為爭端覈之至精猶患相軋處或乖當安能勿踰以漢髙之制服雄豪太宗之削平區㝢天下既定乃論功勲有蕭曹之殊庸有房杜之碩畫戰守經略倬乎殊倫猶謂豐沛故人刀筆文吏諸將不服頗相訐揚乃至攘袂指天拔劒擊柱偶語謀反諠譁訟冤矧今國歩猶艱王化未洽方資武力以殄寇讎盖非恩倖競進之時文儒角逐之日當功而奬尚恐未孚奬又非功固宜見誚儻有節效尤著理當襃崇賞典甚多何必在此其餘别無績用例徇驅馳且俟賊平甄録非晚謹奏興元論賜渾瑊詔書為取散失内人等議狀右徳亮承旨幷録先所散失内人名字令臣撰詔書以賜渾瑊遣於奉天尋訪以得為限仍量與資裝速送赴行在者頃以理道乖錯禍亂荐鍾陛下思咎懼災裕人罪已屢降大號誓將更新天下之人垂涕相賀懲忿釋怨煦仁戴明畢力同心共平多難止土崩於絶岸收板蕩於横流殄寇清都不失舊物實由陛下至誠動於天地深悔感於神人故得百靈降康兆庶歸徳茍不如此自古嘗有擲棄宫闕失守宗祧繼逆於赴難之師再遷於蒙塵之日不踰半嵗而復興大業者乎今渠魁始平法駕將返近自郊甸逺周寰瀛百役疲瘵之甿重傷殘廢之卒皆忍死扶病傾耳竦肩想聞徳聲翹望聖澤陛下固當感上天悔禍之眷荷烈祖垂裕之休念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復言為急損之又損尚懼汰侈之易滋艱之惟艱猶患戒慎之難久謀始盡善克終巳稀始而不謀終則何有夫以内人為號盖是中壼末流天子之尊富有宫掖如此等軰固繁有徒但恐傷多豈憂乏使翦除元惡曽未浹辰奔賀往来道路如織何必自虧君徳首訪婦人又令資裝速赴行在萬目閱視衆口流傳恐非所以答慶賴之心副維新之望也夫事有先後義有重輕重者宜務之於先輕者宜措之於後故武王克殷有未及下車而為之者有下車而為之者盖美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠宜速遣大臣馳傳先往迎復神主修整郊壇展禋享之儀申告謝之意然後弔恤死義慰犒有功綏輯烝黎優問耆耊安定反側寬宥脅從宣暢鬱堙褒奬忠直官失職之士復廢業之人是皆宜先不可後也至如崇飾服器繕緝殿臺備耳目之娛選巾􅌨之侍是皆宜後不可先也宜後而先則為君之道喪宜先而後則理國之義差古之興王必慎於此陛下將務興復又安可不慎乎且散失内人已經累月既當離亂之際必為將卒所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因寇亂喪亡頗有大於此者一聞捜索懐懼必多餘孽尚繁羣情未一因而善撫猶恐危疑若又懼之于何不有昔人所以掩絶纓而飲盗馬者豈必忘其情愛耶盖知為君之體然也以小妨大明者不為天下固多美人何必獨在於此易曰危者安其位者也亂者有其理者也故君子安不忘危理不忘亂是以身安而國家可保也春秋傳曰或多難以固其國或無難以喪其邦誠以處危則思安之情切遭亂則求理之志深切於思安深於求理國之固也不亦宜乎及夫居安而驕恃理而怠驕則縱肆其奢欲怠則厭惡於忠言奢欲日行忠言日梗國之喪也不亦宜乎昔衞獻出奔久而復國大夫迎於境者執其手而與之言迎于門者頷之而已言其驕怠之易生也齊桓將圗霸功管仲戒之以無忘在莒懼其情志之易變也今臣亦願陛下企思危固國如不及懲忘亂喪國如探湯以在莒為書紳之規以衰衞為覆車之鑒則徳為帝範理致時雍與夫貪逸欲而踐禍機其利害亦云逺矣所令撰賜渾瑊詔未敢承旨伏惟聖裁謹奏鑾駕將還宫闕論發日狀右先頒勅旨已定行期所司供承亦聞粗備但以霖潦方甚道路阻艱衆情同憂莫敢論奏今發日漸逼隂雲尚繁小大嗷嗷愁懼轉甚臣雖闇鈍亦竊揣量豈不知元惡初平餘氛未殄乃是逆順將分之際吉凶多變之時須速鎮安理宜促駕向使霖潦為害人功可施其備禦由於智能其役用止於煩費其所患不及於性命其可憂但在於人臣則當公私罄財上下竭力務寜大業奚恤暫勞各應叶奉聖規安敢復忤成命良以襃斜峻阻素號畏途縁側逕於巔巖綴危棧於絶壁或百里之内歷險且千或一程之中渉水數四若遇積雨滯浸羣峰澍流巨石崩奔訇殷相繼深谷瀰漫往来不通悉非功力之所支籌略之所遏斯須之頃跬歩之間倉皇遘殃皆不可測匹夫單騎尚且過防況萬乘時行千官景從而可以蹈不存之險冒無禦之災乎如或磴路潨崩閣道淹圮環衞之儀少缺屬車之馬微驚縱有億徒何所為用陛下欲無駭慮其可得乎又或霪滯更深谿澗皆溢逕路既絶傳送無由連山萬重進退不可一日乏食將如之何陛下欲無軫憂固亦難矣人主舉措宜圖萬全必先事以防危不臨危而求幸幸而獲濟貽媿已深不幸罹災追悔何及孔子曰欲速則不達誠哉是言臣今非敢阻陛下欲速之情但頗以不達為慮耳儻迴睿旨少俟開晴則發期雖延渉路無滯不疾而速允叶乾行知幾其神是謂天鑒竊聞羣議輒以上陳慺慺懇誠實冀昭納謹奏請釋趙貴先罪狀右欽漵奉宣聖旨前者共卿商量趙貴先欲恕其罪朕朝来更問諸將皆云貴先順從朱泚則是逆人合依常刑不可寬捨衆人意既如此應難釋放卿宜知悉者臣愚以為貴先從逆之罪法當不容貴先陷身之由情則可恕陛下所議矜宥原其情也諸將所請誅戮據於法也據法而除君之惡者人臣之常志原情而安衆之危者人主之大權臣主之道既殊通執之方亦異言各有當體各有宜事或相駮而無傷此之謂也往以襄城告急詔命隴右發兵齊映率衆東行貴先即其部將于時軍至昭應適遇駕幸奉天齊映馳歸鳳翔貴先獨主營幕進無總帥退閡亂兵遂為賊泚所招紿以同迎鑾駕泚既反狀未露貴先安得勿從已受邀留遂遭劫制身縻偽職兵隸兇徒雖居賊中亦不見任首末事跡簡在天心臣亦親承徳音非獨聞於傳說其於情狀頗有足矜所可受責之辜唯在不能守莭而死耳貴先儻能守莭即是忠烈之徒固獲襃旌豈資寬捨凡所議讞盖縁獄疑罪疑惟輕實編令典脅從罔理亦載聖謨況復懐光未殱希烈猶熾遭罹誘陷其類寔繁今京邑初平皇猷更始乃是汚俗觀化之日聖王布徳之時所用刑章尤宜審慎一輕一重理亂攸生宥之以恩則自新者咸思歸命斷之以法則懐懼者姑務偷生衆心既偷賊勢愈固不忍一朝之忿而貽累嵗之憂茍循匹夫之談以興億衆之役為計若此夫何利之有焉曩者羯胡亂華染汚士吏肅宗興復累降赦書罪止渠魁餘所不問河朔遺孽既聞徳澤之𢎞被且幸脅汚之見原人人皆自怨尤各悔歸國之晚及乎三司按罪繼用嚴科未降之流復喜得計慶緒將消而再結思明已附而重􅂝浸長厲階至今為梗豈不以任法吏而虧權道小不忍而亂大謀者乎昔漢髙帝既定四方見諸將往往偶語謀反乃問張良曰為之奈何良曰陛下所最恨者為誰帝曰雍齒與我有舊而數窘我良曰今急封雍齒則人人自堅矣帝用良計諸將果安皆云雍齒且侯吾屬何患盖以圗霸王者不牽於常制安反側者㒺念於宿瑕今陛下有漢髙之英貴先無雍齒之釁加戮不足威暴逆矜全可以定危疑明恕而行盛徳斯在何所為慮尚勞依違㣲臣區區上言盖為將来張本凡非首惡皆願從寬庶使負累之徒莫不聞風而化消姦兇誘惑之計開叛亂降附之門此其大機不可失也陛下前意固為善矣伏惟不為浮議所移謹奏論替換李楚琳狀右欽漵奉宣聖旨李楚琳不可久在鳳翔欲候朕到日簡擇一人替楚琳充莭度使楚琳别與一官便隨朕歸京既有迎駕諸軍威勢甚盛因此替換亦是權宜卿宜商量穩便否者臣聞王者有作先懐永圗謀必可傳事必可繼不因利以茍得不乘便而幸成故能上下相安而理可長久也彼楚琳者固是亂人乗國難而肆逞其姦賊邦君而簒居其位按以典法是宜汚瀦既屬多虞不遑致討乃分之以旄鉞又繼之以寵榮逮至南廵頗全外順道途無壅亦有賴焉雖朝命累加盖非獲已然王言一出則不可渝縱闕君臣之恩猶須進退以禮今若因行幸之威勢假迎扈之甲兵易置以歸是同虜執以言乎除亂則不武以言乎務理則不誠禍變繁興為日久矣負釁居位豈唯一人以此時巡後將安入以此撫御誰其感懐昔漢髙偽遊韓信見獲功臣繼叛天下幾危征伐紛紜以至沒代其徼倖之不可也如此陛下得不為至戒哉議者謂之權宜臣又未諭其理夫權之為義取類權衡衡者稱也權者錘也故權在於懸則物之多少可準權施於事則義之輕重不差其趣理也必取重而捨輕其逺禍也必擇輕而避重茍非明哲難盡精微故聖人貴之乃曰可與適道未可與立可與立未可與權言知機之難也今者甫平大亂將復天衢輦路所經首行脅奪易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權以任數為智君上行之必失衆臣下用之必陷身厯代之所以多喪亂而長姦邪由此誤也夫以韓信才略當時莫儔且負嫌猜已遭告訐縱之足以亂區㝢除之可以安國家幸而成擒猶謂失策當時被攻戰之害百代流詭詐之譏況楚琳卒伍凡材厮養賤品因時擾攘得肆猖狂非有陷堅殪敵之雄出竒制勝之略頗同狐鼠乘夜睢盱晨光既升勢自跧縮今郊畿已乂武衞方嚴􅊈隴鎮壓於其西邠涇扼制於其北顧是岐下若居掌中以楚琳瑣劣之資處掌中控握之地縱令蹢躅何惡能為願陛下姑務含𢎞普安反側促駕遄止録功犒勤敷肆眚之恩布維新之令然後徵韋臯楚琳俾入分文武之職擇元勲宿望命出緫岐隴之師則彼承詔欣榮奔走不暇安敢蠆介復勞誅鉏措置得宜萬無一跌何遽過動不為後圖仰希睿聰試更詳慮謹奏收河中後請罷兵狀昨日欽漵奉宣聖旨示臣馬燧渾瑊等奏平懐光收河東狀兼令臣商量須作何處置令欽漵奏来者兇梗殱盪闗畿廓清實聖謀廣運之功亦宗社無疆之祚應須處置大略巳附欽漵口陳展轉傳言恐未盡意謹復薦其固陋願陛下少留察焉臣聞禍或生福福亦生禍喪者得之理得者喪之端故晉勝鄢陵范燮祈死吳克勁越夫差啟殃是知福不可以久徼幸得不可以常覬覦居福而慮禍則其福可保見得而忘喪則其喪必臻臣竊懼諂䛕希旨之徒險躁生事之軰幸兇醜覆亡之㑹揣英主削平之心必將競効甘言誘開利欲謂王師所向莫敵謂餘孽指顧可平請迴蒲坂之戈復起淮沂之役斯議一啟必有亂階故微臣姑以生禍為憂而未敢以獲福為賀也何則建中之難其事可徵始以蓄憾而隘於含容或以亟勝而輕於戰伐故文喜之討涇上之瘡痛未平崇義之征漢南之芟夷繼甚阻命之帥非不誅也伐叛之師非不克也介焉之斷非不堅也赫斯之怒非不逞也然以人不見恤惟戮是聞有辜無辜不敢自保是以抱釁反側者懼鈇鉞之次加畏禍危疑者慮猜譖之旋及遂乃螽結以拒討狼顧以背恩彌兩河而亘淮夷盪三輔而盜京邑鑾輅為之再駕行宫至于合圍于時海内大搖物情幾去天命莫保于寸晷王威不出於一城邦國之杌陧艱屯綿綿聨聨若包桑綴旒幸而不殊者屢矣勢之危窘實足寒心非有曩時熊羆翕習之師雷霆奮發之勢武庫劍㦸之利帑藏財賦之殷其所以施令率人取威定亂比於建中之始豈不至微至殺哉然而陛下懐悔過之深誠降非常之大號知黷武窮兵之長亂知急征重斂之𠞰財知殘人肆欲之取危知違衆率心之稔慝知烝庶困極之興怨知上下鬱堙之失情徳音渙然與之更始所在宣􅆒之際聞者莫不涕流雖或兇獷匪人亦必為之歔欷誠之動物乃至于斯懐梟鴟以好音消祲沴為和氣由是姦囘易慮黎獻歸心假王叛援之夫削偽號以請罪觀釁首鼠之將壹純誠以効勤流亡凍餒者希保於室家屯戍戰爭者冀全其性命徳澤將竭而重霈君臣已絶而更交天下之情翕然一變曩討之而愈叛今釋之而畢来曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任徳而不任兵明矣羣帥之悖臣禮拒天誅圗活而不圗亡又明矣尚恐陛下以臣言之略而未喻也請復循其本而申備之往以河朔青齊同惡相扇擁戎據土易代不庭陛下恥王化之未同忿姦慝之靡格於是發六軍神策河陽河東澤潞朔方之騎士以徂征于北命永平汴宋幽隴江淮閩嶺之將卒以奮伐于南罄國家廩帑以贍軍悉公私廐牧以張武算斂周於萬類徵徭被於八荒勞已甚矣威亦盛矣既而曠日綿嵗老師費財兩河之寇患有加無瘳而邦本已始覆矣洎涇卒倡亂泚戎構災豺狼整居於禁闈䝟㺄擇肉於馳道河朔問罪之衆布路而歸宋郊仗順之師守壘不暇于斯之亂海内沸騰儻有問鼎之雄圗滔天之巨猾幸災乗間何所不為既而恱納之儔咸自斂縮内無非望之議外無軼境之侵及聞天澤滌瑕制書復爵曾不蔕芥望風款降爭馳表章唯恐居後跡其素志於此可知是皆假兵救怨之流戀主偷安之軰懐生畏死蠢動之大情慮危求安品物之常性有天下而子百姓者以天下之欲為欲以百姓之心為心固當遂其所懐去其所畏給其所求使家家自寜人人自遂家茍寜矣國亦固焉人茍遂矣君亦泰焉是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地而求此之乆生也從古及今未之有焉措彼於危地而求此之乆安也從古及今亦未之有焉是以昔之聖王知生者人之所樂而已亦樂之故與人同其生則上下之樂兼得矣聖王知安者人之所利而已亦利之故與人共其安則公私之利兩全矣其有反易常理昏迷不恭則當外察其倔强之由内省於撫馭之失修近以来逺檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苗格孔子曰逺人不服則修文徳以来之既来之則安之此其證也如或昧於懐柔務在攻取不徵教化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而曝之原野輕人如草芥而𠞰之銛鋒叛者不賔則命致討討者不克則將議刑是使負釁者懼必死之誅奉辭者慮無功之責編甿以困於杼軸而思變士卒以憚於死喪而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寜普天致擾兵拏禍結變起百端故孔子曰逺人不服而不能来也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内矣此盖必然之常理至當之格言足以為明鑑元龜貫百王而不易者也事乃反覆得無懼乎夫理有必然則殊途歸於同轍言有至當則異代應如合符頃以東北孽徒職貢廢闕陛下忿其違命大舉甲兵至令逆泚誘姦乗釁而動所備之寇猶逺介於河山不虞之戎巳竊發于都輦蕭牆之戒不其信歟前典垂訓既如彼近事明驗又如此所以徳音敘哀痛之情悔征伐之事引衆慝以咎已布明信以示人既往之失畢懲莫大之辜咸宥約之以省賦誓之以息兵由是億兆汙人四三叛帥感陛下自新之旨悅陛下盛徳之言革面易辭具修臣禮其於深言宻議固亦未盡坦然必當聚黨而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興自京邑厎寜乗輿旋返屬懐光繼亂天討又行息兵之言我則未復山東羣帥所以未敢生辭者盖為河中之地宻近王城迫於朝夕之虞不得不翦除之爾今若改轅移斾復指淮西則淮西元兇必將誑脅其同惡之徒間説於新附之帥謂之曰奉天息兵之旨乃因窘急而言朝廷稍安必復誅伐是以朱泚滅而懐光戮懐光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懐宿負者能不為之動心哉心既動則盈其喪身覆族之憂憂既盈則慮以脣亡齒寒之病夫病同者雖胡越而相愍憂同者不邀結而自親河朔青齊固當響應建中之禍勢必重興以國家再造之初當羣孽息肩之後迭来鳴吠或肆奔衝討之則我力未遑縱之乃寇患斯甚臣愚竊以為禍非細未審陛下何方以待之若有其方侮之可也如其未有願陛下勿輕易焉凡將圗終必在慎始禍機一發難可復追臣請粗陳當今維馭之所宜唯聖主省擇萬一夫君之大柄在惠與威二者兼行廢一不可惠而罔威則不畏威而罔惠則不懐茍知夫惠之可懐而廢其取威之具則所敷之惠適足以示弱也其何懐之有焉茍知夫威之可畏而遺其施惠之徳則所作之威適足以召敵也其何畏之有焉故善為國者宣惠以養威蓄威以尊惠威而能養則不挫惠而見尊則有恩是以惠與威交相畜也威與惠互相行也人主之欲柔逺人而服强暴不明斯術之要莫之得焉今皇運中興天禍將悔以逆泚之偷居上國以懐光之竊保中畿嵗未再周相次梟殄實衆慝驚心之日羣生改觀之時威則已行惠猶未洽誠宜上副天眷下收物情布恤人之惠以濟威乗滅賊之威以行惠宥河中染汚之黨悉無所問赦淮右僭逆之罪咸與惟新蠲貸疲甿休罷戰士符往嵗息兵之令以彰信丕大君含垢之徳以布仁俾萬姓皆曰大哉王言又曰一哉王心如是則威不用而畏如神明惠不費而懐如父母凡在危疑懼討者必將曰淮右僭逆之罪且赦矣吾屬何患焉凡在脅從同惡者必將曰河中染汚之黨且宥矣吾屬何疚焉凡在倦苦思安者必將曰吾君有戰勝之師抑而不騁信乎其罷征矣凡在凋殘望理者必將曰吾君有嫉亂之憤忍而不攄信乎其恤隠矣天下之心若此而禍亂不息理道不行者無之臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其潛慮非不追悔也但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自靦於天地之間耳縱未順命斯為獨夫内則無辭以起兵外則無類以求助其計不過厚撫部曲偷容嵗時心雖陸梁勢必不敢陛下但勅諸鎮各守封疆彼既氣奪算窮是乃狴牢之虜不有人禍則當鬼誅朝廷務崇徳以待之臣固知其必不逃於所揣矣古所謂不戰而屈人之兵者斯之謂歟今若不顧機宜復興戎役瀆威而蔑惠捨易而即難是棄明信而務忿心假敵辭而資宼援窮者不暇恤勞者不得居國之安危或未可保此乃成敗理亂之所繫願陛下難之慎之區區上干憂惜在此儻蒙過納狂瞽不疑所行謹當草具招諭之辭詳陳備禦之畫伏俟宣許方敢以聞謹奏翰苑集巻十六欽定四庫全書翰苑集巻十七唐陸贄撰中書奏議一請許臺省長官舉薦屬吏狀今月十七日顧少連延英對廻奉宣密㫖卿先奏令臺省長官各舉屬吏近聞外議云諸司所舉皆有情故兼受賄賂不得實才此法甚非穩便已後除改卿宜並自揀擇不可信任諸司者臣以闇劣謬當大任果速官謗上貽聖憂過䝉恩私曲降慈誨感戴循省寢興不寜縁是密㫖特宣不敢對衆陳謝祇禀成命所宜必行恭惟聖規又合無隱茍有未逹安敢勿言雖知塵煩固不可已夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧偽繁興而貞方之人罕進徇聲華則趨競彌長而沉退之士莫升自非素與交親備詳本末探其志行閲其器能然後守道藏用者可得而知沽名飾貌者不容其偽故孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里舉選之法長吏辟署之制所以明歴試廣旁求敦行能息馳騖也昔周以伯冏為太僕命之曰愼柬乃寮罔以巧言令色便僻側媚其惟吉士是則古之王朝但命其大官而大官得自柬僚屬之明驗也漢朝務求多士其選不唯公府辟召而已又有父任兄任皆得為即選入之初雜居三署臺省有闕即用補之是則古之郎官皆以任舉充選此其明驗也魏晉已後暨于國初採擇庶官多由選部唯髙位重職乃由宰相考庶官之有成効者請而命焉故晉代山濤為吏部尚書中外品員多所啟授宋朝以蔡廓為吏部尚書郎先使人謂宰相徐羨之曰若得行吏部之職則拜不然則否羨之荅云黄散已下悉委蔡廓猶憤恚以為失職遂不之官是則黄門散騎侍郎皆由吏部選授不必朝廷列位盡合柬在台司此其明驗也國朝之制庶官五品已上制勅命之六品已下則並㫖授制勅所命者蓋宰相商議奏可而除拜之也㫖授者蓋吏部銓材署職然後上言詔㫖但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刋未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序倖臣專朝捨僉議而重已權廢公舉而行私惠是使周行庶品茍不出時宰之意者則莫致焉任衆之道益微進善之途漸隘近者毎須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉凌遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熙固亦難矣臣實駑鈍一無所堪猥蒙任使待罪宰相惟懐竊位之懼且乏知人之明自揣庸虚終難上報唯廣求才之路使賢者各以彚征啓至公之門令職司皆得自逹臣當謹守法度考課百官奉揚聦明信賞必罰庶乎人無滯用朝不乏才以此為酬恩之資以此為致理之具爰初受命即以上陳求賢審官粗立綱制凡是百司之長兼副貳等官及兩省供奉之職并因察舉勞効須加奬任者並宰臣叙擬以聞其餘臺省屬僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各於除書之内具標舉授之由示衆以公明章得失得賢則進考増秩失實則奪俸贖金亟得則襃升亟失則黜免非止捜揚下位亦可閲試大官前志所謂逹觀其所舉即此義也自蒙允許即以宣行南宫舉人纔至十數或非臺省舊吏則是使府佐僚累經薦延多歴事任議其資望既不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聦道之難行亦可知矣陛下勤求理道務徇物情因謂舉薦非宜復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖徳之盛者然於委任責成之道聽言考實之方閑邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人愼謀其始既謀其始詳慮其終終始之間事必前定有疑則勿果於用既用則不復有疑待終其謀乃考其事事愆于素者革其弊而黜其人事協于初者賞其人而成其美使受賞者無所與讓見黜者莫得為辭夫如是則茍無其才孰敢當任茍當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實虚受廣納𢎞接下之規明目逹聦廣濟人之道欲知事之得失不可不聽之於言欲辯言之眞虚不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徴行善之跡論人之惡者必明辯為惡之端凡聽其言皆考其實既得其實又察以情既盡其情復稽於衆衆議情實必參相得然後信其説奬其誠如或矯誣亦寘明罰夫如是則言者不壅聽之不勞無浮妄亂教之談無陰邪傷善之説無輕信見欺之失無潛陷不辯之冤此古之聖王聽言考實不出户而知天下之方也陞下既納臣言而用之旋聞横議而止之於臣謀不責成於横議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恒必由之昔齊桓公將啟霸圗問管仲以害霸之事管仲對曰得賢不能任害霸也任賢不能固害霸也固始而不能終害霸也與賢人謀事而與小人議之害霸也所謂小人者不必悉懐險詖故覆邦家蓋以其意性憸邪趣尚狹促以沮議為出衆以自異為不羣趨近利而昧逺圗効小信而傷大道故論語曰言必信行必果硜硜然小人也夫以能信於言能果於行唯以硜硜淺近不克𢎞通宣尼猶謂其小人管仲尚憂其害霸況又有言行難保而恣其非心者乎此皆任不責成言不考實之弊也聖㫖以謂外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閱責謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦贓不加辯詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何賴焉聖㫖又以官長舉人法非穩便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能徧諳多士備閲羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明敭以暗投儻如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不渉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非逺聖鑒明知今又將徇浮言專任宰臣除吏宰臣不徧諳識踵前須訪於人若訪於親朋則是悔其覆車不易前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官慎柬寮屬所柬既少所求亦精得賢有鑒識之名失實當闇謬之責人之常性莫不愛人況於臺省長官皆是乆當朝選孰肯徇私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則往日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行業頓殊豈有為長官之時則不能舉一二屬吏居宰臣之位則可擇千百具寮物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人於不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失類以類則詳知實行有倫則杜絶徼求將務得人無易於此是故選自卑逺始升於朝者各委長吏任舉之則下無遺賢矣寘于周行既任以事者於是宰臣序進之則朝無曠職矣才徳兼茂歴試不渝者然後人主倚任之則海内無遺士矣夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也考精在於按名責實宰臣之序進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則茍取備員是以考課之法不暇精也考不精則能否無别能否無别則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格浸微是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益麤塞源浚流未見其可臣欲詳徵舊説伏恐聽覽為煩粗舉一端以明其理往者則天太后踐祚臨朝欲収人心尤務拔擢𢎞委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輒試其於選士之道豈不傷於容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明累朝賴多士之用此乃近於求才貴廣考課貴精之効也陛下誕膺寳歴思致理平雖好賢之心有踰前哲而得人之盛未逮往時蓋由鑒賞獨任於聖聦搜擇頗難於公舉但速登延之路罕施練覈之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎柬之規太精而失士是知雖易於舉用而不易於茍容則所易者適足廣得人之資不為害也不精於法制而務精於選才則所精者適足梗進賢之途不為利也人之才行自昔罕全茍有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問于孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之蓋以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下慎選宰臣必以為重於庶品精擇長吏必以為愈於末流及至宰臣獻規長吏薦士陛下則但納橫議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辯所毁之虚實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎臣之切言固非為巳所惜者致理之道所感者見遇之恩輒因陳謝布露以聞惟陛下幸察謹奏請遣使臣宣撫諸道遭水州縣狀右頻得鹽鐵轉運及州縣申報霖雨為災彌月不止或川瀆汎漲或谿谷奔流淹没田苗損壊廬舍又有漂溺不救轉徙乏糧喪亡流離數亦非少臣等任處台輔職調陰陽一物失宜尸曠斯在五行愆度黜責何逃陛下徳邁禹湯恕人咎已臣等每奉詞旨倍益慙惶所以僶俛在公不敢頻煩請罪前者面陳事體須遣使撫綏陛下尚謂詢問來人所損殊少即議優卹恐長姦欺臣等旬日已來更審借訪類㑹行旅所説悉與申報符同但恐所聞聖聦或未盡陳事實夫流俗之弊多徇諂䛕揣所悦意者則侈其言度所惡聞者則小其事制備失所恒病於斯初聞諸道水災臣等屢訪朝列多云無害於物以為不足致懐退省其私言則頓異霖潦非可諱之事搢紳皆有識之人與臣比肩尚且相媚況乎事或曖昧人或瑣微以利已之心希至尊之旨其於情實固不易知如斯之流足誤視聽所願事皆覆驗則冀言無詐欺大明照臨天下之幸也昔子夏問於孔子曰何如斯可謂人之父母孔子對曰四方有敗必先知之斯可謂人之父母矣蓋以君人之道子育為心雖深居九重而慮周四表雖恒處安樂而憂及困窮近取諸身如一體之於四支其疾病無不恤也逺取諸物如兩曜之於萬類其鑒照無不均也故時有凶害而人無流亡恃天聽之必聞知上澤之必至是以有母之愛有父之尊古之聖王能以天下為一家中國為一人用此術也今水潦為敗綿數十州奔告于朝日月相繼若哀其疾苦固宜降旨優矜儻疑其詐欺亦當遣使廵視安可徇往來之浮説忘惠卹之大猷失人得財是將焉用況災害已甚申奏亦頻縱不蒙恩復除自當準式蠲免徒失事體無資國儲恐須速降徳音深示憂憫分道命使明勅弔災寛息征徭省察冤濫應家有溺死及漂没居産都盡父子不存濟者各量賜粟帛便委使臣與州府以當處官物給付其損壊廬舍田苗者亦委使臣與州府據所損作分數等第聞奏量與蠲減租税如此則殁者蒙瘞酹之惠存者霑煦嫗之恩霈澤下施孰不欣戴所費者財用所収者人心若不失人何憂乏用臣等已約支計所費亦不甚多儻蒙聖恩允從即具條件續進臣又聞聖人作則皆以天地為本陰陽為端慶賞者順陽之功故行於春夏刑罰者法陰之氣故用之秋冬事或愆時人必罹咎是以月令所載夏行秋令則苦雨數來丘隰水潦夏行冬令則後乃大水敗其城郭典籍垂誡言固不誣天人同符理當必應既有繫于舒慘是能致于災祥頃自夏初大臣得罪親黨坐累其徒實繁邦憲已行宸嚴未解畏天之怒中外竦然若以月令推之水潦或是其應雖天所降沴不在郊畿然海内為家無論遐邇伏願滌瑕以徳消沴以和威惠之相濟合宜陰陽之運行自序臣等不勝覩災慙負之至謹奉狀陳請以聞謹奏論淮西管内水損處請同諸道遣宣慰使狀右奉進止淮西管内貢賦既闕所縁水損簡擇宣慰使此道亦不要遣去者臣聞聖王之於天下也人有不得其所者若已納之於隍故夏禹泣辜殷湯引罪蓋以率土之内莫非王臣或有昬迷不龔是由教化未至常以善救則無棄人自希烈亂常汚染淮甸職貢廢闕責當有歸在於編甿豈任其咎陛下息師含垢宥彼渠魁惟兹下人乆罹脅制想其翹望聖化誠亦有足哀傷儻𢎞善救之心當軫納隍之慮今者遣使宣命本縁䘏患弔災諸道災患既同朝廷弔卹或異是使慕聲教者絶望懐反側者得詞棄人而固其宼讎恐非所以為計也昔晉饑乞糴于秦大夫百里奚曰天災流行國家代有救災卹鄰道也行道有福丕豹則請因而伐之穆公用百里奚之言拒丕豹之請且曰其君是惡其人何罪遂輸粟以救之其後秦饑乞糴于晉晉大夫虢射曰無損於怨而益於宼不如勿與慶鄭曰幸災不仁貪愛不祥怒鄰不義不如與之惠公信虢射之謀違慶鄭之議遂閉糴以絶焉是嵗晉國復饑秦伯又饋之粟曰吾怨其君而矜其人終於秦穆霸強晉惠擒辱是知棄怨而施惠者可以懐敵計利而忘義者罔不失人此乃列國諸侯猶務卹鄰救災矧君臨天下而可使徳澤不均被者乎議者多謂淮右荐饑國家之利臣等愚見以為不然必若興有征之師問不庭之罪因災幸濟已爽徳政儻又難於用兵望其艱窘自弊利害之勢或未可知夫悍獸之情窮則攫搏暴人之態急則猖狂當其迫阨之時尤資撫馭茍得招攜以禮便可底寜備慮乖方亦足生患竊以帝王之道頗與敵國不同懐柔萬邦唯徳與義寜人負我無我負人故能使億兆歸心逺邇從化猶有兇迷不復必當人鬼同誅此其自取覆亡尚亦不足含怒今因供稅有闕遂令施惠不均責帥及人恐未為允伏惟聖鑒更審細裁量其所擇諸道使並未敢宣行伏候進止謝密旨因論所宣事狀前日顧少連奉諭密旨毎於延英對卿縁有諸人言不得盡中間卿所奏去冬薦人實縁對趙憬執論所以有言相拒亦不是阻卿之意若有要便事但依前者意旨自手疏密封進來卿又頻與苖粲進官朕未放過恐卿未知朕意此人即苖晉卿之子晉卿往年攝政曽有不臣之言又諸子皆與古帝王同名意甚不善縁非諸子之過不欲明行斥逐終是不合令在朝廷卿宜密知此意苖粲兄弟並改與在外閑僻處官仍不得令近兵馬者猥䝉天慈屢降深旨慰眷稠疊誨諭周詳骨肉之恩無以加此士感知已尚合捐軀臣雖孱微能不激勵至於彌綸庶績督課羣官始終不渝夙夜匪懈是皆常分曷足酬恩自揣凡庸之才又無竒崛之効惟當輸罄忠節匡補聖猷衆人之所難言臣必無隱常情之所易溺臣必不囘冏然貞心持以上報此愚夫一至而不易者也惟明主矜亮而保容之頃以去冬薦人頻於街衢披訴既是準制許集理合量才授官進擬再三未蒙允許伏慮事轉淹滯所以因對奏陳懵於忖量推理輒發以趙憬與臣並命俱掌樞衡參奉謀猷事當無間不知避忌輕黷宸嚴陛下特宥惷愚曲加奬導寵遇踰等恩私倍常顧惟何人叨幸若此偶有所見敢不盡言是彰無隱之誠以申上報之分臣聞王者之道坦然著明奉三無私以勞天下平平蕩蕩無側無偏所謂三無私者如天之無私覆也如地之無私載也如日月之無私照也其或有過如日月之有蝕焉過也人皆見之更也人皆仰之日月不疾于蔽虧人君不吝於過失虧而能復無損於明過而能改不累於徳昨者臣所奏惟有趙憬得聞陛下巳至勞神委曲防䕶是於心膂之内尚有形迹之拘職同事殊鮮克以濟恐爽無私之徳且傷不吝之明夫元首股肱義實同體諮詢獻納一日萬幾宣之使言猶未盡意言若有阻義何由通啟沃既難機務斯壅雖荷綢繆之顧實増曠廢之憂仰希聖聦更賜裁處苗粲少以門子早登朝班歴拾遺補闕起居員外郎中前後二十餘年温恭有加恪慎無怠端敏足以守職文學足以飾身詳其器能堪處近侍陛下以粲先父常有過言名子之方又乖義類不忍明加斥黜但令改授外官伏以理國化人在於奬一善使天下之為善者勸罰一惡使天下之為惡者懲是以爵人必於朝刑人必於市惟恐衆之不覩事之不彰君上行之無愧心兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也奬而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不明而恩倖之門啓中傷則枉直莫辯而讒間之道行此柄一虧為害滋大凡是譖愬之輩多非信實之言利於中傷懼於公辯或云歲月已乆不可究尋或云事體有妨須為隱忍或云惡跡未露宜假他事為名或云但棄其人何必明言責辱詞皆近於情理意實苞於矯誣傷善售姦莫斯為甚伏惟聖鑒之下必無浸潤之流然於稱毁之言不可不辯賞罰之典不可不明陛下若以晉卿跡實姦邪粲等法應坐累則當公議典憲豈令陰受播遷陛下若察晉卿見誣又知粲等非罪則合隨才奬用不宜降意猜防今忽不示端由但加斥逐謂之掄材則失序謂之行罰則無名徒使粲等受錮於聖朝晉卿銜憤于幽壤以臣蔽滯未見其宜夫聽訟辯讒貴於明恕明者在驗之以跡恕者在求之以情跡可責而情可矜聖王懼疑似之陷非辜不之責也情可責而跡可宥聖王懼逆詐之濫無罪不之責也惟情見跡具詞服理窮者然後加刑罰焉是以下無寃人上無謬聽苛慝不作教化以興晉卿起自文儒致位台輔能以謙柔自處故為三朝所推當諒闇之辰攝冢宰之任是將備禮豈足擅權安肯露不臣之言招覆族之釁雖甚狂險猶應不為矧伊老臣寜忍及此假有忍人之意其如言發禍隨求之以情既無端驗之以跡又無兆宜蒙昭恕理在不疑又自陛下御極已來粲及兄丕皆歴清近若以舊事為累豈復含容至今恐有無良之徒憎嫉丕粲兄弟構成飛語務欲挫傷大抵任重勢疑易生嫌謗以周公之聖不免流言霍光之忠亦遭告訐向非成王覺悟昭帝保明則二主之徳美不傳二臣之冤誣莫辯陛下追懐往事得失豈不相逺哉後之視今固亦如此凡所舉措安可不詳伏願稍留睿思特加省察斯實羣臣庶免於戾豈唯苖氏一族存殁幸頼而已乎少連又向臣說云聖旨察臣孤貞猶謂清慎太過都絶諸道饋遺却恐事情不通如不能納諸財物至如鞭靴之類受亦無妨者伏以貨賄之利耳目之娯人間常情孰不貪恱況臣性實凡鄙寜忘顧私家本窶貧安能無欲所以深自刻慎勉修廉隅者蓋由負戴厚恩尸竊大任既不克導揚風教致俗清淳又未能減息征徭濟人窮困若無恥懼更啓賄門是忘憂國之誠仍速焚身之禍由是茍行特操杜絶交私誠知無補大猷所冀免貽深累陛下責臣以清謹太過斯謂聖明陛下慮事之不通有乖理道或恐貪惏之輩務逞無厭之求巧陳異端惑亂聖聽稽諸事實則甚不然夫以胥吏末流苞苴微貺茍或違道臣猶知慙況乎公卿大臣之間方岳連帥之任豈資納賄然後致誠若因財利交歡是以姑息為事既乖直道必有過求遂之則法度浸隳阻之則觖望彌甚為害如此國何賴焉髙祖太宗著法垂制監臨受賄盈尺有刑陛下每發徳音敷宥下土大辟之屬皆蒙滌除唯於犯贓往往不赦豈不以貪饕為弊殘蠹最深至於士吏之微尚當嚴禁矧居風化之首反可通行凡上之所為以導下也上所不為以檢下也上所不為而下或為之然後可以設峻防寘明辟若上為之而下亦為之固其理也又可禁乎今吏有受監臨之賄者則以為罪不可容朝廷之制四方所監臨也而宰司公受其賄是亦無恥而不恕者歟孔子曰大臣不可不敬也是人之表也邇臣不可不慎也是人之道也表傾則影曲道僻則行邪若大臣邇臣可以受財則庶長寀寮孰為不可朝廷取之於方鎮方鎮復取之於州州取之於縣縣取之於鄉鄉將安取哉是皆出於疲人之肝腦筋髓耳自大盜猾夏耗斁生人天下常屯百萬之師坐受衣食農夫蠶婦凍而織餒而耕殚力忍死以供十倍之賦日日引頸望覩昇平之化惠恤之恩凡四十九年矣荐屬多故有加無瘳持利權食厚禄者當憂隱忸怩憫愧黎庶而又交通私賄扇起貪風是令已困之甿重遭過分之擾陛下尚以為鞭靴之類受亦無妨若使天下納賂唯有二三宰臣四方誅求止於鞭靴細物行之不足以傷化絶之不足以利人則臣固已微抑私心將順睿旨矣若使國家致理必資饋遺通情辭之足以失天下之心受之足以濟天下之務則臣固亦不避汙行助我聖功矣臣所以未敢奉詔冒昧塵煩者審知此道不唯無益必有甚損故也亦冀陛下詳察其理普澄其源𢎞清浄無欲之風守慈儉不貪之寳是將感人心而天下服何有事情不通之患乎夫貨賄上行則賞罰之柄失貪求下布則廉恥之道衰何者善惡不分功過無辯以貨賄之多少為課績之重輕守道闕供或時致怨招累求得當欲可以釋罪賈榮忍行刻剥者見謂公忠巧飾玩好者或稱才智此謂賞罰之柄失也上好利則下思聚斂上求賄則下肆侵蟊不懐愧心但逞私欲遞相企効習以成風閭閻日殘紀綱日壊不可以禮義勸不可以刑法懲此由廉恥之道衰也作法於涼其弊猶貪作法於貪其弊斯亂利於小者必害於大易於始者必悔於終賄道一開展轉滋甚鞭靴不已必及衣裘衣裘不已必及幣帛幣帛不已必及車輿車輿不已必及金璧日見可欲何能自窒于心已與交私固難中絶其意是以涓流不止谿壑成災毫末既差丘山聚釁自昔國家敗亡多矣何嘗有以約失之者乎臣竊料郡府之不願行賄於朝廷猶鄉閭之不願輸貨於郡府也但以行之者有利不行者有虞故為安身保位之謀不得不行耳夫豈樂而行之哉假如四方俱賂於朝廷朝廷受其三而却其一有所受有所却二端相反則遇却者或有意疑乎見拒而不通焉四方俱賂于朝廷朝廷俱辭而不受則咸知不受者乃朝廷之常理耳適所以服其心而誘其善復何嫌阻之有乎陛下若謂問遺可以通物情絜矩不足敦理化則自建中以來股肱耳目之間蓋常有交利行私者矣乃其所也陛下何尤焉陛下嗣位之初躬行節儉郡國無來獻朝廷無私求行李無黷貨之人邇臣無受賂之事四方風動幾致清平旋以刑峻賦繁兵連禍結理功中否至化未凝洎大憝殱夷皇運興復征伐之役頗息於前時清約之風亦虧於往日此則雖革一弊亦喪一美焉曩興師徒人困暴賦今罷征伐人困私求是乃殘瘁之餘永無蘇息之望使萬方黎獻當陛下休明之代不登富壽不洽雍熙追懐前修實用心熱而議者反以納賂通情之理以惑陛下斯不亦誣上行私之甚者乎夫天下公器也王綱大權也執大權者不任其小數守公器者不徇于私情任小數而御大權則忿戾之禍起徇私情以持公器則姦亂之釁生故春秋傳曰在上位者洒濯其心以待之而後可以理人言私曲之不可以莅衆庶也又曰國家之敗由官邪也官之失徳寵賂彰也君人者將昭徳塞違以臨照百官百官於是乎戒懼而不敢易紀律言賄利之不可以化百官也又曰長國家者非無賄之難無令名之難諸侯之賄聚於公室則諸侯貳言貪欲之不可以懐諸侯也古之懐諸侯者蓋有其道矣唯不務賄然後得之故禮記云凡為天下國家有九經其一曰理亂持危朝聘以時厚往而薄來所以懐諸侯也是知懐撫之道貴徳賤財於往也則厚其贈送之資於來也則薄其贄幣之禮訓人以尊讓示人以不貪始于朝廷行于郡國廉節之風漸廣侵漁之害不萌里閭獲安郡國斯乂朝廷益尊所謂化自上流理由下濟近者恱服而逺者歸懐是皆無賄之致也及夫王綱浸壊徳化陵夷然後滅公議而徇私情盛誅求而崇饋獻故禮記曰天子微諸侯僭於是相覿以貨相賂以利而天下之禮亂矣是知傷風害禮莫甚於斯暴物殘人莫大於賂利於絶私去賄者莫先於君主務於愛人助理者莫切於輔臣然則君主輔臣之間固不可以語及於私賄矣況又躬行乎臣以受恩特深志欲巨細禆補茍懐疑慮不敢因循亦頼遭逄聖明庶得竭盡愚直所以毎事獻替不以犯忤為虞意懇詞繁伏用慙悚謹奏翰苑集巻十七欽定四庫全書翰苑集巻十八唐陸贄撰中書奏議二論嶺南請於安南置市舶中使狀嶺南節度經略使奏近日舶船多往安南市易進奉事大實懼闕供臣今欲差判官就安南収市望定一中使與臣使司同勾當庶免隱欺希顔奉宣聖㫖宜依者逺國商販唯利是求綏之斯來擾之則去廣州地當要會俗號殷繁交易之徒素所奔湊今忽捨近而趨逺棄中而就偏若非侵刻過深則必招懐失所曽無内訟之意更興出位之思玉毁櫝中是將誰咎珠飛境外安可復追書曰不貴逺物則逺人格今既徇欲如此宜其殊俗不歸況又將蕩上心請降中使示貪風於天下延賄道於朝廷黷汚清時虧損聖化法宜當責事固難依且嶺南安南莫非王土中使外使悉是王臣若縁軍國所須皆有令式恒制人思奉職孰敢闕供豈必信嶺南而絶安南重中使以輕外使殊失推誠之體又傷賤貨之風望押不出論宣令除裴延齡度支使狀右縁班宏喪亡臣今日面取進止今當此選緫有四人杜佑盧徵李衡李巽並曽掌判財賦各有績用可稱資望人才亦堪奬任聖旨以淮南未可移動盧徵又近改官令臣擇一人與江西追取李衡者臣以支計之司當今所切常須銜制黠吏不可斯須闕人待追李衡數月方到或恐綱條弛紊錢物隱欺李巽近追到城請授給事中且令權判若處理稱職便除户部侍郎如材不相當則待李衡到别商量處分既免曠廢於事又得閱試其能兩人之中必有可取陛下累稱穩便許依所奏施行臣又退更詳思以為無易於此希顔適宣進止李巽知度支恐未相當且空與給事中朕更思量司農少卿裴延齡甚公清有才宜令判度支便進擬狀來其李衡亦從追取者伏以周制六官實司理本冢宰制國用量入為出司徒掌邦賦敷教恤人今之度支兼此二柄準平萬貨均節百司有無懋遷豐敗相補利害關黎元之性命費省繫財物之盈虚加以饋餉邊軍資給禁旅刻吝則生患寛假則容姦若非其人不可輕授裴延齡僻戾而好動躁妄而多言遂非不悛堅偽無恥豈獨有識深鄙兼為流俗所嗤頃列班行已塵清貫更居要重必斁大猷是將取笑四方貽殃兆庶尸禄之責固宜及於微臣知人之明亦恐傷於聖鑒伏願重循前議俯察愚誠更於四人之中選擇取其尤者庶諧僉屬不紊朝經延齡妄誕小人任之交駭物聽臣雖熟知不可猶慮所見未周趙憬眼疾漸瘳後日即合假滿待其朝謁乞更參詳去邪勿疑天下幸甚謹奏論齊暎齊抗官狀右希顔奉宣進止卿等所進齊暎替李衡縁江南與湖南接近齊暎齊抗既是當家同任方面事非穩便宜别商量者齊暎齊抗同姓别房既非五服之親則與衆人無異聖朝推誠致理未嘗先事示疑曩之李臯李兼鄰接方鎮今之韓潭全義密邇軍城此例甚多無足為慮但以中朝要職常苦乏人至如暎抗良才並當臺閣妙選臣等先請授暎禮部聖旨令且向外商量儻許移鎮江西亦是漸加恩奬齊抗文學足用精敏罕儔掖垣之駮議司言南宫之掌賦承轄俾居其任皆謂當才若䝉追赴闕廷試加顧問察言稽行必有可觀可否之宜伏候進止請減京東水運収脚價於縁邊州鎮儲蓄軍糧事冝狀右臣伏見陛下毎垂睿心經略邊境増築城壘加置戍兵至於春秋衣裝歳時宴犒先後遲速悉由宸衷其為憂勤可謂至矣其為資費亦以多矣蓋以安人固國不憚煩勞此誠慎慮之深者也然於儲蓄大計則未降意良圗但任有司隨月供應近歳蕃戎小息年穀屢登所支軍糧猶有匱乏邊書告闕相繼于朝儻遇水旱為災粟糴翔貴兇醜匪茹寇擾淹時或負輓力殫或饋餉路絶則戍兵雖衆不足恃城壘雖固不克居是使積年完聚之勞適資一夕潰敗之辱此乃理有必至而事無幸濟者也臣竊為陛下惜之軍志曰雖有石城十仞湯池百歩無粟不能守也故晁錯論安邊之䇿要在積穀充國建破羌之議先務屯田歴代制禦四夷常為國之大事勇者奮其力智者貢其謀攻守異宜盛衰殊勢柔服而不勞師旅者則常聞之矣屯師而不務農食者未嘗有焉今陛下廣徵甲兵分守城鎮除所在營田稅畆自供之外仰給於度支者尚八九萬人千里饋糧渉履艱險運米一斛達于邊軍逺或費錢五六千近者猶過其半犯雪霜皸瘃之苦冒豺狼剽掠之虞四時之間無日休息傾財用而竭物力猶苦日給之不充其於儲蓄以備非常固亦絶意而不暇思也夫屯兵守土以備宼戎至而無糧守必不固矣遇㓂不守則如勿屯平居有殘人耗國之煩臨難有啓敵納侮之禍所養非所用所失非所虞以為制備之規臣竊謂疎矣頃者吐蕃尚結贊率其醜類越軼封疆朔方五原相繼淪陷雖由將帥不武亦因匱乏得辭其事未遥足為深戒昧理而好䛕者必曰當結贊入寇之日遇賊泚作亂之餘戍卒未多邊農尚寡今則甲兵大備稼穡屢豐比於曩時勢不同等臣請復陳近效以質浮詞今年夏初寇犯靈武禦則寡力守則乏糧告急求哀匪朝伊夕有司為之請罪陛下為之軫憂遽擇使臣奔波督運積財以資用髙價以招人賴蕃戎自旋糧道獲濟封略不壊固非成謀然則鹽夏覆而靈武全唯在幸與不幸之間耳是皆無不㧞之勢有可駭之危其為規制之方所謂同歸於失矣議者是當今而非既往豈不曰昧理而好䛕乎今戍卒之加於往時臣固知之矣今邊農之廣於往歳臣亦知之矣所謂同歸於失者在於措置乖當蓄斂乖宜利之所生害亦隨至故也陛下忿蕃醜之暴掠懲邊鎮之空虚繕甲益兵庇人保境此誠雄武之英志覆育之仁心刷憤恥而揚威聲海内咸望有必攻之期矣既而統師無律制事失權戍卒不隸於守臣守臣不緫於元帥至有一城之將一旅之兵各降中使監臨皆承别詔委任分鎮亘千里之地莫相率從縁邊列十萬之師不設謀主毎至犬羊犯境方馳書奏取裁行李往來動踰旬日比蒙徵發救援寇已獲勝罷歸小則蹂藉麥禾大則驅掠人畜是乃益兵甲而費財用竟何補侵軼之患哉夫將貴專謀軍尚氣勢訓齊由乎紀律制勝在於機權是以兵法有分閫之詞有合拳之喻有進退如一之令有便宜從事之規故能動作協變通制備垂永乆出則同力居則同心患難相交急疾相赴兵之奉將若四支之衞頭目將之守境若一家之保室廬然後可扞寇讎䕶甿庶蕃畜牧闢田疇天子唯務擇人而任之則髙枕無虞矣吐蕃之比於中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝彼之兵衆合并而我之部分離析夫部分離析則紀律不一而氣勢不全節制在朝則謀議多端而機權多失臣故曰措置乖當此之謂乎陛下頃以邊兵衆多轉餽勞費設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆恱慕爭趨厚利不憚作勞耕稼日滋粟麥歳賤向使有司識重輕之術𢎞乆逺之謀守之有恒施之有制謹視豐耗善計収積菽麥必歸於公廪布帛悉入於農夫其或有力而無資願居而靡措貸其種食假以犂牛自然戍卒忘歸貧人樂徙可以足食可以實邊無屯田課責之勞而儲蓄自廣無徵役踐更之擾而守偹益嚴果能用之足謂長算既而有司隘吝不克將順忘國家制備之謀行市道茍且之意當稔而願糴者則務裁其價不時斂藏遇災而艱食者則莫揆乏糧抑使収糴遂使豪家貪吏反操利權賤取於人以俟公私之乏困乘時所急十倍其贏又有勢要近親羇遊之士或託附邊將或依倚職司委賤糴於軍城取髙價於京邑坐致厚利寔繁有徒欲勸農而農不獲饒欲省費而費又愈甚復以制事無法示人不誠毎至和糴之時多支絺紵充直窮邊寒冱不任衣裘絶野蕭條無所貨鬻且又虚張估價不務準平髙下隨喜怒之心精麤在胥吏之手既無信義率下下亦以偽應之度支物估轉髙軍郡穀價轉貴遞行欺罔不顧憲章互相制持莫可禁止度支以茍售滯貨為功利而不察邊食之盈虚軍司以所得加價為羨餘而不恤農人之勤苦雖設廵院使相監臨既失綱條轉成囊橐至有空申簿帳偽指囷倉計其數則億萬有餘考其實則百十不足廵院巧誣於㑹府㑹府承詐以上聞幸逄有年復遇無事吞聲補舊引日偷安若遇歳儉兵興則必立至危迫靈武之事足為明徵臣故曰蓄斂乖宜此之謂也邊之大事在食與兵今食則無儲兵則乏帥謂之有備其可得乎近者縁邊諸州頻歳大稔穀糴豐賤殊異往時此乃天贊國家永固封略之時也而尚日不暇給曽無逺圖軍府有歉食之詞穡人有悔耕之意天贊而不受其利農傷而不恤其窮及凶災流行播植墮廢雖復悔恨事何可追臣是以屢屢塵煩所惜在此頃請擇人充使委之平糴務農陛下以理貴因循未賜允許又請乘時豐稔邊城加貯軍糧有司以經費無餘其事復寢臣謬當任使待罪樞衡雖神武之謀不資獻納而職司之分敢忘憂虞夙夜疾心䀌如焚灼輒復効其鄙薄庶或禆補萬分不勞人不變法不加賦稅不費官錢不廢耳目之娯不節浮冗之用唯於漕運一事稍權輕重所宜請為陛下致邊軍十萬人一年之糧以為艱急之備陛下誠能聽臣愚計不受沮傷百日之間収貯緫畢轉運常行之務既無失於舊規太倉歲入之儲亦不闕其恒數圗慮至熟更無所妨謹具揚搉上陳惟陛下留意省察舊制以關中王者所都萬方輻輳人殷地狹不足相資加以六師糗糧百官禄廩邦畿之稅給用不充所以控引東方歲運租米冒淮湖風浪之弊泝河渭湍險之艱所費至多所濟蓋寡習聞見而不逹時宜者則曰國之大事不計費損故承前有用一斗錢運一斗米之言雖知勞煩不可廢也習近利而不防逺患者則曰毎至秋成之時但令畿内和糴既易集事又足勸農何必轉輸徒耗財賦臣以兩家之論互有短長各申偏執之懐俱昧變通之術其於事理可得粗言夫聚人以財而人命在食將制國用須權重輕食不足而財有餘則弛於積財而務實倉廪食有餘而財不足則緩於積食而嗇用貨泉若國家理安錢穀俱富烝黎蕃息力役靡施然後恒操羨財益廣漕運雖有厚費適資貧人三者不失其時之所宜則輕重中權而國用有制矣開元天寳之際承平日乆財力阜殷禄食所頒給用亦廣所以不計糜耗勵贍軍儲至使流俗過言有用一斗錢運一斗米之説然且散有餘而備所乏雖費何害焉斯所謂操羨財以廣漕運者也貞元之始巨盗初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省脚錢至使郊畿之間煙火殆絶都市之内餒殍相望斯所謂覩近利而不防逺患者也近歳關輔之地年穀屢登數減百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困穀賤今夏江淮水潦漂損田苗比於常時米貴加倍甿庶匱乏流庸頗多關輔以穀賤傷農宜加價糴穀以勸稼穡江淮以穀貴民困宜減價糶米以救凶災今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘斯所謂習見聞而不逹時宜者也今淮南諸州米毎斗當錢一百五十文從淮南轉運至東渭橋毎斗船脚又約用錢二百文計運米一斗緫當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估毎斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣頃者毎年從江西湖南浙東浙西淮南等道都運米一百一十萬石送至河陰其中減四十萬石留貯河陰倉餘七十萬石送至陜州又減三十萬石留貯太原倉唯餘四十萬石送赴渭橋輸納臣詳問河陰太原等倉留貯之意蓋因往年蟲旱關輔荐饑當崔造作相之初懲元琇罷運之失遂請毎年轉漕米一百萬石以贍京師比至中塗力殫歳盡所以節級停減分貯諸倉毎至春水初通江淮所般未到便取此米入運免令停滯舟船江淮新米至倉還復留納填數輪環貯運頗亦協宜不必毎歳加般以増不急之費所司但遵舊例曽不詳究源由邇來七年積數滋廣臣近勘河陰太原等倉見米猶有三百二十餘萬石河隂一縣所貯尤多倉廪充盈隨便露積舊者未盡新者轉加歳月漸深耗損増甚縱絶江淮輸轉且運此米入關七八年間計猶未盡況江淮轉輸般次不停但恐過多不慮有闕今歳關中之地百穀豐成京尹及諸縣令頻以此事為言憂在京米粟太賤請廣和糴以救農人臣今計料所糴多少皆云可至百餘萬石又今量定所糴估價通計諸縣貴賤幷雇船車般至太倉穀價約四十有餘米價約七十以下此則一年和糴之數足當轉運二年一斗轉運之資足以和糴五斗比較即時利害運務且合悉停臣竊慮運務若停則舟船無用舟船無用則壊爛莫修儻遇凶災復須轉漕臨時鳩集理必淹遲夫立法裁規乆必生弊經略之念始慮貴周不以積習害機宜不以近利隳永制不貴功於當代不流患於他時慮逺防微是其均濟臣今所獻庶近於斯減所運之數以實邊儲存轉運之務以備時要其於詳審必免貽憂舊例從江淮諸道運米一百一十萬石至河陰來年請停八十萬石運三十萬石舊例從河陰運米七十萬石至太原倉來年請停五十萬石運二十萬石舊例從太原倉運米四十萬石至東渭橋來年請停二十萬石運二十萬石其江淮所停運米八十萬石請委轉運使於遭水州縣毎斗八十價出糶計以糙米與細米分數相接之外毎斗猶減時價五十文以救貧乏計得錢六十四萬貫文節級所減運脚計得六十九萬貫都合得錢一百三十三萬貫數内請支二十萬貫付京兆府令於京城内及東渭橋開場和糴米二十萬石毎斗與錢一百文計加時估價三十已上用利農人其米便送東渭橋及太原倉収貯充填毎年轉漕四十萬石之數並足餘尚有錢一百一十三萬貫文以供邊鎮和糴臣已令度支廵院勘問諸軍州米粟時價兼與當管長吏商量令計見墾之田約定所糴之數得鳳翔涇隴邠寜慶鄜坊丹延夏綏銀靈鹽振武等道良原長武平涼等城報除度支旋糴供軍之外别擬儲備者計可糴得粟一百三十五萬石其臨邊州縣各於當處時價之外更加一倍其次毎十分加七分又其次毎十分加五分通計一百三十五萬石當錢一百二萬六千貫文猶合剰錢十萬四千貫留充來年和糴所於江淮糶米及減運米脚錢請並委轉運使便折市綾絹絁綿四色即作船般送赴上都邊地早寒斂藏向畢若待此錢送到即恐収糴過時請且貸户部别庫物充用本色續到便令折填其所貸户部别庫物亦取綾絹絁綿四色並依平估價務利農人仍取度支官畜及車均融般送請各委當道節度及當城兵馬使與監軍中使幷度支和糴廵院官同受領便計㑹和糴各量人户墾田多少先付價直立限納粟不願糶者亦勿强徵其有納米者毎米六升折粟一斗應所糴得米粟亦委此三官同檢覆分於當管城堡之内揀擇髙燥牢固倉窖等収納封閉仍以貯備軍糧為名非縁城守絶糧及承别勅處分並不得輒有支用待収糴畢具所糴數幷収貯處所聞奏幷報中書門下緫計貯備粟一百三十五萬石是十一萬二千五百人一年之糧來秋若遇順成又可更致百餘萬石邊蓄既富邊備自修以討則有齎以守則可乆以加兵則不憂所至乏食以斂糴則不為貪將所邀恢疆保境者得以遂其謀蹙國跳軍者無所辭其罪是乃立武之根柢安邊之本源守土庇人莫急於此傾公藏而發私積猶當悉力以務之況今不擾一人無廢百事但於常用之内収其枉費之資百萬贏糧坐實邊鄙又有勸農賑乏之利存乎其間此蓋天錫陛下攘戎狄而安國家之時不可失也陛下誠能過聽愚計先聚軍儲慎擇良圗更貞師律蠢爾兇醜自當畏威縱迷款塞之心必無猾夏之慮伏惟少留睿思詳省而明斷之其所停減運脚臣已與本司審細計料并邉鎮分配和糴數及米粟估價等數各得别狀條件分析謹同封進聽進止翰苑集巻十八欽定四庫全書翰苑集巻十九唐陸贄撰中書奏議三論縁邊守備事宜狀右臣歴覽前代史書皆謂鎮撫四夷宰相之任不揆闇劣屢敢上言誠以備邊禦戎國家之重事理兵足食備禦之大經兵不理則無可用之師食不足則無可固之地理兵在制置得所足食在斂導有方陛下幸聽愚言先務積穀人無加賦官不費財坐致邊儲數逾百萬諸鎮収糴今已向終分貯軍城用防艱急縱有寇戎之患必無乏絶之憂守此成規以為永制恒収冗費益贍邊農則更經二年可積十萬人三歳之糧矣足食之原粗立理兵之術未精敢試籌量庶備採擇伏以戎狄為患自古有之其於制禦之方得失之理備存史籍可得而言大抵尊即叙者則曰非徳無以化要荒曽莫知威不立則徳不能馴也樂武威者則曰非兵無以服凶獷曽莫知徳不修則兵不可恃也務和親者則曰要結可以睦鄰好曽莫知我結之而彼復解之也美長城者則曰設險可以固邦國而扞宼讎曽莫知力不足而人不堪則險之不能恃城之不能有也尚薄伐者則曰驅遏可以禁侵暴而省征徭曽莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駮聽一家之説則理例可徵考歴代所行則成敗異效是由執常理以御其不常之勢徇所見而昧於所遇之時夫中夏有盛衰夷狄有强弱事機有利害措置有安危故無必定之規亦無長勝之法夏后以序戎而聖化茂古公以避狄而王業興周城朔方而玁狁攘秦築臨洮而宗社覆漢武討匈奴而貽悔太宗征突厥而致安文景約和親而不能弭患於當年宣元𢎞撫納而足以保寜於累葉蓋以中夏之盛衰異勢夷狄之強弱異時事機之利害異情措置之安危異便知其事而不度其時則敗附其時而不失其稱則成形變不同胡可專一夫以中國強盛夷狄衰微而能屈膝稱臣歸心受制拒之則阻其嚮化滅之則類於殺降安得不存而撫之即而叙之也又如中國強盛夷狄衰微而尚棄信忤盟蔑恩肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亂之弊當夷狄強盛之時圗之則彼釁未萌禦之則我力不足安得不卑詞降禮約好通和啗之以利以引其懽心結之以親以紓其交禍縱不必信且無大侵雖非御戎之善經蓋時事亦有不得已而然也儻或夷夏之勢強弱適同撫之不寜威之不靖力足以自保勢不足以出攻安得不設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於逺追雖非安邊之令圖蓋勢力亦有不得已而然也故夏之即叙周之于攘太宗之翦亂皆乘其時而善用其勢者也古公之避狄文景之和親神堯之降禮皆順其時而不失其稱者也秦皇之長城漢武之窮討皆知其事而不度其時者也向若遇孔熾之勢行即叙之方則見侮而不從矣乘可取之資懐畏避之志則失機而養寇矣有攘却之力用和親之謀則示弱而勞費矣當降屈之時務翦伐之略則召禍而危殆矣故曰知其事而不度其時則敗附其時而不失其稱則成是無必定之規亦無長勝之法得失著效不其然歟至於察安危之大情計成敗之大數百代之不變易者蓋有之矣其要在於失人肆慾則必蹷任人從衆則必全此乃古今所同而物理之所壹也國家自禄山構亂肅宗中興撤邊備以靖中邦借外威以寜内難於是吐蕃乘釁吞噬無猒回紇矜功馮凌亦甚中國不遑振旅四十餘年使傷耗遺甿竭力蠶織西輸賄幣北償馬資尚不足塞其煩言滿其驕志復又逺徵士馬列戍邊陲猶不能遏其奔衝止其侵悔小入則驅略黎庶深入則震驚邦畿時有議安邊之策者多務於所難而忽於所易勉於所短而略於所長遂使所易所長者行之而其要不精所難所短者圖之而其功靡就憂患未弭職斯之由夫制敵行師必量事勢勢有難易事有後先力大而敵脆則先其所難是謂奪人之心暫勞而乆逸者也力寡而敵堅則先其所易是謂固國之本觀釁而後動者也頃屬多故人勞未瘳而欲廣發師徒深踐寇境復其侵地攻其堅城前有勝負未必之虞後有餽運不繼之患儻或撓敗適所以啓戎心而挫國威以此爲安邊之謀可謂不量事勢而務於所難矣天之授者有分事無全功地之産者有物宜無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而校其所長必殆用所長而乗其所短必安強者乃以水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不恥敗亡此戎狄之所長也戎狄之所長乃中國之所短而欲益兵蒐乗角力爭驅交鋒原野之間決命尋常之内以此為禦寇之術可謂勉所短而校其所長矣務所難勉所短勞費百倍終於無成雖果成之不挫則廢豈不以越天授而違地産虧時勢以反物宜者哉將欲去危就安息費從省在其慎守所易精用所長而已若乃擇將吏以撫寜衆庶修紀律以訓齊師徒耀徳以佐威能邇以柔逺禁侵掠之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為寇則嚴備而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封疆守要害壍蹊隧壘軍營謹禁防明斥堠務農以足食練卒以蓄威非萬全不謀非百尅不鬭寇小至則張聲勢以遏其入寇大至則謀其大三字疑以邀其歸據險以乗之多方以悞之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乗其弊不戰而屈人之兵此中國之所長也我之所長乃戎狄之所短我之所易乃戎狄之所難以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乗斯謂倒持戈矛以鐏授寇者也今則皆務之矣然猶封守未固寇戎未懲者其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者未必行故令措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遥制臣請為陛下粗陳六者之失惟明主慎聽而熟察之臣聞工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則緩以應機故事有便宜而不拘常制謀有竒詭而不徇衆情進退死生唯將所命此所謂攻討之兵也用之於屯戍則事資可乆勢異從權非物理所愜不寜非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦戎狄非一朝一夕之事固當選鎮守之兵以置焉古之善選置者必量其性習辨其土宜察其技能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不攜故出則足兵居則足食守則固戰則強其術無他便於人情而已矣今者散徵士卒分戍邊陲更代往來以為守備是則不量性習不辨土宜邀其所不能強其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益於備禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目與豺狼為鄰伍以戰鬬為嬉遊晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之娯地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而不遷焉則罕能寜其居而狎其敵也關東之壤百物阜殷從軍之徒尤被優養慣於温飽狎於歡康比諸邊隅若異天地聞絶塞荒陬之苦則辛酸動容聆强蕃勁虜之名則懾駭奪氣而乃使之去親族捨園廬甘其所辛酸抗其所懾駭將冀為用不亦疎乎矧又有休代之期無統帥之馭資奉若驕子姑息如倩人進不邀之以成功退不處之以嚴憲其來也咸負得色其止也莫有固心屈指計歸張頤待飼僥倖者猶患還期之賖緩恒念戎醜之充斥王師挫傷則將乘其亂離布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則投棄城鎮以揺逺近之心其弊豈唯無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲増户實邊兼令展効自贖既是無良之類且加懐土之情思亂幸災又甚戍卒適足煩於防衞諒無望於功庸雖前代時或行之固非良算之可遵者也復有擁旄之帥身不臨邊但分偏師俾守疆場大抵軍中壯銳元戎例選自隨委其疲羸乃配諸鎮節將既居内地精兵祗備紀綱遂令守要禦衝恒在寡弱之卒寇戎毎至力勢不支入壘者纔足閉關在野者悉遭劫執恣其芟蹂盡其搜敺比及都府聞知虜巳尅獲旋返且安邊之本所切在兵理兵若斯可謂措置乖方矣夫賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之於重輕輗軏之所以行車銜勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠實擯抑夫如是若聦明可􅃷律度無章則用與不用其弊一也自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典常又不能施之於將務相遵養茍度歳時欲賞一有功翻慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使亡身効節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懐於愧畏緩救失期者自以為智能襃貶既闕而不行稱毁復紛然相亂人雖欲善誰為言之況又公忠者直已而不求於人反罹困厄敗撓者行私而茍媚於衆例獲優崇此義士所以痛心勇夫所以解體也又有遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為詞有司復以供給無闕為解既相執證理合辨明朝廷毎為含糊未嘗窮究曲直措理者含聲而靡訴誣善者罔上而不慙馭將若斯可謂課責虧度矣課責虧度措置乖方將不得竭其才卒不得盡其力屯集雖衆戰陣莫前虜毎越境横行若渉無人之地遞相推倚無敢誰何虚張賊勢上聞則曰兵少不敵朝廷莫之省察唯務徵發益師無禆備禦之功重増供億之弊閭井日耗徵求日繁以編户傾家破産之資兼有司榷鹽稅酒之利緫其所入半以事邊制用若斯可謂財匱於兵衆矣今四夷之最強盛為中國甚患者莫大於吐蕃舉國勝兵之徒纔當中國十數大郡而已其於内虞外備亦與中國不殊所能寇邊數則蓋寡且又器非犀利甲不堅完識迷韜鈐藝乏趫敏動則中國懼其衆而不敢抗靜則中國憚其強而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也夫統帥專一則人心不分人心不分則號令不貳號令不貳則進退可齊進退可齊則疾徐如意疾徐如意則機㑹靡愆機會靡愆則氣勢自壯斯乃以少為衆以弱為强變化翕闢在於反掌之内是猶臂之使指心之制形若所任得人則何敵之有夫節制多門則人心不一人心不一則號令不行號令不行則進退難必進退難必則疾徐失宜疾徐失宜則機㑹不及機㑹不及則氣勢自衰斯乃勇廢為尫衆散為弱逗撓離析兆乎戰陣之前是猶一國三公十羊九牧欲令齊肅其可得乎開元天寳之間控禦西北兩蕃唯朔方河西隴右三節度而已猶慮權分勢散或使兼而領之中興巳來未遑外討僑隸四鎮於安定權附隴右於扶風所當西北兩蕃亦朔方涇原隴右河東四節度而已關東戍卒至則屬焉雖委任未盡得人而措置尚存典制自頃逆泚誘涇原之衆叛懐光汚朔方之軍割裂誅鋤所餘無幾而又分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬毎俟邊書告急方令計㑹用兵既無軍法下臨唯以客禮相待是乃從容拯溺揖讓救焚冀無阽危固亦難矣夫兵以氣埶為用者也氣聚則盛散則消埶合則威析則弱今之邊備埶弱氣消建軍若斯可謂力分於將多矣理戎之要最在均齊故軍法無貴賤之差軍實無多少之異是將所以同其志而盡其力也如或誘其志意勉其藝能則當閲其材程其勇校其勞逸度其安危明申練覈優劣之科以為衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁蓋所謂日省月試餼廪稱事如權量之無情於物萬人莫不安其分而服其平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒歲月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等繼以茶藥之饋益以蔬醬之資豐約相形縣絶斯甚又有素非禁旅本是邊軍將校詭為媚詞因請遥隸神䇿不離舊所唯改虚名其於廪賜之饒遂有三倍之益此則儔類所以忿恨忠良所以憂嗟疲人所以流亡經費所以􅄶匱夫事業未異而給養有殊人情不能甘也況乎矯佞行而廪賜厚績藝劣而衣食優茍未忘懐孰能無愠不為戎首則已可嘉而欲使其協力同心以攘寇難雖有韓白孫呉之將臣知其必不能焉養士若斯可謂怨生於不均矣凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵藉某人參佐要若干士焉用若干資糧某處置營某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選才端拱於委任既委其事既足其求然後可以覈其否臧行其賞罰受其賞者不以為濫當其罰者無得而辭付授之柄既專茍且之心自息是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之又賜鈇鉞示令専斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以逺決號令不可以兩從未有委任不專而望其尅敵成功者也自頃邊軍去就裁斷多出宸衷選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥必取於承順無違則如斯可矣若有意乎平兇靖難則不可也夫兩疆相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已踈矣況乎千里之逺九重之深陳述之難明聽覽之不一欲其事無遺䇿雖聖者亦有所不能焉設使謀慮能周其如權變無及戎虜馳突迅如風飇馹書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師逗留之間寇已奔逼託於救援未至各且閉壘自全牧馬屯牛鞠為椎剽嗇夫樵婦罄作俘囚雖詔諸鎮發兵唯以虚聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千將帥既幸於緫制在朝不憂罪累陛下又以為大權由己不究事情用師若斯可謂機失於遥制矣理兵而措置乖方馭將而賞罰虧度制用而財匱建軍而力分養士而怨生用師而機失此六者疆埸之蟊賊軍旅之膏肓也蟊賊不除而但滋之以糞溉膏肓不療而茍啗之以滑甘適足以養其害速其災欲求稼穡豐登膚革充美固不可得也臣愚謂宜罷諸道將士番替防秋之制率因舊數而三分之其一分委本道節度使募少壯願住邊城者以徙焉其一分則本道但供衣糧委關内河東諸軍州募蕃漢子弟願傅邊軍者以給焉又一分亦令本道但出衣糧加給應募之人以資新徙之業又令度支散於諸道和市耕牛雇召工人就諸軍城繕造器具募人至者毎家給耕牛一頭又給田農水火之器皆令充備初到之歲與家口二人糧幷賜種子勸之播植待經一稔俾自給家若有餘糧官為収糴各酬倍價務奬營田既息踐更徵發之煩且無幸災茍免之弊寇至則人自為戰時至則家自力農是乃兵不得不强食不得不足與夫倏來忽往其可同等而論哉臣又謂宜擇文武能臣一人為隴右元帥應涇隴鳳翔長武城山南西道等節度管内兵馬悉以屬焉又擇一人為朔方元帥應鄜坊邠寜靈夏等節度管内兵馬悉以屬焉又擇一人為河東元帥河東振武等節度管内兵馬悉以屬焉三帥各選臨邊要㑹之州以為理所見置節度有非要者隨所便近而幷之唯元帥得置統軍餘並停罷其三帥部内太原鳳翔等府及諸郡户口稍多者慎柬良吏以為尹守外奉師律内課農桑俾為軍糧以壯戎府理兵之宜既得選帥之道既明然後減姦濫虚浮之費以豐財定衣糧等級之制以和衆𢎞委任之道以宣其用縣賞罰之典以考其成而又慎守中國之所長謹行當今之所易則八利可致六失可除如是而戎狄不威懐疆埸不寜謐者未之有也諸侯軌道庶類服從如是而教令不行天下不理者亦未之有也以陛下之英聖人心之思安四方之小休兩寇之方靜加以頻年豐稔所在積糧此皆天贊國家可以立制垂統之時也時不乆居事不常兼已過而追雖悔無及明主者不以言為罪不以人廢言罄陳狂愚惟所省擇謹奏商量處置竇參事體狀右希顔奉宣進止朝來共卿等商量竇參事卿等所奏雖於大體甚好然此人交結中外意在不測朕試根尋灼然審知情狀所以有此商量又聞竇參在彼處亦共諸處交通不絶社稷事重卿等只合與朕同憂宜即作文書進來此事非小不可更遲者臣面承深旨又奉密宣皆以社稷為言又知根尋已審敢不上同憂憤内絶狐疑豈願遲迴更貽念慮但以嘗經重任斯謂大臣進退之間猶宜有禮誅戮之際不可無名劉晏久掌貨財當時亦招怨讟及加罪責事不分明叛者既得以為辭衆人亦為之懐愍用刑曖昧損累不輕事例未遥所宜重慎竇參頃司鈞軸頗怙恩私貪饕貨財引縱親黨此則朝廷同議天下共傳至於潛懐異圖將起大惡跡既未露人皆莫知臣等親奉威顔議加刑辟但聞兇險之意尚昧結構之由況在衆流何由察悉忽行峻罰必謂冤誣羣情震驚事亦非細若不付外推鞠則恐難定罪名乞留睿聦更少詳度竇參於臣素分陛下固所明知有何顧懐輒欲營救良以事關國體義絶私嫌所冀典刑不濫於清時君道免虧於聖徳特希天鑒俯亮愚誠謹奏奏議竇參等官狀右希顔奉宣進止竇參結朕左右兼有陰謀皆有馮據事不曖昧只縁連及處多不可推按卿等宜更商量若謂恐事體不穩即且流貶向絶逺惡處竇申竇榮李則之首末同惡無所不至又並微細不比竇參宜便商量處置其竇參等所有朋黨親密並不可容在側近宜便條疏盡發遣向僻逺無兵馬處先雖已經流貶更移向逺惡處者伏以竇參罪犯誠合誅夷聖徳含𢎞務全事體特寛嚴憲俯貸餘生始終之恩實足感於庶品仁育之惠不獨幸於斯人所議貶官謹具别狀其竇榮竇申李則之等既皆同惡固亦難容然以得罪相因法有首從首當居重從合差輕參既䝉恩矜全申等亦宜減降又於黨與之内亦有淑慝之殊稍示區分足彰勸勵竇榮與參雖是近屬亦甚相親然於款密之中都無邪僻之事仍聞激憤屢有直言因此漸搆猜嫌晚年頗見疎忌若論今者陰事則尚未究端由如㨿比來所行必應不至兇險恐須差異以表詳明臣等商量竇榮更貶逺官竇申則之並除名配流謹具别狀進擬庶允從輕之典以洽好生之恩夫趨勢附權時俗常態茍無髙節出衆何能特立不羣竇參久秉鈞衡特承寵渥君之所任孰敢不從或遊於門庭或結以中外或偏被接引或驟與薦延如此之徒十恒七八若聽流議皆謂黨私自非甚與交親安可悉從貶累況竇參罷黜迨欲周星應是私黨近親當時並已連坐人心久定不可復揺今者再責竇參特縁别有結搆陛下親自尋究審得事情所與連謀固知定數今若普加譴斥則恐翻類淪胥罪無指名誰不疑懼中外洶洶殊非令猷臣等商量除同謀陰邪事狀分明者其餘一切更無所問將為穩便未審可否請不簿録竇參莊宅狀右希顔奉宣進止凡是官吏貪濁取受錢物猶並徵贓竇參負朕至深廣納賄貨又更交結謀行惡事其莊宅錢物奴婢之類豈不合収納入官竇參身既逺貶亦恐被人破除隱没今欲使人勾當収拾卿等商量可否者謹按國家典法没入官産唯有兩科一謂姦贓一謂叛逆皆須先鞠犯狀審得實情憲司察冤法寺論罪會府覆奏掖垣參詳如是悉無異詞然後謂之獄成而聞于天子其有抵于深辟者制可既下所司猶三五覆奏庶或宥之聖王愛人恤刑乃至如此精慎罪法既定方合徵収叛逆則盡没其家姦贓則止徵所犯蓋示懲戒匪貪貨財何嘗有罪未斷有法未詳而可以納其資産者也伏惟聖徳廣大如天包含懲忿於彞憲之中念終於常情之外已存惠貸不寘嚴刑今若簿録其家竊恐以財傷義猥䝉下問實荷皇明輒罄愚誠所祈天鑒謹奏翰苑集巻十九欽定四庫全書翰苑集巻二十唐陸贄撰中書奏議四請還田緒所寄撰碑文馬絹狀馬一匹并鞍絹二千匹右田緒使節度隨軍劉瞻送書與臣其書意縁奉進止令為其亡父承嗣撰遺愛碑文故送前件馬絹等以申情貺臣先奉恩㫖令撰碑文於今半年竟未綴緝良以勸戒之道忠義攸先襃貶之詞春秋所重爵位有僥倖而致名稱非詐力可求将使循軌轍者畏昭憲而莫渝怙姦妄者顧清議而知恥仲尼修春秋而亂臣賊子懼豈必臨之以武脅之以刑哉襃貶茍明亦足助理田承嗣阻兵犯命靡惡不為竟逭天誅全歸土壤此乃先朝所愧恨義士所惋嗟今田緒尚干宸嚴請頌遺愛微臣隘跼實憤於心謬承恩光備位台輔既未能滌除姦慝匡益大猷而又飾其愧詞以贊兇徳納彼重賂以襲貪風情所未安事固難强是以屢嘗執翰不能措詞輒投所操太息而止縁承聖誨姑務懷柔昨見田緒使人臣亦婉為報答但告云所為碑頌皆奉德音既異私情難承厚貺候稍休暇續當撰成既無拒絶之言計亦不至疑阻其來書謹封進所送馬及絹等令劉瞻便領却迴訖不敢不奏謹奏請依京兆所請折納事状京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉勑宜依度支續奏稱據時估豌豆毎斗七十價巳上大豆每斗三十價已下京兆府所請將大豆替豌豆望令據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟蜮為殃豌豆全損檢覆若非虚謬地稅固合免徵直道而行大體斯在府司折納充數已為尅下從權度支準估計錢乃是幸災規利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚微舊例所支唯充畜料凖數迴給大豆諸司誰曰不然計價剩徵義將安在理無所據事不可從望依前勅處分未審可否議汴州逐劉士寧事狀右希顔奉宣聖旨適得李萬榮奏劉士寧因出遊獵三軍將士遂閉城門不放入發遣令赴朝廷萬榮安撫軍州今已寧帖卿等宜知悉者伏以劉士寧昏荒暴慢惡貫久盈聖情愛人久為含忍親離衆叛自取奔亡不勞師徒克靖方鎮㳟承宣諭欣賀實深然梁宋之間地當要害鎮壓齊魯控引江淮得其人則安則强失其人則危則弱今士寧見逐雖是衆情萬榮搃軍且非朝旨此亦安危强弱之機也陛下審之慎之或恐奏事之人茍私所奉之將妄陳體勢輒欲徼求承前授任失宜多為此輩所誤假使心無詐㒺其如識乏經通與之籌量鮮不撓敗今軍州既定足得安詳望且選一朝臣馳往宣勞更淹旬日徐察事情見情而後圖之則冀免有差失候至坐日續更面陳謹先狀以聞謹奏請不與李萬榮汴州節度使状右希顔奉宣進止萬榮安撫有功聞亦忠義甚得衆心若更淹遲却恐事不穩便今商量除一親王充節度使且令萬榮知留後其節度制便從内出萬榮須與改官卿等即商量進來者臣性習懦頑藝識空乏辱當奨任待罪宰司事關安危不敢容黙雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之險地則覆致之夷地則平材如負焉唯在所授授踰其力則踣授當其力則行故負重者不可以微劣勝器大者不可以輕易處有巨力而加重負猶懼蹶跌之不虞擇安地而寘大器尚慮傾覆之難備焉有委非所任置非所安而望其不顚不危固亦難矣劉士寧窮兇極暴衆所不容李萬榮因人之心閉城拒逐為國除害亦有可嘉誠宜星夜上聞請擇節将今所陳奏頗渉張皇但露徼求之情殊無退讓之禮據兹鄙躁殊異純良又聞本是滑人偏厚當州將士與之相得纔止三千諸營之兵已甚懷怨據此頗僻亦非將材且邀君而力取其位不忠逐帥而謀代其權不義犯此二者而加之非材得志驕盈不悖則敗悖謂犯上敗謂僨軍俱為厲階莫見其可今雖遽加寵命務饜貪求曲示保持冀消㓙慝然其所行不遜所得無名縱之則反側而益疑奪之則觖望而肆惡夫善始而克終者猶寡况始於不善而求能以義自全者乎又縁嘗自蓄謀以危主將及居人上恒恐見圗必於部校之間多有疑阻之釁上下猜貳何能久安縱未干紀亂常亦必喪師蹙境所以承前方鎮之任選建才徳而不副所委者則有矣其不由才徳而授終能殿邦固節者未之有也是猶置器欲安而不擇可安之勢負重欲濟而不量可濟之材處非所宜不敗何待陛下若謂臣說體迂濶有異軍機引喻乖疎不同事實臣請指陳汴宋一管近代成敗之跡皆陛下之所經見者以為殷鑒惟陛下覽而察之往者田神功作鎮河南領汴宋徐泗兖鄆曹濮八州之地兵食兼足職貢備修左肅青齊右弭滑魏南控淮浙北輔滎瀍殷如長城不震不竦此由制置於可安之地付授得可濟之材其為利冝斯謂大矣及神功入覲遘厲不還先皇帝示眷悼之優崇貪因循之便易知神玉才不勝任排衆議而竟授之既而維御無方經略失制權歸豪將勢散列城禍機一興内叛外破委三軍於暴帥陷五郡於匪人轉輸所經塗路亟阻此由制置於必危之地付授於必躓之才其為敗傷亦已甚矣近者劉元佐驅攘巨猾厎復大梁即鎮如兹幾將十載雖不能勤身節用以撫疲甿畢力竭誠以揚丕烈然尚號令由已部屬畏威緝修戎旅振耀聲勢逺邇談矚且為完軍制持東方猶有所倚及元佐殂沒朝廷命吴湊代之士寧兇頑輙敢眦睚素非得衆且甚不材緩之旬時必自離沮隨機制馭指顧可平陛下念深黎元姑務容養適使姦徒得計庸豎作狂但肆醜厲之詞豈懷任置之恵運路幾絶生人重殘殷然垣翰之軍鞠為汙染之俗追思致患之本豈不失於茍且哉今若又授萬榮則與士寧何異負力而取誰曰不然邀取而除孰為非據茍邀則不順茍允則不誠君臣之間勢必嫌阻與其圗之於滋蔓不若絶之於萌芽忘久逺而樂因循固非英主御天下長筭逺慮之計也且為國之道以義訓人將教事君先令順長用能弭爭奪之禍絶窺覬之心聖人所以興敬譲而服暴强禮達而分定故也假使士寧為將慢上虐人萬榮懷奉國之誠稟嫉惡之性棄而違之斯可矣討而逐之亦可矣謀其帥而篡其位則不可焉何者方鎮之臣事多専制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非獨長亂之道亦開謀逆之端四方諸侯誰不解體得一夫而喪羣帥其何利之有焉矧兹一夫猶未可保徒亂風教以生人心昨者所逐士寧蓋起於倉卒諸郡守將固非連謀一城師人亦未協志況又待之不一撫之不均黨助萬榮其能有幾仍各計度於成敗之勢迴遑於逆順之名安肯捐軀與之同惡今所以未即變者皆為萬榮所誘許其賞給貨財且相服從以候制㫖陛下但於文武羣臣之内選一和恵寛敏素為軍旅所愛信者命為節度仍降優詔慰勞彼軍奬萬榮以撫定之功别加寵任襃將士以輯睦之義厚賜資装衆知保安人且懷恵舎此助亂更將何求揆其大情理必寧息萬榮縱欲跋扈勢何能為三軍既自離心列城又不為援縁其迫逐主將諸道必復憎嫌邇無所親逺無所與不勞天討必自殲夷陛下何所為虞而欲受其邀致臣雖孱怯竊有未安昨因希顔宣㫖却迴已與趙憬等同附口奏展轉申吐慮多闕遺臣更通夕詳思恐亦無易於此不勝拳拳愚懇謹復密啓以聞如䝉聖㤙察納臣即與趙憬等商量應須處置事宜具作條件聞奏儻後事有愆素臣請受敗撓之罪謹奏論度支令京兆府折稅市草事狀度支奏縁當年稅草支用不充諸場和市所得又少所以毎至秋夏常有欠闕請令京兆府折今年秋稅和市草一千萬束便令人户送入城輸納毎束兼車脚與折錢二十五文既利貧人兼濟公用希顔奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非宜曷由無擾臣等毎承睿㫖常以百姓為憂審知事不可行安敢黙而無述毎年蓄聚芻藁所司素有恒規計料稅草不充即便開場和市既優價直復及農収人皆樂輸事不勞擾陛下追想往年之事豈嘗有縁草不足上關宸慮者乎延齡欲􅃷已能頗隳舊制茍收經費之用以資贏羡之功遂使儲備空虛支計寥落廐圉告闕頻煩聖聦去歳已然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徵地稅草數毎年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納唯二百三十萬而已百姓般運已甚艱辛常迫春農僅能得畢今若更徵一千萬束仍令並送入城即是一年之間併徵三年稅草計其所加車脚則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於途程徃復理須淹厯歳時牛廢耕犂人妨播植東作既闕西成曷期况烝黎之間貧富不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徵稅草買草價必倍髙是使豪富之徒乘急令以邀其利窮乏之軰因暴斂以毁其家非所謂均節財物凖平賦法之術也臣等又勘度支京兆比來雇車估價及所載多少大率毎一車載一百二束毎一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設令逺近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計般運已當三十有五文買草本價又更半之而度支曽不計量自我作古徑以胷臆斟酌限為二十五文謂之加徵則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈如官自置埸要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徵固不同等幸有舊制足可遵行何必捨易而即難棄利而從害臣誠暗滯未見其宜伏望戒勅度支令依舊例和市承前既有恒用以後不得闕供稍峻隄防使知懍懼妄作但不施用歳計必免愆違陛下若以軍廐之中馬畜漸衆度支所營藁芻纔可供給當年或慮水旱不虞别須蓄積為備今屬歳稔亦是其時但要收斂有方不宜科配致擾若度支併市延齡必復辭難須有區分使之均濟望委京兆尹勾當别和市草五百萬束以充貯備其所和市並隨要便官自置場毎場貯錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數内以給用不盡者充毎市滿十萬束一度聞奏便以府司郵遞車牛并更雇脚相添轉徙場所般載送付苑中輸納如䝉聖㤙允許臣即依此宣行既免擾人又不増費以資儲蓄足禦㓙災度支謹守恒規亦自不闕常用臣等商度将為合宜謹録奏聞伏聽進止論左降官准赦合量移事状右竄謫之徒皆在遐僻或廹於衰暮顧景思還或困於瘴癘翹心望徙既關霈澤許以量移企躍之情逺想可見若准所司舊例須俟州府錄申盤勘檢尋動踰年歳上稽恤宥之㫖下虧慶頼之心臣等商量恐須釐革望令所司據承貞元六年恩赦檢勘已量移未量移官及貞元六年恩後左降官等除遷改亡歿之外具名銜及貶責事由年月速報中書門下不須更待州府申請臣等據所司報到則便進擬不出歳内冀悉霑恩未審可否謹録奏聞伏聽進止再奏量移官狀右伏以國之令典先徳後刑所後者法當舒遲故決罪不得馳驛行下所先者體宜疾速故赦書日以五百里為程誠以聖王之心務𢎞慶恵必迴翔於行罰而企躍於舒恩不加罰於典法之外不虧恩于徳令之内則受責者莫得興怨荷貸者咸思自新所謂威之斯懲宥之斯感懲以致理感以致和致理則尊致和則愛為人父母必在兼行陛下徳配上元澤流下土頃因郊祀普降鴻恩凡是貶責之人並許量移近處臣等任叨輔翼職在宣行尋具奏聞請便進擬聖心精一務欲均齊令待所司檢尋一時類例處分其左降官内或罪非可棄才有足甄亦許别狀商量不拘常例奨用臣等據所司檢勘左降官及流人送名到者都比擬量移及别追用分為三状前月十二日封進其流人量移状已䝉印出行下訖餘兩状至今未奉進止竊以赦書宣布僅欲半年若更淹遲恐乖事體又諸州刺史及臺省官等繼有事故頗多缺員睿㫖精於選求至今常不充備以眚掩徳見非古人録用棄瑕允歸聖造願廣含𢎞之美庶増誘掖之途謹奉状陳聞伏聽進止三進量移官状右希顔奉宣進止舊例左降官毎准恩赦量移不過三百五百里今度進擬稍似超越又多是近兵馬處及當路州縣事非穏便宜更商量伏以罰宜從輕赦宜從重所以昭仁恕之道廣徳澤之恩也夫位尊者其恵不可以不重言大者其實不可以不豐位尊而恵輕則體非宜言大而實寡則人失望陛下躬行盛禮渙發徳音念謫居之荒遐哀負累之沉棄俾移近處将合新恩赦令初行室家相慶恵亦至矣言亦大矣竊料竄逐窮僻喜聞霈澤降臨固必破産以飾行装計日而俟休命荏苒淹息復經半年儻又所移之官還與舊任隣近竊恐乖陛下垂愍之意虧制書行慶之恩口恵重而事實輕非所以掦鴻休而布大信也謹按承前格令左降官非元勅令長任者毎至考滿即申所司量其舊資便與改叙縱或未有遷轉亦即任其歸還逮于開元末李林甫固權専恣凡所斥黜類多非辜慮其却廻或復寃訴遂奏左降官考滿未别改轉者且給俸料不湏即停外示優矜實欲羈係從此已後遂為恒規一經貶官便同長往迴望舊里永無還期縱遇非常之恩許令移逺就近雖名改轉不越幽遐或自西徂東或從大適小時俗之語謂之横移馴致忌尅之風積成天寳之亂展轉流弊以至於今天下咸病此法深苛而不能改從舊典者良以猜嫌之慮易惑上心将謂負譴之人悉包樂禍之意已經黜責遂欲隄防故髙論則痛嫉林甫之陰邪而密網則習行林甫之弊法憸邪為蠧乃至於斯然則左降永絶於歸還量移不離于僻逺蓋是姦臣詭計殊非國典舊章且貶黜之中情状各異犯有輕重責有淺深固非盡是回邪皆須備慮王者之道待人以誠有責怒而無猜嫌有懲沮而無怨忌斥逺以儆其不恪甄恕以勉其自新不儆則浸及威刑不勉則復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進叙人知復用誰不増修何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦兇恒處防閑之中長從擯棄之例則是悔過者無由自補藴才者終不見伸凡人之情窮則思變含悽貪亂或起於兹雖則何患能為亦足感傷和氣謂非帝王開懷含垢之大體聖哲誘人遷善之良圗也臣等昨進擬商度非不精詳既審事宜亦尋舊例參求折衷兼務齊平大約所擬之官各移近地一道郡邑稍優於舊任官資序進於本銜並無降差亦不超越其有累經移改已至關畿則但以大州増其常秩所冀人皆受賜施不失平上副鴻恩下塞延望纔將得所殊匪為優今若裁限所移不過三五百里則有改職而疆域不離於本道遷居而風土反惡於舊州徒有徙家之勞是増移配之擾又當今郡府多有軍兵所在封疆少無舘驛應合量移之例約有二百許人道路須訃其逺邇之差州縣則校其髙下之等若必選非當路復不近兵則恐類例失倫署置偏併示人疑慮體又非𢎞幸希聖聦更賜裁審其擬官状並未敢改革謹重封進伏聽進止請邊城貯備米粟等状右兵之所屯食最為急若無儲蓄是棄封疆自昔敗亂之由多因餽餉不足臣以任當體國職合分憂奏減河運脚錢用充軍鎮和糴幸䝉聖恩允許又屬頻歳順成二年之間㳂邊諸軍共計收糴米粟一百八十餘萬石準元敇各委當道節度及監軍中使度支知巡院官同勾當檢納仍以貯備軍糧為名非縁城守乏絶及不承别敇處分並不得輙有費用若能堅守此制有用隨即却填則是邊城當貯十五萬人一歳之糧以為急難之備永無懸絶足固軍情去歳版築五原大興師旅所司素無備擬臨事支計缺然齎送悉貸此糧乃得軍行辦集過事之後准敇合填迨今二年竟不支遣加以諸鎮軍食例皆闕供及其告急上聞宣㫖下迫則又請貸貯粟以充将士月糧既務廢隳且無愧畏所未匱竭其能幾何夫栽植至難毁拔至易古人以植楊為喻能不為之歎惜哉况水旱流行固宜有備戎狄為患可不為虞將欲安邉先宜積穀今當嵗稔令益軍儲反罄聚蓄之資用供朝夕之費儻遇災難則如之何惟陛下詳思後圗不貽他日所悔臣之願也疆場之幸也不勝區區慮患之意謹冒昧以聞謹奏翰苑集巻二十欽定四庫全書翰苑集巻二十一唐陸贄撰中書奏議五論裴延齡姦蠧書一首十一月三日具官臣某惶恐頓首獻書皇帝陛下臣聞君子小人用捨不並國家否泰恒必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人於蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠧也眯離婁之目則天地四方之位不分矣充子野之耳則雷霆蠅黽之聲莫辨矣雖后稷之穡禾易長畆而蟊傷其本則零瘁而不植矣雖公輸之巧臺成九層而蠧空其中則圯折而不支矣是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而沮之哉誠以其蔽主之明害時之理致禍之源博傷善之釁深所以有國有家者不得不去耳其在周易則曰大君有命開國承家小人勿用必亂邦也在尚書則曰除惡務本去邪勿疑在毛詩則曰無縱詭隨以謹無良曽是掊克斂怨以為徳盜言孔甘亂是用餤䜛人㒺極交亂四國在論語則曰惡利口之覆邦家者在春秋則曰聚斂積實不知紀極毁信廢忠崇飾惡言靖譖庸回服讒蒐慝天下之人謂之四兇在禮記則曰小人行險以徼幸長國家而務財用者必自小人矣小人使為國家而災害並至雖有善人無如之何臣頃因讀書常憤此類不圗聖代目覩斯人户部侍郎裴延齡者其性邪其行險其口利其志㓙其矯妄不疑其敗亂無恥以聚斂為長策以詭妄為嘉謀以掊克斂怨為匪躬以靖譖服讒為盡節揔典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下協放勛文思之徳而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽則天討斯得聖化允孚小往大來孰不欣幸跡其姦蠧日長月滋隂秘者固未盡彰敗露者猶難悉數今請粗舉數事用明欺㒺大端悉非隠微皆可覆騐陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩願擇左右親信兼與舉朝公卿據臣所言閱實其事儻延齡罪惡無狀即臣之奏議是誣宜申典刑以制虛妄俾四海法朝廷之理兆人戴陛下之明得失之間其體甚大不當復有疑慮使辨之不早以竟失天下之望也前歳秋首班宏喪亡特詔延齡繼司邦賦數月之内遽􅃷功能奏稱勾獲隠欺計錢二十萬貫請貯别庫以為羨財供御所須永無匱乏陛下欣然信納因謂委任得人既頼贏餘之資稍𢎞心意之欲興作浸廣宣索漸多延齡務實前言且希睿旨不敢告闕不敢辭難勾獲既是虛言無以應命供辦皆承嚴約茍在及期遂乃搜求市􅆵豪奪入獻追捕夫匠迫脅就功以勅索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連羣遮訴盈路持綱者莫敢致詰巡察者莫敢為言時有致詰為言翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心于上斂怨於人欺天陷君逺邇危懼此其罪之大者也揔制邦用度支是司出納貨財太府攸職凡是太府出納皆廩度支文符太府依符以奉行度攴慿按以勘覆互相關鍵用絶姦欺其出納之數則毎旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相承月月相繼明若指掌端如貫珠財貨少多無容隠漏延齡務行邪謟公肆誣欺遂奏云左藏庫司多有失落近因檢閱使置簿書乃於糞土之中收得銀十三萬両其疋段雜貨百萬有餘皆是文帳脫遺並同巳棄之物今所收獲即是羨餘悉合移入雜庫以供别勅支用者其時特宣進止悉依所奏施行太府少卿韋少華抗表上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗姦計兩司既相論執理須辨鞫是非臣等具以奏聞請定三司詳覆若左藏庫遺漏不謬隠匿固合抵刑如度支舉奏是虛誣誑亦宜得罪陛下既不許差三司按問又不令檢奏辨明度支言太府隠漏至多而少華所任如舊太府論度支姦欺頗甚而延齡見信不渝枉直兩存法度都弛以在庫之物為收獲之功以常賦之財為羨餘之費罔上無畏示人不慚此又罪之大者也國之府庫用寘貨財物合入官則納於其内事合給用則出乎其中所納無非法之財所出無不道之用坦然明白何曲何私而延齡險滑售姦詭譎求媚遂於左藏之内分建六庫之名意在别貯贏餘以奉人主私欲曽不知王者之體天下為家國不足則取之於人人不足乃資之於國在國為官物在人為私財何謂贏餘復須别貯是必巧詐以變移官物暴法以刻斂私財捨此二途其将焉取陛下方務崇信不加檢裁延齡既怙寵私益復放肆遂録積久逋欠妄云察獲姦贓總計緡錢八百餘萬聽其言則利益雖大考其事則虚誕自彰或是水火漂焚或縁旱澇傷敗或因兵亂散失或遭寇賊敓􅜙或准法免徵或經㤙合放或人户逃逸無處追尋或綱典拘囚不克填納或沒入店宅歳久摧殘或收獲舟船年深破壊類皆如此難以殫論在人者並無可科徵屬官者悉不任貨賣但存名額虚掛簿書大抵錢穀之司皆恥財物減少所以相承積累不肯滌除每當計奏之時常充應在之數延齡茍稱察獲遂請徵收恢張利門誘動天聽貽誚侮於方岳賈愁怨於烝黎于兹累年一無所得其為疎妄亦曰殆哉陛下姑欲保持曽無詰問延齡謂能蔽惑不復懼思姦威既沮於四方憸態復行於内府由是蹂􅏳官屬傾倒貨財移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戯諸州輸送布帛度支不務準平抑制市人賤通估價計其所折即更下徵重困疲甿展轉流弊既彰忍害且示不誠及其支送邊州用充和糴則於本價之外例増一倍有餘布帛不殊貴賤有異剥徵㒺下既以折估為名抑配傷人又以出估為利事多矛盾交駭物情窮邊穡夫痛憤切於骨髓下土編户寃呌徹於蒼旻而延齡以冒取折估為忠公茍得出估為賸利所謂失人心而聚財賄亦何異割支體以徇口腹哉殊不寤支體分披口安能食人心離析財豈能存此又罪之大者也平原逺鎮扼制蕃戎五原要衝控帯靈夏芟夷榛薉翦逐豺狼﨑嶇繕完功力纔畢地猶夐絶勢頗孤危新集之兵志猶未固尤資贍恤俾漸安居頻勅度支令貯軍粮常使平原有一年之蓄鹽州積半年之儲循環轉輸不得闕數近者二鎮告急俱稱絶粮陛下召延齡令赴中書遣希顔宣㫖質問延齡確言饋餉不絶儲蓄殊多歲内以來必無闕乏希顔懼其推互邀令草狀自陳狀亦如言略無疑畏陛下覽其所奏翻謂軍吏不誠遂遣中官馳往檢覆道路無轉運之跡軍城無旬日之儲將卒嗷嗷幾将不守有如是之顛沛有如是之欺謾按驗既明恩勞靡替其為蠱媚曠代罕聞此又罪之大者也國之憲度㑹府是司位列諸郎猶應辰象任居六事實代天工内揔轄於庶官外敷化於列郡舉措繫生靈之命得失關理亂之源為人軌儀安可容易未有大官弛縱而能使羣吏服從朝典陵遲而欲禁天下暴慢是以天寳将季楊國忠為吏部尚書亟於私庭詮集選士果令逆豎得以為詞史策書之足為國恥而延齡放情亂紀又甚國忠懈於夙興多闕㑹朝之禮徇其鄙次大隳省署之儀徙郎曹於里閭視公事於私第盡室飫宫厨之饍填街持簿領之書復有諸部參辭四方申請決遣資其判署去就俟其指撝延齡或聚客大誇不令白事或縱酒慿怒莫敢入言至有迫切而來逾旬未省輸納之後累月不歸資粮罄於滯淹筋力困於朝集晨趨夕散十百為羣里中喧闐常若闤闠衢巷列屠沽之肆邑居成逆旅之津離次慢官虐人斁法求之今古鮮有其倫此又罪之大者也揔領財賦號為殷繁自必識究變通智權輕重大不失體細能析微濟之以均平莅之以勤肅近無滯事逺無壅情綱條之下無亂䋲鑒照之内無隠匿然後人不困而公用足威不厲而姦吏懲茍或未然則非稱職况延齡以素本僻戾之質而加之以狂躁滿盈既懵且驕事何由理遂以國家大計委於胥吏末流當給者無賄而不支應徵者受賕而縱免紀綱大壞貨賂公行茍操利權實竊邦柄近者度支小吏屢為府縣所繩鞫其姦贓無不狼籍通結動連於節将交私匪止於苞苴威福潛移乃至於是職司失序固亦可知此又罪之大者也風教之大禮譲為先禮譲之行朝廷為首朝廷者萬方之所宗仰羣士之所楷模觀而效焉必有甚者是以朝廷好禮則俗尚敬恭朝廷尊譲則時恥貪競朝廷有失容之慢則凌暴之弊播於人朝廷有動色之争則攻鬬之禍流於下聖王知其然也故選建賢徳以為公卿使人具瞻不諭而化昔周之方盛多士盈朝時靡有争用能俾乂故其詩曰慎爾出話敬爾威儀無不柔嘉又曰有來雍雍至止肅肅相維辟公天子穆穆言羣臣相與事上敬而能和言語動作靡有不善也周徳既衰小人在位務相侵侮以至危亡故其詩曰方茂爾惡相爾矛矣又曰旣之陰汝反予來嚇又曰涼曰不可覆背善詈言小人得志惡怒是慿肆其􅄶心以相詬病也陛下勤修儀式以靖四方慎選庶官以貞百度内選則股肱耳目外選則垣翰藩維濟濟師師咸欽至化庶相感率馴至大和而度支慿寵作威恃權縱暴侵刻軍鎮匱闕資粮将帥每使申論延齡率加毁訾或指誣隱盜或謗訐陰私或數其出處賤微或億其心志邪悖詞皆醜媟事悉加誣匹夫見凌猶或生患況將帥素加委遇多著勲庸縱有踰分取求但宜執理裁處茍當其所孰敢不從豈可對彼偏禆恣行侵辱使其慚􅌤於麾下憤恥於朝廷惟口起羞諒非細故為國聚釁實由斯人而又虐害羣司幸其闕敗蔑彼彞典逞於兇懷氣呑等夷𨽻蓄郎吏時有履道而不為屈撓守官而莫肯由從遭其詆訶事則尤劇或辱兼祖父或毁及家門皆名教所不忍聞叙述所不堪紀其為構陷抑復多端故示兇威使人懾憚人之狂險乃至於斯上虧大猷下扇流俗炰烋禮義之府衊汙清明之朝此又罪之大者也度支舊管牛驢三千餘頭車八百餘乘循環載負供饋邊軍既有畨遞之倫永無科配之擾延齡茍逞近效不務逺圖廢其葺修減其蒭秣車破畜耗略無孑遺每須載運軍資則令府縣差雇或有卒承别㫖須赴促期遂於街市之間擄奪公私雜畜披猖頗甚費損尤多吏因生姦人不堪命所減者則奏以為利所費者則隠而不論破實徇虚多如此類度支應給宫内及諸司使蒭藁薪炭等除稅草之外餘並市供所用既多恒須貯備舊例每至秋穫之後冬收之時散開諸場逐便和市免費髙價復資貧人公私之間頗謂兼濟延齡悉隳舊制但飾姦情旋計蒭薪價錢以為節減剰利及乎春夏之際藁秸巳殫霖潦之中樵蘇不繼軍廐輟莝官廚待然告闕頻煩於聖聦徵催絡繹於省署崎嶇求買何暇計量麋損官錢不啻累倍聨蹇狼狽率以為常此則睿鑒之所眀知物情之所深駭事之舛繆觸緒皆然臣愚以謂若斯之流不過歳費國家百萬緡錢及事體非宜耳其為罪惡未足傾危事之可憂不在於此是以不復詳舉以煩聼覽也至如矯詭之態誣㒺之辭遇事輙行應口便發靡日不有靡時不為自非狀迹尤彰足致其禍者又難以備陳也延齡有詐偽亂邦之罪七而重之以耗斁闕遺愚智共知士庶同憤以陛下英明鑒照物無遁情固非延齡所能蔽虧而莫之辨也或者聖㫖以其甚招疾怨而謂之孤貞可託腹心以其好進讒諛而謂之盡誠可寄耳目以其縱暴無畏而謂之强直可肅姦欺以其大言不疑而謂之智能可富財用将欲排衆議而収其獨行假殊寵而冀其大成倘陛下誠有意乎在兹臣竊以為過矣夫君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無繆好者不邪安在私託腹心以售其側媚也以天下之耳目為耳目則天下之聰明皆我之聦明也是以明無不鑒聦無不聞安在偏寄耳目以招其蔽惑也夫布腹心而用耳目舜與紂俱用之矣舜之意務求已之過以與天下同欲而無所偏私由是天下臣庶莫不歸心忠讜既聞元徳逾邁故虞書云臣作朕股肱耳目又云明四目達四聰言廣大也紂之意務求人之過以與天下違欲而溺於偏私由是天下臣庶莫不離心險詖既行昬徳彌熾故商書云崇信姦囘大雅云流言以對寇攘式内言邪僻也與天下同欲者謂之聖帝與天下違欲者謂之獨夫其所以布腹心而任耳目之意不殊然於美惡成敗若此相逺豈非求過之情有異任人之道不同哉太宗嘗問侍臣何者為明君何者為暗主魏徵對曰君之所以明者兼聽也其所以暗者偏信也又曰秦之胡亥偏信趙髙肆其姦欺卒至顛覆徵之此說理致甚明簡册備書足為鑒戒趙髙指鹿為馬愚弄厥君厯代流傳莫不痛憤陛下毎覽前史詳考興亡固亦切齒於斯人傷心於其主臣謂鹿之與馬物類猶同豈若延齡掩有而為無指無而為有陛下若不以時省察得無使後代嗟誚又甚趙髙者乎斯愚臣所以焦慮疚懐以陛下為過者良有所以也夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今徳義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有徳必有人有人必有土有土必有財百姓足君孰與不足蓋謂此也自古及今徳義不立而利用克宣人庶不安而財貨可保因以興邦固位者亦未之有焉故曰財散則人聚財聚則人散與其有聚斂之臣寧有盜臣無令侵削兆庶以為天子取怨於下其有若此者行罰無赦蓋為此也殷紂以貪冒失人而亡周武以散發得人而昌則紂之多藏適所以為害已者之資耳尚何賴於財賄哉太宗亦云務蓄積而不恤人甚非國家之計隋氏不道聚斂無厭所實洛口諸倉卒為李密所利此則前代已行之明效聖祖垂裕之格言是而不懲何以為理陛下初膺寳厯志翦羣兇師旅繁興徵求􅐛廣𣙜筭侵剥下無聊生是以涇原叛徒乘人怨咨白晝犯闕都邑甿庶恬然不驚反與賊衆相從比肩而入宫殿雖蚩蚩之性靡所不為然亦由徳澤未浹於人而暴令驅迫以至於時也于是内府之積尚如丘山竟資兇渠以餌貪卒此時陛下躬覩之矣是乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之内萬衆所屯窘如涸流庶物空匱嘗欲發一健歩出視賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覓不致竟憫黙而遣之又嘗宫壼之中服用有闕聖旨方以戎事之急不忍重煩於人乃剥親王飾帶之金賣以給直是時行從將吏赴難師徒倉黄奔馳咸未冬服漸屬凝冱且無薪烝饑凍内攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飈冒霜霰踰旬而衆無攜貳卒能走強賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其資與衆庶同其憂患與士伍共其有無乃能使捐軀命而扞寇讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既解諸道稍通賦稅漸臻貢獻繼至乃於行宫外廡之下復列瓊林大盈之司未賞功勞遽私賄玩甚沮惟新之望頗􅂝死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然歟旋屬蟊賊内攻翠華南狩奉天所積財貨悉復殲於亂軍既遷岷梁日不暇給獨慿大順遂復皇都是知天子者以得人為資以蓄義為富人茍歸附何患蔑資義茍修崇何憂不富豈在貯之内府方為巳有哉故藏於天下者天子之富也藏於境内者諸侯之富也藏于囷倉篋匵者農夫商賈之富也柰何以天子之貴海内之富而猥行諸侯之棄徳蹙守農商之鄙業哉陛下若為厚取可以恢武功則建中之取既無成矣若謂多積可以為已有則建中之積又不在矣若謂狥欲不足傷理化則建中之失傷巳甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪已悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祗嘉陛下之誠臣庶感陛下之意釋憾迴慮化危為安陛下亦當為宗廟社稷建不傾不拔之永圗為子孫黎元垂可久可大之休業懲前事徇欲之失復日新盛徳之言豈宜更縱憸邪復行刻暴事之追悔其可再乎臣又竊慮陛下納彼盜言墮其姦計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大繆所宜慎思夫人主昬明繫於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而災禍不及邦國者乎譬猶操兵以刃人天下不委罪於兵而委罪於所操之主蓄蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家理有必然不可不察臣竊慮陛下以延齡之進獨出聖衷延齡之言多順宸旨今若以罪寘辟則似為衆所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其於改過不吝去邪勿疑之道或未盡善焉夫人之難知著自淳古試可乃已載於典謨陛下意其賢而任之知其惡而棄之此理之常於何不可倘陛下猶未知惡但疑見擠固有象恭挾詐之人亦有黨邪害直之士所資考覈兩絶欺誣陛下以延齡為能愚臣以延齡為罪能必有跡罪必有端陛下胡不指明其所效之能以表忠賢按驗其所論之罪以考虛實與衆同辨示人不私若能跡可稱而罪端無據則是黨邪害直之驗也陛下當繩其傷善以勵事君罪端有徵而能跡無實則是象恭挾詐之驗也陛下當紏其包禍以戒亂邦如此則上之於下釋嫌構之疑下之於上絶偏惑之議何必忠邪無辨枉直莫分薰蕕同藏其臭終勝此則小人道長之象也實時運否泰安危之所繫豈但有虧聖徳不利善人而已乎陛下若以必與已同者為忠良自我作者無改變如此則上之所欲莫不謟上之所失莫不從水火相濟不為非金礪相須不為是恥過怍非不足戒捨已從人不足稱惟意是行則匡輔或幾乎息矣匡輔息則理不可致仲尼所謂一言喪邦者在於予之言而莫予違也事關興亡固不可忽希旨順黙浸已成風奨之使言猶懼不既若又阻抑誰當貢誠伏恐未亮斯言請以一事為證只如延齡㓙妄流布寰區上自公卿近臣下逮輿臺賤品諠諠談議億萬為徒能以上言其人有幾陛下試令親信博採輿詞參校比來所聞足鑒人間情偽臣以卑鄙任當台衡既極崇髙又承渥澤豈不知觀時附㑹足保舊恩隨衆沉浮免貽厚責謝病黜退獲知幾之名黨姦茍容無見嫉之患何急自苦獨當豺狼上違懽情下餌讒口良由内顧庸愚一無所堪夙䝉眷知唯在誠直綢繆帳扆一紀于兹聖慈既以此見容愚臣亦以此自負從陛下厯播遷之臲卼覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭懼慮燬室而悲鳴蓋情激於衷雖欲罷而不能自黙也因事陳執雖已頻繁天聽尚髙未垂諒察輒申悃款以極愚誠憂深故語煩懇迫故詞切以微臣自固之謀則過為陛下慮患之計則忠糜軀奉君非所敢避沽名􅃷直亦不忍為願迴睿聦為國熟慮社稷是賴豈唯微臣不勝荷恩報徳之誠謹昧死奉書以聞臣誠惶誠恐頓首再拜論朝官闕員及刺史等改轉倫序状右臣聞於經曰濟濟多士文王以寧又曰無曠庶官天工人其代之蓋謂士不可不多官不可不備敦付物以能之義闡㳟巳無為之風此理道得失之所由也夫聖人之於愛才不唯仄席求思而巳乃復引進以崇其術業歴試以發其器能旌善以重其言優禄以全其操歳月積久聲實並豐列之於朝則王室尊分之於土則藩鎮重故詩序太平之君子能長育人才書比梓人之理材既勤樸斵惟施丹雘禮著造士易尚養賢蓋以人皆含靈唯所誘致如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥疏濬則川沼是以書籍所載歴代同途祚屬殷昌必時多雋乂運鍾衰季則朝乏英髦當在衰季之時咸謂無人足任及其雄才御㝢淑徳應期賢能相從森若林㑹然則興王之良佐皆是季代之棄才在季而愚當興而智乃知季代非獨遺賢而不用其於養育奨勸之道亦有所不至焉故曰人皆含靈唯其誘致漢髙稟大度故其時多魁傑不羈之材漢武好英風故其時富瓌詭立名之士漢宣精吏能故其時萃循良核實之能迨乎哀平桓靈昵比小人疎逺君子故其時近習操國柄嬖戚擅朝權是知人之才性與時升降好之則至奨之則崇抑之則衰斥之則絶此人才消長之所由也臣毎於中夜竊自深惟朝之乏人其患有七不澄源而防末流一也不考實而務博訪二也求精太過三也嫉惡太甚四也程試乖方五也取舍違理六也循故事而不擇可否七也夫多少相繆非嘉量不平輕重相欺非縣衡不定用之茍不得其道則主者實病而權量無尤故按名責實者選吏之權量也宰相者主權量之用也宰相之主吏猶司府之主財主吏在序進賢能主財在平頒秩俸假使用財失節則司之者可以改易而秩俸不可以不頒主吏乖方則宰之者可以變更而賢能不可以不進其行甚易其理甚明頃者命官頗異於是常以除吏多少准量宰相重輕宰相承寵私則援引雖濫而必進宰相見疎忌則擬議雖當而罕俞是使羣材仕進之窮通唯繫輔臣恩澤之薄厚求諸理道未謂合宜夫與奪者人主之利權名位者天下之公器不以公器徇喜心不以利權肆忿志不以寡妨衆不以人廢官或其此處有脫誤阻執事而擁羣材所謂不澄源而防末流之患也經曰無以小謀亂大作無以嬖人疾荘士蓋務大者不拘於小累謀小者不達於大猷嬖者或行異於荘荘者必性殊於嬖理勢相激宜其不同進賢援能諒君子之事遏惡揚善非小人所能君子以愛才為心小人以傷善為利愛而引之則近黨傷而沮之則似公近黨則不辨而遽疑似公則不覈而縣信是以大道毎隳於横議良才常困於中傷失士啓讒多由於此所謂不考實而務博訪之患也夫人之器局有圓方大小之殊官之典司有難易閑劇之别名稱有虛實之異課績有升降之差將使官不失才才不失序在乎制法以司契擇人而秉鈞制之不得厥中則其法可更而其契不可亂也擇之不當所任則其人可去而其秉不可奪也如或事多錯雜任靡適從而但役智以求精勞神而救弊則所救愈失所求愈麤故書曰元首明哉股肱良哉庶事康哉元首叢脞哉股肱墮哉庶事隳哉頃之輔臣鮮克勝任過䝉容養茍備職員致勞睿思巨細經慮毎有闕官須補或縁将命藉才宰司慎擇上聞必極當時妙選聖情未愜復命别求執奏既不見從則又降擇其次如是至於再至於三所選漸髙所得轉下或斷於獨見㒺徇僉諧或擢自旁求不稽公議權衡失柄進取多門等差不倫聲實相反此所謂求精太過之患也臣聞耀乘之珠不能無纇連城之璧不能無瑕矧伊有情寧免愆吝仲尼至聖也猶以五十學易無大過為言顔子殆庶也尚稱不逺而復無祗悔為羙况自賢人以降孰能不有過失哉珠玉不以瑕纇而不珍髦彦不以過失而不用故元元之教曰常善救人則無棄人文宣亦云赦小過舉賢才齊桓不以射鈎而致嫌故能成九合之功秦穆不以一眚而掩德故能復九敗之辱前史序項籍之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不可屬國曰聞人過終身不忘然則棄瑕録用者霸王之道記過遺才者衰亂之源夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改修則復進既不廢法亦無棄人雖纖芥必懲而才用不匱故能使黜退者克勵以求復登進者警􅅚以恪居上無滯疑下無蓄怨俾人於變以致時雍陛下英聖統天威莊肅物好善既切計過亦深一抵譴責之中永居嫌忌之地夫以天下士人皆求宦名獲登朝班千百無一其於修身勵行聚學樹官非數十年間勢不能致而以一言忤犯一事過差遂從棄捐沒代不復則人才不能不乏風俗不能不偷此所謂嫉惡太甚之患也臣聞君子約言小人先言君子之道闇然而日章小人之道的然而日亡孔子曰始吾於人也聽其言而信其行今吾於人也察其言而觀其行又曰舉直措諸枉則民服舉枉措諸直則民不服然則舉措不可以不審言行不可以不稽呐呐寡言者未必愚喋喋利口者未必智鄙樸忤逆者未必悖承順愜可者未必忠故明主不以辭盡人不以意選士凡制爵禄與衆共之先論其材乃授以職所舉必試之以事所言必考之於成然後茍妄不行而貞實在位矣如或好善而不擇所用悅言而不驗所行進退隨愛憎之情離合繫異同之趣是猶捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬此所謂程試乖方之患也天之生物為用罕兼性有所長必有所短材有所合亦有所暌曲成則品物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良御適險易之宜故駑驥無失性物既若此人亦宜然其於行能固不兼具前志所謂千年一聖五百年一賢者才難不其然乎夫唯聖人方體全德賢之為目猶有未周且以未周之才彌五百年而有一造次求備曷由得人若夫一至之能偏禀之性則中人以上迭有所長茍區别得宜付授當噐各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而已帝王之盛莫盛唐虞臣佐之盛莫盛稷禹稷禹之比無非大賢然猶各任所能不務兼備故尚書序堯舜命官之美自稷禹咎益以降凡二十二人所命典司不踰一職用能平九土播百穀敷五敎序五刑禮樂興和蠻夷率服洎鳥獸魚鼈亦罔不寧蓋由舉得其人任得其所鑒擇職授審之於初不求責於力分之外不沮撓於局守之内是以事極其理人盡其材君埀拱於上臣濟美於下功焯當代名施無窮及其失也則升降任情首末異趣使人不量其器與人不由其誠以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則責望過當不恕其所不能是以職司之内無成功君臣之際無定分此所謂取捨違理之患也今之議者多曰内外庶官久於其任又曰官無其人則闕之是皆誦老生之常談而不推時變守舊典之糟粕而不本事情徒昡聰明以撓理化古者人風既朴官號未多但别愚賢匪論資序不責人以朝夕之效不計事於尺寸之差不以小善而襃升不以一眚而罪斥故虞書三載考績三考黜陟幽明是則必俟九年方有進退然其所進者或自側微而納於百揆雖久於任復何病哉漢制部刺史秩六百石郡守秩二千石刺史髙第者即遷為郡守郡守髙第者即入為九卿從九卿即遷為亞相相國是乃從六百石吏而至台輔其間所歴者三四轉耳久在其任亦未失宜近代建官漸多列級逾密今縣邑有七等之異州府有九等之差同謂省郎即有前中後行郎中員外五等之殊並稱諫官則有諌議大夫補闕拾遺三等之别洎諸臺寺率類於斯悉有常資各須循守若依唐虞故事咸以九載為期是宜髙位常苦於乏人下寮毎嗟於白首三代為理損益不同豈必樂于變易哉蓋時勢有不得已也至如鯀陻洪水績用靡成猶終九年然後殛竄後代設有如鯀之比者豈復能九年而始行罰乎臣固知其必不能也行罰欲速而進官欲遲以此為稽古之方是猶却行而求及前人也頃者臣因奏事論及内外序遷陛下乃言舊例居官歳月皆久朕外祖曽作秘書少監一任經十餘年董晉将順睿情遂奏云臣於大厯中曽任祠部司勲二郎中各經六考陞下之意頗為宜然以臣惷愚實有偏見凡徵舊例須辨是非是者不必渝非者不必守况於舊例之内自有舛駮之異哉先聖之初權臣用事其於除授類多徇情有一月屢遷有積年不轉迨至中歳君臣構嫌姑務優柔百事凝滯其於選授尤所艱難始以頗僻失平繼以疑阻成否至使彛倫闕叙庶位多淹是皆可懲曷足為法夫覈才取吏有三術焉一曰拔擢以旌其異能二曰黜罷以糾其失職三曰序進以謹其守常如此則髙課者驟升無庸者亟退其餘績非出類守不敗官則循以常資約以定限故得殊才不滯庶品有倫參酌古今此為中道而議者暗於通理一槩但曰宜久其任得非誦老生之常談而不推時變者乎夫列位分官緝熈帝載匪唯應務兼亦養才是以職事雖有小大閑劇之殊而俱不可曠缺者蓋備於時而用耳故記曰天子以騶虞為節樂官備也唯經邦贊國之任則非有盛徳不可以居故記曰設四輔及三公不必備惟其人議者昧於明徵一槩但曰官無其人則闕得非守舊典之糟粕而不本事情者乎今内外羣官考深合轉陛下或言其已有次第須且借留或謂其未著功勞何用數改是乃循黙者既以無聞而不進著課者又有成績而見淹雖能否或差而沉滯無異人之從宦積小成髙至於内列朝行外登郡守其於更歴多已長年孜孜慎修計日思進而又淹逾考限亟易星霜顧懷生涯能不興歎殊異登延之義且乖勸勵之方夫長吏數遷固非理道居官過久亦有弊生何者時俗常情樂新厭舊有始卒者其唯聖人降及中才罕能無變其始也砥勵之心必切其久也因循之意必萌加以盈無不虧張無不弛天地神化且難常全人之所為安得皆當是以分分而度至丈必差銖銖而稱至鈞必謬莅職既久寧無咎愆或為姦吏所持或坐深文所糾偶以一跌盡隳前功至使理行不終能名中缺豈非上失其制而推致以及於斯乎故聖人愛人之才慮事之弊採其英華而使之當其茂暢而奨之不滯人於已成之功不致人於必敗之地是以銳不挫而力不匱官有業而事有終此理之中庸故書以為法遷轉甚速則人心茍而職業不固甚遲則人心怠而事守浸衰然則甚速與甚遲其弊一也陛下俯徇浮議謂協典謨久次當進者既曰務欲且留缺員須補者復曰官不必備則才彦何由進益理化孰與交修此所謂循故事而不擇可否之患也伏惟陛下憂勤務理夢想思賢體陶唐有虞聦明之徳以敷求法太宗天后英邁之風以拔擢然而得人之盛尚愧前朝厎乂之功未光當代良以七患未去三術未行而又睿察太深宸嚴太峻常人才器曷副天心故雖獲超升亦驟從黜廢人物殘瘁抑斯之由而議者莫究致弊之端但思革弊之策反以廣於進用為情故以梗於除授為精詳以避謗為奉公之誠以摘瑕為選士之要乃至稱毁紛糅羙惡混并凡有遷升必遭掎摭聖徳廣納不時發明小人多言益敢陰詐以是眩惑目無全人進用之意轉疑汲引之途漸隘舊齒既凋敗幾盡下位或滯淹罕升故令官序失倫人才不長資望漸薄砥勵浸微髙卑等衰殆不相續臣以竊位屬當序才懼曠庶官亟黷宸扆昧識不足以周物微誠不足以動天徒勤進善之心轉積妨賢之罪慚惶交慮焚灼盈懷凡除吏者非謗刺之所生必怨咎之所聚宰臣獲戾多起於兹屢屢上干何所為利但以待罪鈞轄職思其憂兼迫於感㤙願効之誠不得不冒昧言之耳其於裁擇用捨惟陛下圖之謹奏翰苑集巻二十一欽定四庫全書翰苑集巻二十二唐陸贄撰中書奏議}
