  - {type: variant, offset: 15, length: 0, content: '', WYG: 五欽定四庫全書翰苑集巻六唐陸贄撰制誥冊命祝冊祭文策問答表冊淑妃王氏為皇后文維貞元二年嵗次丙寅十一月丁亥十一日丁酉皇帝若曰乾坤合徳聖人則之惟帝承天惟后配帝嗣續百代母臨萬邦位定于中而尊加于外徳修諸已而化被於人御於家邦所繫斯在三代崇替靡不由之予是以詢衆採賢重難兹命中壼虛位於今厯年隂儀或虧宗事無主缺於典禮朕甚愧焉稱是徽章聿歸全徳咨爾淑妃王氏天與純粹氣鍾元和含章在中發秀于外卓爾風操穆然容輝周旋中規進退有度仁愛共儉稟于生知詩書禮樂成自師氏竭其孝敬祗事先朝承事無違克諧尊㫖往居桂苑淑問已彰洎奉椒塗謙光載路言無伐善志在匿瑕柔嘉自持喜愠莫見六宫攸序九族以親嘗屬艱迍累從行幸思賢才以輔佐知臣下之勤勞庶績伊凝頗資内助永念頃筐之志且懐求劍之情崇位長秋永懐盛典矧惟元子貞我萬邦稽以舊章是宜從貴今遣攝太尉某官某持節冊命爾為皇后嗚呼敬哉王教之端始於内範風美闗睢之化雅詠思齊之徳罔懈厥位忝于前修克念有終庶無後悔奉承休命可不慎歟冊嘉誠公主文維貞元元年嵗次乙丑六月甲子朔十二日乙亥皇帝若曰王者以義睦宗親以禮敦風俗義之深實先於友愛禮之重莫大於婚姻故春秋書築館之儀易象著歸妹之吉予是用祗考令典率由舊章咨爾嘉誠公主孝友柔謙外和内敏公宫稟訓四徳備修疏邑啓封命為公主徽章所被禮實宜之今遣光禄大夫檢校司徒同平章事汧國公勉持節冊命爾惟欽哉下嫁諸侯諒惟古制肅雍之徳見美詩人和可以克家敬可以行已奉若兹道永孚于休懋敦王風勿墜先訓光膺盛典可不慎歟冊蜀王妃文維建中二年十一月某日皇帝若曰夫茂建親戚以敦族固本明慎選納以厚别蕃嗣寔人倫之始王教之端也朕奉若謨訓允求淑哲賢必有象鍾慶於令門姻不失親載光於戚里故某官駙馬都尉田擇交}
