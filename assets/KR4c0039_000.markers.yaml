  - {type: line-break, offset: 425, content: '', id: KR4c0039_SBCK_000-2a06}
  - {type: variant, offset: 428, length: 631, content: 者以德宗克平㓂亂不惟神武之功爪牙宣力蓋亦資文德腹心之助焉及還京師李抱眞來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也公自行在帶本職拜諌議大夫中書舎人精敏小心未甞有過艱難扈從行在輙隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而巳初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸䞇者賞千金頃之公至太子親王皆賀初公旣職内署母韋氏尚在吴中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩附葬河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子爲之興改容叙弔優禮如此内外屬望旦夕俟其輔政爲竇叅忌嫉故緩之眞拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉苟且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦䛕從而間之屢至不恱親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在德宗實録及竇叅納劉士寧之賂爲李巽所發得罪左遷橫議者以公與叅素不恊歸罷相之議於公户部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士吴通玄忌公先逹毎切中傷隂結延齡互言公短宰相趙憬公之引抜升爲同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公爲賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸䞇軰怨望鼔扇軍人也貶公忠州别駕上怒不可測頼陽城張萬福救之獲免蜀帥韋令抗, WYG: 論}
