  - {type: variant, offset: 1356, length: 126, content: 以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭列蓋道未至也應之曰道雖在我弘之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者蓋時不幸也豈公不幸哉以爲其道未至不亦誣乎公之文集有詩文賦集表狀爲別, WYG: 翰苑}
