  - {type: variant, offset: 513, length: 0, content: '', WYG: 二十二巻中分翰苑榜子為二集其}
  - {type: variant, offset: 514, length: 2, content: 録唐, WYG: 亦與史志相同惟晁公武讀書志所載乃袛有奏議十二巻且稱舊有榜子集五巻議論集三巻翰苑集十巻元祐中蘇軾乞校正進呈改從今名疑是裒諸集成此書與史志名目全不相合今考尤袤遂初堂書目所列實作翰苑集而錢曽讀書敏求記載所見宋槧大字本二十二巻者亦作翰苑集則自南宋以後已合議論表疏為一集而總題以翰苑之名公武所見乃元祐本恐非全冊而今世刋行贄集亦有題作}
  - {type: page-break, offset: 514, content: '', id: KR4c0039_WYG_000-1b, image: WYG1072/WYG1072-0565b.png}
  - {type: page-break, offset: 514, content: '', id: KR4c0039_WYG_000-2a, image: WYG1072/WYG1072-0566a.png}
  - {type: 'kr:newline', offset: 515, content: '

      ', id: KR4c0039_krp_000-bkkkrnewl45}
  - {type: line-break, offset: 515, content: '', id: KR4c0039_SBCK_000-8a02}
  - {type: variant, offset: 519, length: 0, content: '', WYG: 奏議者則又沿讀書志而失之者也宋祁作贄傳賛稱其論諫數十百篇譏陳時病皆本仁義炳炳如丹青而惜徳宗之不能盡用故新唐書例不録排偶之作獨取贄文十餘篇以為後世法司馬光作資治通鑑尤重贄議論採奏疏三十九篇其後蘇軾亦乞以贄文校正進讀盖其文雖多出于一時􅋌救規切之語而于古今來政治得失之故無不深切著明有足為萬世龜鑑者故厯代寳重焉贄尚有詩文别}
  - {type: page-break, offset: 519, content: '', id: KR4c0039_WYG_000-2b, image: WYG1072/WYG1072-0566b.png}
  - {type: variant, offset: 520, length: 2, content: 卷第, WYG: 十五巻乆佚不傳全唐詩所録僅存試帖詩三首及語林所載逸句然經世有用之言悉具是書其所以為贄重者固不必在雕章繪句之末矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士􅐧總校官臣陸費墀欽定四庫全書集部二翰苑集目錄别集類一唐巻}
