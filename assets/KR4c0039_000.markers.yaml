  - {type: variant, offset: 2173, length: 0, content: '', WYG: 翰苑集原序嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聰而盡其善排羣議而試厥謀道之難行亦已久矣東陽綘灌何代無之嘻一薫一蕕善齊不能同其器方鑿圎枘良工無以措巧心所以理世少而亂日多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿呉郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸夀春刺史張鎰有名於時一獲晤言大加賞識暨别鎰以泉貨數萬為賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而已是嵗以書判拔萃調渭南簿本傳作尉御史府以監察换之徳宗皇帝春宫時知名召對翰林即日為學士由祠部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機㑹倉卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶㡬羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以徳宗克平寇亂不惟神武之功爪牙宣力葢亦資文徳腹心之助焉及還京師李抱真来朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也公自行在帶本職拜諌議大夫中書舍人精敏小心未嘗有過艱難扈從行在輒隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職内署母韋氏尚在呉中上遣中使迎致京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩附𦵏河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子為之興改容叙弔優禮如此内外屬望旦夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉茍且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦䛕從而間之屢至不悦親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在徳宗實録及竇參納劉士寧之賂為李巽所發得罪左遷横議者以公與參素不協歸罷相之議於公户部侍郎判度支裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士呉通元忌公先逹每切中傷隂結延齡互言公短宰相趙憬公之引拔升為同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公為賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州别駕上怒不可測賴陽城張萬福救之獲免蜀帥韋令抗表請以贄代已嵗賂資糧公在南賔閉門却埽郡人稀識其靣復避謗不著書惟考校醫方撰集驗方五十巻行於世江峡十稔永貞初與鄭餘慶陽城同徵還公已薨殁時年五十二公之秉筆内署也搉古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫増氣則有制誥集一十巻覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七巻覽公之奏則知公之為臣也其在相位也推賢與能舉直措枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊説争衡考其文也與典謨接軫則有中書奏議七巻覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟惟公才不謂不長位不謂不逹逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏争列盖道未至也應之曰道雖在我𢎞之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者盖時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五巻其闗於時政昭昭然與金石不朽者惟制誥奏議乎雖已流行多謬編次今以類相從􅃣于編首兼略書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟唐權徳輿撰宋進呈奏議劄子元祐八年五月七日蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空疎備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經効於世間不必皆從於已出伏見唐宰相陸贄才本王佐學為帝師論深􅋀於事情言不離於道徳智於子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時徳宗以苛刻為能而贄諌之以忠厚徳宗以猜疑為術而贄勸之以推誠徳宗好用兵而贄以消兵為先徳宗好聚財而贄以散財為急至於用人聴言之法治邉馭將之方罪已以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使徳宗盡用其言則貞觀可得而復臣等每退自西閤即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄靣反復熟讀如與贄言必能發聖性之髙明成治功於嵗月臣等不勝區區之意欽定四庫全書翰苑集巻一唐陸贄撰制誥赦宥上}
