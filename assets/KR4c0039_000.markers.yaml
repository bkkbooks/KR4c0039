  - {type: variant, offset: 1526, length: 541, content: 其官氏景行以爲序引俾後之君子覽公制作效之爲文爲臣事君之道不其偉歟本朝名臣進奏議劄子元祐八年五月七日蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨劄子奏臣等猥以空踈備貟講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所爲竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若巳經效於世間不必皆從於已出伏見唐宰相陸䞇才本王佐學爲帝師論深切於事情言不離於道德智於子房而文則過辯如賈誼而術不踈上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻爲能而䞇諌之以忠厚德宗以猜疑爲術而䞇勸之以推誠德宗好用兵而䞇以消兵爲先德宗好聚財而䞇以散財爲急至於用人聽言之法治邊馭將之方罪已以収人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則正觀可得而復臣等毎退自西閤即私相告言以陛下聖明必喜䞇議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文爲之太息魏相條􅏯董之對則孝宣以致中興若陛下能自得師莫若近取諸䞇夫六經三史諸子百家非無可觀皆足爲治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如䞇之論開卷了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕冩進呈願陛下置之坐隅如見䞇面反復熟讀如與䞇言必能發聖性之髙明成治功於歳月臣等不勝區區之意唐, WYG: 録觧題載}
