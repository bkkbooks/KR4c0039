  - {type: variant, offset: 18, length: 223, content: 觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能逹四聦而盡其善排羣議而試厥謀道之難行亦巳乆矣東陽絳灌何代無之嘻一薫一蕕善齊去声不能同其器方鑿圓枘良工無以措巧心所以理丗少而亂日多大雅衰而正聲寢漢道未融旣失之於賈傅吾唐不幸復擯棄於陸公公諱䞇字敬輿吴郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸壽春刺史張鎰有名於時一獲晤言大加賞識曁別鎰以泉貨數萬爲賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而巳是嵗以書判拔萃調渭南簿, WYG: ''}
